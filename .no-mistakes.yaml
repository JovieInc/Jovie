# OWL pilot — no-mistakes gate commands for JovieInc/Jovie (JOV-3200).
# Docs: docs/NO_MISTAKES_GATE.md
#
# Install gate: no-mistakes init
# Push through gate: git push no-mistakes <branch>
commands:
  lint: bash scripts/hooks/pre-push-gate.sh lint
  test: bash scripts/hooks/pre-push-gate.sh test
  format: bash scripts/hooks/pre-push-gate.sh format

ignore_patterns:
  - pnpm-lock.yaml
  - "**/drizzle/migrations/**"
  - "**/*.generated.*"
  - apps/web/screenshot-catalog/**
  - apps/web/public/product-screenshots/**

test:
  evidence:
    store_in_repo: true
    dir: .no-mistakes/evidence