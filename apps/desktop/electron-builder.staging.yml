appId: app.jov.ie.staging
productName: Jovie Staging
executableName: Jovie Staging
artifactName: Jovie-Staging-${version}-${arch}.${ext}
directories:
  output: dist
afterPack: scripts/apply-electron-fuses.cjs
files:
  - dist-electron/**
  - assets/icon.png
  - assets/icon-staging.png
  - package.json
mac:
  category: public.app-category.music
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
    CFBundleURLTypes:
      - CFBundleURLName: Jovie Staging Auth
        CFBundleURLSchemes:
          - jovie-staging
  notarize: true
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  icon: assets/icon-staging.icns
dmg:
  title: Jovie Staging
  background: assets/dmg-background.png
  iconSize: 112
  iconTextSize: 13
  window:
    width: 760
    height: 480
  contents:
    - x: 242
      y: 244
      type: file
    - x: 518
      y: 244
      type: link
      path: /Applications
win:
  target: nsis
  icon: assets/icon-staging.png
linux:
  target: AppImage
  icon: assets/icon-staging.png
# Staging builds are distributed as CI artifacts only and do NOT auto-update:
# CI packages with --publish never, the version has no prerelease component
# for a provider to match a `staging` channel against, and
# autoUpdater.allowPrerelease is never set. Keep publish disabled.
publish: null
