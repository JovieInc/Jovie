appId: app.jov.ie.staging
productName: Jovie Staging
executableName: Jovie Staging
copyright: "Copyright © 2026 Jovie Inc."
artifactName: Jovie-Staging-${version}-${arch}.${ext}
directories:
  output: dist
afterPack: scripts/apply-electron-fuses.cjs
files:
  - dist-electron/**
  - package.json
mac:
  category: public.app-category.music
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
  notarize: true
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  icon: assets/icon-staging.png
dmg:
  title: Jovie Staging
  background: assets/dmg-background.png
  iconSize: 96
  iconTextSize: 12
  window:
    width: 660
    height: 400
  contents:
    - x: 180
      y: 218
      type: file
    - x: 480
      y: 218
      type: link
      path: /Applications
win:
  target: nsis
  icon: assets/icon-staging.png
linux:
  target: AppImage
  icon: assets/icon-staging.png
publish:
  provider: github
  owner: JovieInc
  repo: Jovie
  # Staging builds publish as prereleases on a separate `staging` channel so
  # that production auto-updater (which reads latest.yml) never picks up a
  # staging build. electron-updater will read staging.yml instead.
  releaseType: prerelease
  channel: staging
