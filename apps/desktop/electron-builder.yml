appId: app.jov.ie
productName: Jovie
executableName: Jovie
artifactName: Jovie-${version}-${arch}.${ext}
directories:
  output: dist
afterPack: scripts/apply-electron-fuses.cjs
files:
  - dist-electron/**
  - assets/icon.png
  - assets/icon-staging.png
  - package.json
mac:
  category: public.app-category.music
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
    CFBundleURLTypes:
      - CFBundleURLName: Jovie Auth
        CFBundleURLSchemes:
          - jovie
  notarize: true
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  icon: assets/icon.icns
dmg:
  title: Jovie
  background: assets/dmg-background.png
  iconSize: 112
  iconTextSize: 13
  window:
    width: 760
    height: 480
  contents:
    - x: 242
      y: 244
      type: file
    - x: 518
      y: 244
      type: link
      path: /Applications
win:
  target: nsis
  icon: assets/icon.png
linux:
  target: AppImage
  icon: assets/icon.png
publish:
  provider: github
  owner: JovieInc
  repo: Jovie
  releaseType: release
