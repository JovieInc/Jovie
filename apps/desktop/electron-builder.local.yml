appId: app.jov.ie.local
productName: Jovie Local
executableName: Jovie Local
artifactName: Jovie-Local-${version}-${arch}.${ext}
directories:
  output: dist
afterPack: scripts/apply-electron-fuses.cjs
files:
  - dist-electron/**
  - assets/icon.png
  - assets/icon-staging.png
  - package.json
mac:
  category: public.app-category.music
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
    CFBundleURLTypes:
      - CFBundleURLName: Jovie Local Auth
        CFBundleURLSchemes:
          - jovie-local
  notarize: false
  target:
    - target: dir
      arch:
        - arm64
  icon: assets/icon-staging.icns
publish: null
