description: Jovie CI eval gate — golden cases (mocked deterministic + optional judge lane)

prompts:
  - file://prompts/system/jovie-chat.md
  - "{{input}}"

providers:
  - id: echo
    label: golden-mock

defaultTest:
  options:
    provider: golden-mock
  assert:
    - type: javascript
      value: file://tests/eval/golden/promptfoo-assertions.cjs:assertGoldenDeterministic

tests: file://tests/eval/golden/promptfoo-cases-deterministic.yaml

evaluateOptions:
  maxConcurrency: 2
  cache: false
  showProgressBar: false

commandLineOptions:
  noCache: true
  noShare: true