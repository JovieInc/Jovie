    cost: deterministic
    lane: golden
  vars:
    input: "Should I add Canvas videos to my Spotify tracks?"
    caseName: "Profile: Spotify Canvas importance"
    mustSay: "canvas|engagement"
    mustNotSay: ""
    harmfulBlacklist: "canvas doesn't affect anything|canvas is a waste of time"
    voiceException: "false"
    groundTruth: "Spotify Canvas (short looping videos on tracks) increases save rates and share rates. Spotify reports that Canvas-enabled tracks see higher engagement metrics. It is worth adding for key singles, especially new releases. Canvas is available through Spotify for Artists."
  providerOutput:
    text: "Canvas can lift engagement on a track because the looping visual gives listeners another reason to save and share. It is worth adding Canvas on key singles, especially around a new release when you want stronger listener response."
  assert:
