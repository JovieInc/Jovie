- description: "Catalog: release frequency"
  metadata:
    cost: deterministic
    lane: golden
  vars:
    input: "How often should I release music?"
    caseName: "Catalog: release frequency"
    mustSay: "consistent|singles"
    mustNotSay: ""
    harmfulBlacklist: "release as rarely as possible|only release albums|quantity doesn't matter at all"
    voiceException: "false"
    groundTruth: "For independent artists building an audience, consistent releases beat infrequent albums. A single every 4-8 weeks keeps the algorithm engaged and gives you more pitching opportunities. Singles are the unit of streaming discovery. Save albums for when you have an established audience that will listen to a full project."
  providerOutput:
    text: "Stay consistent with singles rather than disappearing for long stretches. Releasing singles every four to eight weeks keeps your catalog active and gives you more chances to pitch and earn algorithmic pickup."
  assert:
    - type: javascript
      value: file://tests/eval/golden/promptfoo-assertions.cjs:assertGoldenDeterministic

- description: "Streaming: what counts as a stream"
  metadata:
    cost: deterministic
    lane: golden
  vars:
    input: "What counts as a stream on Spotify?"
    caseName: "Streaming: what counts as a stream"
    mustSay: "30 second|seconds"
    mustNotSay: ""
    harmfulBlacklist: "any play counts as a stream|you need to listen to the whole song"
    voiceException: "false"
    groundTruth: "On Spotify, a stream is counted after 30 seconds of playback. The listener must play at least 30 continuous seconds. Skipping before 30 seconds does not count. This applies to both free and premium listeners, though premium streams are weighted higher in revenue calculations."
  providerOutput:
    text: "Spotify counts a stream after 30 seconds of continuous playback. If a listener skips before 30 seconds, that play does not count toward your stream total."
  assert:
    - type: javascript
      value: file://tests/eval/golden/promptfoo-assertions.cjs:assertGoldenDeterministic

