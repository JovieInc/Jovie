# SonarCloud configuration for CI-based analysis.
# Source of truth: edit shared scan settings here for GitHub Actions.
# .sonarcloud.properties is automatic-analysis-only and should be disabled in
# the SonarCloud UI once SONAR_TOKEN-backed CI scanning is configured.

sonar.projectKey=JovieInc_Jovie
sonar.organization=jovieinc
sonar.projectName=Jovie
sonar.projectVersion=1.0

sonar.sources=apps/web/app,apps/web/components,apps/web/constants,apps/web/lib,apps/web/proxy.ts,packages/ui
sonar.tests=apps/web/tests,packages/ui

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.stories.tsx,\
  **/.storybook/**,\
  **/storybook-static/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/*.config.cjs,\
  **/drizzle/migrations/**,\
  **/public/**,\
  **/.turbo/**,\
  **/.vercel/**,\
  **/.cache/**,\
  **/*.d.ts,\
  **/tests/e2e/**,\
  **/globals.css,\
  scripts/knowledge/topics/**/*.md,\
  apps/web/lib/chat/knowledge/topics/**/*.md

sonar.cpd.exclusions=scripts/knowledge/topics/**/*.md,apps/web/lib/chat/knowledge/topics/**/*.md,**/*.test.ts,**/*.test.tsx,**/eval/fixtures/**

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/tests/**

sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,packages/ui/coverage/lcov.info
sonar.typescript.tsconfigPaths=apps/web/tsconfig.json,packages/ui/tsconfig.json
sonar.sourceEncoding=UTF-8
sonar.cpd.minTokens=80
sonar.javascript.environments=browser,node
sonar.typescript.environments=browser,node
sonar.filesize.limit=1000

sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx
# Suppress "Test should not be skipped" (S1607/S1516) for all spec/test files.
# Conditional test.skip() calls are intentional — they guard expensive or
# credential-gated E2E tests that cannot run in standard CI.
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S1607
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.spec.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1607
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.spec.ts
