# Exclude knowledge canon content files from duplication detection and analysis.
# Topic markdown files exist in two locations: the source-of-truth scripts/ dir
# and the apps/web copy used at runtime. Both are distilled reference content
# with intentionally similar structure across topics.
sonar.cpd.exclusions=scripts/knowledge/topics/**/*.md,apps/web/lib/chat/knowledge/topics/**/*.md
sonar.exclusions=scripts/knowledge/topics/**/*.md,apps/web/lib/chat/knowledge/topics/**/*.md
