# Gitleaks Configuration for Jovie
# https://github.com/gitleaks/gitleaks
#
# Scans staged changes (pre-commit), PR diffs (CI), and full git history (main + schedule).
# Keep allowlists narrow — broad docs/*.md exclusions hid real secrets (JOV-2940).
# Backup files (*.backup, *.bak) are intentionally NOT allowlisted (JOV-3215).

[extend]
# Use the default gitleaks config as a base
# See: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

# =============================================================================
# Path Allowlists
# =============================================================================
# Files and directories that should be excluded from scanning

[allowlist]
description = "Narrow allowlist for test fixtures, examples, and templates"

# Regex patterns for paths to ignore
paths = [
    # Test directories and fixtures (anchored — avoid matching paths like contests/)
    '''(?:^|/)tests?/''',
    '''(?:^|/)__tests__/''',
    '''(?i)\.test\.(ts|tsx|js|jsx)$''',
    '''(?i)\.spec\.(ts|tsx|js|jsx)$''',
    '''(?:^|/)fixtures?/''',
    '''(?:^|/)mocks?/''',

    # Example and template files
    '''\.env\.example$''',
    '''\.env\.sample$''',
    '''\.env\.template$''',

    # Generated/build output (should not contain secrets anyway)
    '''node_modules/''',
    '''\.next/''',
    '''\.turbo/''',
    '''dist/''',
    '''\.vercel/''',

    # Lock files
    '''pnpm-lock\.yaml$''',
    '''package-lock\.json$''',
    '''yarn\.lock$''',

    # Plop templates (code generators)
    '''plop-templates/''',

    # Cursor/Editor rules
    '''\.cursor/''',
    '''\.cursorrules$''',
    '''copilot-instructions\.md$''',

    # Archive/historical files
    '''archive/''',

    # Log files from test runs
    '''\.log$''',

    # Gitleaks self-test fixtures (intentionally contain leak-shaped strings)
    '''scripts/security/gitleaks-fixture\.txt$''',
    '''scripts/security/gitleaks-backup-fixture\.txt$''',
]

# Regex patterns for content to ignore (false positive patterns)
regexes = [
    # Placeholder values in env examples
    '''your_.*_here''',
    '''YOUR_.*_HERE''',
    '''your-real-.*-key''',
    '''placeholder''',
    '''PLACEHOLDER''',

    # Common test/mock prefixes
    '''pk_test_mock''',
    '''sk_test_mock''',
    '''dummy''',
    '''DUMMY''',
    '''mock-key''',
    '''test-key''',
    '''fake-key''',
    '''sample-key''',

    # Supabase dummy values
    '''anon_dummy''',
    '''pub_dummy''',
    '''dummy_key''',
    '''dummy\.supabase\.co''',

    # Stripe test mode patterns (commonly appear in docs/tests)
    '''prctbl_dummy''',

    # URL patterns that look like tokens but aren't
    '''localhost''',
    '''127\.0\.0\.1''',
    '''0\.0\.0\.0''',

    # Generic placeholder patterns
    '''xxxx''',
    '''XXXX''',
    '''aaaa''',
    '''1234567890''',
]

# Specific commit SHAs to ignore (for known false positives in history)
# 75ef52d12 — introduced .claude/settings.local.json.backup (Neon connection strings)
# and docs/testing-clerk.md (Clerk sk_test key) in screenshots auto-commit #10692.
# Both were redacted in JOV-2940 (commit 77cbe76c5). Allowlist the introducing commit so
# history scans (workflow_dispatch / scheduled full / `--log-opts` ranges that collapse to
# near-full history on shallow fetches) don't flag already-remediated secrets.
commits = [
    "75ef52d12656b4841c3080ea0d20ff2f74b37c63",
]

# =============================================================================
# Custom Rules — close gaps that allowed JOV-2940 to land
# =============================================================================

[[rules]]
id = "neon-postgres-connection-string"
description = "Neon Postgres connection string with embedded password"
regex = '''postgresql://[^:]+:[^@\s'"]+@[^\s'"]*neon\.tech[^\s'"]*'''
tags = ["database", "neon", "jovie"]

[[rules]]
id = "clerk-secret-key"
description = "Clerk secret key (sk_test_ or sk_live_)"
regex = '''(?i)(?:CLERK_SECRET_KEY\s*=\s*)?sk_(?:test|live)_[A-Za-z0-9]{20,}'''
tags = ["clerk", "auth", "jovie"]

# =============================================================================
# Stop Words
# =============================================================================
# Common words that appear in false positives

[allowlist.stopwords]
# These exact strings are ignored when found as standalone matches
# Useful for common variable names or documentation references