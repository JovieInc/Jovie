# CodeRabbit Configuration for Jovie
# See: https://docs.coderabbit.ai/reference/configuration

language: en-US
early_access: true

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  collapse_walkthrough: true

  finishing_touches:
    unit_tests:
      enabled: true

  tools:
    biome:
      enabled: true
    eslint:
      enabled: false
    shellcheck:
      enabled: true
    actionlint:
      enabled: true

  auto_review:
    enabled: true
    drafts: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[skip ci]"

  suggested_labels: true
  auto_apply_labels: true
  labeling_instructions:
    - label: "schema:drizzle"
      instructions: "Apply when the PR contains changes to drizzle/migrations/ directory. This indicates database migration changes that require careful review."
    - label: "schema:core"
      instructions: "Apply when the PR modifies lib/db/schema.ts. This is the core schema definition file."
    - label: "schema:migration-journal"
      instructions: "Apply when the PR modifies drizzle/migrations/meta/_journal.json. This is the migration tracking journal."
    - label: "area:cron"
      instructions: "Apply when the PR contains changes to app/api/cron/ directory. This affects scheduled background jobs."
    - label: "area:auth"
      instructions: "Apply when the PR modifies authentication-related files in app/(auth)/ or lib/auth/. This is security-sensitive code."
    - label: "area:env"
      instructions: "Apply when the PR modifies turbo.json build.env array, .env.example, or environment variable configuration. This affects deployment and configuration."

  path_instructions:
    # === DRIZZLE MIGRATION RULES (Enhanced) ===
    - path: "drizzle/migrations/**"
      instructions: |
        CRITICAL: Database migrations are IMMUTABLE. Review with extreme care.

        **BLOCKING Issues (must fix):**
        - CONCURRENTLY keyword is FORBIDDEN (Drizzle doesn't support it)
        - Missing IF NOT EXISTS for CREATE TABLE/INDEX
        - Missing IF EXISTS for DROP operations
        - Migration not registered in drizzle/migrations/_journal.json
        - Destructive operations (DROP TABLE, DROP COLUMN) without data backup plan
        - Renaming columns/tables (use add+migrate+drop pattern instead)

        **Required Patterns:**
        - All CREATE TABLE must use `IF NOT EXISTS`
        - All CREATE INDEX must use `IF NOT EXISTS`
        - Column additions should have DEFAULT values for non-nullable columns
        - Enum changes must use proper migration pattern (create new, migrate, drop old)

        **Naming Convention:**
        - File format: NNNN_description.sql (4-digit prefix)
        - Description should be kebab-case, max 50 chars

        **Journal Check:**
        - Verify _journal.json includes this migration with correct hash
        - Migrations must be append-only, never modify existing entries

    - path: "drizzle/migrations/_journal.json"
      instructions: |
        Migration journal is the source of truth.
        - Entries must be append-only - NEVER modify or remove existing entries
        - Each entry needs: idx, version, when, tag, breakpoints
        - Hash in 'tag' must match the actual migration file content
        - Indices must be sequential with no gaps

    - path: "lib/db/schema.ts"
      instructions: |
        Schema changes trigger blocking migration review.
        - Verify corresponding migrations exist
        - Check for proper types (jsonb over json, text over varchar)
        - Ensure RLS-compatible patterns are followed

    # === SECURITY RULES ===
    - path: "**/*.ts"
      instructions: |
        Security review checklist:

        **Hardcoded Secrets (BLOCKING):**
        - No API keys, tokens, or passwords in code
        - No hardcoded URLs with credentials
        - Environment variables must use process.env or publicEnv/serverEnv wrappers

        **Input Validation:**
        - User input must be validated before use
        - SQL queries must use parameterized queries (Drizzle handles this)
        - File paths from user input must be sanitized

        **Auth Checks:**
        - API routes must verify authentication
        - Server actions must check user permissions
        - Sensitive operations should have rate limiting

    - path: "app/api/**"
      instructions: |
        API Route Security:

        **Authentication (BLOCKING if missing):**
        - Must call auth() or getAuth() at route start
        - Must verify userId exists before processing
        - Must return 401/403 for unauthorized access

        **Input Handling:**
        - Validate request body with zod schema
        - Check Content-Type header for POST/PUT/PATCH
        - Sanitize any user-provided strings used in responses

        **Error Handling:**
        - Never expose internal error details to clients
        - Log errors with context but return generic messages
        - Use try/catch for async operations

    - path: "lib/db/**"
      instructions: |
        Database Security:

        **Query Safety:**
        - Never use raw SQL with string interpolation
        - Use Drizzle's query builder for all queries
        - Avoid sql.raw() unless absolutely necessary

        **Connection Security:**
        - Database URLs must come from environment variables
        - Never log connection strings or credentials

    # === AUTH/CLERK RULES ===
    - path: "app/(auth)/**"
      instructions: |
        Authentication code is high-risk.
        - Verify Clerk integration follows best practices
        - Check for proper session handling
        - Ensure no hardcoded credentials or tokens

    # === PAYMENT RULES ===
    - path: "app/api/stripe/**"
      instructions: |
        Payment code is high-risk.
        - Verify webhook signature validation
        - Check for proper error handling and idempotency
        - Confirm Node runtime (not Edge)

    # === MIDDLEWARE ===
    - path: "middleware.ts"
      instructions: |
        Middleware affects all routes.
        - Verify route matching is correct
        - Check for performance implications
        - Ensure proper Clerk middleware usage

    # === CORE FLOWS ===
    - path: "app/onboarding/**"
      instructions: |
        Onboarding is a core user flow.
        - Ensure flow completeness (name -> handle -> done)
        - Verify proper error states and validation
        - Check for proper Clerk user sync

    # === CI/CD ===
    - path: ".github/workflows/**"
      instructions: |
        CI/CD changes can break the deployment pipeline.
        - Verify job dependencies are correct
        - Check for proper secret handling
        - Ensure timeout values are appropriate
        - Validate concurrency settings

chat:
  auto_reply: true

# NOTE: Auto-labeling restored using correct schema (2025-12-24)
# Previous attempt used deprecated keys: 'auto_labeling', 'label_instructions'
# Correct keys are: 'suggested_labels', 'auto_apply_labels', 'labeling_instructions'
# See: https://docs.coderabbit.ai/reference/configuration

code_generation:
  unit_tests:
    path_instructions:
      - path: "apps/web/lib/**/*.{ts,tsx}"
        instructions: |
          Use vitest as the test framework. Import from 'vitest' explicitly (describe, it, expect, vi).
          Place test files co-located as `<filename>.test.ts` next to the source, OR in `apps/web/tests/lib/` mirroring the source structure.
          Mock external services (Clerk, Stripe, Neon DB) with vi.mock().
          Use vi.fn() for function mocks, never jest.fn().
          Target <200ms per test. Prefer fewer, stronger assertions over many weak ones.
          Include edge cases and error scenarios.
          Never use db.transaction() — the Neon HTTP driver doesn't support it.
          For database code, mock with vi.mock('@/lib/db') — never hit a real database.
          CRITICAL: All string assertions must be extracted from the actual source code. Never infer or guess user-facing text. Read the source file and copy the exact strings used in the code.

      - path: "apps/web/components/**/*.tsx"
        instructions: |
          Use vitest with @testing-library/react for component tests.
          Place test files in `apps/web/tests/components/` mirroring the component path.
          Use render() from @testing-library/react, query with screen.getByRole/getByText.
          Test user interactions with @testing-library/user-event (not fireEvent).
          Mock hooks and server actions with vi.mock().
          Do NOT test implementation details (internal state, refs). Test behavior and output.
          For components using 'use client', ensure the test file imports are compatible.

      - path: "apps/web/hooks/**/*.ts"
        instructions: |
          Use vitest with @testing-library/react's renderHook() for custom hook tests.
          Place test files co-located as `<hookName>.test.ts` next to the source, OR in `apps/web/tests/hooks/` mirroring the source structure.
          Test return values, state transitions, and cleanup behavior.
          Mock browser APIs (IntersectionObserver, matchMedia, etc.) when needed.

      - path: "apps/web/app/api/**/*.ts"
        instructions: |
          Test API routes with proper request/response mocking.
          Always test three auth scenarios: authenticated, unauthenticated (no session), wrong user (403).
          Mock auth() from @clerk/nextjs/server with vi.mock().
          Validate request body parsing with zod schema edge cases.
          Test error handling: invalid input, missing fields, server errors.
          Verify correct HTTP status codes (200, 400, 401, 403, 404, 500).

      - path: "apps/web/lib/db/**/*.ts"
        instructions: |
          Mock the database layer with vi.mock('@/lib/db').
          Test query builder logic and business logic separately.
          Never use db.transaction() — Neon HTTP driver is incompatible.
          Test data serialization (Dates must use .toISOString() at server/client boundary).

      - path: "packages/ui/**/*.tsx"
        instructions: |
          Use vitest with @testing-library/react.
          Place tests co-located in the same directory as the component.
          Test accessibility: ensure proper ARIA attributes and keyboard navigation.
          These are shared components — test the public API (props), not internals.

      - path: "**/*.{ts,tsx}"
        instructions: |
          Fallback for files outside the specific paths above.
          Use vitest as the test framework. Import from 'vitest' explicitly (describe, it, expect, vi).
          Place test files co-located as `<filename>.test.ts` next to the source.
          Use vi.fn() for function mocks, never jest.fn().
          Target <200ms per test. Include edge cases and error scenarios.

  docstrings:
    language: en-US
    path_instructions:
      - path: "apps/web/lib/**/*.{ts,tsx}"
        instructions: |
          Use JSDoc format (/** ... */) for all exported functions, types, and constants.
          Include @param tags for each parameter with a short description.
          Include @returns tag describing the return value and its type when not obvious.
          For error-returning functions, document possible error codes/shapes.
          Focus on the "why" not the "what" — explain intent, not implementation.
          Keep descriptions concise (1-2 sentences max for the summary line).
          Do NOT add docstrings to trivial getters/setters or obvious one-liners.

      - path: "apps/web/components/**/*.tsx"
        instructions: |
          Use JSDoc format on exported React components.
          Document the component's purpose and when to use it (1-2 sentences).
          Use @param or @property tags for non-obvious props only — skip self-evident ones like `className`.
          Do NOT document internal helper components that aren't exported.

      - path: "apps/web/hooks/**/*.ts"
        instructions: |
          Use JSDoc on all exported hooks.
          Document what the hook manages, its return value shape, and any side effects.
          Include @example blocks for hooks with non-obvious usage patterns.

      - path: "apps/web/app/api/**/*.ts"
        instructions: |
          Document each API route handler (GET, POST, PUT, DELETE) with:
          - Purpose of the endpoint
          - Auth requirements
          - Expected request body shape (if applicable)
          - Response shape and status codes
          Use JSDoc format.

      - path: "apps/web/lib/db/**/*.ts"
        instructions: |
          Document exported query functions with JSDoc.
          Include @param tags for filter/query parameters.
          Document return types, especially when returning joined/transformed data.
          Note any Neon-specific constraints (no transactions, HTTP driver).

      - path: "packages/ui/**/*.tsx"
        instructions: |
          Use JSDoc on all exported UI components.
          Document the component's purpose, visual behavior, and key props.
          Include @example for components with complex prop combinations.
          These are shared library components — good docs are critical for consumers.
