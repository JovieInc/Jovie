name: Canary Health Gate

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      deployment_url:
        description: Base URL for the deployment to verify.
        required: false
        type: string
      deployment_url_b64:
        description: Base64-encoded deployment URL for masked cross-job handoff.
        required: false
        type: string
      deployment_id:
        description: Exact Vercel deployment ID produced by the caller.
        required: false
        type: string
      commit_sha:
        description: Git commit SHA for the deployment.
        required: true
        type: string
      wait_seconds:
        description: Seconds to wait before the first health check.
        required: false
        default: 30
        type: number
    outputs:
      canary_status:
        description: 'Canary verification status: verified, failed'
        value: ${{ jobs.canary-health-gate.outputs.canary_status }}
      verified_deployment_url:
        description: Verified deployment URL after build-info commit verification.
        value: ${{ jobs.canary-health-gate.outputs.verified_deployment_url }}
    secrets:
      VERCEL_AUTOMATION_BYPASS_SECRET:
        required: false
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  canary-health-gate:
    name: Canary health gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      canary_status: ${{ steps.canary-status.outputs.canary_status || steps.canary-check.outputs.canary_status }}
      verified_deployment_url: ${{ steps.canary-check.outputs.verified_deployment_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1
          persist-credentials: false

      # The exact-deployment resolver is Node code; pin Node before its first
      # invocation instead of relying on the mutable hosted-runner default.
      - uses: ./.github/actions/setup-node-pnpm

      - name: Canary health check
        id: canary-check
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          DEPLOYMENT_URL_B64: ${{ inputs.deployment_url_b64 }}
          DEPLOYMENT_ID: ${{ inputs.deployment_id }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          echo "Running canary health check..."
          deployment_url="${DEPLOYMENT_URL}"
          if [ -z "$deployment_url" ] && [ -n "${DEPLOYMENT_URL_B64:-}" ]; then
            deployment_url="$(printf '%s' "$DEPLOYMENT_URL_B64" | base64 --decode)"
          fi
          deployment_url="${deployment_url%/}"
          caller_deployment_url="$deployment_url"
          [[ "$WAIT_SECONDS" =~ ^[0-9]+$ ]] && [ "$WAIT_SECONDS" -le 300 ] || {
            echo "❌ Canary failed: wait_seconds must be an integer from 0 to 300."
            echo "canary_status=failed_config" >> "$GITHUB_OUTPUT"
            exit 1
          }
          # Honor the documented stabilization delay before the first Vercel API
          # lookup. The resolver then owns bounded polling for list propagation
          # and BUILDING/QUEUED/INITIALIZING convergence.
          sleep "$WAIT_SECONDS"
          if ! resolved_deployment="$(
            VERCEL_CANDIDATE_DEPLOYMENT_URL="$deployment_url" \
            VERCEL_CANDIDATE_DEPLOYMENT_ID="$DEPLOYMENT_ID" \
            EXPECTED_COMMIT_SHA="$COMMIT_SHA" \
            VERCEL_DEPLOYMENT_MAX_PAGES=5 \
            VERCEL_API_TIMEOUT_MS=180000 \
            VERCEL_DEPLOYMENT_POLL_INTERVAL_MS=5000 \
              node apps/web/scripts/vercel-protected-origin.cjs resolve-deployment
          )"; then
            echo "❌ Canary failed: Vercel could not bind the exact caller URL/ID/full SHA as READY within the absolute deadline."
            echo "canary_status=failed_config" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          resolved_commit_deployment_url="$(jq -r '.url // ""' <<<"$resolved_deployment")"
          resolved_commit_deployment_id="$(jq -r '.id // ""' <<<"$resolved_deployment")"
          if [ -z "$deployment_url" ]; then
            deployment_url="$resolved_commit_deployment_url"
          fi
          if { [ -n "$caller_deployment_url" ] &&
              [ "$caller_deployment_url" != "$resolved_commit_deployment_url" ]; } ||
            { [ -n "$DEPLOYMENT_ID" ] &&
              [ "$DEPLOYMENT_ID" != "$resolved_commit_deployment_id" ]; } ||
            [[ ! "$resolved_commit_deployment_id" =~ ^dpl_[A-Za-z0-9]+$ ]]; then
            echo "❌ Canary failed: caller deployment URL/ID does not match the exact project-scoped Vercel result."
            echo "canary_status=failed_config" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          USER_AGENT="Mozilla/5.0 (compatible; JovieCI/1.0; +https://jov.ie)"
          COOKIE_JAR="$(mktemp)"
          trap 'rm -f "$COOKIE_JAR"' EXIT

          # One Node process owns the only secret-bearing request. It binds the
          # preview URL, commit, environment, cookie scope, and shared semantic
          # public surfaces under one absolute deadline.
          if [ -z "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            echo "❌ Canary failed: VERCEL_AUTOMATION_BYPASS_SECRET is required for deterministic staging verification."
            echo "canary_status=failed_config" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! VERCEL_PROBE_URL="$deployment_url" \
            EXPECTED_VERCEL_DEPLOYMENT_ORIGIN="$deployment_url" \
            EXPECTED_COMMIT_SHA="$COMMIT_SHA" \
            EXPECTED_VERCEL_ENVIRONMENT=preview \
            VERCEL_PROBE_COOKIE_JAR="$COOKIE_JAR" \
            VERCEL_VERIFY_PUBLIC_SURFACES=true \
            VERCEL_PROBE_TIMEOUT_MS=180000 \
              node apps/web/scripts/vercel-protected-origin.cjs bootstrap-cookie-jar; then
            echo "❌ Canary failed: protected-origin exact build or semantic public-surface verification failed."
            echo "canary_status=failed_config" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "verified_deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"
          CURL_TIMEOUT_ARGS=(--connect-timeout 5 --max-time 15)

          # This gate verifies the raw Vercel preview deployment. Preview/staging
          # must stay out of search indexes; production SEO is checked separately
          # against jov.ie after promotion.
          echo "Checking preview-safe robots.txt..."
          robots_url="${deployment_url%/}/robots.txt"
          robots_response=$(curl -s --max-redirs 0 "${CURL_TIMEOUT_ARGS[@]}" -A "$USER_AGENT" -H "Cache-Control: no-cache, no-store, must-revalidate" -H "Pragma: no-cache" -b "$COOKIE_JAR" -w "\n%{http_code}" "${robots_url}$( [[ "$robots_url" == *"?"* ]] && echo '&' || echo '?' )_cb=$(date +%s%N)" || printf '\n000')
          robots_code="${robots_response##*$'\n'}"
          robots_body="${robots_response%$'\n'*}"

          preview_robots_policy_valid() {
            awk '
              function trim(value) { gsub(/^[[:space:]]+|[[:space:]]+$/, "", value); return value }
              BEGIN { wildcard_group = 0; group_has_rules = 0; wildcard_disallow = 0; root_allow = 0; sitemap_advertised = 0 }
              {
                line = $0; sub(/\r$/, "", line); sub(/[[:space:]]*#.*/, "", line); line = trim(line)
                if (line == "") next
                separator = index(line, ":"); if (separator == 0) next
                directive = tolower(trim(substr(line, 1, separator - 1)))
                value = trim(substr(line, separator + 1))
                if (directive == "sitemap") { sitemap_advertised = 1; next }
                if (directive == "user-agent") {
                  if (group_has_rules) { wildcard_group = 0; group_has_rules = 0 }
                  if (value == "*") wildcard_group = 1
                  next
                }
                if (directive == "allow" || directive == "disallow") {
                  group_has_rules = 1
                  if (wildcard_group && directive == "allow" && value == "/") root_allow = 1
                  if (wildcard_group && directive == "disallow" && value == "/") wildcard_disallow = 1
                }
              }
              END { exit(wildcard_disallow && !root_allow && !sitemap_advertised ? 0 : 1) }
            '
          }

          if [ "$robots_code" != "200" ] ||
            ! printf '%s\n' "$robots_body" | preview_robots_policy_valid; then
            echo "❌ Canary failed: preview robots.txt must globally block crawlers with Disallow: /, without Allow: / or Sitemap:"
            echo "canary_status=failed_seo_robots" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ preview robots.txt blocks indexing"

          # Verify /start chat is not accidentally disabled by a default-off
          # feature flag. This intentionally omits a Turnstile token: a healthy
          # production build should reach the bot gate and return 403
          # TURNSTILE_REQUIRED, not 503 ONBOARDING_CHAT_DISABLED.
          echo "Checking onboarding chat reaches the bot gate..."
          onboarding_chat_url="${deployment_url%/}/api/chat"
          onboarding_chat_response=$(curl -s --max-redirs 0 "${CURL_TIMEOUT_ARGS[@]}" -A "$USER_AGENT" -X POST -H "Content-Type: application/json" -H "Accept: application/json" -H "Cache-Control: no-cache, no-store, must-revalidate" -H "Pragma: no-cache" -b "$COOKIE_JAR" -d '{"mode":"onboarding","messages":[{"id":"canary-onboarding","role":"user","parts":[{"type":"text","text":"canary"}]}]}' -w "\n%{http_code}" "${onboarding_chat_url}" || printf '\n000')
          onboarding_chat_code="${onboarding_chat_response##*$'\n'}"
          onboarding_chat_body="${onboarding_chat_response%$'\n'*}"

          if echo "$onboarding_chat_body" | grep -q '"errorCode":"ONBOARDING_CHAT_DISABLED"'; then
            echo "❌ Canary failed: onboarding chat is disabled by runtime gate"
            echo "canary_status=failed_onboarding_chat" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$onboarding_chat_code" = "403" ] && echo "$onboarding_chat_body" | grep -q '"errorCode":"TURNSTILE_REQUIRED"'; then
            echo "✅ Onboarding chat reached Turnstile gate"
          else
            echo "❌ Canary failed: onboarding chat expected 403 TURNSTILE_REQUIRED, got HTTP $onboarding_chat_code"
            echo "Response preview: ${onboarding_chat_body:0:300}"
            echo "canary_status=failed_onboarding_chat" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Verify /api/chat is reachable and auth-gated.
          #
          # NOTE: This probe has shown intermittent false positives on staging
          # (transient 5xx responses while the deployment is still warming). Keep
          # this check informational so canary does not block healthy deployments.
          echo "Checking /api/chat is reachable and auth-gated (informational)..."
          chat_url="${deployment_url%/}/api/chat"
          chat_response=$(curl -s --max-redirs 0 "${CURL_TIMEOUT_ARGS[@]}" -A "$USER_AGENT" -X POST -H "Content-Type: application/json" -H "Cache-Control: no-cache, no-store, must-revalidate" -H "Pragma: no-cache" -b "$COOKIE_JAR" -d '{"messages":[{"id":"1","role":"user","parts":[{"type":"text","text":"hi"}]}]}' -w "\n%{http_code}" "${chat_url}" || printf '\n000')
          chat_code="${chat_response##*$'\n'}"

          # The chat route checks auth before body parsing, so unauthenticated
          # probes should return 401 when healthy.
          if [ "$chat_code" = "401" ]; then
            echo "✅ /api/chat reachable and auth-gated (HTTP 401)"
          else
            echo "⚠️ /api/chat probe returned HTTP $chat_code (expected 401). Continuing because this check is currently flaky on staging."
          fi

          echo "✅ HTTP canary passed: shared semantic surfaces and route-specific controls are healthy"

      - name: Cache Playwright Browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium)
        run: pnpm --filter=@jovie/web exec playwright install chromium

      - name: Verify public auth controls are interactive
        run: |
          cd apps/web
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          auth_smoke_attempt=1
          auth_smoke_max_attempts=3

          # The browser smoke exchanges the credential on the exact verified
          # build-info route, verifies build identity and host-only cookie
          # behavior, then navigates without credential headers or query params.
          until CI=true \
            SMOKE_ONLY=1 \
            BASE_URL="${DEPLOYMENT_URL}" \
            EXPECTED_VERCEL_ENVIRONMENT=preview \
            PLAYWRIGHT_DYNAMIC_SECRETS_FILE="$RUNNER_TEMP/playwright-dynamic-cookie-values" \
              node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- \
                pnpm exec playwright test tests/e2e/auth-public-ready.spec.ts --project=chromium --reporter=line; do
            if [ "$auth_smoke_attempt" -ge "$auth_smoke_max_attempts" ]; then
              echo "❌ Public auth controls failed after ${auth_smoke_max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$((auth_smoke_attempt * 30))
            echo "⚠ Public auth controls were not interactive on attempt ${auth_smoke_attempt}/${auth_smoke_max_attempts}. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            auth_smoke_attempt=$((auth_smoke_attempt + 1))
          done
        env:
          DEPLOYMENT_URL: ${{ steps.canary-check.outputs.verified_deployment_url || inputs.deployment_url }}
          EXPECTED_COMMIT_SHA: ${{ inputs.commit_sha }}
          EXPECTED_VERCEL_DEPLOYMENT_ORIGIN: ${{ steps.canary-check.outputs.verified_deployment_url }}
          PLAYWRIGHT_VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Mark canary verified
        id: canary-status
        run: echo "canary_status=verified" >> "$GITHUB_OUTPUT"
