name: Auto-Fix Lint on Agent Drafts

# When an agent-owned draft PR has a failing Lint/Biome check, this workflow
# checks out the PR head, runs `pnpm biome check --write .` on changed files,
# and pushes the mechanical fixes back. If typecheck fails (semantic error),
# it skips and comments instead.
#
# Only fires on agent branches. Human PRs are left alone.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: auto-fix-lint-agent-drafts
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  auto-fix-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Auto-fix biome lint on agent drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
        run: bash scripts/auto-fix-lint-agent-drafts.sh
