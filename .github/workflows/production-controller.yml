name: Production Controller
run-name: Production Controller ${{ github.event.workflow_run.head_sha }} from CI ${{ github.event.workflow_run.id }} attempt ${{ github.event.workflow_run.run_attempt }}

on:
  # CI completion is the sole release signal. Every main SHA reaches CI because
  # ci.yml has no push path filters, and every completed retry naturally creates
  # a new controller opportunity without a duplicate push-triggered generation.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

# Every initial run and rerun joins one repo-wide FIFO. This lease spans exact
# CI evidence authorization, all production mutation and rollback gates,
# immutable probes, canonical finalization, and the only release notification.
concurrency:
  group: production-mutation
  queue: max
  cancel-in-progress: false

jobs:
  authorize-production:
    name: Authorize exact main CI evidence
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      authorized: ${{ steps.authorize.outputs.authorized }}
      is_current: ${{ steps.authorize.outputs.is_current }}
      source_ci_run_id: ${{ steps.authorize.outputs.source_ci_run_id }}
      source_ci_run_attempt: ${{ steps.authorize.outputs.source_ci_run_attempt }}
      expected_sha: ${{ steps.authorize.outputs.expected_sha }}
      already_verified: ${{ steps.authorize.outputs.already_verified }}
      marker_recovery: ${{ steps.authorize.outputs.marker_recovery }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - name: Cross-prove exact successful push CI
        id: authorize
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
          TRIGGER_RUN_ID: ${{ github.event.workflow_run.id }}
          TRIGGER_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          TRIGGER_WORKFLOW_ID: ${{ github.event.workflow_run.workflow_id }}
          TRIGGER_RUN_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_RUN_PATH: ${{ github.event.workflow_run.path }}
          TRIGGER_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_RUN_STATUS: ${{ github.event.workflow_run.status }}
          TRIGGER_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TRIGGER_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "authorized=false"
            echo "is_current=false"
            echo "already_verified=false"
            echo "marker_recovery=false"
          } >> "$GITHUB_OUTPUT"
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Controller expected SHA must be a full commit."
            exit 1
          }
          echo "expected_sha=$EXPECTED_SHA" >> "$GITHUB_OUTPUT"
          [[ "$TRIGGER_RUN_ID" =~ ^[1-9][0-9]*$ ]] &&
            [[ "$TRIGGER_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]] &&
            [[ "$TRIGGER_WORKFLOW_ID" =~ ^[1-9][0-9]*$ ]] &&
            [ "$TRIGGER_RUN_EVENT" = "push" ] &&
            [ "$TRIGGER_RUN_PATH" = ".github/workflows/ci.yml" ] &&
            [ "$TRIGGER_HEAD_BRANCH" = "main" ] &&
            [ "$TRIGGER_RUN_STATUS" = "completed" ] &&
            [ "$TRIGGER_RUN_CONCLUSION" = "success" ] &&
            [ "$TRIGGER_HEAD_REPOSITORY" = "$REPOSITORY" ] || {
            echo "::error::workflow_run did not identify an exact main push CI attempt."
            exit 1
          }

          ci_workflow_json="$(gh api "repos/$REPOSITORY/actions/workflows/ci.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . > 0) and
            .name == "CI" and
            .path == ".github/workflows/ci.yml" and
            .state == "active"
          ' >/dev/null <<<"$ci_workflow_json" || {
            echo "::error::Authoritative CI workflow identity is malformed."
            exit 1
          }
          ci_workflow_id="$(jq -r '.id' <<<"$ci_workflow_json")"
          if [ "$TRIGGER_WORKFLOW_ID" != "$ci_workflow_id" ]; then
            echo "::error::workflow_run did not originate from the authoritative CI workflow."
            exit 1
          fi

          current_main_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha // empty')"
          [[ "$current_main_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Could not resolve exact current main while authorizing production."
            exit 1
          }
          if [ "$current_main_sha" != "$EXPECTED_SHA" ]; then
            echo "::notice::Controller generation $EXPECTED_SHA was superseded by $current_main_sha before production authorization."
            exit 0
          fi
          echo "is_current=true" >> "$GITHUB_OUTPUT"

          controller_workflow_json="$(gh api \
            "repos/$REPOSITORY/actions/workflows/production-controller.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . > 0) and
            .name == "Production Controller" and
            .path == ".github/workflows/production-controller.yml" and
            .state == "active"
          ' >/dev/null <<<"$controller_workflow_json" || {
            echo "::error::Authoritative Production Controller workflow identity is malformed."
            exit 1
          }
          controller_workflow_id="$(jq -r '.id' <<<"$controller_workflow_json")"
          marker_state_json="$(node .github/scripts/production-marker-state.mjs \
            --sha "$EXPECTED_SHA" \
            --repo "$REPOSITORY" \
            --controller-workflow-id "$controller_workflow_id" \
            --actor-run-id "${{ github.run_id }}" \
            --actor-attempt "${{ github.run_attempt }}")"
          jq -e '
            type == "object" and
            (.state | IN("none", "pending", "recovery_available", "verified", "manual")) and
            (.reason | type == "string" and length > 0)
          ' >/dev/null <<<"$marker_state_json" || {
            echo "::error::Production marker classifier returned malformed evidence."
            exit 1
          }
          marker_state="$(jq -r '.state' <<<"$marker_state_json")"
          marker_reason="$(jq -r '.reason' <<<"$marker_state_json")"
          case "$marker_state" in
            verified)
              echo "already_verified=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Exact production generation $EXPECTED_SHA is already verified by its payload-bound historical attempt."
              exit 0
              ;;
            pending)
              echo "::notice::Exact production marker state is still pending ($marker_reason); no mutation is authorized."
              exit 0
              ;;
            recovery_available)
              if [ "${{ github.run_attempt }}" != "2" ] ||
                [ "$(jq -r '.controllerRun // 0' <<<"$marker_state_json")" != "${{ github.run_id }}" ] ||
                [ "$marker_reason" != "current_recovery_attempt_requires_lease" ]; then
                echo "::error::Only the exact full controller attempt 2 may consume an interrupted-marker recovery."
                exit 1
              fi
              echo "marker_recovery=true" >> "$GITHUB_OUTPUT"
              ;;
            none)
              if [ "${{ github.run_attempt }}" != "1" ]; then
                echo "::error::A controller rerun without durable marker evidence cannot authorize production."
                exit 1
              fi
              ;;
            manual)
              echo "::error::Production marker evidence requires manual recovery ($marker_reason)."
              exit 1
              ;;
          esac

          # Reruns retain a run ID but increment run_attempt. Read the exact
          # attempt endpoint carried by workflow_run so attempt N can never
          # opportunistically authorize from attempt N+1.
          run_record="$(gh api \
              "repos/$REPOSITORY/actions/runs/$TRIGGER_RUN_ID/attempts/$TRIGGER_RUN_ATTEMPT")"
            jq -e \
              --arg sha "$EXPECTED_SHA" \
              --arg repo "$REPOSITORY" \
              --arg run_id "$TRIGGER_RUN_ID" \
              --arg run_attempt "$TRIGGER_RUN_ATTEMPT" \
              --argjson workflow_id "$ci_workflow_id" '
                type == "object" and
                (.id | tostring) == $run_id and
                (.run_attempt | tostring) == $run_attempt and
                .workflow_id == $workflow_id and
                .head_sha == $sha and
                .event == "push" and
                .head_branch == "main" and
                .path == ".github/workflows/ci.yml" and
                .head_repository.full_name == $repo and
                .status == "completed" and
                .conclusion == "success"
              ' >/dev/null <<<"$run_record" || {
              echo "::error::Exact CI attempt evidence did not match the successful workflow_run signal."
              exit 1
            }

            source_run_id="$TRIGGER_RUN_ID"
            source_run_attempt="$TRIGGER_RUN_ATTEMPT"

            jobs_json="$(gh api \
              "repos/$REPOSITORY/actions/runs/$source_run_id/attempts/$source_run_attempt/jobs?per_page=100")"
            jq -e '
              type == "object" and
              (.total_count | type == "number") and
              (.jobs | type == "array") and
              .total_count == (.jobs | length) and
              all(.jobs[];
                (.id | type == "number" and . > 0) and
                (.run_id | type == "number" and . > 0) and
                (.run_attempt | type == "number" and . > 0) and
                (.name | type == "string" and length > 0) and
                (.head_sha | type == "string" and length > 0) and
                (.head_branch | type == "string" and length > 0) and
                (.status | type == "string" and length > 0) and
                ((.conclusion | type) == "string" or .conclusion == null)
              )
            ' \
              >/dev/null <<<"$jobs_json" || {
              echo "::error::GitHub returned malformed exact CI job evidence."
              exit 1
            }
            evidence_count="$(jq \
              --arg sha "$EXPECTED_SHA" \
              --argjson run_id "$source_run_id" \
              --argjson run_attempt "$source_run_attempt" '
              [
                .jobs[]
                | select(
                    .name == "Main Release Ready" and
                    .run_id == $run_id and
                    .run_attempt == $run_attempt and
                    .head_sha == $sha and
                    .head_branch == "main" and
                    .status == "completed" and
                    .conclusion == "success"
                  )
              ]
              | length
            ' <<<"$jobs_json")"
            if [ "$evidence_count" != "1" ]; then
              echo "::error::Exact CI run lacks one successful Main Release Ready job for $EXPECTED_SHA."
              exit 1
            fi

            final_main_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha // empty')"
            [[ "$final_main_sha" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::Could not resolve exact main at the production authorization boundary."
              exit 1
            }
            if [ "$final_main_sha" != "$EXPECTED_SHA" ]; then
              echo "::notice::Controller generation $EXPECTED_SHA was superseded by $final_main_sha at authorization."
              echo "is_current=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            {
              echo "source_ci_run_id=$source_run_id"
              echo "source_ci_run_attempt=$source_run_attempt"
              echo "authorized=true"
            } >> "$GITHUB_OUTPUT"
            echo "Authorized production from exact CI run $source_run_id attempt $source_run_attempt."
            exit 0

      - name: Write one-shot production marker recovery lease
        if: ${{ steps.authorize.outputs.marker_recovery == 'true' && steps.authorize.outputs.authorized == 'true' }}
        env:
          EXPECTED_SHA: ${{ steps.authorize.outputs.expected_sha }}
        run: |
          jq -n \
            --arg sha "$EXPECTED_SHA" \
            --arg controller_run "${{ github.run_id }}" \
            --arg controller_attempt "${{ github.run_attempt }}" \
            '{sha: $sha, controllerRun: $controller_run, controllerAttempt: $controller_attempt}' \
            > "$RUNNER_TEMP/production-generation-recovery.json"

      - name: Consume the one-shot production marker recovery lease
        if: ${{ steps.authorize.outputs.marker_recovery == 'true' && steps.authorize.outputs.authorized == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-generation-recovery-${{ steps.authorize.outputs.expected_sha }}
          path: ${{ runner.temp }}/production-generation-recovery.json
          if-no-files-found: error
          retention-days: 30

  production-release:
    name: Production Release
    needs: [authorize-production]
    if: ${{ always() && needs.authorize-production.result == 'success' && needs.authorize-production.outputs.authorized == 'true' }}
    uses: ./.github/workflows/production-release.yml
    permissions:
      contents: read
      actions: read
      attestations: write
      id-token: write
    with:
      expected_sha: ${{ needs.authorize-production.outputs.expected_sha }}
    secrets: inherit
  ci-public-profile-smoke:
    name: Post-Deploy Smoke (Production)
    needs: [authorize-production, production-release]
    # Run after successful deploy to production
    if: ${{ always() && needs.production-release.result == 'success' && needs.production-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.authorize-production.outputs.expected_sha }}
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: Verify production endpoints are healthy
        env:
          EXPECTED_COMMIT_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
          PRODUCTION_BASE_URL_B64: ${{ needs.production-release.outputs.production_deployment_url_b64 }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail

          PRODUCTION_BASE_URL="$(printf '%s' "$PRODUCTION_BASE_URL_B64" | base64 --decode)"
          PRODUCTION_BASE_URL="${PRODUCTION_BASE_URL%/}"
          [[ "$PRODUCTION_BASE_URL" =~ ^https://jovie-[a-z0-9-]+-jovie\.vercel\.app$ ]] || {
            echo "::error::Exact production deployment URL is missing or invalid."
            exit 1
          }
          COOKIE_JAR="$(mktemp)"
          trap 'rm -f "$COOKIE_JAR"' EXIT
          if [ -z "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            echo "::error::VERCEL_AUTOMATION_BYPASS_SECRET is required for exact production deployment probes."
            exit 1
          fi

          # One Node process owns the only secret-bearing request, verifies the
          # exact build identity, and checks every common public surface under
          # one absolute deadline before emitting a host-only cookie jar.
          VERCEL_PROBE_URL="$PRODUCTION_BASE_URL" \
          EXPECTED_VERCEL_DEPLOYMENT_ORIGIN="$PRODUCTION_BASE_URL" \
          EXPECTED_VERCEL_ENVIRONMENT=production \
          VERCEL_PROBE_COOKIE_JAR="$COOKIE_JAR" \
          VERCEL_VERIFY_PUBLIC_SURFACES=true \
          VERCEL_PROBE_TIMEOUT_MS=180000 \
            node apps/web/scripts/vercel-protected-origin.cjs bootstrap-cookie-jar

          echo "=== Exact-Deployment SEO Surfaces ==="
          VERCEL_PROBE_COOKIE_JAR="$COOKIE_JAR" BASE_URL="$PRODUCTION_BASE_URL" \
            pnpm --filter=@jovie/web exec tsx scripts/seo-ratchet-live.ts

          echo "=== Canonical Production SEO Surfaces ==="
          BASE_URL="https://jov.ie" \
            pnpm --filter=@jovie/web exec tsx scripts/seo-ratchet-live.ts

          echo "Post-deploy smoke passed: exact build, semantic surfaces, and SEO verified."

  # Post-deploy authenticated smoke test against the immutable deployment URL.
  # Verifies sign-in + dashboard load with real credentials after deploy.
  ci-post-deploy-auth-smoke:
    name: Post-Deploy Auth Smoke (Production)
    needs: [authorize-production, production-release]
    if: ${{ always() && needs.production-release.result == 'success' && needs.production-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      credentials_configured: ${{ steps.check-creds.outputs.credentials_configured }}
      auth_smoke_status: ${{ steps.auth-result.outputs.auth_smoke_status || steps.check-creds.outputs.auth_smoke_status }}
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.authorize-production.outputs.expected_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Check for production auth credentials
        id: check-creds
        env:
          E2E_PROD_USER_EMAIL: ${{ secrets.E2E_PROD_USER_EMAIL }}
          E2E_PROD_USER_PASSWORD: ${{ secrets.E2E_PROD_USER_PASSWORD }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
        run: |
          set -euo pipefail
          if { [ -n "$E2E_PROD_USER_EMAIL" ] &&
              [ -n "$E2E_PROD_USER_PASSWORD" ]; } ||
            { [ -n "$E2E_CLERK_USER_USERNAME" ] &&
              [ -n "$E2E_CLERK_USER_PASSWORD" ]; }; then
            {
              echo "credentials_configured=true"
              echo "skip=false"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Production auth credentials are not configured; authenticated smoke is explicitly skipped and is not release proof."
            {
              echo "credentials_configured=false"
              echo "auth_smoke_status=not-configured"
              echo "skip=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check-creds.outputs.skip != 'true'

      - name: Setup Playwright (Chromium)
        if: steps.check-creds.outputs.skip != 'true'
        uses: ./.github/actions/setup-playwright

      - name: Wait for CDN propagation
        if: steps.check-creds.outputs.skip != 'true'
        run: sleep 30

      - name: Run production auth smoke tests
        id: auth-result
        if: steps.check-creds.outputs.skip != 'true'
        run: |
          set -euo pipefail
          PRODUCTION_BASE_URL="$(printf '%s' "$PRODUCTION_BASE_URL_B64" | base64 --decode)"
          [[ "$PRODUCTION_BASE_URL" =~ ^https://jovie-[a-z0-9-]+-jovie\.vercel\.app$ ]] || {
            echo "::error::Exact production deployment URL is missing or invalid."
            exit 1
          }
          cd apps/web

          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          test -n "$PRODUCTION_BASE_URL"
          CI=true \
          BASE_URL="$PRODUCTION_BASE_URL" \
          EXPECTED_VERCEL_DEPLOYMENT_ORIGIN="$PRODUCTION_BASE_URL" \
          EXPECTED_VERCEL_ENVIRONMENT=production \
          PLAYWRIGHT_DYNAMIC_SECRETS_FILE="$RUNNER_TEMP/playwright-dynamic-cookie-values" \
            node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- \
              pnpm exec playwright test tests/e2e/smoke-prod-auth.spec.ts --project=chromium --reporter=line
          echo "auth_smoke_status=passed" >> "$GITHUB_OUTPUT"
        env:
          EXPECTED_COMMIT_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
          PLAYWRIGHT_VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PRODUCTION_BASE_URL_B64: ${{ needs.production-release.outputs.production_deployment_url_b64 }}
          E2E_PROD_USER_EMAIL: ${{ secrets.E2E_PROD_USER_EMAIL }}
          E2E_PROD_USER_PASSWORD: ${{ secrets.E2E_PROD_USER_PASSWORD }}
          E2E_PROD_USER_CODE: ${{ secrets.E2E_PROD_USER_CODE }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() && steps.check-creds.outputs.skip != 'true' && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: post-deploy-auth-smoke-${{ github.run_id }}
          path: |
            apps/web/test-results/
          retention-days: 3
  lighthouse-ci:
    name: Lighthouse CI (Production)
    needs: [authorize-production, production-release]
    # Run after successful deploy (tests homepage + /tim profile)
    if: ${{ always() && needs.production-release.result == 'success' && needs.production-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.authorize-production.outputs.expected_sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Install production Lighthouse Chromium
        uses: ./.github/actions/setup-playwright
      - name: Resolve production Lighthouse Chrome
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="$(cd apps/web && node -e "process.stdout.write(require('playwright').chromium.executablePath())")"
          if [ ! -x "$chrome_path" ]; then
            echo "::error::Playwright Chromium is not executable at $chrome_path"
            exit 1
          fi
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          echo "Resolved Lighthouse Chrome: $chrome_path"
      - name: Build exact-deployment Lighthouse config
        env:
          PRODUCTION_BASE_URL_B64: ${{ needs.production-release.outputs.production_deployment_url_b64 }}
        run: |
          set -euo pipefail
          PRODUCTION_BASE_URL="$(printf '%s' "$PRODUCTION_BASE_URL_B64" | base64 --decode)"
          base_url="${PRODUCTION_BASE_URL%/}"
          [[ "$base_url" =~ ^https://jovie-[a-z0-9-]+-jovie\.vercel\.app$ ]] || {
            echo "::error::Exact production deployment URL is missing or invalid."
            exit 1
          }
          echo "EXPECTED_VERCEL_DEPLOYMENT_ORIGIN=$base_url" >> "$GITHUB_ENV"
          echo "EXPECTED_VERCEL_ENVIRONMENT=production" >> "$GITHUB_ENV"
          jq --arg base "$base_url" '
            ($base | gsub("\\."; "\\.")) as $base_pattern |
            .ci.collect.url = [$base + "/", $base + "/tim"] |
            .ci.collect.puppeteerScript = "scripts/lighthouse-vercel-bypass.cjs" |
            .ci.collect.puppeteerLaunchOptions.args = [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage"
            ] |
            .ci.collect.settings.disableStorageReset = true |
            del(.ci.collect.settings.chromeFlags) |
            .ci.assert.includePassedAssertions = true |
            .ci.assert.assertMatrix[0].matchingUrlPattern = ("^" + $base_pattern + "/$") |
            .ci.assert.assertMatrix[1].matchingUrlPattern = ("^" + $base_pattern + "/tim$")
          ' apps/web/.lighthouserc.json > "$RUNNER_TEMP/lighthouse-production-exact.json"
          pnpm --filter @jovie/web exec tsx scripts/lighthouse-exact-target-guard.ts \
            --config="$RUNNER_TEMP/lighthouse-production-exact.json"
      - name: Collect Lighthouse against exact production deployment
        env:
          EXPECTED_COMMIT_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
          LIGHTHOUSE_SENSITIVE_VALUES_FILE: ${{ runner.temp }}/lighthouse-sensitive-values
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node scripts/lighthouse-retry.mjs -- pnpm --filter @jovie/web exec lhci collect --config="$RUNNER_TEMP/lighthouse-production-exact.json"
      - name: Assert Lighthouse production budgets
        run: pnpm --filter @jovie/web exec lhci assert --config="$RUNNER_TEMP/lighthouse-production-exact.json"
      - name: Validate and upload hash-sealed Lighthouse evidence
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          pnpm --filter @jovie/web exec tsx scripts/lighthouse-exact-target-guard.ts \
            --config="$RUNNER_TEMP/lighthouse-production-exact.json" \
            --reports-dir=".lighthouseci" \
            --assertions=".lighthouseci/assertion-results.json" \
            --sensitive-values-file="$RUNNER_TEMP/lighthouse-sensitive-values" \
            --upload
      - name: Remove Lighthouse sensitive probe state
        if: ${{ always() }}
        run: rm -f "$RUNNER_TEMP/lighthouse-sensitive-values"
  production-verified:
    name: Production Verified
    needs:
      [
        authorize-production,
        production-release,
        ci-public-profile-smoke,
        ci-post-deploy-auth-smoke,
        lighthouse-ci,
      ]
    if: >-
      ${{
        always() &&
        github.event.workflow_run.event == 'push' &&
        needs.authorize-production.result == 'success' &&
        needs.authorize-production.outputs.authorized == 'true' &&
        needs.authorize-production.outputs.already_verified != 'true'
      }}
    # The workflow-level production lease is still held here. Every probe
    # targets the immutable deployment URL, and no newer generation can mutate
    # canonical production until this final current-main proof completes.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      verified: ${{ steps.finalize.outputs.verified || 'false' }}
    steps:
      - name: Resolve current main before final verification
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
        run: |
          set -euo pipefail
          current_sha="$(gh api "repos/${{ github.repository }}/commits/main" --jq '.sha // empty')"
          [[ "$current_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Could not resolve an exact current main SHA."
            exit 1
          }
          if [ "$current_sha" != "$EXPECTED_SHA" ]; then
            echo "::notice::Post-deploy verification for $EXPECTED_SHA was superseded by $current_sha; neutral with no notification."
            echo "is_current=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_current=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: steps.current.outputs.is_current == 'true'
        with:
          ref: ${{ needs.authorize-production.outputs.expected_sha }}
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.current.outputs.is_current == 'true'

      - name: Require exact deployment and every post-deploy probe
        id: verify
        if: steps.current.outputs.is_current == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
          EXPECTED_PRODUCTION_DEPLOYMENT_ID: ${{ needs.production-release.outputs.production_deployment_id }}
          PRODUCTION_DEPLOYMENT_URL_B64: ${{ needs.production-release.outputs.production_deployment_url_b64 }}
          PRODUCTION_ALIAS_MAX_ATTEMPTS: '3'
          PRODUCTION_ALIAS_REQUIRED_ROUNDS: '1'
          PRODUCTION_ALIAS_RETRY_SECONDS: '5'
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          set -euo pipefail
          {
            echo "canonical_verified=false"
            echo "canonical_deployment_id="
            echo "canonical_sha="
          } >> "$GITHUB_OUTPUT"
          if [ "${{ needs.authorize-production.result }}" != "success" ] ||
            [ "${{ needs.authorize-production.outputs.authorized }}" != "true" ]; then
            echo "::error::Exact source CI authorization failed."
            exit 1
          fi
          if [ "${{ needs.production-release.result }}" != "success" ] ||
            [ "${{ needs.production-release.outputs.released }}" != "true" ]; then
            echo "::error::Production release did not complete successfully."
            exit 1
          fi
          test -n "$EXPECTED_PRODUCTION_DEPLOYMENT_ID" || {
            echo "::error::Production release omitted the exact deployment ID."
            exit 1
          }
          production_deployment_url="$(printf '%s' "$PRODUCTION_DEPLOYMENT_URL_B64" | base64 --decode)" || {
            echo "::error::Production release emitted malformed deployment URL evidence."
            exit 1
          }
          if [[ ! "$production_deployment_url" =~ ^https://jovie-[a-z0-9-]+-jovie\.vercel\.app$ ]]; then
            echo "::error::Production release omitted the exact immutable deployment URL."
            exit 1
          fi
          for probe in \
            "Post-Deploy Smoke:${{ needs.ci-public-profile-smoke.result }}" \
            "Lighthouse CI:${{ needs.lighthouse-ci.result }}"; do
            name="${probe%%:*}"
            result="${probe#*:}"
            if [ "$result" != "success" ]; then
              echo "::error::$name did not complete successfully ($result)."
              exit 1
            fi
          done
          if [ "${{ needs.ci-post-deploy-auth-smoke.result }}" != "success" ]; then
            echo "::error::Optional authenticated smoke lane did not resolve cleanly."
            exit 1
          fi
          auth_smoke_status="${{ needs.ci-post-deploy-auth-smoke.outputs.auth_smoke_status }}"
          if [ "${{ needs.ci-post-deploy-auth-smoke.outputs.credentials_configured }}" = "true" ] &&
            [ "$auth_smoke_status" != "passed" ]; then
            echo "::error::Configured authenticated smoke did not produce passing test evidence."
            exit 1
          fi
          if [ "${{ needs.ci-post-deploy-auth-smoke.outputs.credentials_configured }}" != "true" ] &&
            [ "$auth_smoke_status" != "not-configured" ]; then
            echo "::error::Authenticated smoke emitted an invalid result state."
            exit 1
          fi
          if [ "$auth_smoke_status" = "not-configured" ]; then
            echo "::notice::Authenticated smoke was skipped because no complete credential pair is configured; OAuth and Better Auth public gates remain blocking."
          fi

          # Main can advance while setup runs. The workflow-level production
          # lease prevents a same-SHA rerun from mutating canonical production;
          # recheck main immediately before reading the canonical alias.
          boundary_sha="$(gh api "repos/${{ github.repository }}/commits/main" --jq '.sha // empty')"
          if [[ ! "$boundary_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve exact main at the canonical verification boundary."
            exit 1
          fi
          if [ "$boundary_sha" != "$EXPECTED_COMMIT_SHA" ]; then
            echo "Main advanced to $boundary_sha before canonical verification; neutral with no notification."
            exit 0
          fi

          bash .github/scripts/verify-production-alias.sh
          {
            echo "canonical_verified=true"
            echo "canonical_deployment_id=$EXPECTED_PRODUCTION_DEPLOYMENT_ID"
            echo "canonical_sha=$EXPECTED_COMMIT_SHA"
          } >> "$GITHUB_OUTPUT"
          echo "Exact production deployment and every required post-deploy probe completed."

      - name: Finalize exact current release generation
        id: finalize
        if: ${{ always() && steps.current.outputs.is_current == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
        shell: bash
        run: |
          set -euo pipefail
          echo "verified=false" >> "$GITHUB_OUTPUT"

          # API uncertainty fails before finalization; a newer main SHA exits
          # neutral. The marker written after this step is production truth.
          boundary_sha="$(gh api "repos/${{ github.repository }}/commits/main" --jq '.sha // empty')"
          if [[ ! "$boundary_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve exact main at the finalization boundary."
            exit 1
          fi
          if [ "$boundary_sha" != "$EXPECTED_SHA" ]; then
            echo "Main advanced to $boundary_sha before finalization; neutral."
            exit 0
          fi

          if [ "${{ steps.verify.outcome }}" = "success" ] &&
            [ "${{ steps.verify.outputs.canonical_verified }}" = "true" ] &&
            [ "${{ steps.verify.outputs.canonical_deployment_id }}" = "${{ needs.production-release.outputs.production_deployment_id }}" ] &&
            [ "${{ steps.verify.outputs.canonical_sha }}" = "$EXPECTED_SHA" ] &&
            [ "${{ needs.production-release.outputs.sentry_gate_status }}" = "passed" ] &&
            [ "${{ needs.production-release.outputs.oauth_gate_status }}" = "passed" ]; then
            echo "verified=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Release generation lacks exact passing gate, canonical deployment, or SHA evidence."
            exit 1
          fi

      - name: Write exact verified-generation marker
        if: ${{ steps.finalize.outputs.verified == 'true' }}
        env:
          AUTH_SMOKE_STATUS: ${{ needs.ci-post-deploy-auth-smoke.outputs.auth_smoke_status }}
          EXPECTED_SHA: ${{ needs.authorize-production.outputs.expected_sha }}
          DEPLOYMENT_ID: ${{ needs.production-release.outputs.production_deployment_id }}
        run: |
          set -euo pipefail
          jq -n \
            --arg sha "$EXPECTED_SHA" \
            --arg deployment_id "$DEPLOYMENT_ID" \
            --arg controller_run "${{ github.run_id }}" \
            --arg controller_attempt "${{ github.run_attempt }}" \
            --arg auth_smoke "$AUTH_SMOKE_STATUS" \
            '{sha: $sha, deploymentId: $deployment_id, controllerRun: $controller_run, controllerAttempt: $controller_attempt, authSmoke: $auth_smoke}' \
            > "$RUNNER_TEMP/production-generation-verified.json"

      - name: Preserve exact verified-generation marker
        if: ${{ steps.finalize.outputs.verified == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.authorize-production.outputs.marker_recovery == 'true' && format('production-generation-verified-recovery-{0}', needs.authorize-production.outputs.expected_sha) || format('production-generation-verified-{0}', needs.authorize-production.outputs.expected_sha) }}
          path: ${{ runner.temp }}/production-generation-verified.json
          if-no-files-found: error
          retention-days: 30

      - name: Notify exact verified production generation
        if: ${{ steps.finalize.outputs.verified == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "Slack webhook is not configured; verified production truth is preserved."
            exit 0
          fi
          payload="$(jq -n \
            --arg text "✅ Production verified: jov.ie" \
            --arg sha "${{ needs.authorize-production.outputs.expected_sha }}" \
            --arg deployment "${{ needs.production-release.outputs.production_deployment_id }}" \
            --arg sentry_gate "${{ needs.production-release.outputs.sentry_gate_status }}" \
            --arg oauth_gate "${{ needs.production-release.outputs.oauth_gate_status }}" \
            --arg auth_smoke "${{ needs.ci-post-deploy-auth-smoke.outputs.auth_smoke_status }}" \
            --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{text: $text, attachments: [{color: "good", fields: [
              {title: "SHA", value: $sha, short: true},
              {title: "Deployment", value: $deployment, short: true},
              {title: "Sentry gate", value: $sentry_gate, short: true},
              {title: "OAuth gate", value: $oauth_gate, short: true},
              {title: "Auth smoke", value: $auth_smoke, short: true},
              {title: "Run", value: $run, short: false}
            ]}]}')"
          if ! curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 20 --retry 2 --retry-all-errors \
            -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            -d "$payload"; then
            echo "::warning::Production is verified, but the bounded Slack notification failed."
          fi
