name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  # NOTE: pull_request_review AND pull_request_review_comment both removed.
  # Bot-submitted reviews/comments (CodeRabbit, Copilot) create
  # action_required runs that clog the CI queue and consume runner slots.
  # Claude can still be invoked via issue_comment (@claude in a PR comment)
  # which doesn't trigger the action_required approval gate.

permissions:
  contents: read
  issues: read
  pull-requests: read

# Prevent multiple Claude runs on the same PR/issue — only latest matters
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      github.actor != 'copilot-swe-agent[bot]' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for Claude to commit and push changes
      pull-requests: write # Required for Claude to create/update PRs
      issues: write # Required for Claude to respond to issues
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Full history for better git operations
          token: ${{ steps.app-token.outputs.token }}

      # Setup Node.js and pnpm for Claude Code hooks and tools
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: 'coderabbitai[bot]'

          additional_permissions: |
            actions: read

          # Use Opus 4.5 for GitHub-triggered tasks (complex by nature)
          claude_args: '--model claude-opus-4-5-20251101'
