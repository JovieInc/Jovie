name: Auth Sentinel

# Continuous synthetic monitor for production sign-in, independent of deploys, so
# auth that breaks BETWEEN deploys (console edits, Clerk key rotation, an expired
# Apple client secret, a FAPI/cert change) is caught in ~15 min instead of
# whenever a user happens to report it. Each check maps to a real outage we have
# eaten:
#   - /api/health/keys missing key     -> "Authentication service is initializing" 503
#   - /signin renders an error page     -> proxy / CLERK_ENCRYPTION_KEY / dynamic-keys break
#   - Google redirect_uri rejected      -> redirect_uri_mismatch (2026-06-26 console drift)
#   - Apple sign-in surface gone        -> Service ID return URL / client-secret break
# Pure curl (no browser) so it is fast and ~free. The heavy "SSO surface is
# interactive" Playwright check stays on the per-deploy canary + production-oauth-gate.
# Pages #alerts-production only after a debounce retry, so a transient blip never pages.

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:
    inputs:
      target:
        description: Base URL to probe (the app origin; instance is derived from it)
        required: false
        default: https://jov.ie
        type: string

permissions:
  contents: read

concurrency:
  group: auth-sentinel
  cancel-in-progress: true

jobs:
  sentinel:
    name: Production auth sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TARGET: ${{ github.event.inputs.target || 'https://jov.ie' }}
      UA: 'Mozilla/5.0 (compatible; JovieAuthSentinel/1.0; +https://jov.ie)'
    steps:
      # Shallow checkout only to read the canonical OAuth snapshot — so the
      # sentinel's client IDs / FAPI hosts can never drift from the source of truth.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Probe production auth surfaces
        id: probe
        run: |
          set -uo pipefail
          SNAP=apps/web/lib/auth/oauth-redirect-uris.expected.json
          INSTANCE=staging
          case "$TARGET" in *staging.*) INSTANCE=staging;; *) INSTANCE=prod;; esac
          FAPI=$(jq -r ".instances.${INSTANCE}.fapiHost" "$SNAP")
          CALLBACK="https://${FAPI}/v1/oauth_callback"
          GOOGLE_CID=$(jq -r '.google.clientId' "$SNAP")
          APPLE_SID=$(jq -r '.apple.serviceId' "$SNAP")
          APPLE_REQUIRED=$(jq -r --arg cb "$CALLBACK" '.apple.requiredReturnUrls | index($cb) // "null"' "$SNAP")
          enc() { jq -rn --arg v "$1" '$v|@uri'; }

          fails=""
          note() { echo "::error::$1"; fails="${fails}\n - $1"; }

          # A check runs up to twice (debounce) before it counts as failed.
          # $1=name  $2=shell-snippet returning 0=ok / 1=fail
          run_check() {
            local name="$1"; shift
            local attempt
            for attempt in 1 2; do
              if "$@"; then echo "✅ ${name}"; return 0; fi
              [ "$attempt" -eq 1 ] && { echo "⚠ ${name} failed (attempt 1), retrying in 15s..."; sleep 15; }
            done
            note "${name}"
            return 1
          }

          chk_health() {
            local body code
            body=$(curl -s -m 15 -A "$UA" -H 'Accept: application/json' "${TARGET}/api/health?_cb=$(date +%s%N)")
            echo "$body" | grep -q '"status":"ok"'
          }
          chk_keys() {
            local body
            body=$(curl -s -m 15 -A "$UA" -H 'Accept: application/json' "${TARGET}/api/health/keys?_cb=$(date +%s%N)")
            echo "$body" | grep -q '"ok":true' && echo "$body" | grep -q '"missing":\[\]'
          }
          chk_signin_render() {
            local body
            body=$(curl -s -m 20 -A "$UA" "${TARGET}/signin?_cb=$(date +%s%N)")
            [ "${#body}" -ge 1000 ] || return 1
            ! echo "$body" | grep -qiE 'auth(entication)? unavailable|temporarily unavailable|service is initializing|application error|something went wrong|this page could not be found'
          }
          chk_google() {
            local body
            body=$(curl -s -m 20 -A "$UA" -L \
              "https://accounts.google.com/o/oauth2/v2/auth?client_id=${GOOGLE_CID}&redirect_uri=$(enc "$CALLBACK")&response_type=code&scope=$(enc 'openid email profile')")
            # Deterministic negative: a rejected redirect_uri shows these.
            ! echo "$body" | grep -qiE 'redirect_uri_mismatch|Access blocked|Error 400|request is invalid'
          }
          chk_apple() {
            local body
            body=$(curl -s -m 20 -A "$UA" -L \
              "https://appleid.apple.com/auth/authorize?client_id=${APPLE_SID}&redirect_uri=$(enc "$CALLBACK")&response_type=code&scope=$(enc 'name email')&response_mode=form_post")
            # Positive presence of Apple's sign-in surface; a bad return URL drops it.
            echo "$body" | grep -qiE 'appleid|sign in|continue' && ! echo "$body" | grep -qiE 'invalid_request|invalid_redirect_uri'
          }

          run_check "health (${TARGET}/api/health)" chk_health || true
          run_check "clerk-keys (${TARGET}/api/health/keys)" chk_keys || true
          run_check "signin renders (${TARGET}/signin)" chk_signin_render || true
          run_check "google redirect_uri ${CALLBACK}" chk_google || true
          if [ "$APPLE_REQUIRED" != "null" ]; then
            run_check "apple return_url ${CALLBACK}" chk_apple || true
          else
            echo "ℹ️ Apple not enabled for ${INSTANCE} — skipping"
          fi

          if [ -n "$fails" ]; then
            { echo "failed=true"; echo "summary<<EOF"; echo -e "${fails}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            echo "❌ Auth sentinel detected failures on ${TARGET}"
            exit 1
          fi
          echo "failed=false" >> "$GITHUB_OUTPUT"
          echo "✅ All auth surfaces healthy on ${TARGET}"

      - name: Page #alerts-production on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg target "$TARGET" \
              --arg summary "${{ steps.probe.outputs.summary }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                text: ("🚨 AUTH SENTINEL FAILED — sign-in may be broken on " + $target),
                attachments: [{
                  color: "danger",
                  fields: [
                    {title: "Failed checks", value: (if $summary == "" then "(probe step errored before reporting)" else $summary end), short: false},
                    {title: "Likely fix", value: "redirect→ /auth-console-sync · keys/503→ Doppler+redeploy · render→ proxy / CLERK_ENCRYPTION_KEY", short: false},
                    {title: "Run", value: $run_url, short: false}
                  ]
                }]
              }')" || echo "Slack notify failed (non-fatal)"
