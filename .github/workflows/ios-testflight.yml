name: iOS TestFlight
run-name: iOS TestFlight ${{ github.event.workflow_run.head_sha || github.sha }}

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional App Store build number override
        required: false
      changelog:
        description: Optional TestFlight changelog
        required: false
  # Production Controller is the sole automatic release signal. It starts only
  # from successful exact-main CI evidence, and this workflow additionally
  # requires its exact Production Verified job before allocating a macOS runner.
  workflow_run:
    workflows: [Production Controller]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

# TestFlight archives are production mutations. Keep one active generation and
# one latest pending generation; never overlap signing or App Store uploads.
concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  authorize-release:
    name: Authorize verified iOS release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_sha: ${{ steps.authorize.outputs.release_sha }}
      baseline_sha: ${{ steps.authorize.outputs.baseline_sha }}
      should_release: ${{ steps.select.outputs.should_release }}
    steps:
      - name: Cross-prove exact production evidence
        id: authorize
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          TRIGGER_RUN_ID: ${{ github.event.workflow_run.id }}
          TRIGGER_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          TRIGGER_RUN_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_RUN_PATH: ${{ github.event.workflow_run.path }}
          TRIGGER_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGER_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          TRIGGER_RUN_STATUS: ${{ github.event.workflow_run.status }}
          TRIGGER_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "release_sha="
            echo "baseline_sha="
            echo "authorized=false"
            echo "manual=false"
            echo "already_released=false"
          } >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            [[ "$TRIGGER_RUN_ID" =~ ^[1-9][0-9]*$ ]] &&
              [[ "$TRIGGER_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]] &&
              [[ "$TRIGGER_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] &&
              [ "$TRIGGER_RUN_EVENT" = "workflow_run" ] &&
              [ "$TRIGGER_RUN_PATH" = ".github/workflows/production-controller.yml" ] &&
              [ "$TRIGGER_HEAD_BRANCH" = "main" ] &&
              [ "$TRIGGER_HEAD_REPOSITORY" = "$REPOSITORY" ] &&
              [ "$TRIGGER_RUN_STATUS" = "completed" ] &&
              [ "$TRIGGER_RUN_CONCLUSION" = "success" ] || {
              echo "::error::TestFlight trigger was not an exact successful Production Controller run."
              exit 1
            }
            release_sha="$TRIGGER_HEAD_SHA"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            [[ "$MANUAL_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::Manual TestFlight dispatch did not resolve a full commit SHA."
              exit 1
            }
            release_sha="$MANUAL_SHA"
            echo "manual=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported TestFlight event: $EVENT_NAME"
            exit 1
          fi

          production_controller_workflow="$(gh api \
            "repos/$REPOSITORY/actions/workflows/production-controller.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . >= 1 and floor == .) and
            .name == "Production Controller" and
            .path == ".github/workflows/production-controller.yml"
          ' >/dev/null <<<"$production_controller_workflow" || {
            echo "::error::GitHub returned malformed Production Controller workflow identity."
            exit 1
          }
          production_controller_workflow_id="$(jq -r '.id | tostring' \
            <<<"$production_controller_workflow")"

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            run_record="$(gh api \
              "repos/$REPOSITORY/actions/runs/$TRIGGER_RUN_ID/attempts/$TRIGGER_RUN_ATTEMPT")"
            controller_generation_selector='
              if (
                type == "object" and
                (.id | type == "number" and . >= 1 and floor == .) and
                (.id | tostring) == $run_id and
                (.run_attempt | type == "number" and . >= 1 and floor == .) and
                (.run_attempt | tostring) == $run_attempt and
                (.workflow_id | type == "number" and . >= 1 and floor == .) and
                (.workflow_id | tostring) == $workflow_id and
                .head_sha == $transport_sha and
                .head_branch == "main" and
                .head_repository.full_name == $repo and
                .event == "workflow_run" and
                .path == ".github/workflows/production-controller.yml" and
                .status == "completed" and
                .conclusion == "success" and
                (.display_title | type == "string" and
                  test("^Production Controller [0-9a-f]{40} from CI [1-9][0-9]* attempt [1-9][0-9]*$"))
              ) then
                .display_title
                | capture("^Production Controller (?<generation>[0-9a-f]{40}) from CI [1-9][0-9]* attempt [1-9][0-9]*$")
                | .generation
              else
                empty
              end
          '
            if ! controller_generation="$(jq -er \
              --arg repo "$REPOSITORY" \
              --arg run_id "$TRIGGER_RUN_ID" \
              --arg run_attempt "$TRIGGER_RUN_ATTEMPT" \
              --arg workflow_id "$production_controller_workflow_id" \
              --arg transport_sha "$release_sha" \
              "$controller_generation_selector" <<<"$run_record")"; then
              echo "::error::Exact Production Controller attempt evidence did not match the workflow_run signal."
              exit 1
            fi
            if [ "$controller_generation" != "$release_sha" ]; then
              echo "::notice::Production Controller generation $controller_generation was superseded before TestFlight observer dispatch; transport head is $release_sha."
              exit 0
            fi
          fi

          current_main_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha // empty')"
          [[ "$current_main_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Could not resolve exact current main for TestFlight authorization."
            exit 1
          }
          if [ "$current_main_sha" != "$release_sha" ]; then
            echo "::notice::TestFlight generation $release_sha was superseded by $current_main_sha."
            exit 0
          fi

          prove_existing_production_marker() {
            local expected_sha="$1"
            local marker_name="production-generation-verified-$expected_sha"
            local artifacts_json marker_candidates
            artifacts_json="$(gh api \
              "repos/$REPOSITORY/actions/artifacts?name=$marker_name&per_page=100")"
            jq -e 'type == "object" and (.artifacts | type == "array")' \
              >/dev/null <<<"$artifacts_json" || return 1
            marker_candidates="$(jq -r --arg sha "$expected_sha" '
              [
                .artifacts[]
                | select(
                    .expired == false and
                    .name == ("production-generation-verified-" + $sha)
                  )
              ]
              | sort_by(.created_at, .id) | reverse
              | .[] | [.id, .workflow_run.id] | @tsv
            ' <<<"$artifacts_json")"

            while IFS=$'\t' read -r artifact_id controller_run_id; do
              [ -n "$controller_run_id" ] || continue
              [[ "$artifact_id" =~ ^[1-9][0-9]*$ ]] &&
                [[ "$controller_run_id" =~ ^[1-9][0-9]*$ ]] || continue

              local controller_json controller_attempt controller_jobs verified_count
              controller_json="$(gh api \
                "repos/$REPOSITORY/actions/runs/$controller_run_id")" || continue
              if ! jq -e \
                --arg repo "$REPOSITORY" \
                --arg sha "$expected_sha" \
                --arg workflow_id "$production_controller_workflow_id" '
                  type == "object" and
                  .head_sha == $sha and
                  .head_branch == "main" and
                  .head_repository.full_name == $repo and
                  .event == "workflow_run" and
                  (.workflow_id | tostring) == $workflow_id and
                  .path == ".github/workflows/production-controller.yml" and
                  .status == "completed" and
                  .conclusion == "success" and
                  (.run_attempt | type == "number" and . >= 1) and
                  (.display_title | type == "string" and
                    test("^Production Controller " + $sha +
                      " from CI [1-9][0-9]* attempt [1-9][0-9]*$"))
                ' >/dev/null <<<"$controller_json"; then
                continue
              fi
              controller_attempt="$(jq -r '.run_attempt' <<<"$controller_json")"
              controller_jobs="$(gh api --paginate --slurp \
                "repos/$REPOSITORY/actions/runs/$controller_run_id/attempts/$controller_attempt/jobs?per_page=100")" || continue
              if ! jq -e '
                type == "array" and length > 0 and
                all(.[]; type == "object" and (.jobs | type == "array"))
              ' >/dev/null <<<"$controller_jobs"; then
                continue
              fi
              verified_count="$(jq --arg sha "$expected_sha" '
                [
                  .[].jobs[]?
                  | select(
                      .name == "Production Verified" and
                      .head_sha == $sha and
                      .status == "completed" and
                      .conclusion == "success"
                    )
                ] | length
              ' <<<"$controller_jobs")"
              [ "$verified_count" = "1" ] || continue

              local marker_archive marker_json
              marker_archive="$RUNNER_TEMP/production-marker-${artifact_id}.zip"
              marker_json="$RUNNER_TEMP/production-marker-${artifact_id}.json"
              gh api "repos/$REPOSITORY/actions/artifacts/$artifact_id/zip" \
                > "$marker_archive" || continue
              if unzip -p "$marker_archive" production-generation-verified.json \
                > "$marker_json" 2>/dev/null &&
                jq -e \
                  --arg sha "$expected_sha" \
                  --arg run "$controller_run_id" '
                    type == "object" and
                    .sha == $sha and
                    (.deploymentId | type == "string" and startswith("dpl_")) and
                    .controllerRun == $run
                  ' >/dev/null "$marker_json"; then
                return 0
              fi
            done <<<"$marker_candidates"
            return 1
          }

          production_proven=false
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            jobs_json="$(gh api --paginate --slurp \
              "repos/$REPOSITORY/actions/runs/$TRIGGER_RUN_ID/attempts/$TRIGGER_RUN_ATTEMPT/jobs?per_page=100")"
            jq -e '
              type == "array" and length > 0 and
              all(.[]; type == "object" and (.jobs | type == "array"))
            ' >/dev/null <<<"$jobs_json" || {
              echo "::error::GitHub returned malformed Production Controller job evidence."
              exit 1
            }
            verified_count="$(jq --arg sha "$release_sha" '
              [
                .[].jobs[]?
                | select(
                    .name == "Production Verified" and
                    .head_sha == $sha and
                    .status == "completed" and
                    .conclusion == "success"
                  )
              ] | length
            ' <<<"$jobs_json")"
            if [ "$verified_count" = "1" ]; then
              production_proven=true
            fi
          fi

          if [ "$production_proven" != "true" ]; then
            if prove_existing_production_marker "$release_sha"; then
              production_proven=true
              echo "Existing exact Production Verified marker authorized $release_sha."
            else
              echo "::error::Current main lacks exact successful Production Verified evidence."
              exit 1
            fi
          fi

          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "authorized=true" >> "$GITHUB_OUTPUT"

          # A manual dispatch may rebuild already-verified current main, but it
          # cannot bypass production evidence.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            exit 0
          fi

          testflight_workflow="$(gh api \
            "repos/$REPOSITORY/actions/workflows/ios-testflight.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . >= 1 and floor == .) and
            .name == "iOS TestFlight" and
            .path == ".github/workflows/ios-testflight.yml"
          ' >/dev/null <<<"$testflight_workflow" || {
            echo "::error::GitHub returned malformed TestFlight workflow identity."
            exit 1
          }
          testflight_workflow_id="$(jq -r '.id | tostring' \
            <<<"$testflight_workflow")"

          # Upload markers are written only after the exact beta job succeeds.
          # Unlike workflow success, this fixed-name history cannot be polluted
          # by the common authorize-success/beta-skipped path.
          testflight_marker_history_allows_legacy_bootstrap() {
            local candidate_count="$1"
            local accepted_baseline="$2"

            [[ "$candidate_count" =~ ^[0-9]+$ ]] || return 2
            if [ -n "$accepted_baseline" ]; then
              [[ "$accepted_baseline" =~ ^[0-9a-f]{40}$ ]] || return 2
              return 0
            fi
            [ "$candidate_count" -eq 0 ]
          }

          marker_name="testflight-upload-verified"
          marker_listing="$(gh api \
            "repos/$REPOSITORY/actions/artifacts?name=$marker_name&per_page=100")"
          jq -e --arg name "$marker_name" '
            type == "object" and
            (.artifacts | type == "array") and
            all(.artifacts[]?;
              type == "object" and
              .name == $name and
              (.expired | type == "boolean")
            ) and
            all(
              .artifacts[]?
              | select(.name == $name and .expired == false);
              (.id | type == "number" and . >= 1 and floor == .) and
              (.workflow_run | type == "object") and
              (.workflow_run.id | type == "number" and . >= 1 and floor == .) and
              (.created_at | type == "string")
            )
          ' \
            >/dev/null <<<"$marker_listing" || {
            echo "::error::GitHub returned malformed TestFlight marker history."
            exit 1
          }
          marker_candidate_count="$(jq --arg name "$marker_name" '[
            .artifacts[]?
            | select(.name == $name and .expired == false)
          ] | length' <<<"$marker_listing")"
          marker_candidates="$(jq -r --arg name "$marker_name" '
            [
              .artifacts[]?
              | select(
                  .expired == false and
                  .name == $name
                )
            ]
            | sort_by(.created_at, .id) | reverse
            | .[] | [.id, .workflow_run.id] | @tsv
          ' <<<"$marker_listing")"

          baseline_sha=""
          while IFS=$'\t' read -r artifact_id run_id; do
            [ -n "$artifact_id" ] || continue
            [[ "$artifact_id" =~ ^[1-9][0-9]*$ ]] &&
              [[ "$run_id" =~ ^[1-9][0-9]*$ ]] || {
              echo "::error::GitHub returned malformed TestFlight marker identity."
              exit 1
            }

            marker_archive="$RUNNER_TEMP/testflight-marker-${artifact_id}.zip"
            marker_json="$RUNNER_TEMP/testflight-marker-${artifact_id}.json"
            gh api "repos/$REPOSITORY/actions/artifacts/$artifact_id/zip" \
              > "$marker_archive"
            if ! unzip -p "$marker_archive" testflight-upload-verified.json \
              > "$marker_json" 2>/dev/null ||
              ! jq -e '
                type == "object" and
                (.sha | type == "string" and test("^[0-9a-f]{40}$")) and
                (.workflowRun | type == "string" and test("^[1-9][0-9]*$")) and
                (.uploadRunAttempt | type == "string" and test("^[1-9][0-9]*$")) and
                (.uploadJob | type == "string" and test("^[1-9][0-9]*$"))
              ' >/dev/null "$marker_json"; then
              echo "::warning::Ignoring malformed TestFlight upload marker artifact $artifact_id."
              continue
            fi

            marker_sha="$(jq -r '.sha' "$marker_json")"
            marker_run_id="$(jq -r '.workflowRun' "$marker_json")"
            upload_attempt="$(jq -r '.uploadRunAttempt' "$marker_json")"
            upload_job_id="$(jq -r '.uploadJob' "$marker_json")"
            if [ "$marker_run_id" != "$run_id" ]; then
              echo "::warning::Ignoring TestFlight marker $artifact_id with mismatched run identity."
              continue
            fi

            marker_run="$(gh api "repos/$REPOSITORY/actions/runs/$run_id")"
            jq -e 'type == "object"' >/dev/null <<<"$marker_run" || {
              echo "::error::GitHub returned malformed marked TestFlight workflow evidence."
              exit 1
            }
            if ! jq -e \
              --arg repo "$REPOSITORY" \
              --arg run "$run_id" \
              --arg sha "$marker_sha" \
              --arg workflow_id "$testflight_workflow_id" '
                type == "object" and
                (.id | tostring) == $run and
                (.workflow_id | tostring) == $workflow_id and
                .path == ".github/workflows/ios-testflight.yml" and
                .display_title == ("iOS TestFlight " + $sha) and
                (.event == "workflow_run" or .event == "workflow_dispatch") and
                .head_branch == "main" and
                .head_sha == $sha and
                .head_repository.full_name == $repo and
                .status == "completed" and
                .conclusion == "success"
              ' >/dev/null <<<"$marker_run"; then
              echo "::warning::Ignoring TestFlight marker $artifact_id without exact workflow identity."
              continue
            fi

            upload_run="$(gh api \
              "repos/$REPOSITORY/actions/runs/$run_id/attempts/$upload_attempt")"
            jq -e 'type == "object"' >/dev/null <<<"$upload_run" || {
              echo "::error::GitHub returned malformed marked TestFlight attempt evidence."
              exit 1
            }
            if ! jq -e \
              --arg repo "$REPOSITORY" \
              --arg run "$run_id" \
              --arg attempt "$upload_attempt" \
              --arg sha "$marker_sha" \
              --arg workflow_id "$testflight_workflow_id" '
                type == "object" and
                (.id | tostring) == $run and
                (.run_attempt | tostring) == $attempt and
                (.workflow_id | tostring) == $workflow_id and
                .path == ".github/workflows/ios-testflight.yml" and
                .display_title == ("iOS TestFlight " + $sha) and
                (.event == "workflow_run" or .event == "workflow_dispatch") and
                .head_branch == "main" and
                .head_sha == $sha and
                .head_repository.full_name == $repo and
                .status == "completed" and
                .conclusion == "success"
              ' >/dev/null <<<"$upload_run"; then
              echo "::warning::Ignoring TestFlight marker $artifact_id with mismatched upload attempt."
              continue
            fi

            upload_jobs="$(gh api --paginate --slurp \
              "repos/$REPOSITORY/actions/runs/$run_id/attempts/$upload_attempt/jobs?per_page=100")"
            jq -e '
              type == "array" and length > 0 and
              all(.[]; type == "object" and (.jobs | type == "array"))
            ' >/dev/null <<<"$upload_jobs" || {
              echo "::error::GitHub returned malformed marked TestFlight job evidence."
              exit 1
            }
            marked_upload_count="$(jq \
              --arg sha "$marker_sha" \
              --arg job "$upload_job_id" '
                [
                  .[].jobs[]?
                  | select(
                      (.id | tostring) == $job and
                      .name == "Upload Internal TestFlight" and
                      .head_sha == $sha and
                      .status == "completed" and
                      .conclusion == "success"
                    )
                ] | length
              ' <<<"$upload_jobs")"
            [ "$marked_upload_count" = "1" ] || {
              echo "::warning::Ignoring TestFlight marker $artifact_id without its exact successful upload job."
              continue
            }

            baseline_sha="$marker_sha"
            echo "Accepted exact TestFlight upload marker $artifact_id from run $run_id attempt $upload_attempt."
            break
          done <<<"$marker_candidates"

          if ! testflight_marker_history_allows_legacy_bootstrap \
            "$marker_candidate_count" "$baseline_sha"; then
            echo "::error::Stable TestFlight markers exist, but none fully proves a successful upload."
            exit 1
          fi

          # Bootstrap/recovery only: older uploads predate the stable marker, and
          # marker upload can fail after beta succeeds. Scan one bounded page and
          # accept a baseline only when an exact run-attempt beta job succeeded.
          # Authorization-only completion is never release truth. Once one marker
          # lands, stable upload-only history becomes the permanent index.
          if [ -z "$baseline_sha" ]; then
            runs_json="$(gh api \
              "repos/$REPOSITORY/actions/workflows/ios-testflight.yml/runs?branch=main&status=completed&per_page=100")"
            jq -e '
              type == "object" and
              (.workflow_runs | type == "array") and
              all(.workflow_runs[]?;
                type == "object" and
                (.id | type == "number" and . >= 1 and floor == .) and
                (.run_attempt | type == "number" and . >= 1 and floor == .) and
                (.workflow_id | type == "number" and . >= 1 and floor == .) and
                (.path | type == "string") and
                (.event | type == "string") and
                (.status | type == "string") and
                (.head_branch | type == "string") and
                (.head_sha | type == "string") and
                (.head_repository | type == "object") and
                (.head_repository.full_name | type == "string") and
                (.created_at | type == "string")
              )
            ' \
              >/dev/null <<<"$runs_json" || {
              echo "::error::GitHub returned malformed TestFlight run history."
              exit 1
            }
            completed_runs="$(jq -c \
              --arg repo "$REPOSITORY" \
              --arg workflow_id "$testflight_workflow_id" \
              '[.workflow_runs[]? | select(
              (.workflow_id | tostring) == $workflow_id and
              .path == ".github/workflows/ios-testflight.yml" and
              (.event == "workflow_run" or .event == "workflow_dispatch" or .event == "push") and
              .status == "completed" and
              .head_branch == "main" and .head_repository.full_name == $repo and
              (.head_sha | test("^[0-9a-f]{40}$")) and
              (.id | type == "number") and (.run_attempt | type == "number")
            )]' <<<"$runs_json")"

            # The marker job can fail after App Store Connect has accepted beta,
            # so workflow conclusion is not external upload truth. Cross-prove
            # every exact run attempt and accept only a successful beta job.
            while IFS=$'\t' read -r run_id run_attempt run_sha; do
              [[ "$run_id" =~ ^[1-9][0-9]*$ ]] &&
                [[ "$run_attempt" =~ ^[1-9][0-9]*$ ]] &&
                [[ "$run_sha" =~ ^[0-9a-f]{40}$ ]] || {
                echo "::error::Completed TestFlight run history contained malformed identity."
                exit 1
              }
              run_has_upload=false
              for attempt in $(seq 1 "$run_attempt"); do
                run_jobs="$(gh api --paginate --slurp \
                  "repos/$REPOSITORY/actions/runs/$run_id/attempts/$attempt/jobs?per_page=100")"
                jq -e '
                  type == "array" and length > 0 and
                  all(.[]; type == "object" and (.jobs | type == "array"))
                ' >/dev/null <<<"$run_jobs" || {
                  echo "::error::GitHub returned malformed TestFlight upload job evidence."
                  exit 1
                }
                beta_count="$(jq --arg sha "$run_sha" '
                  [
                    .[].jobs[]?
                    | select(
                        .name == "Upload Internal TestFlight" and
                        .head_sha == $sha and
                        .status == "completed" and
                        .conclusion == "success"
                      )
                  ] | length
                ' <<<"$run_jobs")"
                if [ "$beta_count" -gt 1 ]; then
                  echo "::error::TestFlight run $run_id attempt $attempt has ambiguous upload jobs."
                  exit 1
                fi
                if [ "$beta_count" = "1" ]; then
                  run_has_upload=true
                fi
              done
              if [ "$run_has_upload" = "true" ]; then
                baseline_sha="$run_sha"
                break
              fi
            done < <(jq -r '
              sort_by(.created_at, .id) | reverse | .[] |
              [.id, .run_attempt, .head_sha] | @tsv
            ' <<<"$completed_runs")
          fi

          if [ -z "$baseline_sha" ]; then
            echo "::notice::No proven TestFlight upload baseline exists; treating this as the first verified release."
            exit 0
          fi
          if [ "$baseline_sha" = "$release_sha" ]; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Exact main generation $release_sha already reached TestFlight."
            exit 0
          fi

          echo "baseline_sha=$baseline_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout exact authorized main
        if: ${{ steps.authorize.outputs.authorized == 'true' && steps.authorize.outputs.already_released != 'true' && steps.authorize.outputs.manual != 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.authorize.outputs.release_sha }}
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false

      - name: Select iOS-relevant production generation
        id: select
        env:
          AUTHORIZED: ${{ steps.authorize.outputs.authorized }}
          ALREADY_RELEASED: ${{ steps.authorize.outputs.already_released }}
          MANUAL: ${{ steps.authorize.outputs.manual }}
          RELEASE_SHA: ${{ steps.authorize.outputs.release_sha }}
          BASELINE_SHA: ${{ steps.authorize.outputs.baseline_sha }}
        shell: bash
        run: |
          set -euo pipefail
          echo "should_release=false" >> "$GITHUB_OUTPUT"
          if [ "$AUTHORIZED" != "true" ] || [ "$ALREADY_RELEASED" = "true" ]; then
            exit 0
          fi
          if [ "$MANUAL" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Explicit current-main TestFlight rebuild authorized."
            exit 0
          fi
          if [ -z "$BASELINE_SHA" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No successful TestFlight baseline exists; releasing the verified current generation."
            exit 0
          fi

          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] &&
            [[ "$BASELINE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::TestFlight comparison SHAs are malformed."
            exit 1
          }
          git cat-file -e "${RELEASE_SHA}^{commit}"
          git cat-file -e "${BASELINE_SHA}^{commit}"
          git merge-base --is-ancestor "$BASELINE_SHA" "$RELEASE_SHA" || {
            echo "::error::The last successful TestFlight SHA is not an ancestor of the authorized current main SHA."
            exit 1
          }
          release_paths=(
            apps/ios
            fastlane
            Gemfile
            Gemfile.lock
            scripts/ios-best-practices-lint.sh
            .github/workflows/ios-ci.yml
            .github/workflows/ios-testflight.yml
          )
          changed_files="$(git diff --name-only "$BASELINE_SHA" "$RELEASE_SHA")"
          relevant_files="$(git diff --name-only "$BASELINE_SHA" "$RELEASE_SHA" -- "${release_paths[@]}")"
          printf '%s\n' "$changed_files"
          if [ -n "$relevant_files" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Verified production generation contains iOS release changes."
          else
            echo "No iOS release changes since the last successful TestFlight upload."
          fi

  beta:
    name: Upload Internal TestFlight
    needs: [authorize-release]
    if: ${{ needs.authorize-release.result == 'success' && needs.authorize-release.outputs.should_release == 'true' }}
    runs-on: macos-26
    timeout-minutes: 75
    env:
      CI: "true"
      GH_TOKEN: ${{ github.token }}
      RELEASE_SHA: ${{ needs.authorize-release.outputs.release_sha }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Associated Domains remains an Apple entitlement even though native auth
      # no longer embeds a Clerk publishable key after the Better Auth cutover.
      CLERK_ASSOCIATED_DOMAIN: ${{ secrets.CLERK_ASSOCIATED_DOMAIN }}
      APP_STORE_COMPANY_NAME: ${{ secrets.APP_STORE_COMPANY_NAME }}
      JOVIE_IOS_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      JOVIE_IOS_OBSERVABILITY_ENVIRONMENT: production
      API_BASE_URL: https://jov.ie
      WEB_BASE_URL: https://jov.ie
      IOS_BUILD_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.build_number || github.run_number }}
      TESTFLIGHT_CHANGELOG: ${{ github.event_name == 'workflow_dispatch' && inputs.changelog || format('Internal build {0}', needs.authorize-release.outputs.release_sha) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize-release.outputs.release_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Validate TestFlight secrets
        shell: bash
        run: bash apps/ios/scripts/validate-testflight-env.sh

      # Full simulator build/test already passed on this exact SHA through the
      # merge-group iOS lane or direct-main fallback required by Main Release
      # Ready. Repeating it here doubles macOS work without adding evidence.
      - name: Revalidate exact current main before archive
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          current_main_sha="$(gh api "repos/${{ github.repository }}/commits/main" --jq '.sha // empty')"
          [ "$current_main_sha" = "$RELEASE_SHA" ] || {
            echo "::error::TestFlight generation $RELEASE_SHA was superseded by $current_main_sha before archive."
            exit 1
          }

      - name: Upload internal TestFlight build
        shell: bash
        run: |
          set -euo pipefail
          match_git_private_key="${MATCH_GIT_PRIVATE_KEY:-}"
          if [[ -z "${match_git_private_key//[[:space:]]/}" ]]; then
            unset MATCH_GIT_PRIVATE_KEY
          fi
          bundle exec fastlane ios beta

  record-upload:
    name: Record exact TestFlight upload
    needs: [authorize-release, beta]
    if: ${{ always() && needs.authorize-release.result == 'success' && needs.beta.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cross-prove and record the exact upload job
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.authorize-release.outputs.release_sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] &&
            [[ "$RUN_ID" =~ ^[1-9][0-9]*$ ]] &&
            [[ "$RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]] || {
            echo "::error::TestFlight upload marker identity is malformed."
            exit 1
          }

          run_record="$(gh api "repos/$REPOSITORY/actions/runs/$RUN_ID")"
          testflight_workflow="$(gh api \
            "repos/$REPOSITORY/actions/workflows/ios-testflight.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . >= 1 and floor == .) and
            .name == "iOS TestFlight" and
            .path == ".github/workflows/ios-testflight.yml"
          ' >/dev/null <<<"$testflight_workflow" || {
            echo "::error::GitHub returned malformed TestFlight workflow identity."
            exit 1
          }
          testflight_workflow_id="$(jq -r '.id | tostring' \
            <<<"$testflight_workflow")"
          jq -e \
            --arg repo "$REPOSITORY" \
            --arg run "$RUN_ID" \
            --arg attempt "$RUN_ATTEMPT" \
            --arg sha "$RELEASE_SHA" \
            --arg workflow_id "$testflight_workflow_id" '
              type == "object" and
              (.id | tostring) == $run and
              (.run_attempt | tostring) == $attempt and
              (.workflow_id | tostring) == $workflow_id and
              .path == ".github/workflows/ios-testflight.yml" and
              .display_title == ("iOS TestFlight " + $sha) and
              (.event == "workflow_run" or .event == "workflow_dispatch") and
              .head_branch == "main" and
              .head_sha == $sha and
              .head_repository.full_name == $repo
            ' >/dev/null <<<"$run_record" || {
            echo "::error::Current TestFlight run does not match the authorized upload identity."
            exit 1
          }

          # A rerun-all can legitimately create more than one successful upload
          # attempt. Select the newest attempt with one exact successful beta and
          # bind the marker to that attempt and job ID.
          upload_attempt=""
          upload_job=""
          for attempt in $(seq 1 "$RUN_ATTEMPT"); do
            jobs_json="$(gh api --paginate --slurp \
              "repos/$REPOSITORY/actions/runs/$RUN_ID/attempts/$attempt/jobs?per_page=100")"
            jq -e '
              type == "array" and length > 0 and
              all(.[]; type == "object" and (.jobs | type == "array"))
            ' >/dev/null <<<"$jobs_json" || {
              echo "::error::GitHub returned malformed TestFlight upload evidence."
              exit 1
            }
            attempt_matches="$(jq -c \
              --arg sha "$RELEASE_SHA" \
              '
                [
                  .[].jobs[]?
                  | select(
                      .name == "Upload Internal TestFlight" and
                      .head_sha == $sha and
                      .status == "completed" and
                      .conclusion == "success" and
                      (.id | type == "number")
                    )
                  | (.id | tostring)
                ]
              ' <<<"$jobs_json")"
            attempt_match_count="$(jq 'unique | length' <<<"$attempt_matches")"
            if [ "$attempt_match_count" -gt 1 ]; then
              echo "::error::TestFlight attempt $attempt has ambiguous successful upload jobs."
              exit 1
            fi
            if [ "$attempt_match_count" = "1" ]; then
              upload_attempt="$attempt"
              upload_job="$(jq -r 'unique | .[0]' <<<"$attempt_matches")"
            fi
          done

          [[ "$upload_attempt" =~ ^[1-9][0-9]*$ ]] &&
            [[ "$upload_job" =~ ^[1-9][0-9]*$ ]] || {
            echo "::error::No successful exact TestFlight upload job exists in this run."
            exit 1
          }
          jq -n \
            --arg sha "$RELEASE_SHA" \
            --arg workflow_run "$RUN_ID" \
            --arg upload_attempt "$upload_attempt" \
            --arg upload_job "$upload_job" \
            '{
              sha: $sha,
              workflowRun: $workflow_run,
              uploadRunAttempt: $upload_attempt,
              uploadJob: $upload_job
            }' > "$RUNNER_TEMP/testflight-upload-verified.json"

      - name: Preserve upload-only TestFlight baseline marker
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testflight-upload-verified
          path: ${{ runner.temp }}/testflight-upload-verified.json
          if-no-files-found: error
          retention-days: 90
