name: Stuck Draft Auto-Close

# Operator-only recovery tool for agent-owned draft PRs that have been idle
# (>48h since last update) with failing checks. Automatic closing conflicts
# with the active all-PR drain, so this workflow has no schedule.
#
# Opt out per-PR with any of: needs-human, hold, gated.
# Human-owned branches are never touched.

on:
  workflow_dispatch:

concurrency:
  group: stuck-draft-autoclose
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  autoclose:
    # A manual cleanup must never consume deterministic merge capacity.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Auto-close stuck agent drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
          STUCK_IDLE_HOURS: 48
        run: bash scripts/stuck-draft-autoclose.sh
