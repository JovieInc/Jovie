name: Production Controller Health

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: production-controller-health
  cancel-in-progress: false

jobs:
  recover:
    name: Recover one exact controller generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Evaluate exact current production controller
        id: evaluate
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "needs_manual=false"
            echo "recovery_reason=not_required"
            echo "run_url=https://github.com/$REPOSITORY/actions"
            echo "short_sha=unknown"
          } >> "$GITHUB_OUTPUT"

          incident() {
            local reason="$1"
            echo "needs_manual=true" >> "$GITHUB_OUTPUT"
            echo "recovery_reason=$reason" >> "$GITHUB_OUTPUT"
            echo "::warning::Production controller requires manual recovery: $reason"
            trap - EXIT
            exit 0
          }
          policy_generation_state() {
            local checked_out_sha="$1"
            local current_sha="$2"
            if [[ ! "$checked_out_sha" =~ ^[0-9a-f]{40}$ ]] ||
              [[ ! "$current_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo invalid
            elif [ "$checked_out_sha" != "$current_sha" ]; then
              echo superseded
            else
              echo current
            fi
          }
          on_exit() {
            local status=$?
            if [ "$status" -ne 0 ]; then
              incident evaluation_error
            fi
          }
          trap on_exit EXIT

          current_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha // empty')"
          [[ "$current_sha" =~ ^[0-9a-f]{40}$ ]] || incident invalid_current_main
          echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${current_sha:0:7}" >> "$GITHUB_OUTPUT"

          checked_out_sha="$(git rev-parse --verify 'HEAD^{commit}' 2>/dev/null || true)"
          policy_state="$(policy_generation_state "$checked_out_sha" "$current_sha")"
          case "$policy_state" in
            invalid)
              incident invalid_checked_out_policy
              ;;
            superseded)
              echo "recovery_reason=policy_generation_superseded" >> "$GITHUB_OUTPUT"
              echo "::notice::Health policy $checked_out_sha does not match current main $current_sha; neutral."
              exit 0
              ;;
            current) ;;
            *) incident malformed_policy_generation_state ;;
          esac

          ci_workflow_json="$(gh api "repos/$REPOSITORY/actions/workflows/ci.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . > 0) and
            .name == "CI" and
            .path == ".github/workflows/ci.yml" and
            .state == "active"
          ' >/dev/null <<<"$ci_workflow_json" || incident invalid_ci_workflow
          ci_workflow_id="$(jq -r '.id' <<<"$ci_workflow_json")"

          controller_workflow_json="$(gh api \
            "repos/$REPOSITORY/actions/workflows/production-controller.yml")"
          jq -e '
            type == "object" and
            (.id | type == "number" and . > 0) and
            .name == "Production Controller" and
            .path == ".github/workflows/production-controller.yml" and
            .state == "active"
          ' >/dev/null <<<"$controller_workflow_json" || incident invalid_controller_workflow
          controller_workflow_id="$(jq -r '.id' <<<"$controller_workflow_json")"

          marker_state_json="$(node .github/scripts/production-marker-state.mjs \
            --sha "$current_sha" \
            --repo "$REPOSITORY" \
            --controller-workflow-id "$controller_workflow_id")"
          jq -e '
            type == "object" and
            (.state | IN("none", "pending", "recovery_available", "verified", "manual")) and
            (.reason | type == "string" and length > 0)
          ' >/dev/null <<<"$marker_state_json" || incident malformed_marker_classification
          marker_state="$(jq -r '.state' <<<"$marker_state_json")"
          marker_reason="$(jq -r '.reason' <<<"$marker_state_json")"
          case "$marker_state" in
            verified)
              echo "Current main $current_sha already has exact verified production evidence."
              exit 0
              ;;
            pending)
              echo "Production marker recovery is already pending ($marker_reason)."
              exit 0
              ;;
            manual)
              incident "$marker_reason"
              ;;
            recovery_available)
              [ "$marker_reason" = "one_interrupted_marker_safe_to_rerun" ] || \
                incident contradictory_recovery_authority
              run_id="$(jq -r '.controllerRun // 0' <<<"$marker_state_json")"
              [[ "$run_id" =~ ^[1-9][0-9]*$ ]] || incident malformed_recovery_run
              echo "run_url=https://github.com/$REPOSITORY/actions/runs/$run_id" \
                >> "$GITHUB_OUTPUT"

              # TOCTOU boundary: re-read the marker-owned exact attempt, its
              # rollback job, the latest run, the lease listing, and main
              # immediately before requesting the sole full rerun.
              exact_attempt="$(gh api \
                "repos/$REPOSITORY/actions/runs/$run_id/attempts/1")"
              jq -e \
                --argjson run_id "$run_id" \
                --arg sha "$current_sha" \
                --arg repo "$REPOSITORY" \
                --argjson workflow_id "$controller_workflow_id" '
                .id == $run_id and .run_attempt == 1 and
                .workflow_id == $workflow_id and
                .path == ".github/workflows/production-controller.yml" and
                .head_sha == $sha and .head_branch == "main" and
                .head_repository.full_name == $repo and
                .event == "workflow_run" and .status == "completed" and
                (.conclusion | IN("cancelled", "failure", "startup_failure", "timed_out"))
              ' >/dev/null <<<"$exact_attempt" || incident changed_exact_attempt

              exact_jobs="$(gh api \
                "repos/$REPOSITORY/actions/runs/$run_id/attempts/1/jobs?per_page=100")"
              jq -e \
                --argjson run_id "$run_id" \
                --arg sha "$current_sha" '
                type == "object" and
                (.total_count | type == "number") and
                (.jobs | type == "array") and
                .total_count == (.jobs | length) and
                all(.jobs[];
                  (.id | type == "number" and . > 0) and
                  (.run_id | type == "number" and . > 0) and
                  (.run_attempt | type == "number" and . > 0) and
                  (.name | type == "string" and length > 0) and
                  (.head_sha | type == "string" and length > 0) and
                  (.head_branch | type == "string" and length > 0) and
                  (.status | type == "string" and length > 0) and
                  ((.conclusion | type) == "string" or .conclusion == null)
                ) and
                ([.jobs[] | select(
                  (.name | type == "string") and
                  (.name | endswith("Centralized production rollback")) and
                  .run_id == $run_id and .run_attempt == 1 and
                  .head_sha == $sha and .head_branch == "main" and
                  .status == "completed" and .conclusion == "skipped"
                )] | length) == 1 and
                ([.jobs[] | select(
                  (.name | type == "string") and
                  (.name | endswith("Centralized production rollback"))
                )] | length) == 1
              ' >/dev/null <<<"$exact_jobs" || incident unsafe_rollback_at_boundary

              latest_run="$(gh api "repos/$REPOSITORY/actions/runs/$run_id")"
              jq -e --argjson run_id "$run_id" --arg sha "$current_sha" \
                --arg repo "$REPOSITORY" --argjson workflow_id "$controller_workflow_id" '
                .id == $run_id and .run_attempt == 1 and
                .workflow_id == $workflow_id and
                .path == ".github/workflows/production-controller.yml" and
                .head_sha == $sha and .head_branch == "main" and
                .head_repository.full_name == $repo and
                .event == "workflow_run" and .status == "completed"
                and (.conclusion | IN("cancelled", "failure", "startup_failure", "timed_out"))
              ' >/dev/null <<<"$latest_run" || incident recovery_attempt_already_started

              lease_name="production-generation-recovery-$current_sha"
              lease_listing="$(gh api \
                "repos/$REPOSITORY/actions/artifacts?name=$lease_name&per_page=100")"
              jq -e --arg name "$lease_name" '
                type == "object" and .total_count == 0 and
                (.artifacts | type == "array" and length == 0)
              ' >/dev/null <<<"$lease_listing" || incident recovery_lease_already_exists

              boundary_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha // empty')"
              [[ "$boundary_sha" =~ ^[0-9a-f]{40}$ ]] || incident invalid_recovery_boundary
              if [ "$boundary_sha" != "$current_sha" ]; then
                echo "Controller recovery was superseded by $boundary_sha; neutral."
                exit 0
              fi
              gh run rerun "$run_id"
              echo "recovery_reason=full_controller_rerun_requested" >> "$GITHUB_OUTPUT"
              echo "Requested the sole full recovery for controller run $run_id."
              exit 0
              ;;
            none) ;;
          esac

          # No marker means no controller attempt may be replayed: it could
          # have mutated production without reaching durable verification.
          # The only safe automatic action is one full CI rerun when GitHub
          # failed to deliver the original workflow_run event at all.
          ci_runs="$(gh api \
            "repos/$REPOSITORY/actions/workflows/ci.yml/runs?event=push&branch=main&head_sha=$current_sha&per_page=100")"
          jq -e '
            type == "object" and
            (.total_count | type == "number") and
            (.workflow_runs | type == "array") and
            .total_count == (.workflow_runs | length) and
            all(.workflow_runs[];
              (.id | type == "number" and . > 0) and
              (.run_attempt | type == "number" and . > 0) and
              (.workflow_id | type == "number" and . > 0) and
              (.path | type == "string") and
              (.head_sha | type == "string") and
              (.head_branch | type == "string") and
              (.head_repository.full_name | type == "string") and
              (.event | type == "string") and
              (.status | type == "string") and
              ((.conclusion | type) == "string" or .conclusion == null) and
              (.updated_at | type == "string") and
              (.html_url | type == "string")
            )
          ' >/dev/null <<<"$ci_runs" || incident incomplete_ci_listing
          source_ci="$(jq -c --arg sha "$current_sha" --arg repo "$REPOSITORY" \
            --argjson workflow_id "$ci_workflow_id" '
            [.workflow_runs[] | select(
              .workflow_id == $workflow_id and
              .path == ".github/workflows/ci.yml" and
              .head_sha == $sha and .head_branch == "main" and
              .head_repository.full_name == $repo and
              .event == "push" and .status == "completed" and
              .conclusion == "success"
            )] | unique_by(.id) | sort_by(.updated_at, .id) | last // empty
          ' <<<"$ci_runs")"
          if [ -z "$source_ci" ]; then
            echo "Current main has no exact completed successful CI attempt yet."
            exit 0
          fi
          source_ci_id="$(jq -r '.id' <<<"$source_ci")"
          source_ci_attempt="$(jq -r '.run_attempt' <<<"$source_ci")"
          source_ci_updated="$(jq -r '.updated_at' <<<"$source_ci")"
          [[ "$source_ci_id" =~ ^[1-9][0-9]*$ ]] &&
            [[ "$source_ci_attempt" =~ ^[1-9][0-9]*$ ]] || incident malformed_source_ci

          expected_title="Production Controller $current_sha from CI $source_ci_id attempt $source_ci_attempt"
          controller_runs="$(gh api \
            "repos/$REPOSITORY/actions/workflows/production-controller.yml/runs?branch=main&event=workflow_run&head_sha=$current_sha&per_page=100")"
          jq -e '
            type == "object" and
            (.total_count | type == "number") and
            (.workflow_runs | type == "array") and
            .total_count == (.workflow_runs | length) and
            all(.workflow_runs[];
              (.id | type == "number" and . > 0) and
              (.run_attempt | type == "number" and . > 0) and
              (.workflow_id | type == "number" and . > 0) and
              (.display_title | type == "string") and
              (.path | type == "string") and
              (.head_sha | type == "string") and
              (.head_branch | type == "string") and
              (.head_repository.full_name | type == "string") and
              (.event | type == "string") and
              (.status | type == "string") and
              ((.conclusion | type) == "string" or .conclusion == null) and
              (.created_at | type == "string") and
              (.html_url | type == "string")
            )
          ' >/dev/null <<<"$controller_runs" || incident incomplete_controller_listing
          controller_matches="$(jq -c --arg title "$expected_title" --arg sha "$current_sha" \
            --arg repo "$REPOSITORY" --argjson workflow_id "$controller_workflow_id" '
            [.workflow_runs[] | select(
              .workflow_id == $workflow_id and .display_title == $title and
              .path == ".github/workflows/production-controller.yml" and
              .head_sha == $sha and .head_branch == "main" and
              .head_repository.full_name == $repo and .event == "workflow_run"
            )] | unique_by(.id) | sort_by(.created_at, .id)
          ' <<<"$controller_runs")"
          controller_count="$(jq 'length' <<<"$controller_matches")"
          if [ "$controller_count" -gt 1 ]; then
            incident duplicate_controller_generation
          fi
          controller="$(jq -c '.[0] // empty' <<<"$controller_matches")"
          if [ -n "$controller" ]; then
            controller_id="$(jq -r '.id' <<<"$controller")"
            controller_status="$(jq -r '.status' <<<"$controller")"
            echo "run_url=https://github.com/$REPOSITORY/actions/runs/$controller_id" \
              >> "$GITHUB_OUTPUT"
            if [ "$controller_status" = "queued" ] || [ "$controller_status" = "in_progress" ]; then
              echo "Controller run $controller_id is still $controller_status."
              exit 0
            fi
            incident controller_completed_without_marker
          fi

          source_epoch="$(date -u -d "$source_ci_updated" +%s)"
          age_seconds=$(($(date +%s) - source_epoch))
          if [ "$age_seconds" -lt 900 ]; then
            echo "Controller event remains inside the 15-minute delivery grace."
            exit 0
          fi
          if [ "$source_ci_attempt" -ne 1 ]; then
            incident ci_event_replay_exhausted
          fi
          source_boundary="$(gh api \
            "repos/$REPOSITORY/actions/runs/$source_ci_id/attempts/1")"
          jq -e --argjson id "$source_ci_id" --arg sha "$current_sha" \
            --arg repo "$REPOSITORY" --argjson workflow_id "$ci_workflow_id" '
            .id == $id and .run_attempt == 1 and
            .workflow_id == $workflow_id and .path == ".github/workflows/ci.yml" and
            .head_sha == $sha and .head_branch == "main" and
            .head_repository.full_name == $repo and .event == "push" and
            .status == "completed" and .conclusion == "success"
          ' >/dev/null <<<"$source_boundary" || incident changed_source_ci
          boundary_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha // empty')"
          [[ "$boundary_sha" =~ ^[0-9a-f]{40}$ ]] || incident invalid_ci_replay_boundary
          if [ "$boundary_sha" != "$current_sha" ]; then
            echo "CI event replay was superseded by $boundary_sha; neutral."
            exit 0
          fi
          gh run rerun "$source_ci_id"
          echo "recovery_reason=ci_event_replayed" >> "$GITHUB_OUTPUT"
          echo "Replayed exact successful CI once to redeliver the controller event."

      - name: Open one manual-recovery incident
        if: ${{ always() && steps.evaluate.outputs.needs_manual == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHORT_SHA: ${{ steps.evaluate.outputs.short_sha }}
          RUN_URL: ${{ steps.evaluate.outputs.run_url }}
          RECOVERY_REASON: ${{ steps.evaluate.outputs.recovery_reason }}
        run: |
          set -euo pipefail
          title="[Production Controller] Manual recovery required for ${SHORT_SHA:-unknown}"
          gh label create incident --force \
            --description "Production incident requiring investigation" --color "d93f0b"
          issues_json="$(gh issue list --state open --label incident --limit 100 \
            --json number,title)"
          existing="$(jq --arg title "$title" '[.[] | select(.title == $title)] | length' \
            <<<"$issues_json")"
          if [ "$existing" -gt 0 ]; then
            echo "Manual recovery incident already exists."
            exit 0
          fi
          gh issue create --title "$title" --label incident --body \
            "Automatic recovery failed closed (${RECOVERY_REASON:-unknown}). Inspect exact controller evidence before any manual rerun or production mutation: ${RUN_URL:-https://github.com/${GH_REPO}/actions}"
