# Cost Anomaly Gate
#
# PURPOSE: Continuous post-deploy safety net that detects when production event
# volume (a proxy for cost-driving activity: function invocations, external API
# calls, log volume) spikes beyond a baseline. On anomaly: alert and open an
# incident; this observer never mutates production.
#
# This complements the one-shot Sentry Error Gate. The error gate catches
# regressions that THROW; this gate catches runaways that SUCCEED — a tight
# loop hammering an external API, a cron processing an unbounded backlog, or
# a code path that suddenly emits 1000x its normal traffic. Those scenarios
# don't generate errors but do burn money.
#
# Background: an earlier project the founder ran lost ~$12k over 12 days
# from a runaway log/API loop while he was unavailable. Hard caps at the
# provider level (Vercel Spend Management, Anthropic usage limits, etc.) are
# the primary defense; see docs/COST_MONITORING.md for the full checklist.
# This workflow is the secondary detection layer. The serialized production
# controller is the only workflow allowed to roll back a release.
#
# TRIGGER: Declared 15-minute hosted schedule plus manual dispatch. GitHub
# workflow enablement and the Production Sentry token are operational
# prerequisites; the YAML schedule does not prove either is active.
#
# HOW IT WORKS:
# 1. Query Sentry for current event count (last 60 min, all event types).
# 2. Query Sentry for baseline event count: same hour-of-week from the
#    prior 4 weeks, averaged.
# 3. Anomaly if current > max(baseline * threshold_multiplier, absolute_floor).
# 4. On anomaly: Slack alert + GitHub issue. No production mutation.
#
# SAFETY:
# - Alert-only by construction; it has no Vercel credentials or rollback step.
# - Absolute floor prevents low-traffic-hour false positives.
# - One open incident is the cooldown boundary: only the first observation
#   creates an issue and sends Slack; later runs stay quiet until it is closed.

name: Cost Anomaly Gate

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      threshold_multiplier:
        description: 'Multiplier above baseline that triggers an anomaly alert'
        required: false
        default: '5'
        type: string
      absolute_floor:
        description: 'Minimum event count required to consider anomaly real (prevents low-traffic noise)'
        required: false
        default: '1000'
        type: string
      lookback_minutes:
        description: 'Minutes of recent traffic to evaluate'
        required: false
        default: '60'
        type: string

# Prevent overlapping evaluations and duplicate alerts.
concurrency:
  group: cost-anomaly-gate
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  evaluate:
    name: Evaluate Production Event Volume
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: Production – jovie
    env:
      THRESHOLD_MULTIPLIER: ${{ github.event.inputs.threshold_multiplier || '5' }}
      ABSOLUTE_FLOOR: ${{ github.event.inputs.absolute_floor || '1000' }}
      LOOKBACK_MINUTES: ${{ github.event.inputs.lookback_minutes || '60' }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Resolve canonical production Sentry project
        id: sentry-config
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: jovie
          SENTRY_PROJECT: jovie-web
        run: |
          set -euo pipefail
          test -n "$SENTRY_AUTH_TOKEN" || {
            echo "::error::Production environment SENTRY_AUTH_TOKEN is unavailable."
            exit 1
          }
          [[ "$THRESHOLD_MULTIPLIER" =~ ^[1-9][0-9]*$ ]] && [ "$THRESHOLD_MULTIPLIER" -le 100 ] &&
            [[ "$ABSOLUTE_FLOOR" =~ ^[0-9]+$ ]] && [ "$ABSOLUTE_FLOOR" -le 100000000 ] &&
            [[ "$LOOKBACK_MINUTES" =~ ^[1-9][0-9]*$ ]] && [ "$LOOKBACK_MINUTES" -le 1440 ] || {
            echo "::error::Cost observer numeric inputs are outside safe bounds."
            exit 1
          }
          project_response="$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/")"
          project_id="$(jq -r '.id // empty | tostring' <<<"$project_response")"
          [[ "$project_id" =~ ^[1-9][0-9]*$ ]] || {
            echo "::error::Sentry project resolution returned no numeric project ID."
            exit 1
          }
          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"

      - name: Query current event volume
        id: current
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: jovie
          SENTRY_PROJECT_ID: ${{ steps.sentry-config.outputs.project_id }}
        run: |
          set -euo pipefail
          END_EPOCH=$(date +%s)
          START_EPOCH=$((END_EPOCH - LOOKBACK_MINUTES * 60))
          START_ISO=$(date -u -d "@$START_EPOCH" '+%Y-%m-%dT%H:%M:%S')
          END_ISO=$(date -u -d "@$END_EPOCH" '+%Y-%m-%dT%H:%M:%S')

          echo "Current window: $START_ISO to $END_ISO (${LOOKBACK_MINUTES} min)"

          STATS_RESPONSE=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/organizations/$SENTRY_ORG/events-stats/?project=$SENTRY_PROJECT_ID&field=count()&start=$START_ISO&end=$END_ISO&interval=1m")
          jq -e '
            type == "object" and (.data | type == "array") and
            all(.data[];
              type == "array" and length >= 2 and (.[1] | type == "array") and
              all(.[1][]; (.count | type == "number"))
            )
          ' >/dev/null <<<"$STATS_RESPONSE"
          COUNT=$(jq -r '[.data[]?[1][]?.count] | add // 0' <<<"$STATS_RESPONSE")
          [[ "$COUNT" =~ ^[0-9]+$ ]] || {
            echo "::error::Sentry current count is not a non-negative integer."
            exit 1
          }

          echo "Current event count: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Query baseline event volume (same hour-of-week, prior 4 weeks)
        id: baseline
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: jovie
          SENTRY_PROJECT_ID: ${{ steps.sentry-config.outputs.project_id }}
        run: |
          set -euo pipefail
          # Sample the same hour-of-week from each of the prior 4 weeks
          # (7, 14, 21, 28 days ago). Average them. This handles weekly
          # traffic seasonality (weekend dips, business-hour peaks).
          NOW_EPOCH=$(date +%s)
          TOTAL=0
          SAMPLES=0

          for WEEKS_AGO in 1 2 3 4; do
            END_EPOCH=$((NOW_EPOCH - WEEKS_AGO * 7 * 86400))
            START_EPOCH=$((END_EPOCH - LOOKBACK_MINUTES * 60))
            START_ISO=$(date -u -d "@$START_EPOCH" '+%Y-%m-%dT%H:%M:%S')
            END_ISO=$(date -u -d "@$END_EPOCH" '+%Y-%m-%dT%H:%M:%S')

            STATS_RESPONSE=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
              "https://sentry.io/api/0/organizations/$SENTRY_ORG/events-stats/?project=$SENTRY_PROJECT_ID&field=count()&start=$START_ISO&end=$END_ISO&interval=1m")
            jq -e '
              type == "object" and (.data | type == "array") and
              all(.data[];
                type == "array" and length >= 2 and (.[1] | type == "array") and
                all(.[1][]; (.count | type == "number"))
              )
            ' >/dev/null <<<"$STATS_RESPONSE"
            SAMPLE=$(jq -r '[.data[]?[1][]?.count] | add // 0' <<<"$STATS_RESPONSE")
            [[ "$SAMPLE" =~ ^[0-9]+$ ]] || {
              echo "::error::Sentry baseline count is not a non-negative integer."
              exit 1
            }

            echo "Week -${WEEKS_AGO}: $START_ISO to $END_ISO → $SAMPLE events"
            TOTAL=$((TOTAL + SAMPLE))
            SAMPLES=$((SAMPLES + 1))
          done

          if [[ "$SAMPLES" -gt 0 ]]; then
            AVG=$((TOTAL / SAMPLES))
          else
            AVG=0
          fi

          echo "Baseline (4-week avg): $AVG events"
          echo "average=$AVG" >> "$GITHUB_OUTPUT"

      - name: Evaluate anomaly
        id: evaluate
        run: |
          CURRENT="${{ steps.current.outputs.count }}"
          BASELINE="${{ steps.baseline.outputs.average }}"

          echo "=== Cost Anomaly Evaluation ==="
          echo "Current events:  $CURRENT (last ${LOOKBACK_MINUTES} min)"
          echo "Baseline events: $BASELINE (4-week avg, same hour-of-week)"
          echo "Multiplier:      ${THRESHOLD_MULTIPLIER}x"
          echo "Absolute floor:  $ABSOLUTE_FLOOR"

          # Threshold = max(baseline * multiplier, absolute_floor)
          # The floor prevents low-traffic-hour false positives where
          # baseline=10 and current=60 would otherwise fire.
          MULTIPLIED=$((BASELINE * THRESHOLD_MULTIPLIER))
          if [[ "$MULTIPLIED" -gt "$ABSOLUTE_FLOOR" ]]; then
            THRESHOLD=$MULTIPLIED
          else
            THRESHOLD=$ABSOLUTE_FLOOR
          fi
          echo "Effective threshold: $THRESHOLD"

          if [[ "$CURRENT" -gt "$THRESHOLD" ]]; then
            if [[ "$BASELINE" -gt 0 ]]; then
              RATIO=$((CURRENT * 100 / BASELINE))
              REASON="Event volume spike: ${RATIO}% of baseline (${CURRENT} vs ${BASELINE}, threshold ${THRESHOLD_MULTIPLIER}x)"
            else
              REASON="Event volume spike: ${CURRENT} events (no baseline; absolute floor ${ABSOLUTE_FLOOR} exceeded)"
            fi
            echo "ANOMALY DETECTED: $REASON"
            echo "status=anomaly" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          else
            echo "Event volume within normal range"
            echo "status=normal" >> "$GITHUB_OUTPUT"
            echo "reason=Within normal range (current=${CURRENT}, threshold=${THRESHOLD})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create one open cost-anomaly incident
        id: incident
        if: steps.evaluate.outputs.status == 'anomaly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CURRENT="${{ steps.current.outputs.count }}"
          BASELINE="${{ steps.baseline.outputs.average }}"
          REASON="${{ steps.evaluate.outputs.reason }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          INCIDENT_TITLE="[Cost Anomaly] Production event-volume incident"

          # Concurrency serializes evaluators. A fixed open-incident identity
          # then deduplicates sequential 15-minute runs until operators close it.
          gh label create cost-monitoring --force \
            --description "Cost monitoring and anomaly detection" --color "e4e669"
          gh label create incident --force \
            --description "Production incident requiring investigation" --color "d93f0b"
          issues_json="$(gh issue list --state open --label cost-monitoring \
            --limit 100 --json number,title,url)"
          jq -e 'type == "array"' >/dev/null <<<"$issues_json"
          existing_json="$(jq -c --arg title "$INCIDENT_TITLE" \
            '[.[] | select(.title == $title)] | sort_by(.number) | first // empty' \
            <<<"$issues_json")"
          if [ -n "$existing_json" ]; then
            existing_number="$(jq -r '.number' <<<"$existing_json")"
            existing_url="$(jq -r '.url' <<<"$existing_json")"
            [[ "$existing_number" =~ ^[1-9][0-9]*$ ]] &&
              [[ "$existing_url" == https://github.com/* ]] || {
              echo "::error::Existing cost anomaly incident evidence is malformed."
              exit 1
            }
            echo "should_notify=false" >> "$GITHUB_OUTPUT"
            echo "incident_url=$existing_url" >> "$GITHUB_OUTPUT"
            echo "Cost anomaly remains open in #$existing_number; suppressing duplicate issue and Slack alert."
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            printf '## Cost anomaly detected (alert only)\n\n'
            printf '**Reason:** %s\n\n' "$REASON"
            printf '**Current event volume:** %s (last %s min)\n' "$CURRENT" "$LOOKBACK_MINUTES"
            printf '**Baseline (4-week avg):** %s\n' "$BASELINE"
            printf '**Threshold:** %sx baseline OR %s absolute floor\n\n' "$THRESHOLD_MULTIPLIER" "$ABSOLUTE_FLOOR"
            printf '**Production mutation:** none; investigate before using the serialized release controller.\n\n'
            printf '**Workflow run:** %s\n\n' "$RUN_URL"
            printf '## Required follow-up\n\n'
            printf '1. Identify which deployment or traffic source caused the spike.\n'
            printf '2. Identify the runaway code path: Sentry transactions, Vercel function logs, per-route invocation counts.\n'
            printf '3. Verify provider-side spend caps held (see docs/COST_MONITORING.md Layer 1 checklist).\n'
            printf '4. Patch the root cause and redeploy through the serialized production controller.\n'
            printf '5. If this was a false positive, tune `threshold_multiplier` or `absolute_floor` in the workflow.\n\n'
            printf '## Runbook\nSee `docs/COST_MONITORING.md`.\n'
          } > "$BODY_FILE"

          incident_url="$(gh issue create \
            --title "$INCIDENT_TITLE" \
            --label "cost-monitoring,incident" \
            --body-file "$BODY_FILE")"
          [[ "$incident_url" == https://github.com/* ]] || {
            echo "::error::GitHub did not return the created incident URL."
            exit 1
          }
          echo "should_notify=true" >> "$GITHUB_OUTPUT"
          echo "incident_url=$incident_url" >> "$GITHUB_OUTPUT"

      - name: Slack alert on new anomaly incident
        if: steps.incident.outputs.should_notify == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          CURRENT="${{ steps.current.outputs.count }}"
          BASELINE="${{ steps.baseline.outputs.average }}"
          REASON="${{ steps.evaluate.outputs.reason }}"
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 \
            -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg reason "$REASON" \
              --arg current "$CURRENT" \
              --arg baseline "$BASELINE" \
              --arg incident "${{ steps.incident.outputs.incident_url }}" \
              --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{text: "🚨 Cost anomaly detected — alert only", attachments: [{color: "warning", fields: [
                {title: "Reason", value: $reason, short: false},
                {title: "Current / baseline", value: ($current + " / " + $baseline), short: true},
                {title: "Production mutation", value: "none", short: true},
                {title: "Incident", value: ("<" + $incident + "|Open incident>"), short: false},
                {title: "Run", value: ("<" + $run + "|View observer run>"), short: false}
              ]}]}')"

      - name: Summary
        if: always()
        run: |
          STATUS="${{ steps.evaluate.outputs.status }}"
          REASON="${{ steps.evaluate.outputs.reason }}"
          CURRENT="${{ steps.current.outputs.count }}"
          BASELINE="${{ steps.baseline.outputs.average }}"

          echo "### Cost Anomaly Gate Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Current events (${LOOKBACK_MINUTES} min) | $CURRENT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Baseline (4-week avg) | $BASELINE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Threshold multiplier | ${THRESHOLD_MULTIPLIER}x |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Absolute floor | $ABSOLUTE_FLOOR |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | $REASON |" >> "$GITHUB_STEP_SUMMARY"
