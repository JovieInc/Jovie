name: Workflow Lint

# Source, merge-group, and direct-main workflow edits are enforced inside
# ci-fast's Structural Contract. Keep this standalone surface manual for
# operator diagnosis without duplicating installs and runner allocation.
#
# Hygiene (#10463): do NOT add push/pull_request triggers here — every agent
# branch push would mint a runner. Acceptance: push without workflow changes
# triggers zero actionlint runs.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    # rhysd/actionlint is a Docker action, so it needs a Docker-capable hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SHELLCHECK_OPTS: >-
        --exclude=SC2001,SC2016,SC2028,SC2034,SC2086,SC2126,SC2129,SC2329
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
      - name: Verify agent workflow hygiene
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - run: python -m pip install --quiet --require-hashes -r .github/requirements/pytest.txt && pytest scripts/tests/test_agent_workflow_hygiene.py -q
