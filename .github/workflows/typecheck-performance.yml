name: Typecheck Performance Ratchet

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: typecheck-performance-ratchet
  cancel-in-progress: true

jobs:
  benchmark:
    name: Typecheck P50/P95 Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Restore TypeScript incremental state
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            **/.cache/tsbuildinfo*
          key: ${{ runner.os }}-typecheck-ratchet-${{ hashFiles('pnpm-lock.yaml', '**/tsconfig*.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-typecheck-ratchet-${{ hashFiles('pnpm-lock.yaml', '**/tsconfig*.json') }}-
      - name: Download rolling benchmark history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/typecheck-history"
          gh run list \
            --workflow typecheck-performance.yml \
            --branch "${{ github.event.repository.default_branch }}" \
            --status success \
            --limit 20 \
            --json databaseId,event \
            --jq '[.[] | select(.event == "schedule" or .event == "workflow_dispatch")][:10][] | .databaseId' \
            | while read -r run_id; do
                mkdir -p "$RUNNER_TEMP/typecheck-history/$run_id"
                gh run download "$run_id" \
                  --pattern 'typecheck-performance-*' \
                  --dir "$RUNNER_TEMP/typecheck-history/$run_id" || true
              done
      - name: Benchmark cold, warm, CI, and incremental typechecking
        run: >-
          pnpm typecheck:benchmark --
          --scenario stable-ci-warm,cold-full,warm-full,ci-warm,incremental-leaf,incremental-wide
          --samples 10
          --warmups 2
          --cooldown-ms 2000
          --check
          --history-dir ${{ runner.temp }}/typecheck-history
          --output artifacts/typecheck-performance/ci-${{ github.run_id }}-${{ github.run_attempt }}.json
      - name: Upload benchmark history
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typecheck-performance-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/typecheck-performance/
          retention-days: 90
          if-no-files-found: error
