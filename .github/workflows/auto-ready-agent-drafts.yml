name: Auto-Ready Agent Drafts

# Flips agent-owned draft PRs to "ready for review" once all required checks
# are green and the PR is mergeable. The merge-queue autoenroll workflow then
# picks them up. Without this, draft PRs sit idle until a human flips them.
#
# Opt out per-PR with any of: needs-human, hold, gated, fast.

on:
  schedule:
    - cron: '*/15 * * * *'   # catch anything missed between CI events
  workflow_dispatch:

concurrency:
  group: auto-ready-agent-drafts
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  auto-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Run merge-queue drain regression tests
        run: pip install pytest --quiet && pytest scripts/tests/test_gh_retry.py -v

      - name: Auto-ready green agent drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
        run: bash scripts/auto-ready-agent-drafts.sh
