name: CI Branching Guard

# Warns (then errors) when agent branches open PRs to main without exemption.
# See .claude/rules/ci-branching.md

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions: {}

concurrency:
  group: ci-branching-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    name: CI Branching Guard
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      (
        startsWith(github.event.pull_request.head.ref, 'linear/') ||
        startsWith(github.event.pull_request.head.ref, 'claude/') ||
        startsWith(github.event.pull_request.head.ref, 'codegen-bot/') ||
        startsWith(github.event.pull_request.head.ref, 'codex/') ||
        startsWith(github.event.pull_request.head.ref, 'tim/') ||
        startsWith(github.event.pull_request.head.ref, 'agent/') ||
        contains(github.event.pull_request.head.ref, '/jov-') ||
        contains(github.event.pull_request.head.ref, 'jov-')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Validate branching policy doc
        run: pnpm ci:branching-guard:validate

      - name: Evaluate PR branching policy
        id: guard
        env:
          CI_BRANCHING_GUARD_MODE: ${{ vars.CI_BRANCHING_GUARD_MODE || 'warn' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          node scripts/ci-branching-guard.mjs check-pr --pr "$PR_NUMBER" --mode "$CI_BRANCHING_GUARD_MODE"

      - name: Comment on policy violation (warn mode only)
        if: steps.guard.outputs.level == 'warn'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RECOMMENDED: ${{ steps.guard.outputs.recommended }}
        run: |
          gh pr comment "$PR_NUMBER" --body "**CI Branching Guard (warn)** — agent PR targets main. Retarget to \`${RECOMMENDED:-integration/loop-ui}\` via \`scripts/loop-integration-ship.sh\`. Exemptions: hotfix/*, needs-human, train PRs. Policy: .claude/rules/ci-branching.md"