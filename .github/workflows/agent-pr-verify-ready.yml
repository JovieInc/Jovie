# Agent PR Verify + Ready
#
# The workflow definition and every privileged step come from the default
# branch. Untrusted PR-head code runs only on a separate, clean GitHub-hosted
# runner with a read-only token and no secrets or shared runner state.

name: Agent PR Verify Ready

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request_target' && (github.event.action != 'edited' || github.event.changes.base) && format('agent-pr-verify-ready-{0}',
    github.event.pull_request.number) || (github.event.issue.pull_request &&
    contains(github.event.comment.body, '<!-- agent-run-artifact') && github.actor == 'itstimwhite' &&
    github.event.comment.user.login == 'itstimwhite' && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
    github.event.comment.author_association) && format('agent-pr-verify-ready-{0}', github.event.issue.number) ||
    format('agent-pr-verify-untrusted-{0}-{1}', github.run_id, github.run_attempt)) }}
  cancel-in-progress: >-
    ${{ github.event_name == 'pull_request_target' && (github.event.action != 'edited' || github.event.changes.base) }}

jobs:
  resolve:
    name: Resolve Trusted Agent PR Context
    if: >-
      (github.event_name == 'pull_request_target' && (github.event.action != 'edited' || github.event.changes.base)) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '<!-- agent-run-artifact') &&
        github.actor == 'itstimwhite' &&
        github.event.comment.user.login == 'itstimwhite' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.context.outputs.pr_number }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      classification: ${{ steps.context.outputs.classification }}
    steps:
      - name: Checkout trusted default-branch policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
      - name: Resolve and authorize live pull request
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          TRIGGER_ACTOR: ${{ github.actor }}
          TRIGGER_LOGIN: ${{ github.event.comment.user.login }}
          TRIGGER_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            pr_number="$EVENT_PR_NUMBER"
            expected_head_sha="$EVENT_HEAD_SHA"
          else
            pr_number="$ISSUE_NUMBER"
            expected_head_sha=""
            node scripts/lib/agent-pr-ready-policy.mjs check-trigger \
              --trigger-actor "$TRIGGER_ACTOR" \
              --trigger-login "$TRIGGER_LOGIN" \
              --trigger-association "$TRIGGER_ASSOCIATION"
          fi
          pr_json="$RUNNER_TEMP/agent-pr-resolve.json"
          gh api "repos/$REPOSITORY/pulls/$pr_number" > "$pr_json"
          if [[ -z "$expected_head_sha" ]]; then
            expected_head_sha="$(jq -r '.head.sha' "$pr_json")"
          fi
          classification="$(node scripts/lib/agent-pr-ready-policy.mjs classify \
            --pr-json "$pr_json" \
            --repository "$REPOSITORY" \
            --expected-head-sha "$expected_head_sha")"
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            [[ "$classification" == "eligible-agent" ]]
            node scripts/lib/agent-pr-ready-policy.mjs check-state \
              --pr-json "$pr_json" --repository "$REPOSITORY" \
              --expected-head-sha "$expected_head_sha" --phase before
          elif [[ "$classification" == "eligible-agent" && "$EVENT_ACTION" =~ ^(opened|reopened)$ ]]; then
            node scripts/lib/agent-pr-ready-policy.mjs check-state --pr-json "$pr_json" \
              --repository "$REPOSITORY" --expected-head-sha "$expected_head_sha" --phase before
          fi
          {
            echo "pr_number=$pr_number"
            echo "head_sha=$expected_head_sha"
            echo "classification=$classification"
          } >> "$GITHUB_OUTPUT"
      - name: Generate redraft-only Jovie Bot token
        if: github.event_name == 'pull_request_target' && (github.event.action == 'synchronize' || (github.event.action == 'edited' && github.event.changes.base)) && steps.context.outputs.classification == 'eligible-agent'
        id: redraft-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}
          permission-pull-requests: write
      - name: Restore unverified synchronized head to draft
        if: github.event_name == 'pull_request_target' && (github.event.action == 'synchronize' || (github.event.action == 'edited' && github.event.changes.base)) && steps.context.outputs.classification == 'eligible-agent'
        env:
          GH_TOKEN: ${{ steps.redraft-token.outputs.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          before_json="$RUNNER_TEMP/agent-pr-before-redraft.json"
          after_json="$RUNNER_TEMP/agent-pr-after-redraft.json"
          gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" > "$before_json"
          node scripts/lib/agent-pr-ready-policy.mjs check-redraft \
            --pr-json "$before_json" --repository "$REPOSITORY" \
            --expected-head-sha "$EXPECTED_HEAD_SHA"
          if [[ "$(jq -r '.draft' "$before_json")" != "true" ]]; then
            gh pr ready "$PR_NUMBER" --repo "$REPOSITORY" --undo
          fi
          gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" > "$after_json"
          node scripts/lib/agent-pr-ready-policy.mjs check-state \
            --pr-json "$after_json" --repository "$REPOSITORY" \
            --expected-head-sha "$EXPECTED_HEAD_SHA" --phase before
          if [[ "$(jq -r '.draft' "$after_json")" != "true" ]]; then
            echo "::error::Synchronized agent PR draft restoration was not observable"
            exit 1
          fi
      - name: Generate advisory-status Jovie Bot token
        id: status-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}
          permission-statuses: write
      - name: Publish advisory exact-head status
        env:
          GH_TOKEN: ${{ steps.status-token.outputs.token }}
          CLASSIFICATION: ${{ steps.context.outputs.classification }}
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          state=pending
          description='Awaiting exact-head agent evidence'
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then description='Verifying actor-bound exact-head evidence'; fi
          if [[ "$CLASSIFICATION" == "non-agent" ]]; then state=success; description='Not an agent PR'; fi
          gh api --method POST "repos/$REPOSITORY/statuses/$EXPECTED_HEAD_SHA" \
            -f state="$state" -f context='Agent Evidence Ready' -f description="$description" >/dev/null
  verify_head:
    name: Verify Exact Agent PR Head
    needs: [resolve]
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout exact untrusted PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup isolated pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false
      - name: Setup isolated Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install untrusted-head dependencies
        env:
          ONNXRUNTIME_NODE_INSTALL: skip
        run: pnpm install --frozen-lockfile
      - name: Run affected typecheck
        run: pnpm turbo typecheck --affected
      - name: Run affected lint
        run: pnpm turbo lint --affected
  verify_ready:
    name: Verify Draft Agent PR
    needs: [resolve, verify_head]
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout trusted default-branch policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
      - name: Setup trusted pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.4
          run_install: false
      - name: Setup trusted Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install trusted policy dependencies
        env:
          ONNXRUNTIME_NODE_INSTALL: skip
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build trusted GStack gate evidence input
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
          TRIGGER_ACTOR: ${{ github.actor }}
          TRIGGER_LOGIN: ${{ github.event.comment.user.login }}
          TRIGGER_ASSOCIATION: ${{ github.event.comment.author_association }}
          TRIGGER_COMMENT_JSON: ${{ toJson(github.event.comment) }}
        run: |
          set -euo pipefail
          pr_json="$RUNNER_TEMP/agent-pr-evidence.json"
          trigger_comment_json="$RUNNER_TEMP/agent-pr-trigger-comment.json"
          evidence_file="$RUNNER_TEMP/agent-gate-evidence.md"
          printf '%s' "$TRIGGER_COMMENT_JSON" > "$trigger_comment_json"
          gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" > "$pr_json"
          node scripts/lib/agent-pr-ready-policy.mjs collect-evidence \
            --pr-json "$pr_json" \
            --evidence-file "$evidence_file" \
            --repository "$REPOSITORY" \
            --expected-head-sha "$EXPECTED_HEAD_SHA" \
            --trigger-actor "$TRIGGER_ACTOR" \
            --trigger-login "$TRIGGER_LOGIN" \
            --trigger-association "$TRIGGER_ASSOCIATION" \
            --trigger-comment-json "$trigger_comment_json"
          echo "EVIDENCE_FILE=$evidence_file" >> "$GITHUB_ENV"

      - name: Require exact-head GStack gate evidence
        env:
          AGENT_RUN_SOURCE_RUN_ID: ${{ needs.resolve.outputs.head_sha }}
        run: >-
          pnpm --filter @jovie/web exec tsx
          scripts/check-agent-gate-evidence.ts "$EVIDENCE_FILE"
      - name: Generate promotion-only Jovie Bot token
        id: promotion-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}
          permission-pull-requests: write
      - name: Mark PR ready if the live state is still eligible
        env:
          GH_TOKEN: ${{ steps.promotion-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          before_json="$RUNNER_TEMP/agent-pr-before-ready.json"
          after_json="$RUNNER_TEMP/agent-pr-after-ready.json"
          gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" > "$before_json"
          node scripts/lib/agent-pr-ready-policy.mjs check-state \
            --pr-json "$before_json" \
            --repository "$REPOSITORY" \
            --expected-head-sha "$EXPECTED_HEAD_SHA" \
            --phase before
          gh pr ready "$PR_NUMBER" --repo "$REPOSITORY"
          gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" > "$after_json"
          if ! node scripts/lib/agent-pr-ready-policy.mjs check-state \
            --pr-json "$after_json" \
            --repository "$REPOSITORY" \
            --expected-head-sha "$EXPECTED_HEAD_SHA" \
            --phase after; then
            restored=false
            for attempt in 1 2 3; do
              if gh pr ready "$PR_NUMBER" --repo "$REPOSITORY" --undo; then
                restored=true
                break
              fi
              sleep "$attempt"
            done
            if [[ "$restored" != "true" ]]; then
              echo "::error::PR eligibility changed and draft restoration failed"
              exit 1
            fi

            restored_json="$RUNNER_TEMP/agent-pr-restored-draft.json"
            gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" > "$restored_json"
            if [[ "$(jq -r '.draft' "$restored_json")" != "true" ]]; then
              echo "::error::PR eligibility changed and draft restoration was not observable"
              exit 1
            fi
            echo "::error::PR eligibility changed; restored and verified draft state"
            exit 1
          fi
      - name: Generate success-status Jovie Bot token
        id: success-status-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}
          permission-statuses: write
      - name: Publish exact-head evidence success
        env:
          GH_TOKEN: ${{ steps.success-status-token.outputs.token }}
          EXPECTED_HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: >-
          gh api --method POST "repos/$REPOSITORY/statuses/$EXPECTED_HEAD_SHA"
          -f state=success -f context='Agent Evidence Ready'
          -f description='Actor-bound exact-head evidence verified'
