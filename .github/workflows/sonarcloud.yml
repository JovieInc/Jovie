name: SonarCloud

# Tech-debt scan — runs NIGHTLY against main, not as a per-PR gate. SonarCloud
# was pure noise on PRs (advisory failures on mechanical/codemod diffs). Debt it
# surfaces is paid down by the tech-debt routine + ponytail, not by blocking PRs.
# Hygiene (#10463): no pull_request trigger (path-filter would still burn runners
# on large source diffs); nightly + manual only.
on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC nightly (~midnight PT)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SONAR_SCAN_ENABLED: ${{ secrets.SONAR_TOKEN != '' }} # trufflehog:ignore (secret reference, not a value)
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # trufflehog:ignore (secret reference, not a value)

    steps:
      - name: Skip SonarCloud scan when SONAR_TOKEN is unavailable
        if: ${{ env.SONAR_SCAN_ENABLED != 'true' }}
        run: echo "SONAR_TOKEN is not configured; skipping SonarCloud scan."

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}

      - name: Run apps/web coverage
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        run: pnpm --filter=@jovie/web run test:ci -- --config=vitest.config.ci.mts --coverage

      - name: Verify apps/web coverage artifact
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        run: test -f apps/web/coverage/lcov.info

      - name: Run packages/ui coverage
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        run: pnpm --filter=@jovie/ui exec vitest run --coverage

      - name: Verify packages/ui coverage artifact
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        run: test -f packages/ui/coverage/lcov.info

      - name: Cache SonarQube packages
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        if: ${{ env.SONAR_SCAN_ENABLED == 'true' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1 trufflehog:ignore (pinned action SHA is a git commit, not a credential)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
