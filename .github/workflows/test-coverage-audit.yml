# Test Coverage Audit
#
# PURPOSE: Nightly regeneration of docs/TEST_COVERAGE_HEATMAP.md from the
# hand-curated docs/TEST_RISK_REGISTER.md plus v8 coverage data.
#
# Output: commits an updated heatmap to main only when values change.
# Snapshot at .context/test-coverage-snapshot.json is committed too, so the
# PR delta check can compare to a known baseline.
#
# Strategy spec: docs/TEST_RISK_REGISTER.md
# Generator:    scripts/audit-test-coverage.ts

name: Test Coverage Audit

on:
  schedule:
    # 06:00 UTC daily — runs after the nightly test suite (02:00 PT = ~10:00 UTC)
    # so any newly-merged tests are reflected.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit the regenerated heatmap if it changed'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: test-coverage-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Regenerate coverage heatmap
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run coverage
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: pnpm --filter web test:coverage

      - name: Generate heatmap
        run: pnpm exec tsx scripts/audit-test-coverage.ts

      - name: Commit if changed
        if: ${{ github.event_name == 'schedule' || inputs.commit }}
        run: |
          if git diff --quiet docs/TEST_COVERAGE_HEATMAP.md .context/test-coverage-snapshot.json 2>/dev/null; then
            echo "No heatmap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/TEST_COVERAGE_HEATMAP.md
          # Snapshot is gitignored — don't try to commit it.
          if git diff --staged --quiet; then
            echo "Snapshot changed but heatmap did not."
            exit 0
          fi
          git commit -m "chore(testing): nightly heatmap refresh" \
            -m "Auto-generated by .github/workflows/test-coverage-audit.yml from docs/TEST_RISK_REGISTER.md + apps/web/coverage/coverage-final.json." \
            -m "Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-audit-${{ github.run_id }}
          path: |
            apps/web/coverage/coverage-final.json
            apps/web/coverage/lcov.info
            docs/TEST_COVERAGE_HEATMAP.md
            .context/test-coverage-snapshot.json
          retention-days: 14
          if-no-files-found: warn
