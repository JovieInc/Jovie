name: iOS CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/ios/**"
      - "package.json"
      - ".github/workflows/ios-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - "package.json"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Build And Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure iOS local configuration exists
        run: |
          python3 <<'PY'
          import os
          import plistlib
          from pathlib import Path

          target = Path("apps/ios/Jovie/Configuration.local.plist")
          if target.exists():
              raise SystemExit(0)

          target.parent.mkdir(parents=True, exist_ok=True)
          payload = {
              # UI tests default to non-live launch modes in CI, so a placeholder
              # publishable key is sufficient to satisfy app bundle resources.
              "ClerkPublishableKey": os.environ.get(
                  "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY", "pk_test_ci_placeholder"
              ),
              "ApiBaseUrl": "http://localhost:3100",
              "WebBaseUrl": "https://jov.ie",
          }

          with target.open("wb") as file_handle:
              plistlib.dump(payload, file_handle, sort_keys=False)
          PY

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project apps/ios/Jovie.xcodeproj \
            -scheme Jovie

      - name: Select simulator destination
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_PATH="apps/ios/Jovie.xcodeproj"
          SCHEME="Jovie"
          DESTINATION=""
          LAST_DESTINATIONS=""

          for attempt in {1..6}; do
            LAST_DESTINATIONS="$(xcodebuild -showdestinations -project "$PROJECT_PATH" -scheme "$SCHEME" 2>/dev/null || true)"

            DESTINATION="$(
              DESTINATIONS="$LAST_DESTINATIONS" python3 <<'PY'
import os
import re

destinations = os.environ.get("DESTINATIONS", "")
preferred = []
fallback = []

for line in destinations.splitlines():
    if "platform:iOS Simulator" not in line:
        continue
    if "name:Any iOS Simulator Device" in line:
        continue

    id_match = re.search(r"id:([^,}]+)", line)
    if id_match is None:
        continue

    os_match = re.search(r"OS:([^,}]+)", line)
    destination = f"platform=iOS Simulator,id={id_match.group(1).strip()}"
    os_version = os_match.group(1).strip() if os_match is not None else ""

    if os_version.startswith("18."):
        preferred.append(destination)
    else:
        fallback.append(destination)

print((preferred or fallback or [""])[0], end="")
PY
            )"

            if [[ -n "$DESTINATION" ]]; then
              break
            fi

            echo "No concrete simulator destination found on attempt $attempt/6."
            if [[ "$LAST_DESTINATIONS" == *"name:Any iOS Simulator Device"* ]] && (( attempt < 6 )); then
              sleep 10
              continue
            fi

            break
          done

          if [[ -z "$DESTINATION" ]]; then
            DESTINATION="$(
              python3 <<'PY'
import json
import subprocess

try:
    raw = subprocess.check_output(
        ["xcrun", "simctl", "list", "devices", "available", "-j"],
        text=True,
    )
except Exception:
    print("", end="")
    raise SystemExit(0)

devices_by_runtime = json.loads(raw).get("devices", {})
preferred = []
fallback = []

for runtime, devices in devices_by_runtime.items():
    if "com.apple.CoreSimulator.SimRuntime.iOS" not in runtime:
        continue

    for device in devices:
        if not device.get("isAvailable"):
            continue
        if "iPhone" not in device.get("name", ""):
            continue

        udid = device.get("udid")
        if not udid:
            continue

        destination = f"platform=iOS Simulator,id={udid}"
        if ".iOS-18" in runtime:
            preferred.append(destination)
        else:
            fallback.append(destination)

print((preferred or fallback or [""])[0], end="")
PY
            )"
          fi

          if [[ -z "$DESTINATION" ]]; then
            echo "Unable to find a concrete iOS Simulator destination."
            echo "$LAST_DESTINATIONS"
            xcrun simctl list devices available || true
            exit 1
          fi

          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DESTINATION"

      - name: Build and test
        run: |
          xcodebuild test \
            -project apps/ios/Jovie.xcodeproj \
            -scheme Jovie \
            -destination '${{ steps.simulator.outputs.destination }}' \
            CODE_SIGNING_ALLOWED=NO
