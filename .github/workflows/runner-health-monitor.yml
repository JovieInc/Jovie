name: Runner Health Monitor

# Hosted observer for the self-hosted OrbStack runner heartbeat. Queue unit
# routing is selected independently inside each CI run from the same evidence;
# this workflow never mutates repository variables or already-queued jobs.
#
# Health comes from the dedicated self-hosted heartbeat workflow. The monitor
# itself always runs on GitHub-hosted capacity so an offline pool cannot prevent
# observation and one deduplicated incident. CI owns conservative per-run
# fallback before unit jobs queue.

on:
  schedule:
    # Observe the 10-minute heartbeat on a two-minute offset. The monitor is
    # hosted, so an offline self-hosted pool cannot prevent observation.
    - cron: '2,12,22,32,42,52 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  monitor:
    name: Check runner health
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: runner-health-routing
      cancel-in-progress: false
    permissions:
      contents: read
      actions: read
      issues: write
    env:
      HEARTBEAT_MAX_AGE_SECONDS: '1500'
      HEARTBEAT_API_TIMEOUT_SECONDS: '20'
    steps:
      - name: Checkout main policy code
        continue-on-error: true
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Query runner status
        id: runners
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          query_output="$RUNNER_TEMP/runner-heartbeat-output"
          if GITHUB_OUTPUT="$query_output" .github/scripts/query-runner-heartbeat.sh; then
            cat "$query_output" >> "$GITHUB_OUTPUT"
          else
            echo "health=uncertain" >> "$GITHUB_OUTPUT"
            echo "evidence=heartbeat API unavailable; no routing mutation attempted" >> "$GITHUB_OUTPUT"
          fi

      - name: Log health state
        if: ${{ always() }}
        run: |
          echo "::notice::${{ steps.runners.outputs.evidence }}"
          if [ "${{ steps.runners.outputs.health }}" = "down" ]; then
            echo "::warning::Fixed runner heartbeat is unavailable; new CI unit runs route to ubuntu-latest."
          elif [ "${{ steps.runners.outputs.health }}" = "uncertain" ]; then
            echo "::warning::Runner heartbeat API is uncertain; new CI unit runs route to ubuntu-latest."
          fi

      - name: Open one fixed-runner degradation incident
        continue-on-error: true
        if: ${{ always() && steps.runners.outputs.health != 'up' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEARTBEAT_EVIDENCE: ${{ steps.runners.outputs.evidence || 'heartbeat evidence unavailable' }}
        run: |
          set -euo pipefail
          title='[Runner Health] Fixed pool degraded'
          if ! gh label view incident >/dev/null 2>&1; then
            gh label create incident \
              --description 'Production incident requiring investigation' \
              --color 'd93f0b'
          fi
          issues_json="$(gh issue list --state open --label incident --limit 100 \
            --json number,title)"
          jq -e 'type == "array"' >/dev/null <<<"$issues_json"
          existing="$(jq --arg title "$title" \
            '[.[] | select(.title == $title)] | length' <<<"$issues_json")"
          if [ "$existing" -gt 0 ]; then
            echo "Fixed-runner degradation incident already open."
            exit 0
          fi
          gh issue create --title "$title" --label incident \
            --body "Fixed-runner evidence is degraded: $HEARTBEAT_EVIDENCE. CI routes new unit work to hosted capacity unless an exact fresh heartbeat is proven. This observer never mutates runner variables or reruns workflows."
