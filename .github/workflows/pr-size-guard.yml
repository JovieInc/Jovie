name: PR Size Guard

# Forces small, reviewable PRs — which forces stacking. A change too big to
# review as one PR must be split into a Graphite stack of dependent PRs
# (`gt create` per logical step) or independent sibling PRs. Opt out for
# approved mechanical codemods (token sweeps, renames, generated output) with
# the `big-pr` label. Thresholds tunable via repo vars PR_MAX_LINES / PR_MAX_FILES.
# Circular shared-CI repair trains may use `integration-train`, but only with a
# machine-readable source block naming 2+ component PRs and the fixed, bounded
# 2500-line / 60-file cap enforced by pr-size-guard-policy.mjs.

# PR size can only change on a push (opened/synchronize/reopened), never on a
# label event. This guard is a REQUIRED check, so re-running it on
# labeled/unlabeled is not just wasteful: rapid label churn (the autonomous
# merge loop does this constantly) cancels the in-flight run via
# cancel-in-progress, leaving a CANCELLED/QUEUED run as the latest for a
# required context → GitHub pins the PR BLOCKED even though it's green
# (JOV-3580). The big-pr/codemod opt-out is honored on push via the webhook
# payload (no GraphQL — avoids rate-limit flakes on bypass). When the label
# lands after a failing run,
# pr-size-guard-label-override.yml posts a passing check-run override.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Inert while Graphite owns landing. Every source PR has already passed the
  # size policy, so only the required context is reproduced on the combined SHA.
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-size-${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  merge-group-size:
    name: ${{ github.event_name == 'merge_group' && 'PR Size Guard' || 'PR Size Guard (merge-group inactive)' }}
    if: github.event_name == 'merge_group'
    runs-on: ${{ vars.CI_GATE_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 1
    steps:
      - name: Confirm source PR size checks
        run: echo "Merge-group members were size-checked as source PRs."

  size:
    name: ${{ github.event_name == 'pull_request' && 'PR Size Guard' || 'PR Size Guard (source inactive)' }}
    runs-on: ${{ vars.CI_GATE_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Fetch PR base
        run: git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"

      - name: Enforce repository hygiene
        run: node scripts/repo-hygiene-guard.mjs --diff-base "${{ github.event.pull_request.base.sha }}"

      - name: Enforce Agent Skill governance
        run: node scripts/skill-governance-guard.mjs

      - name: Detect screenshot integrity changes
        id: screenshot-integrity
        run: |
          if git diff --quiet "${{ github.event.pull_request.base.sha }}" HEAD -- \
            apps/web/lib/screenshots/ \
            apps/web/screenshot-catalog/current/ \
            apps/web/public/product-screenshots/ \
            'apps/web/scripts/check-screenshot-catalog*.ts'; then
            echo "required=false" >> "$GITHUB_OUTPUT"
          else
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node and pnpm for screenshot integrity
        if: steps.screenshot-integrity.outputs.required == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Enforce screenshot catalog integrity
        if: steps.screenshot-integrity.outputs.required == 'true'
        working-directory: apps/web
        run: pnpm exec tsx scripts/check-screenshot-catalog.ts

      - name: Enforce size cap
        # Lockfile and generated screenshot churn skip line-count review, but the
        # repository-hygiene byte/path gate above still applies.
        if: >-
          github.event.pull_request.user.login != 'dependabot[bot]' &&
          github.event.pull_request.head.ref != 'screenshots/auto-update'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          MAX_LINES: ${{ vars.PR_MAX_LINES || '800' }}
          MAX_FILES: ${{ vars.PR_MAX_FILES || '40' }}
        run: |
          set -euo pipefail

          # Graphite merge-queue group drafts don't inherit member labels, so a
          # `big-pr`-bypassed member would fail size guard on the synthetic draft and
          # abort the whole merge group. Members were already size-checked individually.
          # Exit 0 (not skip) so the required "PR Size Guard" context reports success.
          title="$PR_TITLE"
          case "$title" in
            '[Graphite MQ]'*)
              echo "✅ Graphite merge-queue group draft — size guard not applicable (members checked individually)"; exit 0;;
          esac

          labels="$PR_LABELS"
          case ",$labels," in
            *,big-pr,*|*,codemod,*)
              echo "✅ opt-out label present — PR Size Guard skipped"; exit 0;;
          esac

          # Exclude generated / lock / snapshot / vendored noise from the count.
          EXCLUDE='pnpm-lock\.yaml|package-lock\.json|yarn\.lock|\.lock$|/generated/|\.gen\.|__snapshots__/|\.snap$|\.svg$|\.po$|/dist/|/build/|\.min\.|drizzle/migrations/meta/'
          # The GraphQL-backed `gh pr view --json files` shares an installation
          # quota with the rest of the fleet and can fail before counting a
          # two-file PR. Use the paginated REST endpoint and retry only
          # transient quota/server failures; every other error fails closed.
          api_error="$RUNNER_TEMP/pr-size-guard-api.err"
          rows=''
          for attempt in 1 2 3; do
            if rows=$(gh api --paginate \
              "repos/$REPO/pulls/$PR/files?per_page=100" \
              --jq '.[] | "\(.additions+.deletions)\t\(.filename)"' \
              2>"$api_error"); then
              break
            fi
            if [[ "$attempt" -eq 3 ]] || ! grep -qiE \
              "rate limit|HTTP 403|HTTP 429|HTTP 5[0-9][0-9]|invalid character '<'" "$api_error"; then
              cat "$api_error" >&2
              exit 1
            fi
            delay=$((attempt * 5))
            echo "Transient GitHub REST failure (attempt $attempt/3); retrying in ${delay}s"
            sleep "$delay"
          done
          counted=$(printf '%s\n' "$rows" | grep -vE "$EXCLUDE" || true)
          lines=$(printf '%s\n' "$counted" | awk -F'\t' '{s+=$1} END{print s+0}')
          files=$(printf '%s\n' "$counted" | grep -c . || true)

          PR_LINES="$lines" PR_FILES="$files" \
            node scripts/lib/pr-size-guard-policy.mjs
