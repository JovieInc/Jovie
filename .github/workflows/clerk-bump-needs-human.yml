name: Clerk Bump Needs Human

# JOV-2446 — Any PR that bumps a `@clerk/*` package (whether human-authored,
# Dependabot-triggered, or merge-queue-batched) gets the `needs-human` label
# applied automatically. Element-key naming drifts silently between minor
# versions and breaks the AuthShell SSO-only `appearance.elements` map, so a
# human must dogfood /signin + the `clerk-config-audit` cron output before
# the bump merges.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/web/package.json'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  pull-requests: write
  contents: read

# Prevent duplicate runs / duplicate comments on rapid pushes or re-triggers.
concurrency:
  group: clerk-bump-needs-human-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect @clerk/* changes
        id: detect
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- \
              apps/web/package.json package.json pnpm-lock.yaml \
              | grep -E '^\+.*@clerk/' >/dev/null; then
            echo "clerk_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "clerk_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply needs-human label
        if: steps.detect.outputs.clerk_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label needs-human \
            --add-label area:auth
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "This PR bumps a \`@clerk/*\` package. Per JOV-2446, a human must dogfood \`/signin\` and confirm the \`clerk-config-audit\` cron reports no violation before merge. Automerge is blocked while \`needs-human\` is applied."
