name: Production Synthetic Monitoring

permissions:
  contents: read

on:
  schedule:
    # Deep production coverage runs independently of the disabled Agent Tick
    # monolith and is intentionally outside the deploy-blocking path.
    - cron: '17 */6 * * *'
  workflow_dispatch:

concurrency:
  group: production-synthetic-monitoring
  cancel-in-progress: false

jobs:
  synthetic-test:
    name: Production Synthetic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true', PLAYWRIGHT_ARTIFACT_ALLOW_IMAGES: 'true' }

    steps:
      - name: Safety check - only run on schedule or manual dispatch
        if: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
        run: |
          echo "❌ Synthetic monitoring should only run on schedule or manual dispatch, not on '${{ github.event_name }}'"
          echo "This workflow was incorrectly triggered. Exiting to prevent unnecessary resource usage."
          exit 1

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Cache Playwright Browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'playwright.config*.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (chromium only)
        run: pnpm --filter=@jovie/web exec playwright install --with-deps chromium

      - name: Install Doppler CLI
        run: |
          sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates curl gnupg
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update && sudo apt-get install -y doppler
          doppler --version

      - name: Check production signup readiness
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler run -- pnpm --filter=@jovie/web exec tsx scripts/check-signup-readiness.ts --target=prd --source=env

      - name: SEO/AEO ratchet — live robots.txt + sitemap.xml (JOV-11044)
        env:
          BASE_URL: https://jov.ie
        run: pnpm --filter=@jovie/web run seo:ratchet:live

      - name: Run Layer A Auth UI Canary (JOV-2446)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-auth-ui-results.json
        run: |
          doppler run -- node .github/scripts/guard-playwright-artifacts.mjs --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-auth-ui.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-auth-ui
        continue-on-error: true

      - name: Run Golden Path Health + Performance
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-golden-path-results.json
        run: |
          doppler run -- node .github/scripts/guard-playwright-artifacts.mjs --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-golden-path.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-golden-path
        continue-on-error: true

      - name: Run Onboarding Robot Full Synthetic (JOV-2681)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/onboarding-robot-full-results.json
        run: |
          doppler run -- node .github/scripts/guard-playwright-artifacts.mjs --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/onboarding-robot.full.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/onboarding-robot-full
        continue-on-error: true

      - name: Run Legacy OTP Signup Canary (gated, JOV-2446 cutover)
        # Skip this step entirely once Layer A is proven green and the Clerk
        # dashboard has flipped to SSO-only — set repo variable
        # `E2E_PROD_LEGACY_CANARY=0` to disable. Default is to run during the
        # cutover window so monitoring does not go dark between merge and
        # dashboard flip.
        if: ${{ vars.E2E_PROD_LEGACY_CANARY != '0' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-legacy-otp-results.json
        run: |
          doppler run -- node .github/scripts/guard-playwright-artifacts.mjs --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-legacy-otp.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-legacy-otp
        continue-on-error: true

      - name: Run Better Auth Production Account Canary
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_PROD_ACCOUNT_CANARY_ENABLED: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-better-auth-account-results.json
        run: |
          doppler run -- node .github/scripts/guard-playwright-artifacts.mjs --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-better-auth-account.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-better-auth-account
        continue-on-error: true

      - name: Run Public Profile Smoke Test (JOV-1653)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/public-profile-smoke-results.json
        run: |
          doppler run -- node .github/scripts/guard-playwright-artifacts.mjs --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/public-profile-smoke.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/public-profile-smoke
        continue-on-error: true

      - name: Confirm scoped synthetic cleanup
        if: always()
        run: |
          echo "Better Auth account cleanup is transactionally scoped to the exact +jovie-ba-prod-canary-<run> address and must prove zero residue."
          echo "Onboarding robot cleanup is scoped by exact robot email, Clerk user id, run id, and generated handle."
          echo "No broad production Clerk cleanup script is run from this workflow."

      - name: Parse test results
        id: test-results
        if: ${{ always() }}
        env:
          LEGACY_CANARY_ENABLED: ${{ vars.E2E_PROD_LEGACY_CANARY != '0' && '1' || '0' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const {
            DEFAULT_RESULT_FILES,
            formatGithubOutput,
            parseSyntheticTestResults,
          } = require('./.github/scripts/parse-synthetic-test-results.js');

          const legacyCanaryEnabled = process.env.LEGACY_CANARY_ENABLED === '1';
          const result = parseSyntheticTestResults({
            resultFiles: DEFAULT_RESULT_FILES(legacyCanaryEnabled),
          });

          for (const warning of result.testWarnings) {
            console.log(`::warning::${warning}`);
          }

          const outputFile = process.env.GITHUB_OUTPUT;
          if (outputFile) {
            fs.appendFileSync(outputFile, formatGithubOutput(result));
          } else {
            process.stdout.write(formatGithubOutput(result));
          }
          NODE

      - name: Upload test results
        uses: ./.github/actions/upload-safe-playwright-artifact
        if: ${{ always() && hashFiles('apps/web/test-results/*-results.json') != '' }}
        with:
          name: synthetic-test-results
          path: |
            apps/web/test-results/
            !apps/web/test-results/public-profile-smoke-*.png
          retention-days: 30

      - name: Send Slack Alert on Failure
        if: ${{ always() && (failure() || steps.test-results.outputs.test_status != 'passed') }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-production'
          author_name: 'Synthetic Monitoring'
          custom_payload: |
            {
              "text": "Production Synthetic Monitoring Failed - jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    {
                      "title": "URL",
                      "value": "https://jov.ie",
                      "short": true
                    },
                    {
                      "title": "Failed Tests",
                      "value": "```\n${{ steps.test-results.outputs.failed_tests }}\n```",
                      "short": false
                    },
                    {
                      "title": "Artifacts",
                      "value": "Sanitized JSON failure packets are attached under synthetic-test-results; CI intentionally omits trace, video, HTML, and screenshots.",
                      "short": false
                    },
                    {
                      "title": "Action",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack Success Notification (Scheduled Summary)
        if: ${{ always() && !failure() && steps.test-results.outputs.test_status == 'passed' && github.event_name == 'schedule' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#monitoring'
          author_name: 'Synthetic Monitoring'
          custom_payload: |
            {
              "text": "Production Synthetic Monitoring Passed - jov.ie",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    {
                      "title": "URL",
                      "value": "https://jov.ie",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "Production auth UI, onboarding robot, signup health, and public-profile synthetic checks passing",
                      "short": false
                    },
                    {
                      "title": "Tests Passed",
                      "value": "${{ steps.test-results.outputs.passed_tests }}/${{ steps.test-results.outputs.total_tests }}",
                      "short": true
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Preserve the red signal only after the failure alert has had a chance to
      # run. `always()` also covers setup/checkout/parser failures that produced
      # no structured test result.
      - name: Fail job if tests failed
        if: ${{ always() && (failure() || steps.test-results.outputs.test_status != 'passed') }}
        run: |
          echo "Marking job as failed because synthetic status is '${{ steps.test-results.outputs.test_status }}'"
          exit 1
