name: Production Synthetic Monitoring

permissions:
  contents: read

on:
  schedule:
    # Run every 15 minutes during business hours (8 AM - 8 PM PST = 16:00-04:00 UTC)
    - cron: '*/15 16-23 * * *'
    - cron: '*/15 0-4 * * *'
    # Run every 30 minutes during off-hours (4 AM - 4 PM PST = 05:00-15:00 UTC)
    - cron: '0,30 5-15 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  synthetic-test:
    name: Production Synthetic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Safety check - only run on schedule or manual dispatch
        if: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
        run: |
          echo "❌ Synthetic monitoring should only run on schedule or manual dispatch, not on '${{ github.event_name }}'"
          echo "This workflow was incorrectly triggered. Exiting to prevent unnecessary resource usage."
          exit 1

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Cache Playwright Browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'playwright.config*.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (chromium only)
        run: pnpm --filter=@jovie/web exec playwright install --with-deps chromium

      - name: Install Doppler CLI
        run: |
          sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates curl gnupg
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update && sudo apt-get install -y doppler
          doppler --version

      - name: Check production signup readiness
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler run -- pnpm --filter=@jovie/web exec tsx scripts/check-signup-readiness.ts --target=prd --source=env

      - name: Run Layer A Auth UI Canary (JOV-2446)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-auth-ui-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-auth-ui.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-auth-ui
        continue-on-error: true

      - name: Run Golden Path Health + Performance
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-golden-path-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-golden-path.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-golden-path
        continue-on-error: true

      - name: Run Legacy OTP Signup Canary (gated, JOV-2446 cutover)
        # Skip this step entirely once Layer A is proven green and the Clerk
        # dashboard has flipped to SSO-only — set repo variable
        # `E2E_PROD_LEGACY_CANARY=0` to disable. Default is to run during the
        # cutover window so monitoring does not go dark between merge and
        # dashboard flip.
        if: ${{ vars.E2E_PROD_LEGACY_CANARY != '0' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-legacy-otp-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-legacy-otp.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-legacy-otp
        continue-on-error: true

      - name: Run Public Profile Smoke Test (JOV-1653)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/public-profile-smoke-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/public-profile-smoke.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/public-profile-smoke
        continue-on-error: true

      - name: Upload Public Profile Smoke Screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-profile-smoke-screenshots
          path: apps/web/test-results/public-profile-smoke-*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Confirm scoped synthetic cleanup
        if: always()
        run: |
          echo "Production signup canary cleanup is scoped inside synthetic-golden-path.spec.ts by exact plus-addressed email."
          echo "No broad production Clerk cleanup script is run from this workflow."

      - name: Parse test results
        id: test-results
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const resultFiles = [
            {
              name: 'synthetic-auth-ui',
              path: 'apps/web/test-results/synthetic-auth-ui-results.json',
              required: true,
            },
            {
              name: 'synthetic-golden-path',
              path: 'apps/web/test-results/synthetic-golden-path-results.json',
              required: true,
            },
            {
              name: 'public-profile-smoke',
              path: 'apps/web/test-results/public-profile-smoke-results.json',
              required: true,
            },
            {
              // Optional — legacy OTP canary is gated at the workflow level on
              // `E2E_PROD_LEGACY_CANARY` (JOV-2446). When the step is skipped,
              // no results file is produced and we must NOT treat that as an
              // error.
              name: 'synthetic-legacy-otp',
              path: 'apps/web/test-results/synthetic-legacy-otp-results.json',
              required: false,
            },
          ];
          const outputFile = process.env.GITHUB_OUTPUT;

          function emit(line) {
            if (outputFile) {
              fs.appendFileSync(outputFile, `${line}\n`);
            } else {
              console.log(line);
            }
          }

          function emitMultiline(name, lines) {
            emit(`${name}<<EOF`);
            for (const line of lines) emit(line);
            emit('EOF');
          }

          const specs = [];
          const missingResults = [];

          function collectSpecs(suites = [], source) {
            for (const suite of suites) {
              specs.push(
                ...(suite.specs ?? []).map(spec => ({ source, spec }))
              );
              collectSpecs(suite.suites ?? [], source);
            }
          }

          for (const resultFile of resultFiles) {
            if (!fs.existsSync(resultFile.path)) {
              if (resultFile.required !== false) {
                missingResults.push(
                  `${resultFile.name}: Test results file not found (${resultFile.path})`
                );
              } else {
                console.log(
                  `${resultFile.name}: optional results not produced (step likely skipped); ignoring.`
                );
              }
              continue;
            }

            try {
              const results = JSON.parse(
                fs.readFileSync(resultFile.path, 'utf8')
              );
              collectSpecs(results.suites ?? [], resultFile.name);
            } catch (error) {
              missingResults.push(
                `${resultFile.name}: Failed to parse ${resultFile.path}: ${error.message}`
              );
            }
          }

          const tests = specs.flatMap(({ source, spec }) =>
            (spec.tests ?? []).map(testCase => ({ source, spec, testCase }))
          );
          const skipped = tests.filter(({ testCase }) =>
            testCase.status === 'skipped' ||
            (testCase.results ?? []).some(result => result.status === 'skipped')
          );
          const warnings = tests.flatMap(({ source, spec, testCase }) =>
            (testCase.results ?? []).flatMap(result =>
              [...(result.stdout ?? []), ...(result.stderr ?? [])]
                .map(entry => entry.text ?? '')
                .filter(text => text.includes('[Synthetic][warning]'))
                .map(text => `${source}: ${spec.title}: ${text.trim()}`)
            )
          );
          const flaky = tests.filter(({ testCase }) => testCase.status === 'flaky');
          const failed = tests.filter(
            ({ testCase }) => testCase.status === 'unexpected'
          );
          const passed = tests.filter(
            ({ testCase }) =>
              ['expected', 'flaky'].includes(testCase.status) &&
              !(testCase.results ?? []).some(result => result.status === 'skipped')
          );

          emit(`total_tests=${tests.length}`);
          emit(`passed_tests=${passed.length}`);
          emit(`flaky_tests=${flaky.length}`);
          emit(`skipped_tests=${skipped.length}`);
          emit(`warning_count=${warnings.length}`);

          const details = [
            ...missingResults,
            ...failed.map(({ source, spec }) => `${source}: ${spec.title}`),
            ...(skipped.length > 0
              ? [
                  'Skipped tests:',
                  ...skipped.map(({ source, spec }) => `${source}: ${spec.title}`),
                ]
              : []),
          ];
          emitMultiline('failed_tests', details);
          emitMultiline('test_warnings', warnings);
          for (const warning of warnings) {
            console.log(`::warning::${warning}`);
          }

          if (missingResults.length > 0 || tests.length === 0) {
            emit('test_status=error');
          } else if (failed.length > 0 || skipped.length > 0) {
            emit('test_status=failed');
          } else if (passed.length === tests.length) {
            emit('test_status=passed');
          } else {
            emit('test_status=error');
          }
          NODE

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: synthetic-test-results
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 30

      - name: Fail job if tests failed
        if: steps.test-results.outputs.test_status != 'passed'
        run: |
          echo "Marking job as failed because synthetic status is '${{ steps.test-results.outputs.test_status }}'"
          exit 1

      - name: Send Slack Alert on Failure
        if: steps.test-results.outputs.test_status != 'passed'
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-production'
          author_name: 'Synthetic Monitoring'
          custom_payload: |
            {
              "text": "Production Synthetic Monitoring Failed - jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    {
                      "title": "URL",
                      "value": "https://jov.ie",
                      "short": true
                    },
                    {
                      "title": "Failed Tests",
                      "value": "```\n${{ steps.test-results.outputs.failed_tests }}\n```",
                      "short": false
                    },
                    {
                      "title": "Action",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>",
                      "short": false
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack Success Notification (Scheduled Summary)
        if: steps.test-results.outputs.test_status == 'passed' && github.event_name == 'schedule'
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#monitoring'
          author_name: 'Synthetic Monitoring'
          custom_payload: |
            {
              "text": "Production Synthetic Monitoring Passed - jov.ie",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    {
                      "title": "URL",
                      "value": "https://jov.ie",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "Production signup and public-profile synthetic checks passing",
                      "short": false
                    },
                    {
                      "title": "Tests Passed",
                      "value": "${{ steps.test-results.outputs.passed_tests }}/${{ steps.test-results.outputs.total_tests }}",
                      "short": true
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
