# Security scanning workflow for secret detection, vulnerability scanning, and supply chain security
#
# This workflow complements CodeQL by adding:
# - Gitleaks: Secret detection in git history
# - TruffleHog: Defense-in-depth secret scanning (JOV-3215)
# - Trivy: Vulnerability scanning for dependencies and filesystem (added in subtask-1-4)
# - OSSF Scorecard: Supply chain security scoring (added in subtask-1-5)
#
name: Security Scanning

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6:00 AM UTC
  workflow_dispatch:

# Default permissions - each job specifies its own required permissions
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run secret scan (gitleaks + trufflehog)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            ./scripts/security/scan-secrets.sh ci-pr "origin/${{ github.base_ref }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              git fetch origin main --depth=1
              ./scripts/security/scan-secrets.sh ci-pr "origin/main"
            else
              ./scripts/security/scan-secrets.sh ci-pr "${{ github.event.before }}"
            fi
          else
            ./scripts/security/scan-secrets.sh full
          fi

      - name: Verify gitleaks detects Neon/Clerk leak shapes and backup files
        run: ./scripts/security/verify-gitleaks-coverage.sh

  trufflehog:
    name: TruffleHog Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run TruffleHog (full history on main/schedule, PR diff on pull_request)
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          extra_args: --no-verification --exclude-paths=.trufflehog-exclude.txt

  trivy:
    name: Trivy Vulnerability Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Trivy vulnerability scanner (filesystem mode)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3.28.15
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-filesystem'

  scorecard:
    name: OSSF Scorecard Supply Chain Security
    runs-on: ubuntu-latest
    # Scorecard only runs on main branch push and schedule to avoid token issues on PRs
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
      id-token: write # Required for OIDC token authentication
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Avoid flaky failures from transient api.scorecard.dev timeouts.
          publish_results: false

      - name: Upload Scorecard results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3.28.15
        with:
          sarif_file: 'scorecard-results.sarif'
          category: 'ossf-scorecard'