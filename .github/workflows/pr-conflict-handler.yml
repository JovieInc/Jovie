name: PR Conflict Handler

# Classifies PR freshness, requests exact-head GitHub rebases for clean-behind
# branches, and labels true conflicts for manual resolution.
# Fires on:
#   - CI completion (conflict may surface as test failure)
#   - Schedule weekday safety net
#   - Manual dispatch
#
# NOTE: no `pull_request: synchronize` trigger. This is a FLEET-WIDE scan that
# lists all open PRs, so per-push spawns are pure duplication: every push
# already triggers CI, which fires the workflow_run below. Removed in #13359.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply safe labels and exact-head GitHub rebases. Defaults to dry-run.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_concurrent:
        description: 'Maximum CI-heavy PR freshness re-triggers, including in-flight CI.'
        required: false
        default: '2'
  schedule:
    # Read-only audit. Do not auto-push/rebase the fleet on a tight cadence.
    - cron: '17 15 * * 1-5'
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

defaults:
  run:
    shell: bash

jobs:
  plan:
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion != 'cancelled'
      )
    name: Classify and plan PR freshness
    runs-on: ubuntu-latest
    concurrency:
      # CI-completion audits are read-only and supersedable. Operator dispatches
      # serialize separately so an incoming CI event cannot cancel manual apply.
      group: pr-conflict-handler-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && 'operator' || 'audit' }}
      cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Run handler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MODE="--dry-run"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.apply }}" == "true" ]]; then
            MODE="--apply"
          fi

          node scripts/pr-conflict-handler.mjs "$MODE" \
            --repo "${{ github.repository }}" \
            --max-concurrent "${{ inputs.max_concurrent || '2' }}" \
            --json | tee pr-conflict-handler-plan.log

      - name: Summarize
        if: always()
        run: |
          {
            echo '## PR conflict handler plan'
            echo
            echo '```text'
            sed -n '1,160p' pr-conflict-handler-plan.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
