name: Visual & A11y Tests

on:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: visual-a11y-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci-visual-path-changes:
    name: Visual Path Detection
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 2
    outputs:
      has_visual_changes: ${{ steps.detect.outputs.has_visual_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Fetch base ref for diff comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1 --no-tags
      - name: Detect visual-relevant changes
        id: detect
        run: |
          VISUAL_PATTERNS='^apps/web/components/|^apps/web/.storybook/|^packages/ui/'
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD 2>/dev/null || echo "")
            if echo "$CHANGED_FILES" | grep -qE "$VISUAL_PATTERNS"; then
              echo "has_visual_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_visual_changes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Push to main: only run when the tip commit touches visual surfaces.
            # Running on every main push made this workflow a permanent red badge
            # for unrelated merges (tasks, screenshots, infra).
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --pretty=format: HEAD)
            if echo "$CHANGED_FILES" | grep -qE "$VISUAL_PATTERNS"; then
              echo "has_visual_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_visual_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  storybook-a11y:
    name: Storybook A11y Checks
    needs: [ci-visual-path-changes]
    if: ${{ needs.ci-visual-path-changes.outputs.has_visual_changes == 'true' }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Self-hosted runners already provide the system libraries; --with-deps
      # invokes sudo and fails on the locked-down OrbStack runner.
      - run: pnpm --filter web exec playwright install chromium
      - name: Run Storybook A11y Tests
        id: a11y-test
        run: pnpm --filter web test:a11y
      - name: A11y Results Summary
        if: always()
        run: |
          if [ "${{ steps.a11y-test.outcome }}" == "failure" ]; then
            {
              echo "## A11y Check Results"
              echo ""
              echo "FAIL: Accessibility violations detected - blocking this PR."
              echo ""
              echo "To run locally: pnpm --filter web test:a11y"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## A11y Check Results"
              echo ""
              echo "PASS: All Storybook components passed accessibility checks."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  playwright-visual:
    name: Playwright Visual Regression
    needs: [ci-visual-path-changes]
    if: ${{ needs.ci-visual-path-changes.outputs.has_visual_changes == 'true' && (github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install chromium chromium-headless-shell --with-deps
      - name: Run Visual Regression Tests
        id: visual-test
        run: pnpm --filter web e2e:visual
        env:
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_SKIP_AUTH: true
      - name: Upload Visual Diff Artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diff-report
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7
      - name: Visual Test Results Summary
        if: always()
        run: |
          if [ "${{ steps.visual-test.outcome }}" == "failure" ]; then
            {
              echo "## Visual Regression Results"
              echo ""
              echo "FAIL: Visual differences detected - blocking this PR."
              echo ""
              echo "If changes are intentional, update snapshots:"
              echo "pnpm --filter web e2e:visual:update"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Visual Regression Results"
              echo ""
              echo "PASS: All visual tests passed - no unexpected changes detected."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
