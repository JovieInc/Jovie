name: Visual & A11y Tests

# Storybook axe lane (JOV-4042). Playwright page-level visual compare lives in
# visual-regression.yml (self-healing baselines + admin surfaces). This workflow
# stays Storybook-only to avoid double Neon/build cost. It is deep evidence, so
# source PRs and main releases never wait on it.
on:
  schedule:
    - cron: '37 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Keep at most one deep Storybook audit per ref.
concurrency:
  group: visual-a11y-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci-visual-path-changes:
    name: Visual Path Detection
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_visual_changes: ${{ steps.detect.outputs.has_visual_changes }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Detect visual-relevant changes
        id: detect
        run: |
          VISUAL_PATTERNS='^(apps/web/components/|apps/web/\.storybook/|apps/web/app/globals\.css|apps/web/styles/|apps/web/(tailwind|postcss)\.config\.|apps/web/vitest\.config\.storybook\.mts|apps/web/package\.json|packages/ui/|pnpm-lock\.yaml|\.github/workflows/visual-a11y\.yml)'
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "has_visual_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_visual_changes=false" >> "$GITHUB_OUTPUT"
          fi

  storybook-a11y:
    name: Storybook A11y Checks
    needs: [ci-visual-path-changes]
    if: ${{ needs.ci-visual-path-changes.outputs.has_visual_changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install chromium --with-deps
      - name: Run Storybook A11y Tests
        id: a11y-test
        run: pnpm --filter web test:a11y
      - name: A11y Results Summary
        if: always()
        run: |
          if [ "${{ steps.a11y-test.outcome }}" == "failure" ]; then
            echo "## A11y Check Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "FAIL: Accessibility violations detected - blocking this PR." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "To run locally: pnpm --filter web test:a11y" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## A11y Check Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "PASS: All Storybook components passed accessibility checks." >> "$GITHUB_STEP_SUMMARY"
          fi
