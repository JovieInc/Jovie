name: Merge Queue Auto-Enroll

# Fully event-driven — zero polling crons.
#
# Every state change that affects enrollment eligibility fires exactly one
# workflow run. This controller is native-only after cutover: a missing or
# non-native repository variable fails closed before any queue/rebase mutation.
# Existing labels are intent/audit evidence, never an alternate transport.
#
# Triggers:
#   pull_request      — PR label changes, ready, reopen (eligibility change)
#   workflow_run      — CI completion (green PRs are now enrollable)
#   push (main)       — main moved → queued PRs may conflict or get stale
#   workflow_dispatch — manual rescue if needed
#
# Two jobs run (not at the same time — concurrency group serializes):
#   enroll    — classify open PRs, enroll green ones, dequeue broken ones,
#               flag conflicts for the fix agent (no pytest/Python setup;
#               drain regression tests run in CI Structural Contract instead)
#   rebase    — mechanically rebase blocked agent PRs onto latest main
#
# GH-13630 scope boundary: pr-conflict-handler debounce + lighter model are
# follow-ups — handler lacks a durable "recently resolved" marker contract.
#
# No schedule. No watchdog label-cycling. No polling.

on:
  pull_request:
    types: [ready_for_review, reopened, labeled, unlabeled]
  workflow_run:
    workflows: ['CI']
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: merge-queue-drain-mutex
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write

jobs:
  enroll:
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion != 'cancelled'
      )
    # API-only fleet controller. ubuntu-latest deterministically includes gh;
    # the heterogeneous self-hosted fast pool does not.
    runs-on: ubuntu-latest
    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}
      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - name: Verify GitHub CLI
        run: gh --version
      - name: Enroll clean PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
          MERGE_QUEUE_BACKEND: ${{ vars.MERGE_QUEUE_BACKEND }}
          DRAIN_MUTATION_AUTHORIZATION: merge-queue-autoenroll
          MERGE_QUEUE_NATIVE_AUTHORIZATION: merge-queue-autoenroll
        run: |
          if [[ "$MERGE_QUEUE_BACKEND" != "native" ]]; then
            echo "::error::Merge Queue Auto-Enroll requires MERGE_QUEUE_BACKEND=native" >&2
            exit 2
          fi
          bash scripts/drain-pr-queue.sh

  rebase:
    needs: enroll
    if: >-
      github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}
      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - name: Verify GitHub CLI
        run: gh --version
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Preflight native queue cutover
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          MERGE_QUEUE_BACKEND: ${{ vars.MERGE_QUEUE_BACKEND }}
          MERGE_QUEUE_NATIVE_AUTHORIZATION: merge-queue-autoenroll
        run: |
          if [[ "$MERGE_QUEUE_BACKEND" != "native" ]]; then
            echo "::error::Merge Queue Auto-Enroll requires MERGE_QUEUE_BACKEND=native" >&2
            exit 2
          fi
          node scripts/merge-queue-backend.mjs preflight
      - name: Rebase blocked agent PRs onto main (Phase 2)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          DRAIN_REMEDIATE_APPLY: '1'
          DRAIN_REMEDIATE_MAX_PER_RUN: '3'
          DRAIN_REMEDIATE_COOLDOWN_HOURS: '4'
        run: node scripts/drain-pr-remediate.mjs --apply
