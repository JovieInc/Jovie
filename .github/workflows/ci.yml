          fallback_json_key: db_url

      - name: Export DATABASE_URL (ephemeral branch)
        if: needs.ci-path-changes.outputs.run_neon == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-chat-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

