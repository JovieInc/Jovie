name: CI

on:
  pull_request:
    branches: [main, 'integration/**']
  # GitHub native merge queue validates the exact synthetic combined head.
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_runner_image_canary:
        description: Build and validate the candidate fixed-runner image.
        required: false
        default: false
        type: boolean
      run_preview_deploy:
        description: Build a bounded hosted Vercel preview for the dispatched ref.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  # CI owns only source/combined-head deduplication. Production serialization
  # lives exclusively in production-controller.yml's repo-wide FIFO lease.
  # Main push runs use unique keys so every SHA can produce exact evidence.
  group: >-
    ${{ github.workflow }}-${{
      (github.event_name == 'pull_request')
        && format('pr-{0}', github.event.pull_request.number)
        || (github.event_name == 'merge_group'
           && format('merge-group-{0}', github.event.merge_group.head_sha)
           || format('run-{0}-{1}', github.run_id, github.run_attempt))
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Source and synthetic combined-head code are PR-controlled. Both stages are
  # deterministic and local-cache-only; remote Turbo credentials are available
  # exclusively to trusted main pushes and explicit manual dispatches.
  TURBO_TOKEN: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && secrets.TURBO_TOKEN || '' }}
  TURBO_TEAM: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && secrets.TURBO_TEAM || '' }}
  TURBO_CACHE: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 'local:rw,remote:rw' || 'local:rw' }}
  # JOV-2497: four-slot cross-PR pool caps Neon branch *creation* (one endpoint per branch).
  # Only jobs that call neon-create-branch-with-retry use the pool — artifact consumers
  # (Lighthouse/A11y/Mobile Overflow) reuse neon-db and must NOT share the pool or
  # sibling matrix jobs cancel each other within the same workflow run.
  # Pool groups use literal job IDs because github.job is only populated inside runner
  # steps. Job-level concurrency is evaluated before assignment, where github.job is null.

jobs:
  runner-image-offline-proof:
    name: Build and verify runner image offline
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.run_runner_image_canary == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare exact filtered build context
        id: runner-context
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          mkdir -p runner-image-evidence
          printf '%s\n' "$EXPECTED_SHA" > runner-image-evidence/head.txt
          .github/runner-image/build-context.sh "$EXPECTED_SHA" \
            > runner-image-evidence/context.tar
          sha256sum runner-image-evidence/context.tar \
            > runner-image-evidence/context.sha256
          context_sha=$(cut -d ' ' -f 1 runner-image-evidence/context.sha256)
          echo "sha256=$context_sha" >> "$GITHUB_OUTPUT"

      - name: Expose GitHub Actions cache runtime to BuildKit
        uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3

      - name: Build twice and prove the dependency layer is cached
        shell: bash
        env:
          IMAGE_TAG: jovie-runner:offline-${{ github.sha }}
          CACHE_SCOPE: runner-image-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ steps.runner-context.outputs.sha256 }}
        run: |
          set -euo pipefail
          cleanup() {
            docker buildx rm runner-image-first runner-image-second \
              >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker buildx create --name runner-image-first \
            --driver docker-container --use
          docker buildx inspect --bootstrap
          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --file .github/runner-image/Dockerfile \
            --cache-from "type=gha,scope=$CACHE_SCOPE,version=2" \
            --cache-to "type=gha,scope=$CACHE_SCOPE,mode=max,version=2" \
            --metadata-file runner-image-evidence/first-build-metadata.json \
            - < runner-image-evidence/context.tar \
            2>&1 | tee runner-image-evidence/first-build.log
          test "${PIPESTATUS[0]}" -eq 0

          docker buildx rm runner-image-first
          docker buildx create --name runner-image-second \
            --driver docker-container --use
          docker buildx inspect --bootstrap
          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --file .github/runner-image/Dockerfile \
            --cache-from "type=gha,scope=$CACHE_SCOPE,version=2" \
            --load \
            --tag "$IMAGE_TAG" \
            --metadata-file runner-image-evidence/second-build-metadata.json \
            - < runner-image-evidence/context.tar \
            2>&1 | tee runner-image-evidence/second-build.log
          test "${PIPESTATUS[0]}" -eq 0

          node .github/runner-image/verify-build-cache.mjs \
            runner-image-evidence/second-build.log \
            runner-image-evidence/cache-proof.json
          docker image inspect "$IMAGE_TAG" \
            > runner-image-evidence/image-inspect.json

      - name: Verify candidate with networking disabled
        shell: bash
        env:
          IMAGE_TAG: jovie-runner:offline-${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm --network none \
            --entrypoint bash \
            --volume "$PWD:/repo:ro" \
            "$IMAGE_TAG" -lc '
              set -euo pipefail
              test "$(node --version)" = v22.23.1
              test "$(cd / && COREPACK_ENABLE_NETWORK=0 pnpm --version)" = 9.15.4

              dependency_status=$(JOVIE_RUNNER_REPO_ROOT=/repo \
                node /repo/.github/runner-image/verify-prerequisites.mjs \
                --component dependencies)
              playwright_status=$(JOVIE_RUNNER_REPO_ROOT=/repo \
                node /repo/.github/runner-image/verify-prerequisites.mjs \
                --component playwright)
              grep -qx "dependencies_warm=true" <<< "$dependency_status"
              grep -qx "playwright_warm=true" <<< "$playwright_status"

              archive_path=$(sed -n \
                "s/^installed_tree_archive_path=//p" <<< "$dependency_status")
              archive_sha=$(sed -n \
                "s/^installed_tree_archive_sha256=//p" <<< "$dependency_status")
              test -n "$archive_path"
              [[ "$archive_sha" =~ ^[0-9a-f]{64}$ ]]
              mkdir -p /tmp/offline-workspace
              GITHUB_WORKSPACE=/tmp/offline-workspace \
                /repo/.github/runner-image/restore-installed-tree.sh \
                "$archive_path" "$archive_sha"
              test -f /tmp/offline-workspace/node_modules/.modules.yaml
              test -x /tmp/offline-workspace/node_modules/.bin/tsx
              test -e /tmp/offline-workspace/apps/web/node_modules/next
              printf "offline_image_proof=true\n"
            ' 2>&1 | tee runner-image-evidence/offline-proof.log
          test "${PIPESTATUS[0]}" -eq 0
          grep -qx 'offline_image_proof=true' \
            runner-image-evidence/offline-proof.log

      - name: Bound runner image proof artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          for log in first-build second-build; do
            if test -f "runner-image-evidence/$log.log"; then
              tail -n 500 "runner-image-evidence/$log.log" \
                > "runner-image-evidence/$log-tail.log"
              rm "runner-image-evidence/$log.log"
            fi
          done
          rm -f runner-image-evidence/context.tar
          evidence_kb=$(du -sk runner-image-evidence | cut -f1)
          if (( evidence_kb > 2048 )); then
            echo "Runner image proof exceeds 2048 KiB: ${evidence_kb} KiB" >&2
            exit 1
          fi
          echo "Runner image proof is bounded: ${evidence_kb} KiB"

      - name: Upload runner image proof
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runner-image-proof-${{ github.sha }}
          path: runner-image-evidence/
          if-no-files-found: error
          retention-days: 14

  runner-image-canary:
    name: Validate runner image warm paths
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.run_runner_image_canary == true
    needs: runner-image-offline-proof
    runs-on: [self-hosted, Linux, X64, "${{ 'jovie-runner-image-canary' }}"]
    timeout-minutes: 20
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact checkout
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Setup Node.js and pnpm warm path
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Playwright warm path
        uses: ./.github/actions/setup-playwright

      - name: Verify warm paths and toolchain
        shell: bash
        run: |
          set -euo pipefail
          assert_equal() {
            local name="$1" expected="$2" actual="$3"
            if [[ "$actual" != "$expected" ]]; then
              printf '::error title=Runner image canary::%s: expected %q, got %q\n' \
                "$name" "$expected" "$actual"
              return 1
            fi
          }
          assert_line() {
            local name="$1" expected="$2" actual="$3"
            if ! grep -Fqx -- "$expected" <<< "$actual"; then
              printf '::error title=Runner image canary::%s: missing line %q; output was %q\n' \
                "$name" "$expected" "$actual"
              return 1
            fi
          }
          assert_executable() {
            local name="$1" path="$2"
            if [[ ! -x "$path" ]]; then
              printf '::error title=Runner image canary::%s: not executable at %s\n' \
                "$name" "$path"
              return 1
            fi
          }

          # The verifier normally writes machine-readable fields to the
          # Actions-provided GITHUB_OUTPUT file. This assertion step needs those
          # fields on stdout so command substitution can inspect them.
          dependency_status=$(env -u GITHUB_OUTPUT node .github/runner-image/verify-prerequisites.mjs --component dependencies)
          playwright_status=$(env -u GITHUB_OUTPUT node .github/runner-image/verify-prerequisites.mjs --component playwright)
          assert_line 'dependency warm status' 'dependencies_warm=true' "$dependency_status"
          assert_line 'pnpm store path' 'pnpm_store_path=/opt/jovie-pnpm-store' "$dependency_status"
          assert_line 'Playwright warm status' 'playwright_warm=true' "$playwright_status"
          assert_line 'Playwright browser path' 'playwright_browsers_path=/opt/ms-playwright' "$playwright_status"
          assert_equal 'Node version' v22.23.1 "$(node --version)"
          assert_equal 'pnpm version' 9.15.4 "$(pnpm --version)"
          assert_equal 'PLAYWRIGHT_BROWSERS_PATH' /opt/ms-playwright "$PLAYWRIGHT_BROWSERS_PATH"
          assert_executable 'Chromium' /opt/ms-playwright/chromium-1223/chrome-linux64/chrome
          assert_executable 'Chromium headless shell' /opt/ms-playwright/chromium_headless_shell-1223/chrome-headless-shell-linux64/chrome-headless-shell
          assert_executable 'FFmpeg' /opt/ms-playwright/ffmpeg-1011/ffmpeg-linux

  # Successful root for every CI event, with one-shot proof only for push:main.
  # Queue-proven SHAs reuse their exact merge_group gate and skip every duplicate
  # fallback lane. Direct/admin main commits run the complete fallback contract
  # below. API errors fail main pushes; other events emit neutral defaults so a
  # skipped ancestor cannot cascade through Path Changes into every source gate.
  main-queue-provenance:
    name: Main Queue Provenance
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      is_current: ${{ steps.verified.outputs.is_current || steps.neutral.outputs.is_current }}
      queue_proven: ${{ steps.verified.outputs.queue_proven || steps.neutral.outputs.queue_proven }}
      proof_run_id: ${{ steps.verified.outputs.proof_run_id || steps.neutral.outputs.proof_run_id }}
    steps:
      - name: Emit neutral provenance for non-main events
        id: neutral
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
        shell: bash
        run: |
          {
            echo "is_current=false"
            echo "queue_proven=false"
            echo "proof_run_id="
          } >> "$GITHUB_OUTPUT"
      - name: Checkout exact main push
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Resolve exact queue provenance once
        id: verified
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/verify-main-release-readiness.mjs

  # Manual diagnostics retain the secretless routing observer, but no automated
  # CI event consumes its output while fixed unit capacity is quarantined.
  ci-unit-runner-route:
    name: Unit Runner Route
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Actions suppresses job outputs that resemble configured masked values.
      # Keep runner labels local to the trusted workflow and export only this enum.
      runner_class: ${{ steps.route.outputs.runner_class }}
    steps:
      - name: Checkout trusted runner routing policy
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          sparse-checkout: |
            .github/scripts/await-runner-heartbeat.sh
            .github/scripts/query-runner-heartbeat.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Query exact runner heartbeat
        id: heartbeat
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEARTBEAT_MAX_AGE_SECONDS: '900'
          HEARTBEAT_API_TIMEOUT_SECONDS: '5'
          HEARTBEAT_EXPECTED_EVENT: ''
          HEARTBEAT_EXPECTED_SHA: ''
          HEARTBEAT_POLL_ATTEMPTS: '10'
          HEARTBEAT_POLL_INTERVAL_SECONDS: '5'
        run: |
          set -uo pipefail
          {
            echo "health=down"
            echo "probe_state=unhealthy"
            echo "evidence=trusted heartbeat helper unavailable; using hosted capacity"
          } >> "$GITHUB_OUTPUT"
          helper='.github/scripts/await-runner-heartbeat.sh'
          if [ ! -x "$helper" ]; then
            echo "::warning::Trusted heartbeat helper is absent before landing; using ubuntu-latest."
            exit 0
          fi
          query_output="$RUNNER_TEMP/unit-runner-heartbeat-output"
          : > "$query_output"
          if GITHUB_OUTPUT="$query_output" timeout 60s "$helper"; then
            cat "$query_output" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Trusted heartbeat observer timed out or failed unexpectedly; using ubuntu-latest."
          fi
          exit 0

      - name: Select conservative unit runner route
        id: route
        env:
          HEARTBEAT_HEALTH: ${{ steps.heartbeat.outputs.health }}
          HEARTBEAT_EVIDENCE: ${{ steps.heartbeat.outputs.evidence }}
        shell: bash
        run: |
          set -euo pipefail
          runner_class='hosted'
          runner_label='ubuntu-latest'
          if [ "$HEARTBEAT_HEALTH" = 'up' ]; then
            runner_class='fixed'
            runner_label='jovie-runner'
          fi

          case "$runner_class" in
            fixed|hosted) ;;
            *)
              echo "::warning::Invalid runner class '$runner_class'; using ubuntu-latest."
              runner_class='hosted'
              runner_label='ubuntu-latest'
              ;;
          esac
          echo "runner_class=$runner_class" >> "$GITHUB_OUTPUT"
          echo "::notice::Unit runner route: $runner_label — $HEARTBEAT_EVIDENCE"

  # ── Centralized deterministic path-change detection ────────────────────
  # Source and combined heads compute their own exact diff. The former
  # Graphite reuse action is intentionally absent: native queue provenance
  # cannot rely on an external source-branch skip decision.
  ci-path-changes:
    name: Path Changes
    needs: [main-queue-provenance]
    if: >-
      always() &&
      (
        github.event_name != 'push' ||
        github.ref != 'refs/heads/main' ||
        (
          needs.main-queue-provenance.result == 'success' &&
          needs.main-queue-provenance.outputs.is_current == 'true' &&
          needs.main-queue-provenance.outputs.queue_proven != 'true'
        )
      )
    # Hosted-only root of the PR DAG. Self-hosted cancel/hang here cascades into
    # SKIPPED risk/ci-fast/unit leaves and a red PR Ready (JOV-3464 drain).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_build: ${{ steps.detect.outputs.run_build || 'false' }}
      run_test: ${{ steps.detect.outputs.run_test || 'false' }}
      run_test_performance: ${{ steps.detect.outputs.run_test_performance || 'false' }}
      run_storybook_a11y: ${{ steps.detect.outputs.run_storybook_a11y || 'false' }}
      run_public_lighthouse: ${{ steps.detect.outputs.run_public_lighthouse || 'false' }}
      run_dashboard_lighthouse: ${{ steps.detect.outputs.run_dashboard_lighthouse || 'false' }}
      run_onboarding_lighthouse: ${{ steps.detect.outputs.run_onboarding_lighthouse || 'false' }}
      run_admin_lighthouse: ${{ steps.detect.outputs.run_admin_lighthouse || 'false' }}
      run_chat_lighthouse: ${{ steps.detect.outputs.run_chat_lighthouse || 'false' }}
      run_promptfoo_evals: ${{ steps.detect.outputs.run_promptfoo_evals || 'false' }}
      run_golden_eval_set: ${{ steps.detect.outputs.run_golden_eval_set || 'false' }}
      run_e2e: ${{ steps.detect.outputs.run_e2e || 'false' }}
      run_golden_path: ${{ steps.detect.outputs.run_golden_path || 'false' }}
      run_drizzle: ${{ steps.detect.outputs.run_drizzle || 'false' }}
      run_neon: ${{ steps.detect.outputs.run_neon || 'false' }}
      run_ios: ${{ steps.detect.outputs.run_ios || 'false' }}
      has_code_changes: ${{ steps.detect.outputs.has_code_changes || 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Blobless partial clone: full commit graph for merge-base/diff
          # (names only), no historical file contents. Cuts the clone from
          # ~30-40s (worse under runner throttling) to seconds on this repo;
          # any blob that is actually needed is lazy-fetched on demand.
          fetch-depth: 0
          filter: blob:none
      - name: Run deterministic brand safety scan
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request)
              git fetch --no-tags origin "${{ github.base_ref }}"
              DIFF_BASE="origin/${{ github.base_ref }}"
              ;;
            merge_group)
              DIFF_BASE="${{ github.event.merge_group.base_sha }}"
              git cat-file -e "${DIFF_BASE}^{commit}"
              ;;
            push)
              DIFF_BASE="${{ github.event.before }}"
              if [[ ! "$DIFF_BASE" =~ ^[0-9a-f]{40}$ ]] ||
                [[ "$DIFF_BASE" == "0000000000000000000000000000000000000000" ]]; then
                echo "::error::push.before is not a usable exact main base SHA"
                exit 1
              fi
              git cat-file -e "${DIFF_BASE}^{commit}"
              ;;
            *)
              echo "::error::Unsupported event for brand safety scan"
              exit 1
              ;;
          esac

          BRAND_CANDIDATES="$RUNNER_TEMP/brand-scrub-candidates.txt"
          # Materialize the diff before filtering so a Git failure cannot be
          # hidden by a no-match grep exit status.
          git diff --name-only --diff-filter=d "$DIFF_BASE" HEAD > "$BRAND_CANDIDATES"
          mapfile -t brand_files < <(
            awk '
              (/\.(md|mdx|txt)$/ || /^docs\//) &&
              !/^(node_modules|\.cache|drizzle\/migrations)/
            ' "$BRAND_CANDIDATES"
          )
          if (( ${#brand_files[@]} > 0 )); then
            python3 scripts/brand-scrub.py "${brand_files[@]}"
          else
            echo "No brand-scrub paths changed."
          fi
      - name: Detect path changes for all job types
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          IS_FORK="${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}"
          # Determine changed files
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then
            MERGE_GROUP_BASE_SHA="${{ github.event.merge_group.base_sha }}"
            MERGE_GROUP_HEAD_SHA="${{ github.event.merge_group.head_sha }}"
            git cat-file -e "${MERGE_GROUP_BASE_SHA}^{commit}"
            git cat-file -e "${MERGE_GROUP_HEAD_SHA}^{commit}"
            CHANGED_FILES=$(git diff --name-only "$MERGE_GROUP_BASE_SHA...$MERGE_GROUP_HEAD_SHA")
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Fail closed on base resolution: a failed fetch used to leave an
            # empty CHANGED_FILES list that looked like docs-only and skip-
            # cascaded ci-fast / unit leaves while risk still ran.
            git fetch --no-tags origin "${{ github.base_ref }}"
            if ! git rev-parse --verify "origin/${{ github.base_ref }}" >/dev/null 2>&1; then
              echo "::error::Could not resolve origin/${{ github.base_ref }} after fetch"
              exit 1
            fi
            CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
            if [[ -z "${CHANGED_FILES//[$'\t\r\n' ]/}" ]]; then
              echo "::error::Empty changed-file list vs origin/${{ github.base_ref }}; refusing a false docs-only classification."
              exit 1
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: run everything
            echo "Manual dispatch: running all checks"
            for t in run_build run_test run_test_performance run_storybook_a11y run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_promptfoo_evals run_golden_eval_set run_e2e run_golden_path run_drizzle run_neon run_ios has_code_changes; do
              echo "$t=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          else
            PUSH_BASE_SHA="${{ github.event.before }}"
            if [[ ! "$PUSH_BASE_SHA" =~ ^[0-9a-f]{40}$ ]] ||
              [[ "$PUSH_BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              echo "::error::push.before is not a usable exact main base SHA"
              exit 1
            fi
            git cat-file -e "${PUSH_BASE_SHA}^{commit}"
            CHANGED_FILES=$(git diff --name-only "$PUSH_BASE_SHA" HEAD)
          fi

          IOS_PATTERN='^(apps/ios/|fastlane/|Gemfile$|Gemfile\.lock$|scripts/ios-best-practices-lint\.sh$|\.github/workflows/ios-(ci|testflight)\.yml$)'
          if echo "$CHANGED_FILES" | grep -q -E "$IOS_PATTERN"; then
            echo "run_ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_ios=false" >> "$GITHUB_OUTPUT"
          fi

          TEST_PERFORMANCE_PATTERN='^apps/web/scripts/test-performance-(guard\.ts|profiler(\.test)?\.ts)$'
          if echo "$CHANGED_FILES" | grep -q -E "$TEST_PERFORMANCE_PATTERN"; then
            echo "run_test_performance=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_test_performance=false" >> "$GITHUB_OUTPUT"
          fi

          PROMPTFOO_INFRA_TRIGGER_PATTERN='^(\.github/workflows/evals-periodic\.yml|\.github/workflows/README\.md|apps/web/tests/eval/promptfoo/|apps/web/tests/eval/golden/)'
          PROMPTFOO_INFRA_ALLOWED_PATTERN='^(\.github/workflows/ci\.yml|\.github/workflows/evals-periodic\.yml|\.github/workflows/README\.md|apps/web/tests/eval/promptfoo/.*|apps/web/tests/eval/golden/.*|apps/web/vitest\.config\.golden-eval\.mts|apps/web/scripts/run-golden-eval-set-ci\.sh|apps/web/package.*\.json|package.*\.json|pnpm-lock\.yaml)$'
          if [[ "${{ github.event_name }}" == "pull_request" ]] &&
            echo "$CHANGED_FILES" | grep -q -E "$PROMPTFOO_INFRA_TRIGGER_PATTERN" &&
            ! echo "$CHANGED_FILES" | grep -v -E "$PROMPTFOO_INFRA_ALLOWED_PATTERN" | grep -q .; then
            echo "Promptfoo eval-infrastructure-only source PR: deferring semantic evidence to the merge-group head."
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "run_promptfoo_evals=false" >> "$GITHUB_OUTPUT"
            echo "run_golden_eval_set=false" >> "$GITHUB_OUTPUT"
            for t in run_build run_test run_test_performance run_storybook_a11y run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_e2e run_golden_path run_drizzle run_neon; do
              echo "$t=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Check if only docs changed (exclude .github/ — workflow changes must run CI)
          if ! echo "$CHANGED_FILES" | grep -q -E '^\.github/' &&
            ! echo "$CHANGED_FILES" | grep -q -v -E '\.(md|txt)$'; then
            echo "Only documentation files changed"
            for t in run_build run_test run_test_performance run_storybook_a11y run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_promptfoo_evals run_golden_eval_set run_e2e run_golden_path run_drizzle run_neon has_code_changes; do
              echo "$t=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          echo "has_code_changes=true" >> "$GITHUB_OUTPUT"

          # Build paths
          BUILD_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/lib/|apps/web/hooks/|apps/web/types/|apps/web/constants/|apps/web/package.*\.json|apps/web/next\.config\.js|apps/web/tailwind\.config\.|apps/web/postcss\.config\.|apps/web/instrumentation.*\.ts|apps/web/sentry\..*\.config\.ts|apps/web/middleware\.ts|package.*\.json|turbo\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$BUILD_PATTERN"; then
            RUN_BUILD=true
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            RUN_BUILD=false
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi

          # Test paths
          TEST_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/lib/|apps/web/hooks/|apps/web/types/|apps/web/tests/unit/|apps/web/__tests__/|packages/|.*\.test\.|.*\.spec\.|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$TEST_PATTERN"; then
            RUN_TEST=true
            echo "run_test=true" >> "$GITHUB_OUTPUT"
          else
            RUN_TEST=false
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          fi

          STORYBOOK_A11Y_PATTERN='^(apps/web/components/|apps/web/\.storybook/|apps/web/app/globals\.css|apps/web/styles/|apps/web/(tailwind|postcss)\.config\.|apps/web/vitest\.config\.storybook\.mts|apps/web/package\.json|packages/ui/|pnpm-lock\.yaml|\.github/workflows/(ci|visual-a11y)\.yml)'
          if echo "$CHANGED_FILES" | grep -q -E "$STORYBOOK_A11Y_PATTERN"; then
            echo "run_storybook_a11y=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_storybook_a11y=false" >> "$GITHUB_OUTPUT"
          fi

          # Screenshot-only product exports live under public/product-screenshots and
          # must not force public Lighthouse + Neon on main (they are marketing assets,
          # not route code). Filter that tree out before matching public/* paths.
          PUBLIC_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|scripts/lighthouse-retry\.mjs|apps/web/\.lighthouserc\.pr\.json|apps/web/\.lighthouserc\.public-launch\.json|apps/web/app/\(home\)/|apps/web/app/\(marketing\)/|apps/web/app/\(dynamic\)/legal/|apps/web/content/legal/|apps/web/app/\[username\]/|apps/web/app/layout\.tsx|apps/web/app/globals\.css|apps/web/public/|apps/web/styles/|apps/web/components/features/home/|apps/web/components/features/marketing/|apps/web/components/features/profile/|apps/web/components/homepage/|apps/web/components/marketing/|apps/web/scripts/run-public-lighthouse\.ts|apps/web/scripts/public-route-qa\.ts|apps/web/scripts/public-surface-qa\.ts|apps/web/scripts/performance-route-manifest\.ts|apps/web/tests/e2e/public-exhaustive\.spec\.ts|apps/web/tests/e2e/profile-mobile-viewport-stability\.spec\.ts|apps/web/tests/e2e/axe-audit\.spec\.ts|apps/web/tests/e2e/utils/(public-surface-(manifest|helpers)|smoke-test-utils|mobile-profile-viewports)\.ts|packages/|apps/web/package.*\.json|package.*\.json|apps/web/tailwind\.config\.|apps/web/postcss\.config\.)'
          PUBLIC_LIGHTHOUSE_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^apps/web/public/product-screenshots/' || true)
          if echo "$PUBLIC_LIGHTHOUSE_FILES" | grep -q -E "$PUBLIC_LIGHTHOUSE_PATTERN"; then
            echo "run_public_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_public_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          DASHBOARD_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.dashboard\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs)$'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$DASHBOARD_LIGHTHOUSE_PATTERN"; then
            echo "run_dashboard_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_dashboard_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          ONBOARDING_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.onboarding\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/onboarding/|apps/web/components/features/dashboard/organisms/onboarding|apps/web/components/features/dashboard/organisms/apple-style-onboarding|apps/web/components/features/onboarding/|apps/web/lib/onboarding/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$ONBOARDING_LIGHTHOUSE_PATTERN"; then
            echo "run_onboarding_lighthouse=true" >> $GITHUB_OUTPUT
          else
            echo "run_onboarding_lighthouse=false" >> $GITHUB_OUTPUT
          fi

          ADMIN_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.admin\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/app/\(shell\)/admin/|apps/web/components/features/admin/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$ADMIN_LIGHTHOUSE_PATTERN"; then
            echo "run_admin_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_admin_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          CHAT_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.chat\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/app/\(shell\)/chat/|apps/web/components/jovie/|apps/web/components/chat/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$CHAT_LIGHTHOUSE_PATTERN"; then
            echo "run_chat_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_chat_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          PROMPTFOO_EVAL_PATTERN='^(\.github/workflows/ci\.yml|apps/web/tests/eval/promptfoo/|apps/web/tests/eval/golden/|apps/web/vitest\.config\.golden-eval\.mts|apps/web/scripts/run-golden-eval-set-ci\.sh|apps/web/lib/chat/|apps/web/app/api/chat/|apps/web/package.*\.json|package.*\.json|pnpm-lock\.yaml)'
          if echo "$CHANGED_FILES" | grep -q -E "$PROMPTFOO_EVAL_PATTERN"; then
            echo "run_promptfoo_evals=true" >> "$GITHUB_OUTPUT"
            echo "run_golden_eval_set=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_promptfoo_evals=false" >> "$GITHUB_OUTPUT"
            echo "run_golden_eval_set=false" >> "$GITHUB_OUTPUT"
          fi

          # E2E paths
          E2E_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/tests/e2e/|apps/web/tests/smoke/|apps/web/playwright\.config\.|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$E2E_PATTERN"; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

          # Launch-gate golden path (JOV-3758). Mirrors docs/launch/LAUNCH_GATES.md's
          # path list: onboarding routes/components/libs, auth signup/signin entrypoints,
          # dashboard shell/releases flows, billing/checkout API routes used by the golden
          # path, golden-path Playwright specs + helpers, and launch-gate CI/Lighthouse/perf
          # config. Docs-only changes never reach here (handled by the docs-only guard above).
          LAUNCH_GATE_PATTERN='^(apps/web/app/onboarding/|apps/web/components/features/onboarding/|apps/web/components/features/dashboard/organisms/onboarding|apps/web/components/features/dashboard/organisms/apple-style-onboarding|apps/web/lib/onboarding/|apps/web/app/\(auth\)/|apps/web/app/signin/|apps/web/app/signup/|apps/web/app/sign-in/|apps/web/app/sign-up/|apps/web/app/app/\(shell\)/dashboard/|apps/web/app/app/\(shell\)/layout\.tsx|apps/web/components/features/dashboard/|apps/web/lib/releases/|apps/web/app/api/stripe/|apps/web/app/api/billing/|apps/web/app/api/checkout/|apps/web/lib/stripe/|apps/web/tests/e2e/golden-path\.spec\.ts|apps/web/tests/helpers/clerk-auth\.ts|apps/web/tests/global-setup\.ts|apps/web/playwright\.config\.ts|\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.dashboard\.pr\.json|apps/web/\.lighthouserc\.onboarding\.pr\.json|docs/launch/LAUNCH_GATES\.md|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$LAUNCH_GATE_PATTERN"; then
            echo "run_golden_path=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_golden_path=false" >> "$GITHUB_OUTPUT"
          fi

          # Drizzle paths
          DRIZZLE_PATTERN='^(apps/web/drizzle/|apps/web/lib/db/|apps/web/drizzle\.config\.ts|drizzle\.kit\.(m?js|ts))'
          if echo "$CHANGED_FILES" | grep -q -E "$DRIZZLE_PATTERN"; then
            echo "run_drizzle=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_drizzle=false" >> "$GITHUB_OUTPUT"
          fi

          # Neon ephemeral-branch gate: only spin up Neon when DB-relevant code changed.
          # Covers drizzle, lib/db, lib/queries, schema, cron routes, SQL files, and
          # lockfile changes that could affect drizzle/DB deps. Version-only package
          # metadata changes should not spin up ephemeral Neon branches.
          # Jobs that create ephemeral Neon branches must check this flag before doing so.
          NEON_PATTERN='^(apps/web/drizzle/|apps/web/lib/db/|apps/web/lib/queries/|apps/web/drizzle\.config\.ts|drizzle\.kit\.(m?js|ts)|.*\.sql$|apps/web/app/api/cron/|pnpm-lock\.yaml)'
          if echo "$CHANGED_FILES" | grep -q -E "$NEON_PATTERN"; then
            echo "run_neon=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_neon=false" >> "$GITHUB_OUTPUT"
          fi

          # Fork guard: disable E2E for forks (no secrets)
          if [[ "$IS_FORK" == "true" ]]; then
            echo "Fork PR: disabling e2e and build"
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "run_golden_path=false" >> "$GITHUB_OUTPUT"
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "run_public_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_dashboard_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_admin_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_chat_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_test=false" >> "$GITHUB_OUTPUT"
            echo "run_test_performance=false" >> "$GITHUB_OUTPUT"
          fi

  # Do not allocate unit/build/Xcode/eval capacity after a required external
  # queue gate has already failed or GitHub has deleted the synthetic ref.
  ci-merge-group-admission:
    name: Merge Group Admission
    needs: [ci-path-changes]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      checks: read
      contents: read
    steps:
      - name: Check out trusted admission policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # ALLGREEN prefix groups may use a prior synthetic commit as
          # merge_group.base_sha. The live default branch is the trusted policy
          # source; the helper separately proves the event's exact queue ref.
          ref: main
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: scripts/lib/merge-group-admission.mjs
          sparse-checkout-cone-mode: false
      - name: Require live queue ref and external admission checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/lib/merge-group-admission.mjs

  ci-risk-classifier:
    # Dependency-free so fork PRs classify without waiting on a trusted job or
    # secret. On main, only an unproven exact SHA executes the fallback lane.
    if: >-
      always() &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'merge_group' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          needs.main-queue-provenance.result == 'success' &&
          needs.main-queue-provenance.outputs.is_current == 'true' &&
          needs.main-queue-provenance.outputs.queue_proven != 'true'
        )
      )
    name: CI Risk Classifier
    needs: [main-queue-provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      risk_level: ${{ steps.classify.outputs.risk_level }}
      requires_smoke: ${{ steps.classify.outputs.requires_smoke }}
      requires_preview: ${{ steps.classify.outputs.requires_preview }}
      blocks_unattended_auto_merge: ${{ steps.classify.outputs.blocks_unattended_auto_merge }}
      recommended_labels: ${{ steps.classify.outputs.recommended_labels }}
      matched_rule_ids: ${{ steps.classify.outputs.matched_rule_ids }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: blob:none
      # This gate is dependency-free. Restoring the full pnpm cache can exceed
      # the three-minute latency ratchet before classification even starts.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Collect changed files
        id: changed-files
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          CHANGED_FILES="$RUNNER_TEMP/ci-risk-changed-files.txt"
          : > "$CHANGED_FILES"
          DIFF_BASE=""

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --no-tags origin "$BASE_REF"
            DIFF_BASE="origin/$BASE_REF"
            git diff --name-only "$DIFF_BASE" HEAD > "$CHANGED_FILES"
          elif [[ "$EVENT_NAME" == "merge_group" ]]; then
            DIFF_BASE="${{ github.event.merge_group.base_sha }}"
            git cat-file -e "${DIFF_BASE}^{commit}"
            git diff --name-only "$DIFF_BASE" "${{ github.event.merge_group.head_sha }}" > "$CHANGED_FILES"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            DIFF_BASE="${{ github.event.before }}"
            if [[ ! "$DIFF_BASE" =~ ^[0-9a-f]{40}$ ]] ||
              [[ "$DIFF_BASE" == "0000000000000000000000000000000000000000" ]]; then
              echo "::error::push.before is not a usable exact main base SHA"
              exit 1
            fi
            git cat-file -e "${DIFF_BASE}^{commit}"
            git diff --name-only "$DIFF_BASE" HEAD > "$CHANGED_FILES"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            git ls-files > "$CHANGED_FILES"
          else
            echo "::error::Unsupported event for CI risk classification: $EVENT_NAME"
            exit 1
          fi

          echo "Changed files for CI risk classification:"
          sed 's/^/  /' "$CHANGED_FILES" || true
          echo "path=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
      - name: Classify CI risk
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ci-harness"
          RISK_JSON="$RUNNER_TEMP/ci-harness/ci-risk-classification.json"

          node scripts/ci-harness.mjs classify-risk \
            --files "${{ steps.changed-files.outputs.path }}" \
            --diff-base "${{ steps.changed-files.outputs.diff_base }}" \
            --github-output "$GITHUB_OUTPUT" | tee "$RISK_JSON"

          RISK_LEVEL=$(jq -r '.riskLevel' "$RISK_JSON")
          REQUIRES_SMOKE=$(jq -r '.requiresSmoke' "$RISK_JSON")
          REQUIRES_PREVIEW=$(jq -r '.requiresPreview' "$RISK_JSON")
          BLOCKS_UNATTENDED=$(jq -r '.blocksUnattendedAutoMerge' "$RISK_JSON")
          MATCHED_RULES=$(jq -r '[.matchedRules[].id] | join(",") // ""' "$RISK_JSON")
          if [[ -z "$MATCHED_RULES" ]]; then
            MATCHED_RULES="none"
          fi

          {
            echo "### CI risk classification"
            echo
            echo "- Risk level: $RISK_LEVEL"
            echo "- Requires smoke: $REQUIRES_SMOKE"
            echo "- Requires preview: $REQUIRES_PREVIEW"
            echo "- Blocks unattended auto-merge: $BLOCKS_UNATTENDED"
            echo "- Matched rules: $MATCHED_RULES"
            echo
            echo "Next local command:"
            echo
            echo '```bash'
            echo 'pnpm ci:harness:check'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CI risk artifact
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-risk-classification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-harness/ci-risk-classification.json
          retention-days: 7

  ci-env-example-guard:
    needs: [ci-path-changes]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    name: Env Example Guard
    # Always run; fast, prevents accidental secret commits.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - name: Validate .env.example contains placeholders only
        run: |
          set -euo pipefail

          if [ ! -f .env.example ]; then
            echo "No .env.example found; skipping."
            exit 0
          fi

          # Fail on common secret/token prefixes.
          if grep -nE '(sk_live_|sk_test_|rk_live_|rk_test_|whsec_|ghp_|github_pat_|xoxb-|BEGIN PRIVATE KEY|-----BEGIN)' .env.example; then
            echo "❌ .env.example appears to contain a real secret/token. Replace with placeholders."
            exit 1
          fi

          # Fail on real-looking Stripe price IDs (these should be placeholders).
          if grep -nE '^STRIPE_PRICE_.*=price_[A-Za-z0-9]+' .env.example; then
            echo "❌ .env.example contains Stripe price IDs. Replace with placeholders."
            exit 1
          fi

          echo "✅ .env.example looks safe (no obvious secrets)."

  ci-secret-scan:
    needs: [main-queue-provenance]
    if: >-
      always() &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'merge_group' ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          needs.main-queue-provenance.result == 'success' &&
          needs.main-queue-provenance.outputs.is_current == 'true' &&
          needs.main-queue-provenance.outputs.queue_proven != 'true'
        )
      )
    name: Secret Scan (gitleaks + trufflehog)
    # Always run; fast, catches secrets in PR diffs including *.backup files (JOV-3215).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history fetches every branch and tag, which made this fast gate
          # spend 5+ minutes in an effectively non-cancellable checkout. The
          # next step deepens only this event's exact base..head ancestry.
          fetch-depth: 1
      - name: Run secret scan
        env:
          # Keep Git-valid but shell-significant branch characters out of the
          # generated run script; GitHub transports this value as environment.
          PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_REF="$GITHUB_REF"
          CURRENT_SHA="$GITHUB_SHA"
          CURRENT_BASE_REF=''
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            # refs/pull/<n>/merge is regenerated by GitHub even when its tree
            # and parents are unchanged. The base-repository pull head ref is
            # stable, available for forks, and tracks source-head supersession.
            CURRENT_REF="refs/pull/${{ github.event.pull_request.number }}/head"
            CURRENT_SHA="${{ github.event.pull_request.head.sha }}"
            CURRENT_BASE_REF="refs/heads/$PULL_REQUEST_BASE_REF"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            BASE_SHA="${{ github.event.merge_group.base_sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              echo "::error::push.before is not a usable exact main base SHA"
              exit 1
            fi
          fi
          ./scripts/security/prepare-ci-secret-scan-range.sh \
            "$BASE_SHA" "$GITHUB_SHA" "$CURRENT_REF" "$CURRENT_SHA" \
            "$CURRENT_BASE_REF"
          # Update Branch may leave pull_request.base.sha stale while the exact
          # event merge parent and live base ref have advanced independently.
          # The helper publishes only the proven immutable event merge base.
          BASE_SHA="$(git rev-parse refs/secret-scan/exact-base)"
          SECRET_SCAN_REMOTE_CURRENT_REF="$CURRENT_REF" \
          SECRET_SCAN_REMOTE_CURRENT_SHA="$CURRENT_SHA" \
          SECRET_SCAN_REMOTE_BASE_SHA="$BASE_SHA" \
            ./scripts/security/scan-secrets.sh ci-pr "$BASE_SHA"
      - name: Verify backup-file fixture coverage
        run: ./scripts/security/verify-gitleaks-coverage.sh

  ci-fast:
    name: ci-fast
    # JOV-3464: fold cheap cluster into one job (checkout+install once).
    # Lanes: biome, eslint server-boundaries, typecheck --force, guardrails,
    # structural (path-gated). Per-lane PASS/FAIL via scripts/ci-fast-lanes.mjs
    # (--continue semantics; never set -e out on first failure). Heavy lanes
    # (build / Lighthouse / e2e / preview) stay separate.
    needs: [ci-path-changes, ci-merge-group-admission]
    runs-on: ubuntu-latest
    # Setup (checkout + install, ~2m) + ci-fast lanes via scripts/ci-fast-lanes.mjs
    # (biome, eslint-server-boundaries, typecheck, guardrails, ios-fast,
    # structural) must fit without the job canceling a healthy run.
    timeout-minutes: 25
    if: >-
      always() &&
      needs.ci-path-changes.result == 'success' &&
      (
        github.event_name != 'merge_group' ||
        needs.ci-merge-group-admission.result == 'success'
      )
    env:
      # Match prior Structural Contract job so actionlint/shellcheck is hermetic.
      SHELLCHECK_OPTS: >-
        --exclude=SC2001,SC2016,SC2028,SC2034,SC2086,SC2126,SC2129,SC2329
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Validate CI/release incident prevention contract
        # This is intentionally outside the path-gated Structural Contract.
        # The required prevention receipt must exist for every source PR and
        # exact merge-group head, even when no contract file changed.
        run: pnpm ci:incident-contract:validate
      - name: Verify Node and tsx seed-loader compatibility
        shell: bash
        run: |
          if ! output=$(node --import tsx --import ./apps/web/tests/eval/promptfoo/server-only-preload.mjs -e 'console.log("seed-loader-runtime-ok")' 2>&1); then
            echo "::error title=Node/tsx runtime drift::The .nvmrc runtime cannot load the Promptfoo seed hook through tsx. Align the Node pin and seed-loader API before retrying CI."
            printf '%s\n' "$output"
            exit 1
          fi
          printf '%s\n' "$output"
      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Decide structural lane
        id: structural
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Full (non-shallow) base fetch: guardrails needs git merge-base with
          # origin/<base>; a --depth=1 fetch leaves the base tip shallow and fails
          # desktop-release-guard / version-fanout-guard on PRs.
          git fetch origin "${{ github.base_ref }}" --no-tags
          if git diff --name-only "origin/${{ github.base_ref }}" HEAD | grep -qE '^(\.github/|\.claude/|AGENTS\.md|CODEX\.md|scripts/lib/(ci-|merge-queue)|scripts/ci-|scripts/brand-scrub\.py|scripts/tests/test_(brand_scrub|agent_workflow_hygiene|vercel_prebuilt_deploy)\.py)'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install actionlint (structural)
        if: steps.structural.outputs.skip != 'true'
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
      - name: Set up Python (structural regression tests)
        if: steps.structural.outputs.skip != 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install pytest (structural regression tests)
        if: steps.structural.outputs.skip != 'true'
        run: pip install pytest --quiet
      - name: Run ci-fast lanes
        id: lanes
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || ((github.base_ref && format('origin/{0}', github.base_ref)) || '') }}
          CI_FAST_SKIP_STRUCTURAL: ${{ steps.structural.outputs.skip }}
          CI_FAST_LANES_OUT: ${{ runner.temp }}/ci-fast-lanes.json
        run: node scripts/ci-fast-lanes.mjs
      - name: Upload ci-fast lane results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-fast-lanes-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-fast-lanes.json
          retention-days: 7
          if-no-files-found: warn

  ci-promptfoo-evals:
    name: Promptfoo Evals (deterministic)
    needs: [ci-path-changes, ci-merge-group-admission]
    # Model-free semantic gate: path-selected only on the exact combined head
    # and direct-main fallback. Manual dispatch may run it exhaustively.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      always() &&
      needs.ci-path-changes.result == 'success' &&
      (
        github.event_name != 'merge_group' ||
        needs.ci-merge-group-admission.result == 'success'
      ) &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.ci-path-changes.outputs.run_promptfoo_evals == 'true' &&
          (
            github.event_name == 'merge_group' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
          )
        )
      )
    env:
      JOVIE_RUN_LIVE_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_RATE_LIMIT_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_MODEL_ERROR_EVALS: '0'
      PROMPTFOO_DISABLE_TELEMETRY: '1'
      PROMPTFOO_DISABLE_UPDATE: '1'
      PROMPTFOO_NO_TESTCASE_ASSERT_WARNING: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Validate Promptfoo config
        run: pnpm --filter @jovie/web run evals:validate
      - name: Run deterministic Promptfoo evals
        run: pnpm run evals

  ci-golden-eval-set:
    name: Golden Eval Set (deterministic)
    needs: [ci-path-changes, ci-merge-group-admission]
    # Model-free semantic gate with the same combined-head/fallback contract.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      always() &&
      needs.ci-path-changes.result == 'success' &&
      (
        github.event_name != 'merge_group' ||
        needs.ci-merge-group-admission.result == 'success'
      ) &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.ci-path-changes.outputs.run_golden_eval_set == 'true' &&
          (
            github.event_name == 'merge_group' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
          )
        )
      )
    env:
      JOVIE_RUN_LIVE_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_RATE_LIMIT_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_MODEL_ERROR_EVALS: '0'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run golden eval-set CI gate
        run: pnpm run evals:golden

  ci-knip:
    name: Knip (dead code)
    # Detect unused files, dependencies, and exports
    needs: [ci-path-changes]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run Knip (unused files, deps & exports)
        run: pnpm knip

  neon-db:
    name: Neon DB
    needs: [ci-path-changes]
    # Run for push to main or any selected evidence lane that needs ephemeral DB credentials.
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # 5m was warm-store-only: the admission probe needs @neondatabase/serverless
    # from the installed tree, and a cold pnpm install alone runs ~5m.
    timeout-minutes: 10
    concurrency:
      group: neon-endpoint-pool-neon-db-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    outputs:
      branch_name: ${{ steps.sanitize-branch.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Confirm manual DB evidence lane
        id: check-backend
        run: echo "needs_db=true" >> "$GITHUB_OUTPUT"

      - name: Cleanup old Neon branches (prevent limit errors)
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/neon-branch-cleanup
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_limit: '10'
          protected_branches: 'main,development,preview,br-main,br-production'
          cleanup_threshold: '7'

      - name: Determine owned ephemeral branch name
        id: sanitize-branch
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          SUFFIX="${RUN_ID}-${RUN_ATTEMPT}"
          FINAL="ci-neon-run-${SUFFIX}"
          echo "Using owned ephemeral branch name: $FINAL"
          echo "name=$FINAL" >> "$GITHUB_OUTPUT"
      - name: Create or reuse Neon branch (with retry)
        id: create-branch
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ steps.sanitize-branch.outputs.name }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_in_hours: '2'
      - name: Finalize Neon DB URLs
        id: finalize-urls
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          CONNECTION_FILE: ${{ steps.create-branch.outputs.connection_file }}
        run: |
          set -euo pipefail
          CONNECTION_FILE="${CONNECTION_FILE:-${RUNNER_TEMP:-/tmp}/neon-connection/connection.json}"
          if [ ! -f "$CONNECTION_FILE" ]; then
            echo "Neon connection file missing after branch create: $CONNECTION_FILE"
            echo "This indicates NEON_PROJECT_ID/NEON_API_KEY or the create-branch action is failing."
            exit 1
          fi
          if ! jq -e '
            (.db_url // "" | length > 0) and
            (.db_url_pooled // "" | length > 0)
          ' "$CONNECTION_FILE" >/dev/null; then
            echo "Neon connection file is missing db_url/db_url_pooled."
            exit 1
          fi
          # Intentionally do NOT expose DB_URL via job outputs.
          # GitHub will drop outputs that look like secrets, which breaks downstream jobs.
          echo "Neon DB URL resolved for this job (file-backed)."

      - name: Prepare shared Neon admission probe
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify shared Neon branch admission before publish
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          CONNECTION_FILE: ${{ steps.create-branch.outputs.connection_file }}
          GITHUB_TOKEN: ${{ github.token }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          PROTECTED_BRANCHES: main,development,preview,br-main,br-production
        run: bash scripts/ci/verify-neon-branch-admission.sh

      - name: Persist Neon DB connection artifact
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          BRANCH_NAME: ${{ steps.sanitize-branch.outputs.name }}
          CONNECTION_FILE: ${{ steps.create-branch.outputs.connection_file }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/neon-db-artifact
          # Prefer the file written by neon-create-branch-with-retry (avoids
          # re-interpolating DB passwords through GitHub expression expansion).
          if [ -n "${CONNECTION_FILE:-}" ] && [ -f "$CONNECTION_FILE" ]; then
            cp "$CONNECTION_FILE" /tmp/neon-db-artifact/connection.json
          elif [ -f "${RUNNER_TEMP:-/tmp}/neon-connection/connection.json" ]; then
            cp "${RUNNER_TEMP:-/tmp}/neon-connection/connection.json" /tmp/neon-db-artifact/connection.json
          else
            echo "Neon connection file missing; cannot persist artifact."
            exit 1
          fi
          # Ensure branch_name is present for downstream diagnostics.
          if [ -n "${BRANCH_NAME:-}" ]; then
            jq --arg branch_name "$BRANCH_NAME" '.branch_name = $branch_name' \
              /tmp/neon-db-artifact/connection.json > /tmp/neon-db-artifact/connection.json.tmp
            mv /tmp/neon-db-artifact/connection.json.tmp /tmp/neon-db-artifact/connection.json
          fi
          # Fail closed if password is missing from the artifact URL.
          if ! jq -e '
            (.db_url // "" | test("^postgres(ql)?://[^:]+:[^@]+@")) and
            (.db_url_pooled // "" | test("^postgres(ql)?://[^:]+:[^@]+@"))
          ' /tmp/neon-db-artifact/connection.json >/dev/null; then
            echo "Neon connection artifact is missing username/password credentials."
            exit 1
          fi

      - name: Upload Neon DB connection artifact
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/neon-db-artifact/connection.json
          retention-days: 1

  drizzle-migration-guard:
    name: Migration Guard
    needs: [ci-path-changes]
    # Skip if 'skip-migration-guard' label is present (for schema consolidation)
    if: ${{ needs.ci-path-changes.result == 'success' && (github.event_name == 'merge_group' || github.event_name == 'push' || (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-migration-guard'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      # Skip notification (updated condition)
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping migration guard as no DB/schema paths were changed."
          exit 0
      - name: Run Migration Guard
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          # Make script executable
          chmod +x apps/web/scripts/check-migrations.sh
          chmod +x apps/web/scripts/validate-migrations.sh

          # Run migration guard and validation from apps/web directory
          cd apps/web

          ./scripts/check-migrations.sh
          ./scripts/validate-migrations.sh
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}

  ci-drizzle-check:
    name: Drizzle Check
    needs: [neon-db, ci-path-changes]
    # Deep evidence only. Merge-group migration policy is covered by Migration Guard.
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping Drizzle check as no DB/schema paths were changed."
          echo "Deep evidence runs through an explicit workflow dispatch."
          exit 0

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-drizzle-neon-db-url
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-drizzle-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run Drizzle check against staging/production DBs."
            exit 1
          fi

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Drizzle Check
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:check

  ci-integration-ready:
    name: Integration Fast
    # Lightweight gate for integration/* PRs (agent batch lanes). Full CI runs on train PRs to main.
    needs: [ci-path-changes, ci-risk-classifier, ci-build-public]
    if: ${{ needs.ci-path-changes.result == 'success' && (always() && github.event_name == 'pull_request' && startsWith(github.event.pull_request.base.ref, 'integration/')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate integration fast checks
        run: |
          BUILD_RESULT="${{ needs.ci-build-public.result }}"
          RISK_RESULT="${{ needs.ci-risk-classifier.result }}"
          echo "ci-build-public: $BUILD_RESULT"
          echo "ci-risk-classifier: $RISK_RESULT"
          if [[ "$RISK_RESULT" != "success" ]]; then
            echo "Integration fast lane failed: risk classifier"
            exit 1
          fi
          if [[ "$BUILD_RESULT" != "success" && "$BUILD_RESULT" != "skipped" ]]; then
            echo "Integration fast lane failed: build"
            exit 1
          fi
          echo "Integration fast lane passed"

  # Queue and admin-fallback integration evidence stays in one hosted
  # workspace. No Actions artifact upload/download sits on the critical path.
  ci-build-layout:
    name: Build + Layout (combined)
    needs: [ci-path-changes, ci-merge-group-admission]
    if: >-
      always() &&
      needs.ci-path-changes.result == 'success' &&
      (
        github.event_name != 'merge_group' ||
        needs.ci-merge-group-admission.result == 'success'
      ) &&
      (
        github.event_name == 'merge_group' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright
      - name: Build exact combined head
        run: pnpm turbo build --filter=@jovie/web
        env:
          # Merge-group code is PR-controlled. This deterministic mock key is
          # intentionally public and keeps the combined lane secret-free.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZHVtbXktdGVzdC1jb3ZlcmFnZS5jbGVyay5hY2NvdW50cy5kZXYk
          NEXT_PUBLIC_APP_URL: http://localhost:3230
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3230
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
      - name: Verify combined build output
        run: |
          set -euo pipefail
          for required in \
            apps/web/.next/BUILD_ID \
            apps/web/.next/standalone/apps/web/server.js \
            apps/web/.next/standalone/apps/web/.next/BUILD_ID; do
            test -f "$required" || {
              echo "::error::Combined build output missing $required"
              exit 1
            }
          done
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public
      - name: Run deterministic layout behavior guard
        run: |
          set -euo pipefail
          cd apps/web
          mapfile -t LAYOUT_GUARD_SPECS < <(node ../../.github/scripts/layout-guard-manifest.mjs)
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          export HOSTNAME=localhost
          export NEXT_PUBLIC_APP_URL=http://localhost:3230

          PORT=3230 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || {
              echo "::error::Combined-head standalone server died"
              exit 1
            }
            if curl -sf http://localhost:3230 >/dev/null 2>&1; then
              node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- \
                pnpm exec playwright test "${LAYOUT_GUARD_SPECS[@]}" \
                  --config=playwright.config.noauth.ts --project=chromium --reporter=line
              exit 0
            fi
            sleep 1
          done
          echo "::error::Combined-head standalone server failed to start"
          exit 1
        env:
          BASE_URL: http://localhost:3230
          SMOKE_ONLY: '1'
          CI: true
          HUD_KIOSK_TOKEN: layout-guard-ci
          HUD_AGENT_RUNS_FIXTURES: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZHVtbXktdGVzdC1jb3ZlcmFnZS5jbGVyay5hY2NvdW50cy5kZXYk
      - name: Upload combined layout failure evidence
        if: ${{ failure() && hashFiles('apps/web/test-results/**') != '' }}
        continue-on-error: true
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: combined-layout-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/test-results/
          retention-days: 3

  # Full Xcode work belongs on the synthetic combined head, never the source
  # PR. The same reusable lane is the fail-closed fallback for direct/admin
  # main commits that touch iOS.
  ci-ios:
    name: iOS Build + Test (combined)
    needs: [ci-path-changes, ci-merge-group-admission]
    if: >-
      always() &&
      needs.ci-path-changes.result == 'success' &&
      (
        github.event_name != 'merge_group' ||
        needs.ci-merge-group-admission.result == 'success'
      ) &&
      needs.ci-path-changes.outputs.run_ios == 'true' &&
      (
        github.event_name == 'merge_group' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    uses: ./.github/workflows/ios-ci.yml

  ci-build-public:
    name: Build (public routes)
    needs: [ci-path-changes, ci-risk-classifier]
    # Shared Next.js build for a11y + layout-guard — build once, test twice.
    # Manual deep evidence only. Automatic source PRs and merge groups use the
    # dedicated combined Build + Layout workspace instead.
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    # Deep review evidence uses hosted capacity and cannot consume fixed unit slots.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact_required: ${{ steps.check_changes.outputs.run_full_ci }}
      # Consumers may start only after actions/upload-artifact completed. Build
      # selection alone is not proof that the artifact exists.
      has_artifact: ${{ steps.publish_artifact.outputs.has_artifact || 'false' }}
    steps:
      - name: Reset workspace git state (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .git ]]; then exit 0; fi
          git sparse-checkout disable 2>/dev/null || true
          git config --local --unset-all core.sparseCheckout 2>/dev/null || true
          git config --local --unset-all core.sparseCheckoutCone 2>/dev/null || true
          rm -f .git/info/sparse-checkout
          git config --local --unset-all extensions.partialClone 2>/dev/null || true
          git config --local --unset-all remote.origin.promisorRemote 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          clean: true

      - name: Materialize full tree (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          git sparse-checkout disable 2>/dev/null || true
          git reset --hard HEAD
          git checkout-index -a -f

      - name: Verify checkout sentinel
        shell: bash
        run: |
          set -euo pipefail
          sentinel=".github/actions/setup-node-pnpm/action.yml"
          if [[ ! -f "$sentinel" ]]; then
            echo "::error::Incomplete checkout — missing ${sentinel}"
            exit 1
          fi

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          # Run when UI/component paths, public QA inputs, or risk-triggered smoke changed.
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_PUBLIC_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_public_lighthouse }}"
          REQUIRES_SMOKE="${{ needs.ci-risk-classifier.outputs.requires_smoke }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_PUBLIC_LIGHTHOUSE" == "true" || "$REQUIRES_SMOKE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: echo "Skipping build — no UI-relevant paths changed."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Build app (public routes only — no secrets needed)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo build --filter=@jovie/web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3100
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3100
          # This shared artifact feeds bypass-based smoke/mobile evidence. The
          # real-Clerk golden path builds its own artifact below so these public
          # compile-time flags cannot leak into that lane.
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Verify build output exists
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          # Fail closed on a partial tree: remote-cache hits or tar truncation can
          # leave apps/web/.next present without the files lanes actually run.
          for required in \
            apps/web/.next/BUILD_ID \
            apps/web/.next/standalone/apps/web/server.js \
            apps/web/.next/standalone/apps/web/.next/BUILD_ID; do
            if [ ! -f "$required" ]; then
              echo "::error::Build output missing $required — build may have used remote cache without producing local output"
              exit 1
            fi
          done
          echo "Build output verified: $(du -sh apps/web/.next | cut -f1)"

      - name: Package build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -cf "${{ runner.temp }}/nextjs-build.tar" -C apps/web .next

      - name: Upload build artifact
        id: upload_artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        # Keep the producer build result independent from artifact transport so
        # main staging can proceed. The post-upload readiness output below is
        # the only signal consumers trust, and merge-group PR Ready fails closed
        # when a selected artifact was not published.
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build.tar
          retention-days: 1
          if-no-files-found: error

      - name: Publish build artifact readiness
        id: publish_artifact
        if: ${{ steps.check_changes.outputs.run_full_ci == 'true' && steps.upload_artifact.outcome == 'success' }}
        run: echo "has_artifact=true" >> "$GITHUB_OUTPUT"

  ci-layout-guard:
    name: Layout Guard
    needs: [ci-path-changes, ci-build-public]
    # Manual hosted evidence using the shared deep-lane build artifact.
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    steps:
      - name: Reset workspace git state (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .git ]]; then exit 0; fi
          git sparse-checkout disable 2>/dev/null || true
          git config --local --unset-all core.sparseCheckout 2>/dev/null || true
          git config --local --unset-all core.sparseCheckoutCone 2>/dev/null || true
          rm -f .git/info/sparse-checkout
          git config --local --unset-all extensions.partialClone 2>/dev/null || true
          git config --local --unset-all remote.origin.promisorRemote 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          clean: true
          persist-credentials: false

      - name: Materialize full tree (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          git sparse-checkout disable 2>/dev/null || true
          git reset --hard HEAD
          git checkout-index -a -f

      - name: Verify checkout sentinel
        shell: bash
        run: |
          set -euo pipefail
          sentinel=".github/actions/setup-node-pnpm/action.yml"
          if [[ ! -f "$sentinel" ]]; then
            echo "::error::Incomplete checkout — missing ${sentinel}"
            exit 1
          fi

      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download

      - name: Extract build artifact
        if: steps.download.outcome == 'success'
        run: tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web

      - name: Run deterministic layout behavior guard
        if: steps.download.outcome == 'success'
        run: |
          set -euo pipefail
          cd apps/web

          LAYOUT_GUARD_MANIFEST=$(node ../../.github/scripts/layout-guard-manifest.mjs)
          mapfile -t LAYOUT_GUARD_SPECS <<< "$LAYOUT_GUARD_MANIFEST"

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "::error::Layout Guard standalone server entrypoint is missing."
            exit 1
          fi

          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          export HOSTNAME=localhost
          export NEXT_PUBLIC_APP_URL=http://localhost:3230

          PORT=3230 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          SERVER_READY=false
          for attempt in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf http://localhost:3230 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            echo "Waiting for Layout Guard standalone server ($attempt/30)..."
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Layout Guard standalone server failed to start within 30s."
            exit 1
          fi

          node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm exec playwright test "${LAYOUT_GUARD_SPECS[@]}" --config=playwright.config.noauth.ts --project=chromium --reporter=line
        env:
          BASE_URL: http://localhost:3230
          SMOKE_ONLY: '1'
          CI: true
          HUD_KIOSK_TOKEN: layout-guard-ci
          HUD_AGENT_RUNS_FIXTURES: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Upload Playwright Report on Failure
        if: ${{ failure() && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: layout-guard-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/test-results/
          retention-days: 3

  ci-mobile-overflow:
    name: Mobile Overflow Guard (${{ matrix.width }}px)
    needs: [ci-path-changes, neon-db, ci-build-public]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    strategy:
      fail-fast: false
      # The expanded runner pool supports two widths while the third remains
      # bounded; non-320 widths already wait for the shared seed explicitly.
      max-parallel: 2
      matrix:
        width: [320, 390, 430]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run static mobile overflow guard
        run: pnpm --filter=@jovie/web run mobile-overflow:guard

      - name: Download Neon DB connection artifact
        # Reuse the shared ephemeral branch from neon-db instead of DATABASE_URL_MAIN.
        # Screenshot/UI-only PRs still need seeded profile fixtures for Playwright.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        # Use only the ephemeral branch credentials from the neon-db artifact.
        # Injecting DATABASE_URL_MAIN passwords onto an ephemeral host causes
        # password-auth retry storms during migrate/seed and SSR profile reads.
        id: resolve-mobile-overflow-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url

      - name: Export DATABASE_URL (ephemeral branch)
        run: echo "DATABASE_URL=${{ steps.resolve-mobile-overflow-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (Mobile Overflow)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run mobile overflow against staging/production DBs."
            exit 1
          fi

      - name: Verify Neon DB connectivity (fail-fast)
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        # 320px matrix shard owns migrate/seed so 390/430 siblings reuse one Neon branch.
        if: matrix.width == 320
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed mobile overflow fixtures
        if: matrix.width == 320
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Wait for shared Neon seed (mobile overflow width > 320)
        if: matrix.width != 320
        run: |
          echo "Waiting for 320px shard migrate/seed on shared Neon branch..."
          for attempt in $(seq 1 60); do
            if pnpm --filter=@jovie/web exec tsx tests/wait-for-public-qa-seed.ts; then
              echo "Shared Neon seed ready"
              exit 0
            fi
            echo "Attempt ${attempt}/60: seed markers not ready yet"
            sleep 5
          done
          echo "Timed out waiting for 320px shard seed on shared Neon branch"
          exit 1
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download

      - name: Extract build artifact
        if: steps.download-build.outcome == 'success'
        run: tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web

      - name: Build app fallback
        if: steps.download-build.outcome != 'success'
        # Do not accept a remote artifact from the shared mock build. The
        # real-Clerk lane has a different compile-time auth contract.
        run: pnpm turbo build --filter=@jovie/web --force
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run mobile overflow Playwright guard
        run: |
          cd apps/web

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "Standalone server not found - mobile overflow guard cannot start."
            exit 1
          fi

          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          # Export before server start so the production-built standalone process
          # inherits test-auth gates (step env alone is not enough if a wrapper
          # strips process.env for the backgrounded Node child on some runners).
          # HOSTNAME=localhost: GHA sets HOSTNAME to the runner machine name;
          # Next standalone uses it for URL construction, which fails the
          # test-auth trusted-host gate unless Host header is honored.
          export VERCEL_ENV=development
          export E2E_USE_TEST_AUTH_BYPASS=1
          export E2E_TEST_AUTH_PERSONA=creator-ready
          export NEXT_PUBLIC_E2E_MODE=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          export HOSTNAME=localhost

          OVERFLOW_PORT=$((3210 + ${{ strategy.job-index }}))
          # Pin app/auth URLs to this shard's isolated port — the shared build
          # artifact bakes localhost:3100, which no longer matches this lane.
          export NEXT_PUBLIC_APP_URL="http://localhost:$OVERFLOW_PORT"
          export BETTER_AUTH_URL="http://localhost:$OVERFLOW_PORT"
          export NEXT_PUBLIC_BETTER_AUTH_URL="http://localhost:$OVERFLOW_PORT"
          PORT="$OVERFLOW_PORT" node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          SERVER_READY=false
          for attempt in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf "http://localhost:$OVERFLOW_PORT" > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            echo "Waiting for standalone server ($attempt/30)..."
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Standalone server failed to start within 30s."
            exit 1
          fi

          # The lane uses the deterministic test-auth bypass, so use the
          # no-auth config and avoid its unrelated legacy Clerk setup project.
          BASE_URL="http://localhost:$OVERFLOW_PORT" node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm exec playwright test tests/e2e/mobile-overflow.spec.ts --config=playwright.config.noauth.ts --project=chromium --reporter=line
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          # Match ci-e2e-smoke: standalone is production-built; VERCEL_ENV=development
          # unlocks isExplicitDevelopmentEnvironment + test-auth enter on loopback.
          VERCEL_ENV: development
          CI: true
          E2E_SKIP_WEB_SERVER: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          URL_ENCRYPTION_KEY: mobile-overflow-ci-url-encryption-key
          AI_GATEWAY_API_KEY: mobile-overflow-ci
          MOBILE_OVERFLOW_WIDTHS: ${{ matrix.width }}
          MOBILE_OVERFLOW_PUBLIC_WIDTHS: ${{ matrix.width }}
          MOBILE_OVERFLOW_FOCUS_LIMIT: '8'
          # Each matrix shard owns one mobile width. Keep navigation serialized
          # so user-state transitions are deterministic.
          PLAYWRIGHT_WORKERS: '1'

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: mobile-overflow-report-${{ matrix.width }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
          retention-days: 3

  ci-lighthouse-pr:
    name: Lighthouse (public routes manual)
    needs: [ci-build-public, ci-path-changes, neon-db]
    # Manual hosted evidence only; never starts from a source PR event.
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true', PLAYWRIGHT_ARTIFACT_ALLOW_IMAGES: 'true' }
    strategy:
      fail-fast: false
      # Four isolated hosted servers keep the public route set below the
      # long-process exhaustion horizon observed after eight sequential URLs.
      max-parallel: 4
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download Neon DB connection artifact
        # Reuse the shared ephemeral branch from neon-db instead of DATABASE_URL_MAIN.
        # Screenshot/UI-only PRs still need seeded profile fixtures for shard-0 Playwright.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        # Prefer ephemeral branch host from neon-db artifact. credential_source
        # only fills missing username/password components (Neon project roles
        # share passwords) — it never rewrites the ephemeral host. This recovers
        # when GITHUB_OUTPUT/artifact handoff strips credentials.
        id: resolve-lighthouse-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (ephemeral branch)
        run: echo "DATABASE_URL=${{ steps.resolve-lighthouse-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (Lighthouse)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run public Lighthouse against staging/production DBs."
            exit 1
          fi

      - name: Verify Neon DB connectivity (fail-fast)
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        # Shard 0 owns migrate/seed so matrix siblings reuse one Neon branch.
        if: matrix.shard == 0
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: matrix.shard == 0
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Wait for shared Neon seed (lighthouse shard > 0)
        if: matrix.shard != 0
        run: |
          echo "Waiting for shard 0 migrate/seed on shared Neon branch..."
          for attempt in $(seq 1 60); do
            if pnpm --filter=@jovie/web exec tsx tests/wait-for-public-qa-seed.ts; then
              echo "Shared Neon seed ready"
              exit 0
            fi
            echo "Attempt ${attempt}/60: seed markers not ready yet"
            sleep 5
          done
          echo "Timed out waiting for shard 0 seed on shared Neon branch"
          exit 1
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Download build artifact
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download

      - name: Extract build artifact
        if: steps.download-build.outcome == 'success'
        run: tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web

      - name: Build app fallback for public Lighthouse
        if: steps.download-build.outcome != 'success'
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          SKIP_SKILLS_CATALOG_SYNC: '1'

      - name: Pin Chrome for Lighthouse CI
        # chrome-launcher only discovers system Chrome via PATH/CHROME_PATH, and
        # ephemeral runners vary in what they ship. Point lhci at the baked
        # Playwright Chromium so runs don't flake on runner image drift. If no
        # candidate matches, leave CHROME_PATH unset (never export a literal
        # unmatched glob) and let chrome-launcher fall back to system Chrome.
        run: |
          CHROME_BIN=""
          for root in "${PLAYWRIGHT_BROWSERS_PATH:-}" /opt/ms-playwright "$HOME/.cache/ms-playwright"; do
            [ -n "$root" ] || continue
            CHROME_BIN="$(find "$root" -maxdepth 3 -type f -path '*/chrome-linux*/chrome' 2>/dev/null | head -1 || true)"
            [ -n "$CHROME_BIN" ] && break
          done
          if [ -n "$CHROME_BIN" ]; then
            echo "CHROME_PATH=$CHROME_BIN" >> "$GITHUB_ENV"
          else
            echo "No Playwright Chromium found; leaving CHROME_PATH unset for chrome-launcher fallback."
          fi

      - name: Run Lighthouse CI (public launch thresholds)
        run: |
          cd apps/web
          cleanup() {
            kill $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          # GHA sets HOSTNAME to the runner name. Next standalone otherwise uses
          # its 0.0.0.0 bind address for absolute redirects, which turns a
          # same-origin Lighthouse request into cross-origin CORS/HTTP noise.
          export HOSTNAME=localhost
          export NEXT_PUBLIC_APP_URL=http://localhost:3000
          export BETTER_AUTH_URL=http://localhost:3000
          export NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3000

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "Standalone server not found - public Lighthouse cannot start."
            exit 1
          fi

          PORT=3000 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:public:launch

          # Pin the extra mobile-viewport-stability Playwright spec to one shard
          # so the evidence remains single-owned while the route audits stay
          # isolated across four short-lived hosted servers.
          if [ "${{ matrix.shard }}" = "1" ]; then
            mkdir -p tests/.auth
            echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
            node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm exec playwright test tests/e2e/profile-mobile-viewport-stability.spec.ts --config=playwright.config.noauth.ts --project=chromium --reporter=line
          fi
        env:
          CI: true
          BASE_URL: http://localhost:3000
          PUBLIC_LIGHTHOUSE_SHARD_INDEX: ${{ matrix.shard }}
          PUBLIC_LIGHTHOUSE_TOTAL_SHARDS: '4'
          PROFILE_MOBILE_PERF_BUDGETS: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PUBLIC_NOAUTH_SMOKE: '1'
          URL_ENCRYPTION_KEY: lighthouse-public-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-public-ci

      - name: Upload public Lighthouse mobile artifacts on failure
        if: ${{ failure() && matrix.shard == 1 && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: public-lighthouse-mobile-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
          allow-images: 'true'
          retention-days: 3

  ci-lighthouse-dashboard-pr:
    name: Lighthouse (dashboard manual)
    needs: [ci-path-changes, neon-db, ci-build-public]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: neon-endpoint-pool-ci-lighthouse-dashboard-pr-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_DASHBOARD_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_dashboard_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_DASHBOARD_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: echo "Skipping dashboard Lighthouse — no dashboard-relevant paths changed."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: dashboard-lighthouse-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-dashboard-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-dashboard-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Download build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.download-build.outcome == 'success'
        run: tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web

      - name: Build app fallback for dashboard Lighthouse
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.download-build.outcome != 'success'
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          SKIP_SKILLS_CATALOG_SYNC: '1'

      - name: Run authenticated dashboard Lighthouse
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          if [ -z "$E2E_CLERK_USER_ID" ]; then
            echo "E2E_CLERK_USER_ID not set — skipping dashboard Lighthouse."
            exit 0
          fi

          export E2E_USE_TEST_AUTH_BYPASS=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "Standalone server not found — dashboard Lighthouse cannot start."
            exit 1
          fi

          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -s http://localhost:3000 > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:dashboard:pr
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          URL_ENCRYPTION_KEY: lighthouse-dashboard-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-dashboard-ci
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload dashboard Lighthouse artifacts
        if: always() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-dashboard-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/.lighthouseci/dashboard-pr/
          if-no-files-found: ignore
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

