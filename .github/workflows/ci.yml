        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          SKIP_SKILLS_CATALOG_SYNC: '1'

      - name: Run authenticated chat Lighthouse
        run: |
          cd apps/web

          if [ -z "$E2E_CLERK_USER_ID" ]; then
            echo "E2E_CLERK_USER_ID not set — skipping chat Lighthouse."
            exit 0
          fi

          export E2E_USE_TEST_AUTH_BYPASS=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "Standalone server not found — chat Lighthouse cannot start."
            exit 1
          fi

          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -s http://localhost:3000 > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:chat:pr
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          URL_ENCRYPTION_KEY: lighthouse-chat-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-chat-ci
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload chat Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-chat-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/.lighthouseci/chat-pr/
          if-no-files-found: ignore
          retention-days: 3

  ci-pr-neon-migrate:
    name: DB Migrate (manual deep lane)
    needs: [neon-db, ci-path-changes]
    # Only run when drizzle/schema paths changed — skip entirely otherwise to save runners
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-path-changes.outputs.run_drizzle == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping DB migrate check: no DB/schema/migration paths were changed."
          exit 0

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-pr-neon-db-url
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled

      - name: Export DATABASE_URL (ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-pr-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (PR migrate)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run PR migrate against staging/production DBs."
            exit 1
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Verify Neon DB connectivity (fail-fast)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: manual-${{ github.run_id }}
          ALLOW_PROD_MIGRATIONS: 'true'

  # Post-deploy smoke test -- deterministic curl checks against production.
  # Replaces the previous Playwright-based test that was flaky due to
  # dynamic content assertions, hydration timing, and excessive retries.

  ci-unit-tests:
    name: Unit Tests (${{ matrix.shard }})
    needs: [ci-path-changes, ci-merge-group-admission]
    # Runs five shards on every merge-group combined head and direct-main
    # fallback. The merge-group command remains --affected, but the matrix may
    # never turn into a skipped placeholder. Source PRs defer unit evidence to
    # the combined queue head.
    if: >-
      always() &&
      needs.ci-path-changes.result == 'success' &&
      (
        github.event_name != 'merge_group' ||
        needs.ci-merge-group-admission.result == 'success'
      ) &&
      (
        github.event_name == 'merge_group' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      )
    # Phase 0: quarantine generic fixed-runner routing until all five named
    # services have immutable warm-canary receipts. Combined heads use explicit
    # hosted capacity, so this change's own merge group gets the safe fast path.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      # Hosted capacity runs all five logical shards without consuming Gem.
      max-parallel: 5
      matrix:
        shard: ['1/5', '2/5', '3/5', '4/5', '5/5']
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      # Fixed self-hosted runners reuse one workspace across PRs. Stale sparse-checkout
      # / dirty trees leave .github/actions/* missing and fail composite action load
      # ("Can't find action.yml under setup-node-pnpm") before any tests run.
      - name: Reset workspace git state (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .git ]]; then exit 0; fi
          git sparse-checkout disable 2>/dev/null || true
          git config --local --unset-all core.sparseCheckout 2>/dev/null || true
          git config --local --unset-all core.sparseCheckoutCone 2>/dev/null || true
          rm -f .git/info/sparse-checkout
          git config --local --unset-all extensions.partialClone 2>/dev/null || true
          git config --local --unset-all remote.origin.promisorRemote 2>/dev/null || true
          # Clear dirty tracked/untracked leftovers so checkout clean does not skip
          # paths ("not uptodate; will not remove from working tree").
          git reset --hard HEAD 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Full history for vitest --changed (names via commit graph)
          filter: blob:none # historical blobs lazy-fetch; saves ~30s × 5 shards/run
          clean: true

      - name: Materialize full tree (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          git sparse-checkout disable 2>/dev/null || true
          git reset --hard HEAD
          git checkout-index -a -f

      - name: Verify checkout sentinel
        shell: bash
        run: |
          set -euo pipefail
          sentinel=".github/actions/setup-node-pnpm/action.yml"
          if [[ ! -f "$sentinel" ]]; then
            echo "::error::Incomplete checkout — missing ${sentinel}"
            exit 1
          fi

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=true" >> "$GITHUB_OUTPUT"

      # Skip remaining steps if no relevant changes
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping unit tests as no critical paths were changed."
          exit 0

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Playwright warm path
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Load quarantined unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: quarantine
        run: node .github/scripts/quarantine-ledger.mjs emit-github-output

      - name: Run unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        env:
          TURBO_SCM_HEAD: ${{ github.sha }}
          TURBO_SCM_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || ((github.base_ref && format('origin/{0}', github.base_ref)) || '') }}
        run: |
          # Each ephemeral runner has 2 CPUs. Match Vitest forks to that quota so
          # two five-shard PR cohorts use 20 workers across 20 allocated CPUs
          # instead of oversubscribing the shared Docker/NVMe host with 30.
          export NODE_OPTIONS="--max-old-space-size=3072"
          VITEST_CI_FLAGS="--pool=forks --maxWorkers=2"
          # Retry budget comes from apps/web/tests/quarantine.json
          RETRY_FLAG="--retry=${{ steps.quarantine.outputs.unit_default_retries }}"
          # Use shard-specific output file so Codecov Test Analytics receives all 10 shards
          # (a shared filename causes only the last upload to be recorded)
          # Note: vitest runs from apps/web/, so path is relative to that directory
          SHARD_SLUG="${{ matrix.shard }}"
          SHARD_SLUG="${SHARD_SLUG//\//-}"
          OUTPUT_FLAG="--outputFile=test-report.${SHARD_SLUG}.junit.xml"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "main: Running web unit suite through Turbo without coverage; nightly coverage audit uploads Codecov coverage"
            pnpm turbo test:fast --filter=@jovie/web -- $VITEST_CI_FLAGS $RETRY_FLAG --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} $OUTPUT_FLAG
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "🔍 Merge group: Running affected test suite"
            # Run affected tests against the merge-group base SHA.
            pnpm turbo test:fast --affected -- $VITEST_CI_FLAGS $RETRY_FLAG --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} $OUTPUT_FLAG
          else
            echo "🔍 Manual dispatch: Running critical + interaction tests (no base_ref available)"
            # Non-main manual dispatches have no base_ref. Run the critical and
            # interaction suites; main dispatches take the full-suite branch above.
            # --passWithNoTests: some shards may have no files matching the filter
            pnpm turbo test:fast --affected -- $VITEST_CI_FLAGS $RETRY_FLAG --passWithNoTests --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} "critical|interaction" $OUTPUT_FLAG
          fi
      - name: Run quarantined unit tests (retries)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.has_unit == 'true'
        continue-on-error: true
        env:
          TURBO_SCM_HEAD: ${{ github.sha }}
          TURBO_SCM_BASE: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || ((github.base_ref && format('origin/{0}', github.base_ref)) || '') }}
        run: pnpm turbo test:fast --affected -- --pool=forks --maxWorkers=2 --retry=${{ steps.quarantine.outputs.quarantine_unit_retries }} ${{ steps.quarantine.outputs.unit_files }}

      - name: Run packages/ui unit tests
        # This suite is not sharded; running it in every web-test shard was
        # identical duplicate work. Keep it in the existing required matrix.
        if: steps.check_changes.outputs.run_full_ci == 'true' && matrix.shard == '1/5'
        run: pnpm turbo test --filter=@jovie/ui

      - name: Upload test results to Codecov
        # Queue evidence must not consume external service credentials.
        if: ${{ !cancelled() && github.event_name != 'merge_group' && steps.check_changes.outputs.run_full_ci == 'true' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/test-report.*.junit.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

  ci-a11y:
    name: A11y (axe)
    # Manual hosted axe-core WCAG 2.1 AA evidence using the shared build artifact.
    needs: [ci-build-public, ci-path-changes, neon-db]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true'
      PLAYWRIGHT_ARTIFACT_PATHS: apps/web/test-results/**/*.json
      PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/axe-a11y-results.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          # Align with ci-build-public so public QA config changes still run the blocking lane.
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_PUBLIC_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_public_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_PUBLIC_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping a11y audit — no UI-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Download Neon DB connection artifact
        # Reuse the shared ephemeral branch from neon-db instead of creating a
        # second branch (avoids duplicate Neon branches and flaky third-party
        # action downloads on this job).
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-a11y-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-a11y-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (A11y)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run a11y against staging/production DBs."
            exit 1
          fi

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number || github.run_id }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Run axe a11y audit (public routes)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          # Create empty auth state so Playwright's auth-setup project doesn't crash.
          # The axe audit only tests public routes (SMOKE_ONLY=1) so no real auth is needed.
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "Standalone server not found - public axe audit cannot start."
            exit 1
          fi

          # Keep absolute URLs on loopback (GHA HOSTNAME is the runner machine name).
          export HOSTNAME=localhost
          export NEXT_PUBLIC_APP_URL=http://localhost:3220

          PORT=3220 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          SERVER_READY=false
          for i in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf http://localhost:3220 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Standalone server failed to start within 30s."
            exit 1
          fi

          node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm exec playwright test tests/e2e/axe-audit.spec.ts --config=playwright.config.ts --project=chromium --reporter=line,json
        env:
          BASE_URL: http://localhost:3220
          SMOKE_ONLY: '1'
          CI: true
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          URL_ENCRYPTION_KEY: a11y-public-ci-url-encryption-key
          AI_GATEWAY_API_KEY: a11y-public-ci

      - name: Upload Playwright Report on Failure
        if: ${{ failure() && steps.check_changes.outputs.run_full_ci == 'true' && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: a11y-axe-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/test-results/**/*.json
          retention-days: 3

  # Authenticated a11y (JOV-4061): dashboard + chat axe suites that previously
  # lived only as dead local coverage. Path/event-gated and informational until
  # violations are burned down — does NOT fan into PR Ready.
  ci-a11y-authed:
    name: A11y (authenticated, informational)
    needs: [ci-build-public, ci-path-changes, neon-db]
    # Manual hosted evidence only (when the build artifact is present).
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection
        continue-on-error: true

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-a11y-authed-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

      - name: Export DATABASE_URL
        if: steps.resolve-a11y-authed-neon-db-url.outputs.database_url != ''
        run: echo "DATABASE_URL=${{ steps.resolve-a11y-authed-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Skip when Neon URL missing
        if: env.DATABASE_URL == ''
        run: |
          echo "No Neon DATABASE_URL — skipping authenticated a11y (informational)."
          exit 0

      - name: Setup Playwright (Chromium)
        if: env.DATABASE_URL != ''
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download
        if: env.DATABASE_URL != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download
        continue-on-error: true

      - name: Extract or rebuild
        if: env.DATABASE_URL != ''
        run: |
          if [ -f "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" ]; then
            tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web
          else
            pnpm turbo build --filter=@jovie/web
          fi
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run migrations + seed
        if: env.DATABASE_URL != ''
        run: |
          pnpm --filter=@jovie/web run drizzle:migrate:ci
          pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: a11y-authed-${{ github.run_id }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Run authenticated a11y specs
        id: a11y-authed
        if: env.DATABASE_URL != ''
        run: |
          cd apps/web
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json

          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "::error::Standalone server not found for authenticated a11y."
            exit 1
          fi

          # Same server-side env export as mobile-overflow / e2e-smoke so
          # test-auth enter is available on the production-built standalone.
          export VERCEL_ENV=development
          export E2E_USE_TEST_AUTH_BYPASS=1
          export E2E_TEST_AUTH_PERSONA=creator-ready
          export NEXT_PUBLIC_E2E_MODE=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          export HOSTNAME=localhost

          PORT=3270 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf http://localhost:3270 > /dev/null 2>&1; then break; fi
            sleep 1
          done

          node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm exec playwright test \
            tests/e2e/a11y.spec.ts \
            tests/e2e/chat-axe.spec.ts \
            --config=playwright.config.ts --project=chromium
        env:
          BASE_URL: http://localhost:3270
          CI: true
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          # Match ci-e2e-smoke standalone auth env (see mobile-overflow).
          VERCEL_ENV: development
          E2E_SKIP_WEB_SERVER: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          URL_ENCRYPTION_KEY: a11y-authed-ci-url-encryption-key
          AI_GATEWAY_API_KEY: a11y-authed-ci

      - name: Upload Playwright Report on Failure
        if: ${{ failure() && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: a11y-authed-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
          retention-days: 7
          if-no-files-found: error

  ci-e2e-smoke:
    name: E2E Smoke (manual)
    environment: Preview – jovie
    # Manual hosted evidence only; never a source-PR event.
    # The shared manual Neon producer is mandatory; no fallback branch can race it.
    needs: [ci-path-changes, ci-risk-classifier, ci-build-public, neon-db]
    if: ${{ always() && needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' && needs.neon-db.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    concurrency:
      group: neon-endpoint-pool-ci-e2e-smoke-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_e2e }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping E2E smoke; no E2E-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result == 'success'
        id: resolve-e2e-smoke-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled

      - name: Export DATABASE_URL (shared ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result == 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-e2e-smoke-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: manual-${{ github.run_id }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web

      - name: Materialize standalone assets (manual smoke)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          # Tarred .next artifacts can omit sibling paths the standalone server needs at runtime.
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public

      - name: Run E2E Smoke (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "::error::Standalone server not found — ci-build-public artifact is required for manual smoke"
            exit 1
          fi

          # Standalone production server (not next dev --webpack) to avoid CI OOM/timeouts.
          # Keep env aligned with the post-merge smoke lane (ci-e2e-tests) so manifest
          # specs behave the same against the shared ci-build-public artifact.
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          export NODE_ENV=test
          export CI=true
          export SMOKE_ONLY=1
          export SENTRY_E2E_REPORTING=1
          export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
          export SENTRY_ENVIRONMENT=ci-manual-e2e
          export SENTRY_RELEASE="${{ github.sha }}"
          export E2E_USE_TEST_AUTH_BYPASS=1
          export VERCEL_ENV=development
          export E2E_TEST_AUTH_PERSONA=creator-ready
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          export NEXT_PUBLIC_TURNSTILE_SITE_KEY="1x00000000000000000000AA"
          export TURNSTILE_SECRET_KEY="1x0000000000000000000000000000000AA"
          export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
          export NEXT_PUBLIC_E2E_MODE=1
          export NEXT_DISABLE_TOOLBAR=1
          export CHAT_LLM_FAILURE_INJECTION=1
          export E2E_CLERK_USER_ID="${{ secrets.E2E_CLERK_USER_ID }}"
          export E2E_CLERK_USER_USERNAME="${{ secrets.E2E_CLERK_USER_USERNAME }}"
          export E2E_CLERK_USER_PASSWORD="${{ secrets.E2E_CLERK_USER_PASSWORD }}"
          export FLAGS_SECRET="${{ secrets.FLAGS_SECRET }}"
          export URL_ENCRYPTION_KEY="smoke-preview-url-encryption-key"
          export AI_GATEWAY_API_KEY="smoke-preview-ai-gateway-key"
          export E2E_SKIP_WARMUP=1
          export SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
          export UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}"
          export UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          # Arms the onboarding LLM-failure fallback spec; matches playwright.config.smoke.ts
          export CHAT_LLM_FAILURE_INJECTION=1
          # GHA sets HOSTNAME to the runner machine name; Next standalone uses it for
          # absolute URL construction and can rewrite redirects to 0.0.0.0 / non-loopback
          # hosts, which breaks claim flows and test-auth trusted-host checks.
          export HOSTNAME=localhost
          export NEXT_PUBLIC_APP_URL=http://localhost:3240
          export BETTER_AUTH_URL=http://localhost:3240
          export NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3240

          PORT=3240 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          SERVER_READY=false
          for i in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf http://localhost:3240 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Standalone server failed to start within 30s"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"
          CI=true BASE_URL=http://localhost:3240 node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm --filter=@jovie/web exec playwright test --config=playwright.config.smoke.ts --project=chromium --reporter=line
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          BETTER_AUTH_URL: http://localhost:3240
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3240
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() && steps.check_changes.outputs.run_full_ci == 'true' && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: e2e-smoke-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
          retention-days: 3

  ci-golden-path:
    name: Golden Path (manual)
    environment: Preview – jovie
    # Launch-gate job (JOV-3758): full signup -> onboarding -> music import -> live
    # public profile -> Stripe checkout journey against REAL Clerk + an ephemeral
    # Manual golden-path evidence uses the isolated Neon branch.
    # Unlike ci-e2e-smoke this must NOT set NEXT_PUBLIC_CLERK_MOCK or
    # E2E_USE_TEST_AUTH_BYPASS — those make golden-path.spec.ts self-skip.
    # Path-triggered (not always-on): the spec has a 600s timeout, so always-on would
    # blow the CI budget and churn the Clerk dev-instance 100-user cap.
    needs: [ci-path-changes, ci-risk-classifier, ci-build-public, neon-db]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && needs.ci-build-public.outputs.has_artifact == 'true' && needs.neon-db.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    # Scope pending replacement to one PR. GitHub replaces the older pending job in
    # a constant concurrency group even when cancel-in-progress is false, which can
    # cancel a required check before it obtains a runner. Golden-path cleanup only
    # removes users older than the job timeout, so separate PRs are safe to run.
    concurrency:
      group: neon-endpoint-pool-ci-golden-path-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        if: needs.neon-db.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        if: needs.neon-db.result == 'success'
        id: resolve-golden-path-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url

      - name: Export DATABASE_URL (shared ephemeral branch)
        if: needs.neon-db.result == 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-golden-path-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: needs.neon-db.result != 'success'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: golden-path-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production

      - name: Resolve DATABASE_URL (fallback Neon ephemeral)
        if: needs.neon-db.result != 'success'
        id: resolve-golden-path-fallback-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (fallback ephemeral branch)
        if: needs.neon-db.result != 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-golden-path-fallback-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (Golden Path)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run Golden Path against staging/production DBs."
            exit 1
          fi

      - name: Verify Neon DB connectivity (fail-fast)
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Build real-Clerk golden-path artifact
        # NEXT_PUBLIC_* values are compile-time inputs. Do not reuse the
        # bypass artifact consumed by smoke/mobile jobs.
        run: pnpm turbo build --filter=@jovie/web --force
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3250
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3250
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Materialize standalone assets (golden path)
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public

      - name: Run Golden Path (Chromium, Better Auth)
        run: |
          cd apps/web

          if [ ! -f .next/standalone/apps/web/server.js ] || [ ! -f .next/standalone/apps/web/.next/BUILD_ID ]; then
            echo "::error::Standalone server not found — ci-build-public artifact is required for the golden path"
            exit 1
          fi

          # Standalone production server (not next dev) to avoid CI OOM/timeouts.
          # Real Better Auth signup: no test-auth bypass is permitted here.
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          export NODE_ENV=test
          export CI=true
          export VERCEL_ENV=development
          # Enables Better Auth's deterministic OTP only for the golden path's
          # canonical +e2e test address; production hard-blocks this switch.
          export E2E_TEST_MODE=1
          # Makes the anonymous /start turn deterministic while preserving the
          # real session cookie, persistence, signup, claim, and activation path.
          export CHAT_LLM_FAILURE_INJECTION=1
          # The loopback-only server gate also requires this explicit flag before
          # it will bypass Turnstile for the first anonymous request.
          export PUBLIC_NOAUTH_SMOKE=1
          export NEXT_PUBLIC_APP_URL=http://localhost:3250
          export BETTER_AUTH_URL=http://localhost:3250
          export NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3250
          # GHA HOSTNAME is the runner machine name; pin loopback so BA redirects
          # and form origin checks stay on localhost:3250.
          export HOSTNAME=localhost
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
          export SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
          export FLAGS_SECRET="${{ secrets.FLAGS_SECRET }}"
          export SPOTIFY_CLIENT_ID="${{ secrets.SPOTIFY_CLIENT_ID }}"
          export SPOTIFY_CLIENT_SECRET="${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          export MUSICFETCH_API_TOKEN="${{ secrets.MUSICFETCH_API_TOKEN }}"
          # UPSTASH_REDIS_* MUST stay set in this lane: the anonymous onboarding
          # chat limiters are requireRedis and fail CLOSED (429) without Redis.
          # The loopback-IP shared-bucket OTP race is handled app-side instead —
          # deterministic +e2e test emails are exempt from the OTP send limit.
          export UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}"
          export UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"

          PORT=3250 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          SERVER_READY=false
          for i in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf http://localhost:3250 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Standalone server failed to start within 30s"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"
          BASE_URL=http://localhost:3250 E2E_SKIP_WEB_SERVER=1 node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm --filter @jovie/web run test:e2e:golden-path:ci
        env:
          # The runner also needs the database and deterministic E2E OTP flag.
          DATABASE_URL: ${{ env.DATABASE_URL }}
          E2E_TEST_MODE: '1'
          BETTER_AUTH_URL: http://localhost:3250
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3250
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          MUSICFETCH_API_TOKEN: ${{ secrets.MUSICFETCH_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: golden-path-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && needs.neon-db.result != 'success' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-admin-smoke:
    name: Admin E2E Smoke
    environment: Preview – jovie
    # Manual hosted evidence only (admin tests need auth credentials).
    # Removed push-to-main trigger — merge queue validates PRs before merge.
    needs: [ci-path-changes, neon-db, ci-build-public]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    concurrency:
      group: neon-endpoint-pool-ci-admin-smoke-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_e2e }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping admin smoke; no E2E-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: admin-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-admin-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-admin-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Load quarantined E2E specs
        id: quarantine
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          node .github/scripts/quarantine-ledger.mjs validate
          FILE="apps/web/tests/quarantine.json"
          QUARANTINED=()

          if [ -f "$FILE" ]; then
            mapfile -t QUARANTINED < <(jq -r '.entries[]? | select(.kind == "e2e") | .path' "$FILE")
          fi

          ADMIN_SPEC="apps/web/tests/e2e/dashboard-pages-health.spec.ts"

          for quarantined in "${QUARANTINED[@]}"; do
            if [[ "$quarantined" == "$ADMIN_SPEC" ]]; then
              echo "run_admin_smoke=false" >> "$GITHUB_OUTPUT"
              echo "Admin smoke spec is quarantined: $ADMIN_SPEC"
              exit 0
            fi
          done

          echo "run_admin_smoke=true" >> "$GITHUB_OUTPUT"

      - name: Run Admin Smoke Tests (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.run_admin_smoke == 'true'
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          CI: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_ADMIN_USERNAME: ${{ secrets.E2E_CLERK_ADMIN_USERNAME }}
          E2E_CLERK_ADMIN_PASSWORD: ${{ secrets.E2E_CLERK_ADMIN_PASSWORD }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        # dashboard-pages-health is temporarily quarantined in apps/web/tests/quarantine.json due to JOV-782 flakiness.
        run: node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/dashboard-pages-health.spec.ts --grep "Admin Pages Health Check" --project=chromium

      - name: Skip notification (quarantined)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.run_admin_smoke != 'true'
        run: echo "Skipping admin smoke; admin spec is quarantined."

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() && steps.check_changes.outputs.run_full_ci == 'true' && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: admin-smoke-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/test-results/
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-e2e-migrate:
    name: E2E DB Migrate
    environment: Preview – jovie
    needs: [ci-path-changes, ci-build-public, neon-db]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_e2e }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping E2E DB migrate as no critical paths were changed."
          echo "Deep evidence runs through an explicit workflow dispatch."
          exit 0

      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-e2e-migrate-neon-db-url
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-e2e-migrate-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (E2E)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run E2E against staging/production DBs."
            exit 1
          fi

      - name: Run migrations for E2E DB
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: ${{ github.ref_name }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed E2E DB
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}

  ci-e2e-tests:
    name: Full E2E (Preview)
    environment: Preview – jovie
    # Opt-in validation lane for risky PRs. Keep it off the main deploy critical path.
    needs: [ci-path-changes, ci-build-public, neon-db, ci-e2e-migrate]
    if: ${{ needs.ci-path-changes.result == 'success' && needs.ci-e2e-migrate.outputs.run_full_ci == 'true' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    strategy:
      fail-fast: true
      # Cap E2E shard concurrency (preview env + Playwright is heavy).
      max-parallel: 2
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Set shard env
        run: |
          echo "SHARD_TOTAL=4" >> "$GITHUB_ENV"
          echo "SHARD_INDEX=${{ matrix.shard }}" >> "$GITHUB_ENV"

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-e2e-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=${{ steps.resolve-e2e-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"
          echo "RESOLVED_DB_SOURCE=neon-artifact" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (E2E)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run E2E against staging/production DBs."
            exit 1
          fi

      - name: Setup Playwright (Chromium)
        if: ${{ (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        uses: ./.github/actions/setup-playwright

      - name: Load quarantined E2E specs
        if: ${{ (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        id: quarantine
        run: |
          node .github/scripts/quarantine-ledger.mjs validate
          FILE="apps/web/tests/quarantine.json"
          QUARANTINED=()

          if [ -f "$FILE" ]; then
            mapfile -t QUARANTINED < <(jq -r '.entries[]? | select(.kind == "e2e") | .path' "$FILE")
          fi

          mapfile -t ALL_SPECS < <(git ls-files "apps/web/tests/e2e/**/*.spec.ts" "apps/web/tests/smoke/**/*.spec.ts")

          ALLOWED_SPECS=()
          for spec in "${ALL_SPECS[@]}"; do
            skip=false
            for quarantined in "${QUARANTINED[@]}"; do
              if [[ "$spec" == "$quarantined" ]]; then
                skip=true
                break
              fi
            done
            if [[ "$skip" == "false" ]]; then
              ALLOWED_SPECS+=("$spec")
            fi
          done

          echo "allowed_specs=${ALLOWED_SPECS[*]}" >> "$GITHUB_OUTPUT"
          echo "quarantined_specs=${QUARANTINED[*]}" >> "$GITHUB_OUTPUT"

          if [ ${#QUARANTINED[@]} -gt 0 ]; then
            echo "has_quarantine=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_quarantine=false" >> "$GITHUB_OUTPUT"
          fi

      - name: E2E Smoke (PR to Preview)
        if: ${{ github.event_name == 'pull_request' && github.ref != 'refs/heads/production' && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          SMOKE_ONLY: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          VERCEL_ENV: development
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-pr-e2e
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        run: |
          if [ -z "${{ steps.quarantine.outputs.allowed_specs }}" ]; then
            echo "No non-quarantined E2E specs to run."
            exit 0
          fi
          # Chrome-only for PRs - faster feedback, Firefox runs on main only.
          # `e2e:smoke:tagged` runs every `-g @smoke` test across the suite,
          # sharded and quarantine-filtered. The focused PR-fast lane lives in
          # the separate `ci-e2e-smoke` job (playwright.config.smoke.ts).
          cd apps/web && node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm e2e:smoke:tagged --trace=off --project=chromium --shard=${SHARD_INDEX}/${SHARD_TOTAL} ${{ steps.quarantine.outputs.allowed_specs }}

      - name: E2E Auth Smoke (PR Gate)
        if: ${{ matrix.shard == 1 && github.event_name == 'pull_request' && github.ref != 'refs/heads/production' && hashFiles('apps/web/tests/e2e/smoke-auth.spec.ts') != '' }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          SMOKE_ONLY: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          VERCEL_ENV: development
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-pr-e2e-auth
          SENTRY_RELEASE: ${{ github.sha }}
          # Auth smoke requires real Clerk keys in CI
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          # Auth smoke signs in a configured E2E user
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          # Optional: enable deterministic spotify-only UI check
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        run: |
          cd apps/web && node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm --filter=@jovie/web run e2e:auth-smoke --project=chromium

      - name: E2E Full (Main Branch)
        if: ${{ github.ref == 'refs/heads/main' && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-main-e2e
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        run: |
          if [ -z "${{ steps.quarantine.outputs.allowed_specs }}" ]; then
            echo "No non-quarantined E2E specs to run."
            exit 0
          fi
          cd apps/web && node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm playwright test --shard=${SHARD_INDEX}/${SHARD_TOTAL} ${{ steps.quarantine.outputs.allowed_specs }}

      - name: E2E Quarantine (retries)
        if: ${{ matrix.shard == 1 && steps.quarantine.outputs.has_quarantine == 'true' }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-main-e2e-quarantine
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          RETRIES=$(jq -r '.retryBudget.quarantineE2eRetries // 2' apps/web/tests/quarantine.json)
          cd apps/web && node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm playwright test --retries="$RETRIES" ${{ steps.quarantine.outputs.quarantined_specs }}

      - name: Upload Playwright Test Results on Failure
        if: ${{ failure() && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: ${{ github.job }}-shard-${{ matrix.shard }}-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/test-results/
          retention-days: 7

  ci-test-performance:
    name: Test Performance Budgets
    needs: [ci-path-changes]
    # Main keeps the post-merge guard. Internal PRs run it only when the
    # profiler, guard, or profiler regression itself changes.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_test == 'true' || needs.ci-path-changes.outputs.run_test_performance == 'true' }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping test performance budgets; no relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Generate test performance profile
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm test:profile

      - name: Enforce test performance budgets
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          TEST_PERFORMANCE_SUITE="full" TEST_PERFORMANCE_USE_BASELINE="true" pnpm test:guard -- --suite="full" --use-baseline
  ci-pr-vercel-preview:
    name: Preview Deploy (manual)
    # Bounded hosted evidence for an explicitly dispatched ref. It never starts
    # from a source PR event and never feeds source PR Ready.
    needs: [ci-path-changes, ci-risk-classifier]
    if: ${{ needs.ci-path-changes.result == 'success' && github.event_name == 'workflow_dispatch' && inputs.run_preview_deploy == true }}
    runs-on: ubuntu-latest
    # Build + pull env consume ~5m; Vercel prebuilt upload often needs >20m alone.
    timeout-minutes: 40
    concurrency:
      # Scope preview concurrency to a single PR/ref so unrelated PRs do not
      # evict each other's pending preview deployments from the queue.
      group: preview-deploy-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    outputs:
      deployment_url: ${{ steps.pr_deploy.outputs.deployment_url }}
    steps:
      # Same fixed-runner hygiene as unit tests / public build: clear sparse
      # leftovers and dirty trees before composite setup-node-pnpm runs.
      - name: Reset workspace git state (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .git ]]; then exit 0; fi
          git sparse-checkout disable 2>/dev/null || true
          git config --local --unset-all core.sparseCheckout 2>/dev/null || true
          git config --local --unset-all core.sparseCheckoutCone 2>/dev/null || true
          rm -f .git/info/sparse-checkout
          git config --local --unset-all extensions.partialClone 2>/dev/null || true
          git config --local --unset-all remote.origin.promisorRemote 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          clean: true
          persist-credentials: false

      - name: Materialize full tree (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          git sparse-checkout disable 2>/dev/null || true
          git reset --hard HEAD
          git checkout-index -a -f

      - name: Verify checkout sentinel
        shell: bash
        run: |
          set -euo pipefail
          sentinel=".github/actions/setup-node-pnpm/action.yml"
          if [[ ! -f "$sentinel" ]]; then
            echo "::error::Incomplete checkout — missing ${sentinel}"
            exit 1
          fi

      - uses: ./.github/actions/setup-node-pnpm
      - name: Pull env (preview)
        timeout-minutes: 10
        run: |
          scope_args=()
          if [ -n "${VERCEL_ORG_ID:-}" ]; then
            scope_args=(--scope "$VERCEL_ORG_ID")
          fi
          for i in {1..3}; do
            if ./node_modules/.bin/vercel pull --yes --environment=preview "${scope_args[@]}"; then
              break
            fi
            echo "Vercel pull attempt $i failed, retrying in 10s..."
            sleep 10
            if [ "$i" -eq 3 ]; then exit 1; fi
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Strip deprecated Turbo env overrides (preview)
        run: |
          for env_file in .vercel/.env.preview.local .vercel/.env.local; do
            if [ -f "$env_file" ]; then
              grep -v '^TURBO_REMOTE_ONLY=' "$env_file" > "${env_file}.tmp" || true
              mv "${env_file}.tmp" "$env_file"
            fi
          done
      - name: Build (PR preview)
        timeout-minutes: 10
        run: |
          scope_args=()
          if [ -n "${VERCEL_ORG_ID:-}" ]; then
            scope_args=(--scope "$VERCEL_ORG_ID")
          fi
          for i in {1..3}; do
            if env -u TURBO_REMOTE_ONLY ./node_modules/.bin/vercel build "${scope_args[@]}"; then
              break
            fi
            echo "Vercel build attempt $i failed, retrying in 10s..."
            sleep 10
            if [ "$i" -eq 3 ]; then exit 1; fi
          done
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
          COREPACK_ENABLE_STRICT: 0
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (PR preview, fast deployment for UI-only changes)
        id: pr_deploy
        timeout-minutes: 30
        run: |
          # For fast preview PRs: use main secrets (no Neon dependency)
          # Fallback hierarchy for maximum compatibility
          POOLED_URL=""
          if [ -n "$DATABASE_URL_MAIN" ]; then
            POOLED_URL="$DATABASE_URL_MAIN"
            echo "Using main database URL"
          elif [ -n "$DATABASE_URL" ]; then
            POOLED_URL="$DATABASE_URL"
            echo "Using fallback database URL"
          else
            # Provide cheap stub for UI-only deployments that might not need DB
            POOLED_URL="postgresql://stub:***@localhost:5432/main_stub"
            echo "Using stub database URL for UI-only deployment"
          fi
          export DATABASE_URL="$POOLED_URL"
          export GIT_BRANCH

          for i in {1..3}; do
            if bash .github/scripts/vercel-prebuilt-deploy.sh deployment_url \
              --env DATABASE_URL \
              --env GIT_BRANCH; then
              break
            fi
            echo "Vercel deploy attempt $i failed, retrying in 10s..."
            sleep 10
            if [ "$i" -eq 3 ]; then exit 1; fi
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ALLOW_SOURCE_FALLBACK: '1'
          VERCEL_ENABLE_PLAIN_PREBUILT_FALLBACK: 'true'
          # Use main secrets - no Neon dependency for fast deployments
          DATABASE_URL_MAIN: ${{ secrets.DATABASE_URL_MAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Wait for PR preview readiness
        timeout-minutes: 9
        env:
          DEPLOYMENT_URL: ${{ steps.pr_deploy.outputs.deployment_url }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          inspect_wait_status=0
          ./node_modules/.bin/vercel inspect "$DEPLOYMENT_URL" \
            --wait \
            --timeout 8m \
            --scope "$VERCEL_ORG_ID" || inspect_wait_status=$?
          deployment_json="$(./node_modules/.bin/vercel inspect "$DEPLOYMENT_URL" \
            --format=json \
            --scope "$VERCEL_ORG_ID")"
          deployment_state="$(jq -r '(.readyState // .state // .status // "unknown") | ascii_upcase' \
            <<<"$deployment_json")"
          echo "Current PR preview deployment state: $deployment_state"
          if [ "$deployment_state" != "READY" ]; then
            echo "::error::PR preview is $deployment_state after readiness wait (status $inspect_wait_status); refusing a false-green preview."
            exit 1
          fi

  # Deep Lighthouse runs only by manual dispatch. Production Lighthouse remains
  # a separate hosted post-deploy release probe.

  ci-merge-group-ready:
    name: ${{ github.event_name == 'merge_group' && 'PR Ready' || 'PR Ready (merge-group inactive)' }}
    # Combined heads require deterministic gates, five unit shards, one hosted
    # build/layout workspace, and path-selected iOS evidence. Deep browser lanes
    # never provision Neon from this event.
    needs:
      [
        ci-path-changes,
        ci-merge-group-admission,
        ci-risk-classifier,
        ci-fast,
        ci-unit-tests,
        ci-build-layout,
        ci-ios,
        ci-promptfoo-evals,
        ci-golden-eval-set,
        ci-secret-scan,
        drizzle-migration-guard,
      ]
    if: ${{ always() && github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate combined-head checks
        shell: bash
        run: |
          set -euo pipefail
          PATH_RESULT="${{ needs.ci-path-changes.result }}"
          ADMISSION_RESULT="${{ needs.ci-merge-group-admission.result }}"
          RISK_RESULT="${{ needs.ci-risk-classifier.result }}"
          FAST_RESULT="${{ needs.ci-fast.result }}"
          UNIT_RESULT="${{ needs.ci-unit-tests.result }}"
          BUILD_LAYOUT_RESULT="${{ needs.ci-build-layout.result }}"
          IOS_RESULT="${{ needs.ci-ios.result }}"
          PROMPTFOO_RESULT="${{ needs.ci-promptfoo-evals.result }}"
          GOLDEN_EVAL_RESULT="${{ needs.ci-golden-eval-set.result }}"
          SECRET_RESULT="${{ needs.ci-secret-scan.result }}"
          MIGRATION_RESULT="${{ needs.drizzle-migration-guard.result }}"
          RUN_IOS="${{ needs.ci-path-changes.outputs.run_ios }}"
          RUN_PROMPTFOO="${{ needs.ci-path-changes.outputs.run_promptfoo_evals }}"
          RUN_GOLDEN_EVAL="${{ needs.ci-path-changes.outputs.run_golden_eval_set }}"
          {
            echo "### Merge group ready"
            echo
            echo "Combined head: \`${{ github.event.merge_group.head_sha }}\`"
            echo "Base: \`${{ github.event.merge_group.base_sha }}\`"
            echo
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| Path Changes | $PATH_RESULT |"
            echo "| Merge Group Admission | $ADMISSION_RESULT |"
            echo "| CI Risk Classifier | $RISK_RESULT |"
            echo "| ci-fast | $FAST_RESULT |"
            echo "| Unit Tests | $UNIT_RESULT |"
            echo "| Build + Layout (same hosted workspace) | $BUILD_LAYOUT_RESULT |"
            echo "| iOS Build + Test | $IOS_RESULT |"
            echo "| Promptfoo Evals (path-selected) | $PROMPTFOO_RESULT |"
            echo "| Golden Eval Set (path-selected) | $GOLDEN_EVAL_RESULT |"
            echo "| Secret Scan | $SECRET_RESULT |"
            echo "| Migration Guard | $MIGRATION_RESULT |"
            echo
            echo "Preview/A11y evidence is explicit opt-in or post-merge; merge groups do not provision Neon."
          } >> "$GITHUB_STEP_SUMMARY"

          for gate in \
            "Path Changes:$PATH_RESULT" \
            "Merge Group Admission:$ADMISSION_RESULT" \
            "CI Risk Classifier:$RISK_RESULT" \
            "ci-fast:$FAST_RESULT" \
            "Secret Scan:$SECRET_RESULT" \
            "Migration Guard:$MIGRATION_RESULT" \
            "Build + Layout:$BUILD_LAYOUT_RESULT"; do
            name="${gate%%:*}"
            result="${gate#*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error::$name did not pass on the merge-group combined head (result: $result)"
              exit 1
            fi
          done

          if [[ "$UNIT_RESULT" != "success" ]]; then
            echo "::error::Five affected Unit Test shards did not pass on the merge-group combined head (result: $UNIT_RESULT)"
            exit 1
          fi

          if [[ "$RUN_IOS" == "true" && "$IOS_RESULT" != "success" ]]; then
            echo "::error::iOS Build + Test did not pass for an iOS-changing combined head (result: $IOS_RESULT)"
            exit 1
          fi
          if [[ "$RUN_IOS" != "true" && "$IOS_RESULT" != "skipped" ]]; then
            echo "::error::iOS Build + Test ran without an iOS path selection (result: $IOS_RESULT)"
            exit 1
          fi

          for selected_gate in \
            "Promptfoo Evals:$RUN_PROMPTFOO:$PROMPTFOO_RESULT" \
            "Golden Eval Set:$RUN_GOLDEN_EVAL:$GOLDEN_EVAL_RESULT"; do
            name="${selected_gate%%:*}"
            selection_and_result="${selected_gate#*:}"
            selected="${selection_and_result%%:*}"
            result="${selection_and_result#*:}"
            if [[ "$selected" == "true" && "$result" != "success" ]]; then
              echo "::error::$name did not pass for a selected combined head (result: $result)"
              exit 1
            fi
            if [[ "$selected" != "true" && "$result" != "skipped" ]]; then
              echo "::error::$name ran without path selection (result: $result)"
              exit 1
            fi
          done

          echo "All required combined-head checks passed."
  # Storybook a11y evidence lives exclusively in the scheduled visual-a11y.yml
  # storybook-a11y lane; the duplicate manual ci-storybook-a11y job was removed
  # (JOV-4326) so the evidence has a single owner.
  ci-pr-ready:
    name: ${{ github.event_name == 'pull_request' && 'PR Ready' || 'PR Ready (source inactive)' }}
    # The source-branch aggregate is intentionally small and deterministic.
    # GitHub's merge_group producer reuses the same required context name for
    # combined-head unit/build/layout evidence. Migration Guard, Fork PR Gate,
    # and PR Size Guard remain separately required ruleset contexts.
    needs: [ci-path-changes, ci-risk-classifier, ci-fast, ci-secret-scan]
    if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate deterministic source PR checks
        shell: bash
        run: |
          set -euo pipefail
          PATH_RESULT="${{ needs.ci-path-changes.result }}"
          FAST_RESULT="${{ needs.ci-fast.result }}"
          SECRET_SCAN_RESULT="${{ needs.ci-secret-scan.result }}"
          RISK_RESULT="${{ needs.ci-risk-classifier.result }}"
          RISK_LEVEL="${{ needs.ci-risk-classifier.outputs.risk_level }}"
          RISK_RULES="${{ needs.ci-risk-classifier.outputs.matched_rule_ids }}"

          {
            echo "### PR Ready"
            echo
            echo "Source PRs run deterministic fast checks only. Unit, build, and layout integration evidence runs on the merge-group combined head."
            echo
            echo "| Gate | Result | Next local command |"
            echo "| --- | --- | --- |"
            echo "| Path Changes | $PATH_RESULT | re-run workflow if cancelled/failed |"
            echo "| ci-fast (typecheck/biome/eslint/guardrails/structural) | $FAST_RESULT | \`pnpm run typecheck && pnpm run biome:check\` |"
            echo "| Secret Scan | $SECRET_SCAN_RESULT | \`./scripts/security/scan-secrets.sh ci-pr origin/main\` |"
            echo "| Risk classifier | $RISK_RESULT | \`pnpm ci:harness:check\` |"
            echo
            echo "Risk level: ${RISK_LEVEL:-low}; matched rules: ${RISK_RULES:-none}"
            echo "Heavy evidence is manual, scheduled, or event-driven and never starts from this source-PR gate."
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$PATH_RESULT" != "success" ]]; then
            echo "❌ Path Changes did not succeed (result: $PATH_RESULT)"
            exit 1
          fi
          if [[ "$SECRET_SCAN_RESULT" != "success" ]]; then
            echo "❌ Secret Scan did not pass (result: $SECRET_SCAN_RESULT)"
            exit 1
          fi
          if [[ "$RISK_RESULT" != "success" ]]; then
            echo "❌ CI risk classifier did not pass (result: $RISK_RESULT)"
            exit 1
          fi

          if [[ "$FAST_RESULT" != "success" ]]; then
            echo "❌ ci-fast did not pass (result: $FAST_RESULT)"
            exit 1
          fi

          echo "All deterministic source PR checks passed."
  ci-summary:
    name: Manual Evidence Summary
    # Collect the manual deep-lane artifact after every selected job settles.
    # It never starts on a source PR or merge-group event.
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    permissions:
      actions: read
      pull-requests: write
      contents: read
    needs:
      - ci-path-changes
      - ci-env-example-guard
      - ci-secret-scan
      - ci-fast
      - ci-pr-ready
      - ci-risk-classifier
      - neon-db
      - drizzle-migration-guard
      - ci-drizzle-check
      - ci-e2e-smoke
      - ci-golden-path
      - ci-smoke-required
      - ci-pr-neon-migrate
      - ci-unit-tests
      - ci-test-performance
      - ci-e2e-migrate
      - ci-e2e-tests
      - ci-pr-vercel-preview
      - ci-build-public
      - ci-layout-guard
      - ci-lighthouse-pr
      - ci-lighthouse-dashboard-pr
      - ci-lighthouse-onboarding-pr
      - ci-lighthouse-admin-pr
      - ci-a11y
    # Keep this informational tail off the saturated ephemeral unit-test pool.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reset workspace git state (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d .git ]]; then exit 0; fi
          git sparse-checkout disable 2>/dev/null || true
          git config --local --unset-all core.sparseCheckout 2>/dev/null || true
          git config --local --unset-all core.sparseCheckoutCone 2>/dev/null || true
          rm -f .git/info/sparse-checkout
          git config --local --unset-all extensions.partialClone 2>/dev/null || true
          git config --local --unset-all remote.origin.promisorRemote 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true
          git clean -ffdx 2>/dev/null || true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          clean: true

      - name: Materialize full tree (self-hosted)
        if: runner.environment != 'github-hosted'
        shell: bash
        run: |
          set -euo pipefail
          git sparse-checkout disable 2>/dev/null || true
          git reset --hard HEAD
          git checkout-index -a -f

      - name: Verify checkout sentinel
        shell: bash
        run: |
          set -euo pipefail
          sentinel=".github/actions/setup-node-pnpm/action.yml"
          if [[ ! -f "$sentinel" ]]; then
            echo "::error::Incomplete checkout — missing ${sentinel}"
            exit 1
          fi

      - uses: ./.github/actions/setup-node-pnpm
      - name: Build CI harness artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_PREVIEW_URL: ${{ needs.ci-pr-vercel-preview.outputs.deployment_url }}
          RISK_LEVEL: ${{ needs.ci-risk-classifier.outputs.risk_level }}
          RISK_REQUIRES_SMOKE: ${{ needs.ci-risk-classifier.outputs.requires_smoke }}
          RISK_REQUIRES_PREVIEW: ${{ needs.ci-risk-classifier.outputs.requires_preview }}
          RISK_BLOCKS_UNATTENDED: ${{ needs.ci-risk-classifier.outputs.blocks_unattended_auto_merge }}
          RISK_RULES: ${{ needs.ci-risk-classifier.outputs.matched_rule_ids }}
          CI_HARNESS_JOB_CI_RISK_CLASSIFIER: ${{ needs.ci-risk-classifier.result }}
          CI_HARNESS_JOB_CI_FAST: ${{ needs.ci-fast.result }}
          CI_HARNESS_JOB_CI_UNIT_TESTS: ${{ needs.ci-unit-tests.result }}
          CI_HARNESS_JOB_CI_BUILD_PUBLIC: ${{ needs.ci-build-public.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_PR: ${{ needs.ci-lighthouse-pr.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_DASHBOARD_PR: ${{ needs.ci-lighthouse-dashboard-pr.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_ONBOARDING_PR: ${{ needs.ci-lighthouse-onboarding-pr.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_ADMIN_PR: ${{ needs.ci-lighthouse-admin-pr.result }}
          CI_HARNESS_JOB_CI_E2E_SMOKE: ${{ needs.ci-e2e-smoke.result }}
          CI_HARNESS_JOB_CI_GOLDEN_PATH: ${{ needs.ci-golden-path.result }}
          CI_HARNESS_JOB_CI_SMOKE_REQUIRED: ${{ needs.ci-smoke-required.result }}
          CI_HARNESS_JOB_CI_PR_VERCEL_PREVIEW: ${{ needs.ci-pr-vercel-preview.result }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/ci-harness"
          RISK_JSON="$RUNNER_TEMP/ci-harness/risk.json"
          ARTIFACT_JSON="$RUNNER_TEMP/ci-harness/ci-harness.v1.json"

          risk_level="${RISK_LEVEL:-low}"
          requires_smoke="${RISK_REQUIRES_SMOKE:-false}"
          requires_preview="${RISK_REQUIRES_PREVIEW:-false}"
          blocks_unattended="${RISK_BLOCKS_UNATTENDED:-false}"
          risk_rules="${RISK_RULES:-}"

          jq -n \
            --arg riskLevel "$risk_level" \
            --arg rules "$risk_rules" \
            --argjson requiresSmoke "$requires_smoke" \
            --argjson requiresPreview "$requires_preview" \
            --argjson blocksUnattended "$blocks_unattended" \
            '{
              schemaVersion: 1,
              riskLevel: $riskLevel,
              requiresSmoke: $requiresSmoke,
              requiresPreview: $requiresPreview,
              blocksUnattendedAutoMerge: $blocksUnattended,
              matchedRules: ($rules | split(",") | map(select(length > 0) | {id: ., title: ., level: $riskLevel, files: []})),
              recommendedLabels: (if $blocksUnattended then ["needs-human"] else [] end)
            }' > "$RISK_JSON"

          node scripts/ci-harness.mjs emit-artifact \
            --risk "$RISK_JSON" \
            --out "$ARTIFACT_JSON"

          {
            echo "### CI harness artifact"
            echo
            echo "- Artifact: \`ci-harness.v1.json\`"
            echo "- Risk level: $risk_level"
            echo "- Preview URL: ${PR_PREVIEW_URL:-none}"
            echo
            echo "Next local command:"
            echo
            echo '```bash'
            echo "pnpm ci:harness:check"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CI harness artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-harness-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-harness/ci-harness.v1.json
          retention-days: 14
      - name: Post CI summary to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILD_RUN_FULL_CI: ${{ needs.ci-path-changes.outputs.run_build }}
          DRIZZLE_RUN_FULL_CI: ${{ needs.ci-drizzle-check.outputs.run_full_ci }}
          E2E_RUN_FULL_CI: ${{ needs.ci-e2e-migrate.outputs.run_full_ci }}
          E2E_SMOKE_RUN_FULL_CI: ${{ needs.ci-e2e-smoke.outputs.run_full_ci }}
          MIGRATION_GUARD_RUN_FULL_CI: ${{ needs.drizzle-migration-guard.outputs.run_full_ci }}
          PR_MIGRATE_RUN_FULL_CI: ${{ needs.ci-pr-neon-migrate.outputs.run_full_ci }}
          # Source PR unit selection is intentionally deferred to the merge-group head.
          UNIT_RUN_FULL_CI: 'false'
          PR_PREVIEW_URL: ${{ needs.ci-pr-vercel-preview.outputs.deployment_url }}
          RISK_LEVEL: ${{ needs.ci-risk-classifier.outputs.risk_level }}
          RISK_REQUIRES_SMOKE: ${{ needs.ci-risk-classifier.outputs.requires_smoke }}
          RISK_REQUIRES_PREVIEW: ${{ needs.ci-risk-classifier.outputs.requires_preview }}
          RISK_BLOCKS_UNATTENDED: ${{ needs.ci-risk-classifier.outputs.blocks_unattended_auto_merge }}
          RISK_RULES: ${{ needs.ci-risk-classifier.outputs.matched_rule_ids }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;

            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              per_page: 100
            });

            const jobByName = new Map(
              jobsResponse.data.jobs.map(job => [job.name, job])
            );

            const formatDuration = (job) => {
              if (!job?.started_at || !job?.completed_at) return '—';
              const start = new Date(job.started_at);
              const end = new Date(job.completed_at);
              const ms = Math.max(0, end - start);
              const minutes = Math.floor(ms / 60000);
              const seconds = Math.floor((ms % 60000) / 1000);
              return minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
            };

            const resolveOutcome = (jobName, fallbackResult) => {
              const job = jobByName.get(jobName);
              if (!job) return { status: fallbackResult ?? 'not_run', duration: '—' };
              return {
                status: job.conclusion || job.status || fallbackResult || 'unknown',
                duration: formatDuration(job)
              };
            };

            const summarizeStatus = (status) => {
              switch (status) {
                case 'success':
                  return '✅ Passed';
                case 'failure':
                  return '❌ Failed';
                case 'cancelled':
                  return '⚠️ Cancelled';
                case 'skipped':
                  return '⚠️ Skipped';
                case 'timed_out':
                  return '❌ Timed out';
                case 'not_run':
                  return '⚪️ Not run';
                default:
                  return `⚪️ ${status}`;
              }
            };

            const deriveSkipReason = (jobKey, runFullCiFlag) => {
              if (runFullCiFlag === 'false') {
                return 'Skipped (path guard: no relevant changes)';
              }
              if (runFullCiFlag === '') {
                return 'Skipped (job not applicable)';
              }
              return jobKey === 'neon-db'
                ? 'Skipped (not required for this PR)'
                : 'Skipped (conditional job)';
            };

            const summaryRows = [
              { label: '**PR Ready (merge gate)**', jobName: 'PR Ready' },
              { label: 'CI Risk Classifier', jobName: 'CI Risk Classifier' },
              { label: 'Structural Contract', jobName: 'Structural Contract' },
              { label: 'Env Example Guard', jobName: 'Env Example Guard' },
              { label: 'Guardrails', jobName: 'Guardrails (proxy)' },
              { label: 'Biome', jobName: 'Biome (lint + format)' },
              {
                label: 'Migration Guard',
                jobName: 'Migration Guard',
                runFullCi: process.env.MIGRATION_GUARD_RUN_FULL_CI
              },
              { label: 'Neon DB', jobName: 'Neon DB' },
              {
                label: 'Drizzle Check',
                jobName: 'Drizzle Check',
                runFullCi: process.env.DRIZZLE_RUN_FULL_CI
              },
              {
                label: 'Build',
                jobName: 'Build',
                runFullCi: process.env.BUILD_RUN_FULL_CI
              },
              { label: 'Build (public routes)', jobName: 'Build (public routes)' },
              { label: 'Layout Guard', jobName: 'Layout Guard' },
              { label: 'Lighthouse (public routes PR)', jobName: 'Lighthouse (public routes PR)' },
              { label: 'Lighthouse (dashboard PR)', jobName: 'Lighthouse (dashboard PR)' },
              { label: 'Lighthouse (onboarding PR)', jobName: 'Lighthouse (onboarding PR)' },
              { label: 'Lighthouse (admin PR)', jobName: 'Lighthouse (admin PR)' },
              { label: 'A11y (axe)', jobName: 'A11y (axe)' },
              {
                label: 'Unit Tests',
                jobName: 'Unit Tests',
                runFullCi: process.env.UNIT_RUN_FULL_CI
              },
              {
                label: 'E2E Smoke',
                jobName: 'E2E Smoke (PR Fast Feedback)',
                runFullCi: process.env.E2E_SMOKE_RUN_FULL_CI
              },
              {
                label: 'Test Performance Budgets',
                jobName: 'Test Performance Budgets'
              },
              {
                label: 'E2E Tests',
                jobName: 'E2E Tests',
                runFullCi: process.env.E2E_RUN_FULL_CI
              },
              {
                label: 'DB Migrate (PR main)',
                jobName: 'DB Migrate (PR main)',
                runFullCi: process.env.PR_MIGRATE_RUN_FULL_CI
              },
              { label: 'Preview Deploy', jobName: 'Preview Deploy (PR)' }
            ];

            const rows = summaryRows.map((row) => {
              const outcome = resolveOutcome(row.jobName);
              const statusLabel = summarizeStatus(outcome.status);
              const timing = outcome.duration;
              let context = 'Executed';
              if (outcome.status === 'skipped' || outcome.status === 'not_run') {
                context = deriveSkipReason(row.label, row.runFullCi ?? '');
              }
              return `| ${row.label} | ${statusLabel} | ${context} | ${timing} |`;
            });

            // Add preview URL section if available
            let previewUrlSection = '';
            if (process.env.PR_PREVIEW_URL) {
              previewUrlSection = `\n🔗 **Preview Deployment**: ${process.env.PR_PREVIEW_URL}\n`;
            }

            const summaryBody = [
              '## CI Summary',
              '',
              'A crisp snapshot of this PR run — executed vs. skipped, with timing for every key lane.',
              '',
              `**Risk:** ${process.env.RISK_LEVEL || 'low'} (smoke: ${process.env.RISK_REQUIRES_SMOKE || 'false'}, preview: ${process.env.RISK_REQUIRES_PREVIEW || 'false'}, blocks unattended auto-merge: ${process.env.RISK_BLOCKS_UNATTENDED || 'false'})`,
              `**Matched risk rules:** ${process.env.RISK_RULES || 'none'}`,
              '**Machine artifact:** `ci-harness.v1.json` uploaded to this workflow run.',
              previewUrlSection,
              '',
              '| Job | Status | Context | Time |',
              '| --- | ------ | ------- | ---- |',
              ...rows,
              '',
              `**Run:** [${runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})`,
              ''
            ].join('\n');

            const existingComments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber
            });

            const botComment = existingComments.data.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.startsWith('## CI Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: summaryBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: summaryBody
              });
            }
  # Extended smoke validation for risky changes.
  # This remains available for opt-in PR validation but does not block production deploys.
  ci-smoke-required:
    name: Extended Smoke (manual)
    needs: [ci-path-changes, ci-build-public, neon-db, ci-e2e-tests]
    if: ${{ needs.ci-path-changes.result == 'success' && always() && github.event_name == 'workflow_dispatch' && needs.neon-db.result == 'success' }}
    runs-on: ubuntu-latest
    environment: Preview – jovie
    timeout-minutes: 20
    env: { PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE: 'true' }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-smoke-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: ${{ runner.temp }}/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        run: echo "DATABASE_URL=${{ steps.resolve-smoke-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations for Smoke DB
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: ${{ github.ref_name }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact from ci-build
        id: download-build
        if: ${{ needs.ci-path-changes.outputs.run_build == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: ${{ runner.temp }}/nextjs-build-download
        continue-on-error: true

      - name: Extract or rebuild for smoke tests
        run: |
          if [ -f "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" ]; then
            echo "Reusing build artifact (saves ~3-4 min)"
            tar -xf "$RUNNER_TEMP/nextjs-build-download/nextjs-build.tar" -C apps/web
          else
            echo "Build artifact not available, building from scratch"
            pnpm turbo build --filter=@jovie/web
          fi
          # Standalone output needs static assets alongside server.js
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3260
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3260
          # Keep rebuild fallback equivalent to the shared ci-build artifact.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          # NEXT_PUBLIC_* must be present at build time for standalone smoke runs.
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run Required Smoke Tests
        run: |
          cd apps/web

          # Start standalone production server (not Turbopack dev) to avoid SWC OOM on CI runners
          # IMPORTANT: Pass runtime env vars explicitly — the step's env: block only applies to
          # the shell process, but backgrounded processes inherit from the shell's exported vars.
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          export NODE_ENV=test
          export VERCEL_ENV=development
          export HOSTNAME=localhost
          export NEXT_PUBLIC_APP_URL=http://localhost:3260
          export BETTER_AUTH_URL=http://localhost:3260
          export NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3260
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          export NEXT_PUBLIC_TURNSTILE_SITE_KEY="1x00000000000000000000AA"
          export TURNSTILE_SECRET_KEY="1x0000000000000000000000000000000AA"
          export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
          export SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
          export UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}"
          export UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          export NEXT_PUBLIC_E2E_MODE=1
          export NEXT_DISABLE_TOOLBAR=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          export E2E_USE_TEST_AUTH_BYPASS=1
          export E2E_TEST_AUTH_PERSONA=creator-ready
          export E2E_CLERK_USER_ID="${{ secrets.E2E_CLERK_USER_ID }}"
          export FLAGS_SECRET="${{ secrets.FLAGS_SECRET }}"
          export URL_ENCRYPTION_KEY="smoke-preview-url-encryption-key"
          export AI_GATEWAY_API_KEY="smoke-preview-ai-gateway-key"
          PORT=3260 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # Wait for server readiness
          SERVER_READY=false
          for i in $(seq 1 30); do
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "Standalone server died"; exit 1; }
            if curl -sf http://localhost:3260 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Standalone server failed to start within 30s"
            exit 1
          fi

          # Run smoke tests with BASE_URL set (skips Playwright webServer config)
          cd "$GITHUB_WORKSPACE"
          set +e
          CI=true BASE_URL=http://localhost:3260 node "$GITHUB_WORKSPACE/.github/scripts/guard-playwright-artifacts.mjs" --run -- pnpm --filter=@jovie/web exec playwright test --config=playwright.config.smoke.ts --reporter=line
          EXIT_CODE=$?
          set -e
          exit $EXIT_CODE
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          BETTER_AUTH_URL: http://localhost:3260
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3260
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_DISABLE_TOOLBAR: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() && hashFiles('apps/web/test-results/**') != '' }}
        uses: ./.github/actions/upload-safe-playwright-artifact
        with:
          name: smoke-required-report-${{ github.run_id }}
          path: |
            apps/web/test-results/
          retention-days: 3

  # Homepage smoke is a blocking probe of the immutable production deployment.

  main-release-ready:
    name: Main Release Ready
    needs:
      [
        main-queue-provenance,
        ci-path-changes,
        ci-risk-classifier,
        ci-fast,
        ci-secret-scan,
        drizzle-migration-guard,
        ci-unit-tests,
        ci-build-layout,
        ci-ios,
        ci-promptfoo-evals,
        ci-golden-eval-set,
      ]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      release_authorized: ${{ steps.ready.outputs.release_authorized }}
      evidence_mode: ${{ steps.ready.outputs.evidence_mode }}
    steps:
      - name: Evaluate exact queue proof or complete fallback
        id: ready
        shell: bash
        run: |
          set -euo pipefail
          echo "release_authorized=false" >> "$GITHUB_OUTPUT"
          PROVENANCE_RESULT="${{ needs.main-queue-provenance.result }}"
          IS_CURRENT="${{ needs.main-queue-provenance.outputs.is_current }}"
          QUEUE_PROVEN="${{ needs.main-queue-provenance.outputs.queue_proven }}"

          if [ "$PROVENANCE_RESULT" != "success" ]; then
            echo "::error::Main queue provenance failed closed ($PROVENANCE_RESULT)."
            exit 1
          fi
          if [ "$IS_CURRENT" != "true" ]; then
            echo "evidence_mode=superseded" >> "$GITHUB_OUTPUT"
            echo "Superseded main run is neutral."
            exit 0
          fi

          PATH_RESULT="${{ needs.ci-path-changes.result }}"
          RISK_RESULT="${{ needs.ci-risk-classifier.result }}"
          FAST_RESULT="${{ needs.ci-fast.result }}"
          SECRET_RESULT="${{ needs.ci-secret-scan.result }}"
          MIGRATION_RESULT="${{ needs.drizzle-migration-guard.result }}"
          UNIT_RESULT="${{ needs.ci-unit-tests.result }}"
          BUILD_LAYOUT_RESULT="${{ needs.ci-build-layout.result }}"
          IOS_RESULT="${{ needs.ci-ios.result }}"
          PROMPTFOO_RESULT="${{ needs.ci-promptfoo-evals.result }}"
          GOLDEN_EVAL_RESULT="${{ needs.ci-golden-eval-set.result }}"
          RUN_IOS="${{ needs.ci-path-changes.outputs.run_ios }}"
          RUN_PROMPTFOO="${{ needs.ci-path-changes.outputs.run_promptfoo_evals }}"
          RUN_GOLDEN_EVAL="${{ needs.ci-path-changes.outputs.run_golden_eval_set }}"

          if [ "$QUEUE_PROVEN" = "true" ]; then
            # A queue-proven main SHA must not duplicate unit/build/fallback work.
            for lane in \
              "Path Changes:$PATH_RESULT" \
              "CI Risk Classifier:$RISK_RESULT" \
              "ci-fast:$FAST_RESULT" \
              "Secret Scan:$SECRET_RESULT" \
              "Migration Guard:$MIGRATION_RESULT" \
              "Unit Tests:$UNIT_RESULT" \
              "Build + Layout:$BUILD_LAYOUT_RESULT" \
              "iOS Build + Test:$IOS_RESULT" \
              "Promptfoo Evals:$PROMPTFOO_RESULT" \
              "Golden Eval Set:$GOLDEN_EVAL_RESULT"; do
              name="${lane%%:*}"
              result="${lane#*:}"
              if [ "$result" != "skipped" ]; then
                echo "::error::Queue-proven main duplicated $name (result $result)."
                exit 1
              fi
            done
            echo "evidence_mode=merge_group" >> "$GITHUB_OUTPUT"
            echo "release_authorized=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Direct/admin main fallback is intentionally unconditional: five unit
          # shards and the combined hosted build+layout may never be represented
          # by a skipped placeholder.
          for lane in \
            "Path Changes:$PATH_RESULT" \
            "CI Risk Classifier:$RISK_RESULT" \
            "ci-fast:$FAST_RESULT" \
            "Secret Scan:$SECRET_RESULT" \
            "Migration Guard:$MIGRATION_RESULT" \
            "Unit Tests (five shards):$UNIT_RESULT" \
            "Build + Layout:$BUILD_LAYOUT_RESULT"; do
            name="${lane%%:*}"
            result="${lane#*:}"
            if [ "$result" != "success" ]; then
              echo "::error::Main fallback $name did not pass (result $result)."
              exit 1
            fi
          done

          if [ "$RUN_IOS" = "true" ]; then
            if [ "$IOS_RESULT" != "success" ]; then
              echo "::error::Main fallback iOS Build + Test did not pass (result $IOS_RESULT)."
              exit 1
            fi
          elif [ "$IOS_RESULT" != "skipped" ]; then
            echo "::error::Main fallback ran iOS Build + Test without an iOS path selection (result $IOS_RESULT)."
            exit 1
          fi

          for selected_gate in \
            "Promptfoo Evals:$RUN_PROMPTFOO:$PROMPTFOO_RESULT" \
            "Golden Eval Set:$RUN_GOLDEN_EVAL:$GOLDEN_EVAL_RESULT"; do
            name="${selected_gate%%:*}"
            selection_and_result="${selected_gate#*:}"
            selected="${selection_and_result%%:*}"
            result="${selection_and_result#*:}"
            if [ "$selected" = "true" ] && [ "$result" != "success" ]; then
              echo "::error::Main fallback $name did not pass (result $result)."
              exit 1
            fi
            if [ "$selected" != "true" ] && [ "$result" != "skipped" ]; then
              echo "::error::Main fallback ran $name without path selection (result $result)."
              exit 1
            fi
          done

          echo "evidence_mode=fallback" >> "$GITHUB_OUTPUT"
          echo "release_authorized=true" >> "$GITHUB_OUTPUT"
