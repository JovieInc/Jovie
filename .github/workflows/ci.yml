name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'apps/web/public/product-screenshots/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  # Larger runner for CPU-heavy jobs (typecheck, build, tests).
  # Set to a GitHub-hosted larger runner label (e.g. "ubuntu-4core") for burst throughput,
  # or leave as "ubuntu-latest" for default 2-core runners.
  FAST_RUNNER: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}

jobs:

  # ── Centralized path-change detection ──────────────────────────────────
  # Runs once, outputs change flags for all job types.
  # Downstream jobs read outputs instead of fetching git history independently.
  ci-path-changes:
    name: Path Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_build: ${{ steps.detect.outputs.run_build }}
      run_test: ${{ steps.detect.outputs.run_test }}
      run_public_lighthouse: ${{ steps.detect.outputs.run_public_lighthouse }}
      run_dashboard_lighthouse: ${{ steps.detect.outputs.run_dashboard_lighthouse }}
      run_onboarding_lighthouse: ${{ steps.detect.outputs.run_onboarding_lighthouse }}
      run_e2e: ${{ steps.detect.outputs.run_e2e }}
      run_drizzle: ${{ steps.detect.outputs.run_drizzle }}
      has_code_changes: ${{ steps.detect.outputs.has_code_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect path changes for all job types
        id: detect
        shell: bash
        run: |
          IS_FORK="${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}"
          FULL_CI_LABEL="${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'testing') }}"

          # Force run all if the 'testing' label is present
          if [[ "$FULL_CI_LABEL" == "true" ]]; then
            echo "Forcing full CI run due to 'testing' label"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_e2e run_drizzle has_code_changes; do
              echo "$t=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Determine changed files
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: run everything
            echo "Manual dispatch: running all checks"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_e2e run_drizzle has_code_changes; do
              echo "$t=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          # Check if only docs changed (exclude .github/ — workflow changes must run CI)
          if echo "$CHANGED_FILES" | grep -v -E '^\.(github/)' | grep -v -E '\.(md|txt)$' | wc -l | grep -q '^0$'; then
            echo "Only documentation files changed"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_e2e run_drizzle has_code_changes; do
              echo "$t=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          echo "has_code_changes=true" >> "$GITHUB_OUTPUT"

          # Build paths
          BUILD_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/lib/|apps/web/hooks/|apps/web/types/|apps/web/constants/|apps/web/package.*\.json|apps/web/next\.config\.js|apps/web/tailwind\.config\.|apps/web/postcss\.config\.|apps/web/instrumentation.*\.ts|apps/web/sentry\..*\.config\.ts|apps/web/middleware\.ts|package.*\.json|turbo\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$BUILD_PATTERN"; then
            RUN_BUILD=true
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            RUN_BUILD=false
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi

          # Test paths
          TEST_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/lib/|apps/web/hooks/|apps/web/types/|apps/web/tests/unit/|apps/web/__tests__/|packages/|.*\.test\.|.*\.spec\.|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$TEST_PATTERN"; then
            RUN_TEST=true
            echo "run_test=true" >> "$GITHUB_OUTPUT"
          else
            RUN_TEST=false
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          fi

          PUBLIC_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.pr\.json|apps/web/\.lighthouserc\.public-launch\.json|apps/web/app/\(home\)/|apps/web/app/\(marketing\)/|apps/web/app/\(dynamic\)/legal/|apps/web/content/legal/|apps/web/app/\[username\]/|apps/web/app/layout\.tsx|apps/web/app/globals\.css|apps/web/public/|apps/web/styles/|apps/web/components/features/home/|apps/web/components/features/marketing/|apps/web/components/features/profile/|apps/web/scripts/run-public-lighthouse\.ts|apps/web/scripts/public-route-qa\.ts|apps/web/scripts/public-surface-qa\.ts|apps/web/scripts/performance-route-manifest\.ts|apps/web/tests/e2e/public-exhaustive\.spec\.ts|apps/web/tests/e2e/axe-audit\.spec\.ts|apps/web/tests/e2e/utils/(public-surface-(manifest|helpers)|smoke-test-utils)\.ts|packages/|apps/web/package.*\.json|package.*\.json|apps/web/tailwind\.config\.|apps/web/postcss\.config\.)'
          if echo "$CHANGED_FILES" | grep -q -E "$PUBLIC_LIGHTHOUSE_PATTERN"; then
            echo "run_public_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_public_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          DASHBOARD_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.dashboard\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs)$'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$DASHBOARD_LIGHTHOUSE_PATTERN"; then
            echo "run_dashboard_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_dashboard_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          ONBOARDING_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.onboarding\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/onboarding/|apps/web/components/features/dashboard/organisms/onboarding|apps/web/components/features/dashboard/organisms/apple-style-onboarding|apps/web/components/features/onboarding/|apps/web/lib/onboarding/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$ONBOARDING_LIGHTHOUSE_PATTERN"; then
            echo "run_onboarding_lighthouse=true" >> $GITHUB_OUTPUT
          else
            echo "run_onboarding_lighthouse=false" >> $GITHUB_OUTPUT
          fi

          # E2E paths
          E2E_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/tests/e2e/|apps/web/tests/smoke/|apps/web/playwright\.config\.|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$E2E_PATTERN"; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

          # Drizzle paths
          DRIZZLE_PATTERN='^(apps/web/drizzle/|apps/web/lib/db/|apps/web/drizzle\.config\.ts|drizzle\.kit\.(m?js|ts))'
          if echo "$CHANGED_FILES" | grep -q -E "$DRIZZLE_PATTERN"; then
            echo "run_drizzle=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_drizzle=false" >> "$GITHUB_OUTPUT"
          fi

          # Fork guard: disable E2E for forks (no secrets)
          if [[ "$IS_FORK" == "true" ]]; then
            echo "Fork PR: disabling e2e and build"
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "run_public_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_dashboard_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          fi

  ci-env-example-guard:
    name: Env Example Guard
    # Always run; fast, prevents accidental secret commits.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1 }
      - name: Validate .env.example contains placeholders only
        run: |
          set -euo pipefail

          if [ ! -f .env.example ]; then
            echo "No .env.example found; skipping."
            exit 0
          fi

          # Fail on common secret/token prefixes.
          if grep -nE '(sk_live_|sk_test_|rk_live_|rk_test_|whsec_|ghp_|github_pat_|xoxb-|BEGIN PRIVATE KEY|-----BEGIN)' .env.example; then
            echo "❌ .env.example appears to contain a real secret/token. Replace with placeholders."
            exit 1
          fi

          # Fail on real-looking Stripe price IDs (these should be placeholders).
          if grep -nE '^STRIPE_PRICE_.*=price_[A-Za-z0-9]+' .env.example; then
            echo "❌ .env.example contains Stripe price IDs. Replace with placeholders."
            exit 1
          fi

          echo "✅ .env.example looks safe (no obvious secrets)."

  ci-guardrails:
    name: Guardrails (proxy)
    # Draft PRs skip; ready PRs + pushes + merge queue enforce core repo guardrails
    needs: [ci-path-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.has_code_changes == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Next.js proxy guard
        run: pnpm --filter=@jovie/web run next:proxy-guard

  ci-biome:
    name: Lint
    # Single consolidated job for all Biome checks (lint + format)
    needs: [ci-path-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.has_code_changes == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run Biome CI (lint + format)
        run: |
          # For PRs: only lint changed files (faster, pre-commit already ran on local)
          # For pushes to main: full lint to catch any issues
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            # Use diff-filter=d to exclude deleted files (biome can't lint deleted files)
            # Include .mts/.mjs extensions for ESM config files
            CHANGED_FILES=$(git diff --diff-filter=d --name-only "origin/${{ github.base_ref }}" HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.mts' '*.mjs' ':(exclude)**/package-lock.json' ':(exclude).claude/settings.json' ':(exclude).claude/skills/**' | tr '\n' ' ')
            if [ -n "$CHANGED_FILES" ]; then
              echo "Linting changed files only: $CHANGED_FILES"
              pnpm biome ci --reporter=github $CHANGED_FILES
            else
              echo "No lintable files changed"
            fi
          else
            pnpm biome ci --reporter=github .
          fi

  ci-eslint:
    name: ESLint Server Boundaries
    # Check server/client boundary violations
    needs: [ci-path-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.has_code_changes == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run ESLint server boundary checks
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t CHANGED_FILES < <(
              git diff --diff-filter=d --name-only "origin/${{ github.base_ref }}" HEAD -- \
                'apps/web/*.ts' \
                'apps/web/*.tsx' \
                'apps/web/**/*.ts' \
                'apps/web/**/*.tsx'
            )
            if (( ${#CHANGED_FILES[@]} > 0 )); then
              pnpm --filter=@jovie/web run lint:server-boundaries -- "${CHANGED_FILES[@]}"
            else
              echo "No server-boundary TypeScript files changed"
            fi
          else
            pnpm --filter=@jovie/web run lint:server-boundaries
          fi

  ci-knip:
    name: Knip (dead code)
    # Detect unused files, dependencies, and exports
    needs: [ci-path-changes]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-path-changes.outputs.has_code_changes == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run Knip (unused files, deps & exports)
        run: pnpm knip

  ci-typecheck:
    name: Typecheck
    # Draft PRs skip; ready PRs + pushes + merge queue run typecheck
    # Note: Runs in parallel with lint for speed (no dependency on cache-warm)
    needs: [ci-path-changes]
    runs-on: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.has_code_changes == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history needed for turbo --affected merge-base detection
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Cache Turbo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          # Use content hash for better cache hit rates (not commit SHA which changes every commit)
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Cache TypeScript artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .cache/tsbuildinfo
            apps/web/.cache/tsbuildinfo
          key: ${{ runner.os }}-tsc-${{ github.ref }}-${{ hashFiles('**/tsconfig*.json', '**/pnpm-lock.yaml', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-tsc-${{ github.ref }}-
            ${{ runner.os }}-tsc-
      - name: Run typecheck
        run: pnpm turbo typecheck --affected

  neon-db:
    name: Neon DB
    needs: [ci-path-changes]
    # Run for push to main, risky PRs with the testing label, or schema PRs that need a shared Neon branch.
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && (contains(github.event.pull_request.labels.*.name, 'testing') || needs.ci-path-changes.outputs.run_drizzle == 'true')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      branch_name: ${{ steps.sanitize-branch.outputs.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check for backend changes
        id: check-backend
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail

          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)

          # Check if any backend-related files changed (migrations, lib/db, API routes, etc.)
          if echo "$CHANGED_FILES" | grep -E '^(drizzle/migrations/|apps/web/lib/db/|apps/web/app/api/)' > /dev/null; then
            echo "Backend changes detected, Neon DB required"
            echo "needs_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "No backend changes detected, skipping Neon DB creation"
            echo "needs_db=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Cleanup old Neon branches (prevent limit errors)
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'testing') || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/neon-branch-cleanup
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_limit: '10'
          protected_branches: 'main,development,preview,br-main,br-production'
          cleanup_threshold: '7'

      - name: Determine sanitized branch name
        id: sanitize-branch
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'testing') || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          RAW_REF: ${{ github.head_ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          RAW="$RAW_REF"

          # Avoid collisions with protected long-lived branches in Neon.
          # For push to main we reuse the long-lived Neon branch.
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "main" ]]; then
            RAW="$REF_NAME"
          fi

          # sanitize: lowercase, replace slashes with dashes, remove invalid chars, collapse repeats
          SANITIZED=$(printf '%s' "$RAW" | tr '[:upper:]' '[:lower:]' | sed -E 's|/|-|g; s|[^a-z0-9._-]|-|g; s/-{2,}/-/g; s/^-+//; s/-+$//')
          BASE=$(printf '%s' "$SANITIZED" | cut -c1-40)
          SUFFIX="${RUN_ID}-${RUN_ATTEMPT}"
          FINAL="${BASE}-${SUFFIX}"
          echo "Using sanitized branch name: $FINAL"
          echo "name=$FINAL" >> "$GITHUB_OUTPUT"
      - name: Create or reuse Neon branch (with retry)
        id: create-branch
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'testing') || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ steps.sanitize-branch.outputs.name }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
      - name: Finalize Neon DB URLs
        id: finalize-urls
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'testing') || steps.check-backend.outputs.needs_db == 'true' }}
        run: |
          DB_URL="${{ steps.create-branch.outputs.db_url }}"
          DB_URL_POOLED="${{ steps.create-branch.outputs.db_url_pooled }}"

          if [ -z "$DB_URL" ]; then
            echo "Neon branch creation did not return db_url."
            echo "This indicates NEON_PROJECT_ID/NEON_API_KEY or the create-branch action is failing."
            exit 1
          fi

          if [ -z "$DB_URL_POOLED" ]; then
            echo "Neon branch creation did not return db_url_pooled."
            echo "The pooled URL is required for stable cross-job CI consumers."
            exit 1
          fi

          # Intentionally do NOT expose DB_URL via job outputs.
          # GitHub will drop outputs that look like secrets, which breaks downstream jobs.
          echo "Neon DB URL resolved for this job."

      - name: Persist Neon DB connection artifact
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'testing') || steps.check-backend.outputs.needs_db == 'true' }}
        run: |
          mkdir -p /tmp/neon-db-artifact
          jq -n \
            --arg db_url "${{ steps.create-branch.outputs.db_url }}" \
            --arg db_url_pooled "${{ steps.create-branch.outputs.db_url_pooled }}" \
            --arg branch_id "${{ steps.create-branch.outputs.branch_id }}" \
            --arg branch_name "${{ steps.sanitize-branch.outputs.name }}" \
            '{
              db_url: $db_url,
              db_url_pooled: $db_url_pooled,
              branch_id: $branch_id,
              branch_name: $branch_name
            }' > /tmp/neon-db-artifact/connection.json

      - name: Upload Neon DB connection artifact
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'testing') || steps.check-backend.outputs.needs_db == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-artifact/connection.json
          retention-days: 1

  drizzle-migration-guard:
    name: Migration Guard
    needs: [ci-path-changes]
    # Skip if 'skip-migration-guard' label is present (for schema consolidation)
    if: ${{ github.event_name == 'push' || github.event_name == 'merge_group' || (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-migration-guard')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      # Skip notification (updated condition)
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping migration guard as no DB/schema paths were changed."
          exit 0
      - name: Run Migration Guard
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          # Make script executable
          chmod +x apps/web/scripts/check-migrations.sh
          chmod +x apps/web/scripts/validate-migrations.sh

          # Run migration guard and validation from apps/web directory
          cd apps/web

          ./scripts/check-migrations.sh
          ./scripts/validate-migrations.sh
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}

  ci-drizzle-check:
    name: Drizzle Check
    needs: [neon-db, ci-path-changes]
    # Drizzle check runs on push to main or PRs with testing label
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'testing')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping Drizzle check as no DB/schema paths were changed."
          echo "To force a full CI run, add the 'testing' label to the PR."
          exit 0

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          CONNECTION_FILE="/tmp/neon-db-connection/connection.json"
          if [ ! -f "$CONNECTION_FILE" ]; then
            echo "Neon DB connection artifact missing."
            exit 1
          fi

          CANDIDATE=$(jq -r '.db_url // .db_url_pooled // empty' "$CONNECTION_FILE")
          echo "Using direct-first Neon DB URL from neon-db artifact for Drizzle check"
          echo "DATABASE_URL=$CANDIDATE" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run Drizzle check against staging/production DBs."
            exit 1
          fi

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Drizzle Check
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:check

  ci-fast:
    name: ci-fast
    # Gate for PRs, pushes, and merge queue: aggregate fast checks
    needs: [ci-typecheck, ci-biome, ci-eslint, ci-guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All fast checks passed
        run: |
          echo "ci-fast passed: Typecheck, Biome (lint + format), ESLint (server boundaries), and guardrails succeeded"

  ci-regression-test-policy:
    name: Regression Test Policy (warn)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=50

      - name: Warn when bug-fix PR lacks regression coverage
        continue-on-error: true
        run: node scripts/check-regression-test.mjs --mode warn --base-ref "origin/${{ github.base_ref }}"

  ci-pr-ready:
    name: PR Ready
    # Single merge gate for PRs and merge queue.
    # Gates on fast checks (typecheck, lint, guardrails), unit tests, public-route build, and Lighthouse audits.
    needs: [ci-fast, ci-unit-tests, ci-build-public, ci-lighthouse-dashboard-pr, ci-lighthouse-onboarding-pr, ci-lighthouse-pr]
    if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group') }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate required PR checks
        run: |
          FAST_RESULT="${{ needs.ci-fast.result }}"
          UNIT_RESULT="${{ needs.ci-unit-tests.result }}"
          BUILD_RESULT="${{ needs.ci-build-public.result }}"
          DASHBOARD_LIGHTHOUSE_RESULT="${{ needs.ci-lighthouse-dashboard-pr.result }}"
          ONBOARDING_LIGHTHOUSE_RESULT="${{ needs.ci-lighthouse-onboarding-pr.result }}"
          PUBLIC_LIGHTHOUSE_RESULT="${{ needs.ci-lighthouse-pr.result }}"
          echo "ci-fast: $FAST_RESULT"
          echo "ci-unit-tests: $UNIT_RESULT"
          echo "ci-build-public: $BUILD_RESULT"
          echo "ci-lighthouse-dashboard-pr: $DASHBOARD_LIGHTHOUSE_RESULT"
          echo "ci-lighthouse-onboarding-pr: $ONBOARDING_LIGHTHOUSE_RESULT"
          echo "ci-lighthouse-pr: $PUBLIC_LIGHTHOUSE_RESULT"

          # ci-fast must succeed (or be skipped when path-gated with no app files changed)
          if [[ "$FAST_RESULT" != "success" && "$FAST_RESULT" != "skipped" ]]; then
            echo "❌ ci-fast did not pass (result: $FAST_RESULT)"
            exit 1
          fi

          # Unit tests must succeed (or be skipped when path-gated with no test files changed)
          if [[ "$UNIT_RESULT" != "success" && "$UNIT_RESULT" != "skipped" ]]; then
            echo "❌ Unit tests did not pass (result: $UNIT_RESULT)"
            exit 1
          fi

          # Build must succeed. Only skipped for fork PRs (no secrets).
          if [[ "$BUILD_RESULT" != "success" && "$BUILD_RESULT" != "skipped" ]]; then
            echo "❌ ci-build-public did not pass (result: $BUILD_RESULT)"
            exit 1
          fi

          if [[ "$DASHBOARD_LIGHTHOUSE_RESULT" != "success" && "$DASHBOARD_LIGHTHOUSE_RESULT" != "skipped" ]]; then
            echo "❌ ci-lighthouse-dashboard-pr did not pass (result: $DASHBOARD_LIGHTHOUSE_RESULT)"
            exit 1
          fi

          # Onboarding Lighthouse — path-gated, so skipped when no onboarding files changed
          if [[ "$ONBOARDING_LIGHTHOUSE_RESULT" != "success" && "$ONBOARDING_LIGHTHOUSE_RESULT" != "skipped" ]]; then
            echo "❌ ci-lighthouse-onboarding-pr did not pass (result: $ONBOARDING_LIGHTHOUSE_RESULT)"
            exit 1
          fi

          # Public routes Lighthouse — path-gated, blocks when triggered
          if [[ "$PUBLIC_LIGHTHOUSE_RESULT" != "success" && "$PUBLIC_LIGHTHOUSE_RESULT" != "skipped" ]]; then
            echo "❌ ci-lighthouse-pr did not pass (result: $PUBLIC_LIGHTHOUSE_RESULT)"
            exit 1
          fi

          echo "All required PR checks passed: lint, typecheck, guardrails, unit tests, build, lighthouse"

  ci-build-public:
    name: Build (public routes)
    needs: [ci-path-changes]
    # Shared Next.js build for a11y + layout-guard — build once, test twice.
    # On PRs: always runs (non-fork) for build validation. Part of the merge gate.
    # On merge_group: runs to validate build hasn't regressed before merge.
    # On main push: always runs for full coverage.
    # Fork PRs are excluded (no secrets) — skipped via fork-pr-gate.
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_artifact: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          # Run when UI/component paths or public QA inputs changed.
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_PUBLIC_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_public_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_PUBLIC_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: echo "Skipping build — no UI-relevant paths changed."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Build app (public routes only — no secrets needed)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo build --filter=@jovie/web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Verify build output exists
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [ ! -d "apps/web/.next" ]; then
            echo "::error::Build output directory apps/web/.next does not exist — build may have used remote cache without producing local output"
            exit 1
          fi
          echo "Build output verified: $(du -sh apps/web/.next | cut -f1)"

      - name: Package build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -cf /tmp/nextjs-build.tar -C apps/web .next

      - name: Upload build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build.tar
          retention-days: 1
          if-no-files-found: error

  ci-layout-guard:
    name: Layout Guard (informational)
    needs: [ci-build-public]
    # Fully informational — never blocks PRs or merge queue.
    # Runs when ci-build-public produced an artifact. Failures are logged but don't gate merges.
    # Skipped on push-to-main (merge queue already validated).
    if: ${{ github.event_name == 'pull_request' && needs.ci-build-public.outputs.has_artifact == 'true' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-node-pnpm

      - name: Cache Playwright Browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium)
        # This job only has an 8 minute budget. Avoid apt-based `--with-deps` here
        # because slow font package mirrors can consume the whole lane before tests run.
        run: pnpm --filter=@jovie/web exec playwright install chromium

      - name: Download build artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.download.outcome == 'success'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Run layout overlap/touching guard
        if: steps.download.outcome == 'success'
        run: |
          cd apps/web

          if [ ! -f tests/e2e/layout-overlap-guard.spec.ts ]; then
            echo "⚠ layout-overlap-guard.spec.ts not found — skipping"
            exit 0
          fi
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          PORT=3100 pnpm --filter=@jovie/web exec next start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then break; fi
            sleep 1
          done
          pnpm exec playwright test tests/e2e/layout-overlap-guard.spec.ts --project=chromium --reporter=line
          EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
        env:
          BASE_URL: http://localhost:3100
          SMOKE_ONLY: '1'
          CI: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: layout-guard-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 3

  ci-lighthouse-pr:
    name: Lighthouse (public routes PR)
    needs: [ci-build-public, ci-path-changes, neon-db]
    # Runs Lighthouse CI against the public-route build artifact on PRs.
    # Blocks PRs when triggered (path-gated to public-route changes).
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && needs.ci-build-public.outputs.has_artifact == 'true' && needs.ci-path-changes.outputs.run_public_lighthouse == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node-pnpm

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: public-lighthouse-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        id: resolve-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        run: echo "DATABASE_URL=${{ steps.resolve-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        run: pnpm --filter=@jovie/web exec tsx tests/seed-test-data.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Run Lighthouse CI (public launch thresholds)
        run: |
          cd apps/web
          cleanup() {
            kill $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          PORT=3000 pnpm --filter=@jovie/web exec next start &
          SERVER_PID=$!

          echo "Waiting for server to start..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:public:launch
        env:
          CI: true
          BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PUBLIC_NOAUTH_SMOKE: '1'
          URL_ENCRYPTION_KEY: lighthouse-public-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-public-ci

  ci-lighthouse-dashboard-pr:
    name: Lighthouse (dashboard PR)
    needs: [ci-fast, ci-path-changes, neon-db]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && contains(github.event.pull_request.labels.*.name, 'testing') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_DASHBOARD_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_dashboard_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_DASHBOARD_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: echo "Skipping dashboard Lighthouse — no dashboard-relevant paths changed."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Cache Playwright Browsers
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web exec playwright install chromium

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: dashboard-lighthouse-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-dashboard-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-dashboard-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Build app for dashboard Lighthouse
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run authenticated dashboard Lighthouse
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          if [ -z "$E2E_CLERK_USER_ID" ]; then
            echo "E2E_CLERK_USER_ID not set — skipping dashboard Lighthouse."
            exit 0
          fi

          export E2E_USE_TEST_AUTH_BYPASS=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found — dashboard Lighthouse cannot start."
            exit 1
          fi

          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:dashboard:pr
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          URL_ENCRYPTION_KEY: lighthouse-dashboard-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-dashboard-ci
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload dashboard Lighthouse artifacts
        if: always() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-dashboard-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/.lighthouseci/dashboard-pr/
          if-no-files-found: ignore
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-lighthouse-onboarding-pr:
    name: Lighthouse (onboarding PR)
    needs: [ci-fast, ci-path-changes, neon-db]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && needs.ci-path-changes.outputs.run_onboarding_lighthouse == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Cache Playwright Browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium)
        run: pnpm --filter=@jovie/web exec playwright install chromium

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: onboarding-lighthouse-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        id: resolve-onboarding-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        run: echo "DATABASE_URL=${{ steps.resolve-onboarding-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Build app for onboarding Lighthouse
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run authenticated onboarding Lighthouse
        run: |
          cd apps/web

          if [ -z "$E2E_CLERK_USER_ID" ]; then
            echo "E2E_CLERK_USER_ID not set — skipping onboarding Lighthouse."
            exit 0
          fi

          export E2E_USE_TEST_AUTH_BYPASS=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found — onboarding Lighthouse cannot start."
            exit 1
          fi

          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:onboarding:pr
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          URL_ENCRYPTION_KEY: lighthouse-onboarding-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-onboarding-ci
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload onboarding Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-onboarding-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/.lighthouseci/onboarding-pr/
          if-no-files-found: ignore
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-pr-neon-migrate:
    name: DB Migrate (PR main)
    needs: [neon-db, ci-path-changes]
    # Only run when drizzle/schema paths changed — skip entirely otherwise to save runners
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && needs.ci-path-changes.outputs.run_drizzle == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping DB migrate check: no DB/schema/migration paths were changed."
          exit 0

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          CONNECTION_FILE="/tmp/neon-db-connection/connection.json"
          if [ ! -f "$CONNECTION_FILE" ]; then
            echo "Neon DB connection artifact missing."
            exit 1
          fi

          CANDIDATE=$(jq -r '.db_url // .db_url_pooled // empty' "$CONNECTION_FILE")
          echo "DATABASE_URL=$CANDIDATE" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

  # Post-deploy smoke test -- deterministic curl checks against production.
  # Replaces the previous Playwright-based test that was flaky due to
  # dynamic content assertions, hydration timing, and excessive retries.
  ci-public-profile-smoke:
    name: Post-Deploy Smoke (Production)
    needs: [promote-production]
    # Run after successful deploy to production
    if: ${{ always() && needs.promote-production.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for CDN propagation
        run: |
          echo "Waiting 30s for Vercel CDN propagation after deploy..."
          sleep 30

      - name: Verify production endpoints are healthy
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail

          USER_AGENT="Mozilla/5.0 (compatible; JovieCI/1.0; +https://jov.ie)"
          COOKIE_JAR="$(mktemp)"
          MAX_RETRIES=5

          # Vercel Deployment Protection bypass
          BYPASS_SECRET="${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          BYPASS_ARGS=()
          if [ -n "$BYPASS_SECRET" ]; then
            BYPASS_ARGS+=(
              -H "x-vercel-protection-bypass: $BYPASS_SECRET"
              -H "x-vercel-set-bypass-cookie: true"
              -c "$COOKIE_JAR"
              -b "$COOKIE_JAR"
            )
          fi

          # Helper: curl with standard options, returns "body\nstatus_code"
          # Append a cache-busting query parameter to bypass Vercel CDN edge cache,
          # ensuring post-deploy smoke tests always hit the origin server.
          fetch() {
            local sep="?"
            [[ "$1" == *"?"* ]] && sep="&"
            curl -sS -L -A "$USER_AGENT" \
              -H "Cache-Control: no-cache, no-store, must-revalidate" \
              -H "Pragma: no-cache" \
              "${BYPASS_ARGS[@]}" -w "\n%{http_code}" "${1}${sep}_cb=$(date +%s%N)" || echo -e "\n000"
          }

          # Helper: retry a check function with exponential backoff (max 5 attempts)
          retry() {
            local label="$1"; shift
            local attempt=1
            while [ $attempt -le $MAX_RETRIES ]; do
              if "$@"; then
                return 0
              fi
              if [ $attempt -lt $MAX_RETRIES ]; then
                local delay=$((attempt * 3))
                echo "  Retry $attempt/$MAX_RETRIES for $label in ${delay}s..."
                sleep "$delay"
              fi
              attempt=$((attempt + 1))
            done
            echo "::error::$label failed after $MAX_RETRIES attempts"
            return 1
          }

          FAILURES=0

          # -- 1. Health API: JSON status=ok --
          check_health() {
            local response
            response=$(fetch "https://jov.ie/api/health")
            local status="${response##*$'\n'}"
            local body="${response%$'\n'*}"

            if [ "$status" != "200" ]; then
              echo "  Health API returned HTTP $status"
              return 1
            fi

            if ! echo "$body" | grep -q '"status":"ok"'; then
              echo "  Health API status is not ok: $body"
              return 1
            fi

            echo "  Health API: HTTP 200, status=ok"
            return 0
          }

          echo "=== 1/4 Health API ==="
          if ! retry "Health API" check_health; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 2. Homepage: HTTP 200, >1000 chars, no error strings --
          check_homepage() {
            local response
            response=$(fetch "https://jov.ie")
            local status="${response##*$'\n'}"
            local body="${response%$'\n'*}"

            if [ "$status" != "200" ]; then
              echo "  Homepage returned HTTP $status"
              return 1
            fi

            if [ ${#body} -lt 1000 ]; then
              echo "  Homepage body too short (${#body} chars)"
              return 1
            fi

            if echo "$body" | grep -qi "application error\|internal server error\|something went wrong"; then
              echo "  Homepage contains error message"
              return 1
            fi

            echo "  Homepage: HTTP 200, ${#body} chars, no errors"
            return 0
          }

          echo "=== 2/4 Homepage ==="
          if ! retry "Homepage" check_homepage; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 3. Public profile: HTTP 200, substantial content, no 404 markers --
          # Warm up the database connection before checking the profile page.
          # The health check (step 1) may use a lightweight query that doesn't
          # fully warm Neon, so hit the profile once and discard the result.
          fetch "https://jov.ie/tim" > /dev/null 2>&1
          sleep 5

          check_profile() {
            local response
            response=$(fetch "https://jov.ie/tim")
            local status="${response##*$'\n'}"
            local body="${response%$'\n'*}"

            if [ "$status" -ge 500 ] 2>/dev/null; then
              echo "  Profile /tim returned HTTP $status (server error)"
              return 1
            fi

            if [ ${#body} -lt 500 ]; then
              echo "  Profile /tim body too short (${#body} chars)"
              return 1
            fi

            if echo "$body" | grep -qi "application error\|internal server error\|something went wrong"; then
              echo "  Profile /tim contains error content"
              return 1
            fi

            # "Profile not found" with HTTP 200 is a valid app response (data issue),
            # not a code regression — warn but don't fail.
            if echo "$body" | grep -qi "profile not found\|page could not be found"; then
              echo "  Profile /tim: HTTP $status, profile not seeded (non-blocking warning)"
            else
              echo "  Profile /tim: HTTP $status, ${#body} chars, renders correctly"
            fi
            return 0
          }

          echo "=== 3/4 Public Profile ==="
          if ! retry "Public Profile" check_profile; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 4. Critical pages: /signup, /pricing -- no 5xx --
          check_critical_pages() {
            for route in "/signup" "/pricing"; do
              local response
              response=$(fetch "https://jov.ie${route}")
              local status="${response##*$'\n'}"

              if [ "$status" -ge 500 ] 2>/dev/null; then
                echo "  Route ${route} returned HTTP $status (server error)"
                return 1
              fi
              echo "  ${route}: HTTP $status"
            done
            return 0
          }

          echo "=== 4/4 Critical Pages ==="
          if ! retry "Critical Pages" check_critical_pages; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- Summary --
          echo ""
          if [ $FAILURES -gt 0 ]; then
            echo "::error::Post-deploy smoke failed: $FAILURES/4 checks failed"
            exit 1
          fi
          echo "Post-deploy smoke passed: 4/4 checks OK"

  # Post-deploy authenticated smoke test — lightweight Playwright test against production.
  # Verifies sign-in + dashboard load with real credentials after deploy.
  # Non-blocking initially — promote to blocking once stable.
  ci-post-deploy-auth-smoke:
    name: Post-Deploy Auth Smoke (Production)
    needs: [promote-production]
    if: ${{ always() && needs.promote-production.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check for production auth credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.E2E_PROD_USER_EMAIL }}" ] && [ -z "${{ secrets.E2E_CLERK_USER_USERNAME }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No production auth credentials configured — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check-creds.outputs.skip != 'true'

      - name: Cache Playwright Browsers
        if: steps.check-creds.outputs.skip != 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium only)
        if: steps.check-creds.outputs.skip != 'true'
        run: pnpm --filter=@jovie/web exec playwright install chromium

      - name: Wait for CDN propagation
        if: steps.check-creds.outputs.skip != 'true'
        run: sleep 30

      - name: Run production auth smoke tests
        if: steps.check-creds.outputs.skip != 'true'
        run: |
          cd apps/web

          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          CI=true BASE_URL=https://jov.ie pnpm exec playwright test tests/e2e/smoke-prod-auth.spec.ts --project=chromium --reporter=line
        env:
          E2E_PROD_USER_EMAIL: ${{ secrets.E2E_PROD_USER_EMAIL }}
          E2E_PROD_USER_PASSWORD: ${{ secrets.E2E_PROD_USER_PASSWORD }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright Artifacts on Failure
        if: failure() && steps.check-creds.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-deploy-auth-smoke-${{ github.run_id }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

  ci-build:
    name: Build
    needs: [ci-path-changes]
    # Build skips typecheck (NEXT_IGNORE_TYPECHECK=1), downstream jobs gate on ci-fast
    # Skipped in merge queue: no merge-queue jobs depend on the full build.
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'testing') || contains(github.event.pull_request.labels.*.name, 'deploy-preview'))) || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history needed for turbo --affected merge-base detection
          fetch-depth: 0

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_build }}" >> "$GITHUB_OUTPUT"

      # Skip remaining steps if no relevant changes
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping full CI as no critical paths were changed."
          echo "To force a full CI run, add the 'testing' label to the PR."
          exit 0

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      # .next/cache is managed by Turbo — no separate cache step needed

      - name: Build
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo build --affected
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Bundle size comparison
        if: steps.check_changes.outputs.run_full_ci == 'true'
        continue-on-error: true
        run: pnpm --filter @jovie/web compare-chunks

      - name: Upload build manifest
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: build-manifest
          path: apps/web/.next/build-manifest.json
          retention-days: 7

      - name: Pre-deploy Lighthouse performance check
        if: steps.check_changes.outputs.run_full_ci == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          cd apps/web


          if [ ! -f .lighthouserc.build.json ]; then
            echo "⚠️ Lighthouse config not found; skipping."
            exit 0
          fi

          # Start Next.js standalone server in background (monorepo places it under apps/web/)
          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          # Wait for server to be ready (verify it actually started)
          echo "Waiting for server to start..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "⚠️ Server failed to start within 30s. Skipping Lighthouse."
            kill $SERVER_PID 2>/dev/null || true
            exit 0
          fi

          # Run Lighthouse CI with build config
          pnpm --filter web exec lhci autorun --config=.lighthouserc.build.json || {
            echo "⚠️ Lighthouse checks failed - performance regression detected"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          }

          # Clean up
          kill $SERVER_PID 2>/dev/null || true
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          URL_ENCRYPTION_KEY: ${{ secrets.URL_ENCRYPTION_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

  ci-unit-tests:
    name: Unit Tests (${{ matrix.shard }})
    needs: [ci-path-changes]
    # Runs on PRs, main pushes, merge queue, and manual dispatch.
    # Parallel with typecheck/build for faster CI.
    # Path-gated: skips test execution when no test-relevant files changed.
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '3/4', '4/4']
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history for vitest --changed

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_test }}" >> "$GITHUB_OUTPUT"

      # Skip remaining steps if no relevant changes
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping unit tests as no critical paths were changed."
          exit 0

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Load quarantined unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: quarantine
        run: |
          FILE="apps/web/tests/quarantine.json"
          UNIT_FILES=""
          UNIT_EXCLUDES=""

          if [ -f "$FILE" ]; then
            UNIT_FILES=$(jq -r '.unit // [] | join(" ")' "$FILE")
            UNIT_EXCLUDES=$(jq -r '.unit // [] | map("--exclude=" + .) | join(" ")' "$FILE")
          fi

          echo "unit_files=$UNIT_FILES" >> "$GITHUB_OUTPUT"
          echo "unit_excludes=$UNIT_EXCLUDES" >> "$GITHUB_OUTPUT"

          if [ -n "$UNIT_FILES" ]; then
            echo "has_unit=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_unit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TURBO_SCM_HEAD: ${{ github.sha }}
          TURBO_SCM_BASE: ${{ github.event_name == 'merge_group' && 'origin/main' || (github.base_ref && format('origin/{0}', github.base_ref)) || '' }}
        run: |
          RUN_WITH_COVERAGE="false"
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            RUN_WITH_COVERAGE="true"
          fi
          # Use forked pool with limited workers to reduce CI flakiness from memory pressure
          export NODE_OPTIONS="--max-old-space-size=2048"
          VITEST_CI_FLAGS="--pool=forks --maxWorkers=2"
          # Mitigate low-frequency flakes by retrying failed tests once in CI
          RETRY_FLAG="--retry=1"
          # Use shard-specific output file so Codecov Test Analytics receives all 4 shards
          # (a shared filename causes only the last upload to be recorded)
          # Note: vitest runs from apps/web/, so path is relative to that directory
          SHARD_SLUG="${{ matrix.shard }}"
          SHARD_SLUG="${SHARD_SLUG//\//-}"
          OUTPUT_FLAG="--outputFile=test-report.${SHARD_SLUG}.junit.xml"

          if [ "$RUN_WITH_COVERAGE" = "true" ]; then
            echo "🧪 PR/main: Running web unit suite with coverage"
            pnpm --filter=@jovie/web run test:fast -- $VITEST_CI_FLAGS --coverage $RETRY_FLAG --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} $OUTPUT_FLAG
          elif [ -n "${{ github.base_ref }}" ] || [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "🔍 Merge queue: Running fast web unit suite"
            pnpm --filter=@jovie/web run test:fast -- $VITEST_CI_FLAGS $RETRY_FLAG --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} $OUTPUT_FLAG
          else
            echo "🔍 Feature branch push: Running critical + interaction tests only (no base_ref available)"
            # Push events on feature branches (claude/*, codegen-bot/*) don't have base_ref,
            # so we can't determine changed files. Run critical + interaction tests only to avoid OOM
            # from the full test suite. The PR event covers changed-file tests.
            # --passWithNoTests: some shards may have no files matching the filter
            pnpm --filter=@jovie/web run test:fast -- $VITEST_CI_FLAGS $RETRY_FLAG --passWithNoTests --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} "critical|interaction" $OUTPUT_FLAG
          fi
      - name: Run quarantined unit tests (retries)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.has_unit == 'true'
        continue-on-error: true
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TURBO_SCM_HEAD: ${{ github.sha }}
          TURBO_SCM_BASE: ${{ github.event_name == 'merge_group' && 'origin/main' || (github.base_ref && format('origin/{0}', github.base_ref)) || '' }}
        run: pnpm --filter=@jovie/web run test:fast -- --pool=forks --maxWorkers=2 --retry=2 ${{ steps.quarantine.outputs.unit_files }}

      - name: Run packages/ui unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo test --filter=@jovie/ui

      - name: Upload coverage to Codecov
        if: steps.check_changes.outputs.run_full_ci == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: apps/web/coverage/lcov.info
          flags: unittests
          name: unittests-${{ matrix.shard }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Emit passing Codecov statuses when tests are skipped
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.run_full_ci != 'true' && matrix.shard == '1/4'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          run_command: empty-upload
          force: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && steps.check_changes.outputs.run_full_ci == 'true' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/test-report.*.junit.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

  ci-a11y:
    name: A11y (axe)
    # Runs axe-core WCAG 2.1 AA audit on public routes — uses shared build artifact.
    needs: [ci-build-public, ci-path-changes, neon-db]
    if: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || github.event_name == 'workflow_dispatch') && needs.ci-build-public.outputs.has_artifact == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          # Align with ci-build-public so public QA config changes still run the blocking lane.
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_PUBLIC_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_public_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_PUBLIC_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping a11y audit — no UI-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Create ephemeral Neon database branch (with retry)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: neon-branch
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: public-a11y-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-a11y-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-a11y-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Cache Playwright Browsers
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web exec playwright install chromium

      - name: Download build artifact
        id: download
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number || github.run_id }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web exec tsx tests/seed-test-data.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Run axe a11y audit (public routes)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          # Create empty auth state so Playwright's auth-setup project doesn't crash.
          # The axe audit only tests public routes (SMOKE_ONLY=1) so no real auth is needed.
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          PORT=3100 pnpm --filter=@jovie/web exec next start &
          SERVER_PID=$!
          # Wait for server to accept connections
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then break; fi
            sleep 1
          done
          pnpm exec playwright test tests/e2e/axe-audit.spec.ts --config=playwright.config.ts --project=chromium --reporter=line
          kill $SERVER_PID 2>/dev/null || true
        env:
          BASE_URL: http://localhost:3100
          SMOKE_ONLY: '1'
          CI: true
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          URL_ENCRYPTION_KEY: a11y-public-ci-url-encryption-key
          AI_GATEWAY_API_KEY: a11y-public-ci

      - name: Upload Playwright Report on Failure
        if: failure() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-axe-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

