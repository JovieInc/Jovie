name: CI

on:
  pull_request:
    branches: [main, 'integration/**']
  # merge_group retired 2026-06-18: Graphite owns the merge queue; GitHub never
  # creates a merge_group, so this trigger would never fire. See .github/MERGE_QUEUE.md.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'apps/web/public/product-screenshots/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  # On main, scope the concurrency group per-commit so rapid merges cannot
  # cancel each other's deploy pipelines. GitHub evaluates cancel-in-progress
  # expressions as strings and treats "false" as truthy, which was cancelling
  # every main CI run when the next merge landed and starving production
  # promotion. Using github.sha in the group on main sidesteps the issue
  # entirely. PRs share a group per ref so stale runs are superseded as usual.
  group: >-
    ci-${{ github.workflow }}-${{
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
        && github.sha
        || github.ref
    }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_CACHE: local:rw,remote:rw
  # Larger runner for CPU-heavy jobs (typecheck, build, tests).
  # Set to a GitHub-hosted larger runner label (e.g. "ubuntu-4core") for burst throughput,
  # or leave as "ubuntu-latest" for default 2-core runners.
  FAST_RUNNER: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}
  # JOV-2497: four-slot cross-PR pool caps Neon branch *creation* (one endpoint per branch).
  # Only jobs that call neon-create-branch-with-retry use the pool — artifact consumers
  # (Lighthouse/A11y/Mobile Overflow) reuse neon-db and must NOT share the pool or
  # sibling matrix jobs cancel each other within the same workflow run.
  # Pool groups include github.job so branch-creator siblings in one workflow (neon-db,
  # dashboard Lighthouse, E2E smoke fallback, admin smoke) do not queue-cancel each other.

jobs:
  # ── CI Optimizer + Centralized path-change detection (merged) ──────────
  # Merged optimize_ci + ci-path-changes into one job to eliminate the serial
  # dependency chain that added ~5 min to every CI run. Graphite CI Optimizer
  # runs first (fail-open), then path detection.
  ci-path-changes:
    name: Path Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.graphite.outputs.skip || 'false' }}
      run_build: ${{ steps.detect.outputs.run_build }}
      run_test: ${{ steps.detect.outputs.run_test }}
      run_public_lighthouse: ${{ steps.detect.outputs.run_public_lighthouse }}
      run_dashboard_lighthouse: ${{ steps.detect.outputs.run_dashboard_lighthouse }}
      run_onboarding_lighthouse: ${{ steps.detect.outputs.run_onboarding_lighthouse }}
      run_admin_lighthouse: ${{ steps.detect.outputs.run_admin_lighthouse }}
      run_chat_lighthouse: ${{ steps.detect.outputs.run_chat_lighthouse }}
      run_promptfoo_evals: ${{ steps.detect.outputs.run_promptfoo_evals }}
      run_golden_eval_set: ${{ steps.detect.outputs.run_golden_eval_set }}
      run_e2e: ${{ steps.detect.outputs.run_e2e }}
      run_golden_path: ${{ steps.detect.outputs.run_golden_path }}
      run_drizzle: ${{ steps.detect.outputs.run_drizzle }}
      run_neon: ${{ steps.detect.outputs.run_neon }}
      has_code_changes: ${{ steps.detect.outputs.has_code_changes }}
    steps:
      - id: graphite-token
        name: Check Graphite token configuration
        env:
          GRAPHITE_TOKEN: ${{ secrets.GRAPHITE_TOKEN }}
        run: |
          if [ -z "${GRAPHITE_TOKEN:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GRAPHITE_TOKEN is not configured; Graphite CI Optimizations will not scan PRs."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - id: graphite
        if: steps.graphite-token.outputs.configured == 'true'
        continue-on-error: true
        uses: withgraphite/graphite-ci-action@402a89bc8aa6db18ae1f9c61953d001d5f9d828f # v0.0.11
        with:
          graphite_token: ${{ secrets.GRAPHITE_TOKEN }}

      - name: Skip CI (Graphite optimizer)
        if: steps.graphite.outputs.skip == 'true'
        run: |
          echo "Graphite CI optimizer requested skip — CI will be skipped."
          for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_promptfoo_evals run_golden_eval_set run_e2e run_golden_path run_drizzle run_neon has_code_changes; do
            echo "$t=false" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.graphite.outputs.skip != 'true'
        with:
          fetch-depth: 0
      - name: Detect path changes for all job types
        if: steps.graphite.outputs.skip != 'true'
        id: detect
        shell: bash
        run: |
          IS_FORK="${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}"
          # Determine changed files
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: run everything
            echo "Manual dispatch: running all checks"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_promptfoo_evals run_golden_eval_set run_e2e run_golden_path run_drizzle run_neon has_code_changes; do
              echo "$t=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi

          FULL_CI_LABEL="${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'testing') }}"

          PROMPTFOO_INFRA_TRIGGER_PATTERN='^(\.github/workflows/evals-periodic\.yml|\.github/workflows/README\.md|apps/web/tests/eval/promptfoo/|apps/web/tests/eval/golden/)'
          PROMPTFOO_INFRA_ALLOWED_PATTERN='^(\.github/workflows/ci\.yml|\.github/workflows/evals-periodic\.yml|\.github/workflows/README\.md|apps/web/tests/eval/promptfoo/.*|apps/web/tests/eval/golden/.*|apps/web/vitest\.config\.golden-eval\.mts|apps/web/scripts/run-golden-eval-set-ci\.sh|apps/web/package.*\.json|package.*\.json|pnpm-lock\.yaml)$'
          if echo "$CHANGED_FILES" | grep -q -E "$PROMPTFOO_INFRA_TRIGGER_PATTERN" &&
            ! echo "$CHANGED_FILES" | grep -v -E "$PROMPTFOO_INFRA_ALLOWED_PATTERN" | grep -q .; then
            echo "Promptfoo eval-infrastructure-only change: running deterministic eval CI and core static checks, even if the PR has the testing label."
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "run_promptfoo_evals=true" >> "$GITHUB_OUTPUT"
            echo "run_golden_eval_set=true" >> "$GITHUB_OUTPUT"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_e2e run_golden_path run_drizzle run_neon; do
              echo "$t=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Force run all if the 'testing' label is present. Promptfoo eval-infra-only
          # changes are handled above so the deterministic no-cost lane cannot fan out
          # into Neon, Lighthouse, or Playwright work by label accident.
          if [[ "$FULL_CI_LABEL" == "true" ]]; then
            echo "Forcing full CI run due to 'testing' label"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_promptfoo_evals run_golden_eval_set run_e2e run_golden_path run_drizzle run_neon has_code_changes; do
              echo "$t=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Check if only docs changed (exclude .github/ — workflow changes must run CI)
          if ! echo "$CHANGED_FILES" | grep -q -E '^\.github/' &&
            ! echo "$CHANGED_FILES" | grep -q -v -E '\.(md|txt)$'; then
            echo "Only documentation files changed"
            for t in run_build run_test run_public_lighthouse run_dashboard_lighthouse run_onboarding_lighthouse run_admin_lighthouse run_chat_lighthouse run_promptfoo_evals run_golden_eval_set run_e2e run_golden_path run_drizzle run_neon has_code_changes; do
              echo "$t=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          echo "has_code_changes=true" >> "$GITHUB_OUTPUT"

          # Build paths
          BUILD_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/lib/|apps/web/hooks/|apps/web/types/|apps/web/constants/|apps/web/package.*\.json|apps/web/next\.config\.js|apps/web/tailwind\.config\.|apps/web/postcss\.config\.|apps/web/instrumentation.*\.ts|apps/web/sentry\..*\.config\.ts|apps/web/middleware\.ts|package.*\.json|turbo\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$BUILD_PATTERN"; then
            RUN_BUILD=true
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            RUN_BUILD=false
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi

          # Test paths
          TEST_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/lib/|apps/web/hooks/|apps/web/types/|apps/web/tests/unit/|apps/web/__tests__/|packages/|.*\.test\.|.*\.spec\.|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$TEST_PATTERN"; then
            RUN_TEST=true
            echo "run_test=true" >> "$GITHUB_OUTPUT"
          else
            RUN_TEST=false
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          fi

          # Screenshot-only product exports live under public/product-screenshots and
          # must not force public Lighthouse + Neon on main (they are marketing assets,
          # not route code). Filter that tree out before matching public/* paths.
          PUBLIC_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.pr\.json|apps/web/\.lighthouserc\.public-launch\.json|apps/web/app/\(home\)/|apps/web/app/\(marketing\)/|apps/web/app/\(dynamic\)/legal/|apps/web/content/legal/|apps/web/app/\[username\]/|apps/web/app/layout\.tsx|apps/web/app/globals\.css|apps/web/public/|apps/web/styles/|apps/web/components/features/home/|apps/web/components/features/marketing/|apps/web/components/features/profile/|apps/web/components/homepage/|apps/web/components/marketing/|apps/web/scripts/run-public-lighthouse\.ts|apps/web/scripts/public-route-qa\.ts|apps/web/scripts/public-surface-qa\.ts|apps/web/scripts/performance-route-manifest\.ts|apps/web/tests/e2e/public-exhaustive\.spec\.ts|apps/web/tests/e2e/profile-mobile-viewport-stability\.spec\.ts|apps/web/tests/e2e/axe-audit\.spec\.ts|apps/web/tests/e2e/utils/(public-surface-(manifest|helpers)|smoke-test-utils|mobile-profile-viewports)\.ts|packages/|apps/web/package.*\.json|package.*\.json|apps/web/tailwind\.config\.|apps/web/postcss\.config\.)'
          PUBLIC_LIGHTHOUSE_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^apps/web/public/product-screenshots/' || true)
          if echo "$PUBLIC_LIGHTHOUSE_FILES" | grep -q -E "$PUBLIC_LIGHTHOUSE_PATTERN"; then
            echo "run_public_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_public_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          DASHBOARD_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.dashboard\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs)$'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$DASHBOARD_LIGHTHOUSE_PATTERN"; then
            echo "run_dashboard_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_dashboard_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          ONBOARDING_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.onboarding\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/onboarding/|apps/web/components/features/dashboard/organisms/onboarding|apps/web/components/features/dashboard/organisms/apple-style-onboarding|apps/web/components/features/onboarding/|apps/web/lib/onboarding/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$ONBOARDING_LIGHTHOUSE_PATTERN"; then
            echo "run_onboarding_lighthouse=true" >> $GITHUB_OUTPUT
          else
            echo "run_onboarding_lighthouse=false" >> $GITHUB_OUTPUT
          fi

          ADMIN_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.admin\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/app/\(shell\)/admin/|apps/web/components/features/admin/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$ADMIN_LIGHTHOUSE_PATTERN"; then
            echo "run_admin_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_admin_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          CHAT_LIGHTHOUSE_PATTERN='^(\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.chat\.pr\.json|apps/web/scripts/lighthouse-dashboard-auth\.cjs|apps/web/app/app/\(shell\)/chat/|apps/web/components/jovie/|apps/web/components/chat/)'
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" ]] || echo "$CHANGED_FILES" | grep -q -E "$CHAT_LIGHTHOUSE_PATTERN"; then
            echo "run_chat_lighthouse=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_chat_lighthouse=false" >> "$GITHUB_OUTPUT"
          fi

          PROMPTFOO_EVAL_PATTERN='^(\.github/workflows/ci\.yml|apps/web/tests/eval/promptfoo/|apps/web/tests/eval/golden/|apps/web/vitest\.config\.golden-eval\.mts|apps/web/scripts/run-golden-eval-set-ci\.sh|apps/web/lib/chat/|apps/web/app/api/chat/|apps/web/package.*\.json|package.*\.json|pnpm-lock\.yaml)'
          if echo "$CHANGED_FILES" | grep -q -E "$PROMPTFOO_EVAL_PATTERN"; then
            echo "run_promptfoo_evals=true" >> "$GITHUB_OUTPUT"
            echo "run_golden_eval_set=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_promptfoo_evals=false" >> "$GITHUB_OUTPUT"
            echo "run_golden_eval_set=false" >> "$GITHUB_OUTPUT"
          fi

          # E2E paths
          E2E_PATTERN='^(apps/web/app/|apps/web/components/|apps/web/tests/e2e/|apps/web/tests/smoke/|apps/web/playwright\.config\.|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$E2E_PATTERN"; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

          # Launch-gate golden path (JOV-3758). Mirrors docs/launch/LAUNCH_GATES.md's
          # path list: onboarding routes/components/libs, auth signup/signin entrypoints,
          # dashboard shell/releases flows, billing/checkout API routes used by the golden
          # path, golden-path Playwright specs + helpers, and launch-gate CI/Lighthouse/perf
          # config. Docs-only changes never reach here (handled by the docs-only guard above).
          LAUNCH_GATE_PATTERN='^(apps/web/app/onboarding/|apps/web/components/features/onboarding/|apps/web/components/features/dashboard/organisms/onboarding|apps/web/components/features/dashboard/organisms/apple-style-onboarding|apps/web/lib/onboarding/|apps/web/app/\(auth\)/|apps/web/app/signin/|apps/web/app/signup/|apps/web/app/sign-in/|apps/web/app/sign-up/|apps/web/app/app/\(shell\)/dashboard/|apps/web/app/app/\(shell\)/layout\.tsx|apps/web/components/features/dashboard/|apps/web/lib/releases/|apps/web/app/api/stripe/|apps/web/app/api/billing/|apps/web/app/api/checkout/|apps/web/lib/stripe/|apps/web/tests/e2e/golden-path\.spec\.ts|apps/web/tests/helpers/clerk-auth\.ts|apps/web/tests/global-setup\.ts|apps/web/playwright\.config\.ts|\.github/workflows/ci\.yml|apps/web/\.lighthouserc\.dashboard\.pr\.json|apps/web/\.lighthouserc\.onboarding\.pr\.json|docs/launch/LAUNCH_GATES\.md|apps/web/package.*\.json|package.*\.json)'
          if echo "$CHANGED_FILES" | grep -q -E "$LAUNCH_GATE_PATTERN"; then
            echo "run_golden_path=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_golden_path=false" >> "$GITHUB_OUTPUT"
          fi

          # Drizzle paths
          DRIZZLE_PATTERN='^(apps/web/drizzle/|apps/web/lib/db/|apps/web/drizzle\.config\.ts|drizzle\.kit\.(m?js|ts))'
          if echo "$CHANGED_FILES" | grep -q -E "$DRIZZLE_PATTERN"; then
            echo "run_drizzle=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_drizzle=false" >> "$GITHUB_OUTPUT"
          fi

          # Neon ephemeral-branch gate: only spin up Neon when DB-relevant code changed.
          # Covers drizzle, lib/db, lib/queries, schema, cron routes, SQL files, and
          # lockfile changes that could affect drizzle/DB deps. Version-only package
          # metadata changes should not spin up ephemeral Neon branches.
          # Jobs that create ephemeral Neon branches must check this flag before doing so.
          NEON_PATTERN='^(apps/web/drizzle/|apps/web/lib/db/|apps/web/lib/queries/|apps/web/drizzle\.config\.ts|drizzle\.kit\.(m?js|ts)|.*\.sql$|apps/web/app/api/cron/|pnpm-lock\.yaml)'
          if echo "$CHANGED_FILES" | grep -q -E "$NEON_PATTERN"; then
            echo "run_neon=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_neon=false" >> "$GITHUB_OUTPUT"
          fi

          # Fork guard: disable E2E for forks (no secrets)
          if [[ "$IS_FORK" == "true" ]]; then
            echo "Fork PR: disabling e2e and build"
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "run_golden_path=false" >> "$GITHUB_OUTPUT"
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "run_public_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_dashboard_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_admin_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_chat_lighthouse=false" >> "$GITHUB_OUTPUT"
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          fi

  ci-risk-classifier:
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    name: CI Risk Classifier
    needs: [ci-path-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      risk_level: ${{ steps.classify.outputs.risk_level }}
      requires_smoke: ${{ steps.classify.outputs.requires_smoke }}
      requires_preview: ${{ steps.classify.outputs.requires_preview }}
      blocks_unattended_auto_merge: ${{ steps.classify.outputs.blocks_unattended_auto_merge }}
      recommended_labels: ${{ steps.classify.outputs.recommended_labels }}
      matched_rule_ids: ${{ steps.classify.outputs.matched_rule_ids }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Collect changed files
        id: changed-files
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          CHANGED_FILES="$RUNNER_TEMP/ci-risk-changed-files.txt"
          : > "$CHANGED_FILES"
          DIFF_BASE=""

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch origin "$BASE_REF" --depth=1
            DIFF_BASE="origin/$BASE_REF"
            git diff --name-only "$DIFF_BASE" HEAD > "$CHANGED_FILES"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            DIFF_BASE="HEAD~1"
            git diff --name-only "$DIFF_BASE" HEAD > "$CHANGED_FILES" 2>/dev/null || git show --pretty="" --name-only HEAD > "$CHANGED_FILES"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            git ls-files > "$CHANGED_FILES"
          fi

          echo "Changed files for CI risk classification:"
          sed 's/^/  /' "$CHANGED_FILES" || true
          echo "path=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
      - name: Classify CI risk
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ci-harness"
          RISK_JSON="$RUNNER_TEMP/ci-harness/ci-risk-classification.json"

          node scripts/ci-harness.mjs classify-risk \
            --files "${{ steps.changed-files.outputs.path }}" \
            --diff-base "${{ steps.changed-files.outputs.diff_base }}" \
            --github-output "$GITHUB_OUTPUT" | tee "$RISK_JSON"

          RISK_LEVEL=$(jq -r '.riskLevel' "$RISK_JSON")
          REQUIRES_SMOKE=$(jq -r '.requiresSmoke' "$RISK_JSON")
          REQUIRES_PREVIEW=$(jq -r '.requiresPreview' "$RISK_JSON")
          BLOCKS_UNATTENDED=$(jq -r '.blocksUnattendedAutoMerge' "$RISK_JSON")
          MATCHED_RULES=$(jq -r '[.matchedRules[].id] | join(",") // ""' "$RISK_JSON")
          if [[ -z "$MATCHED_RULES" ]]; then
            MATCHED_RULES="none"
          fi

          {
            echo "### CI risk classification"
            echo
            echo "- Risk level: $RISK_LEVEL"
            echo "- Requires smoke: $REQUIRES_SMOKE"
            echo "- Requires preview: $REQUIRES_PREVIEW"
            echo "- Blocks unattended auto-merge: $BLOCKS_UNATTENDED"
            echo "- Matched rules: $MATCHED_RULES"
            echo
            echo "Next local command:"
            echo
            echo '```bash'
            echo 'pnpm ci:harness:check'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CI risk artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-risk-classification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-harness/ci-risk-classification.json
          retention-days: 7

  ci-env-example-guard:
    needs: [ci-path-changes]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    name: Env Example Guard
    # Always run; fast, prevents accidental secret commits.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - name: Validate .env.example contains placeholders only
        run: |
          set -euo pipefail

          if [ ! -f .env.example ]; then
            echo "No .env.example found; skipping."
            exit 0
          fi

          # Fail on common secret/token prefixes.
          if grep -nE '(sk_live_|sk_test_|rk_live_|rk_test_|whsec_|ghp_|github_pat_|xoxb-|BEGIN PRIVATE KEY|-----BEGIN)' .env.example; then
            echo "❌ .env.example appears to contain a real secret/token. Replace with placeholders."
            exit 1
          fi

          # Fail on real-looking Stripe price IDs (these should be placeholders).
          if grep -nE '^STRIPE_PRICE_.*=price_[A-Za-z0-9]+' .env.example; then
            echo "❌ .env.example contains Stripe price IDs. Replace with placeholders."
            exit 1
          fi

          echo "✅ .env.example looks safe (no obvious secrets)."

  ci-secret-scan:
    needs: [ci-path-changes]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    name: Secret Scan (gitleaks + trufflehog)
    # Always run; fast, catches secrets in PR diffs including *.backup files (JOV-3215).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run secret scan
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            ./scripts/security/scan-secrets.sh ci-pr "origin/${{ github.base_ref }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              git fetch origin main --depth=1
              ./scripts/security/scan-secrets.sh ci-pr "origin/main"
            else
              ./scripts/security/scan-secrets.sh ci-pr "${{ github.event.before }}"
            fi
          else
            git fetch origin main --depth=1
            ./scripts/security/scan-secrets.sh ci-pr "origin/main"
          fi
      - name: Verify backup-file fixture coverage
        run: ./scripts/security/verify-gitleaks-coverage.sh

  ci-guardrails:
    name: Guardrails (proxy)
    # Draft PRs skip; ready PRs + pushes + merge queue enforce core repo guardrails
    needs: [ci-path-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Desktop release guard
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: node scripts/desktop-release-guard.mjs --base "origin/${BASE_REF}"
      - name: Version fan-out guard (main-only stamping)
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: node scripts/version-fanout-guard.mjs --base "origin/${BASE_REF}"
      - name: Script unit tests
        run: node --test scripts/cleanup-stale-dev.test.mjs scripts/desktop-release-guard.test.mjs scripts/desktop-installed-apps-audit.test.mjs scripts/dev-web-fast.test.mjs scripts/ios-guardrail-rollout-audit.test.mjs scripts/version-fanout-guard.test.mjs scripts/version-stamp.test.mjs
      - name: Version consistency guard
        run: node scripts/version-check.mjs
      - name: Next.js proxy guard
        # next-proxy-guard.mjs only uses Node built-ins (fs, path) — no pnpm install needed.
        # Running node directly avoids ERR_PNPM_OUTDATED_LOCKFILE on dependabot PRs that
        # bump package.json without regenerating pnpm-lock.yaml.
        working-directory: apps/web
        run: node scripts/next-proxy-guard.mjs

  ci-structural-contract:
    # Path-gated: only runs when CI harness/.github files change or on push/dispatch.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    name: Structural Contract
    needs: [ci-path-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SHELLCHECK_OPTS: >-
        --exclude=SC2001,SC2016,SC2028,SC2034,SC2086,SC2126,SC2129,SC2329
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Validate CI harness manifest and generated docs
        run: pnpm ci:harness:check
      - name: CI control-plane characterization suite
        # Locks merge-gate set, risk smoke/preview flags, and merge-queue aggregate
        # required-check contracts before any YAML refactor can silently change them.
        run: pnpm ci:control:test
      - name: Validate CI branching policy
        run: pnpm ci:branching-guard:validate
      - name: Validate Graphite merge queue config
        run: pnpm ci:merge-queue:check
      - name: Verify typecheck gate uses --force (JOV-3499)
        run: pnpm ci:typecheck-gate-guard
      - name: Run actionlint
        shell: bash
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 2>/dev/null
          ./actionlint -color
      - name: Run structural repo guardrails
        run: |
          pnpm next:proxy-guard
          pnpm tailwind:check
          pnpm --filter=@jovie/web run lint:no-native-dialogs
          pnpm --filter=@jovie/web run lint:seo
          pnpm --filter=@jovie/web run lint:contrast-ratchet
          pnpm doc:freshness:check
      - name: Validate flaky quarantine ledger
        run: node .github/scripts/quarantine-ledger.mjs validate
      - name: Validate reliability detector registry
        run: pnpm --filter @jovie/web run test:reliability-detectors
      - name: Run merge-queue drain regression tests
        run: pip install pytest --quiet && pytest scripts/tests/test_gh_retry.py -v
      - name: Write remediation summary
        if: always()
        run: |
          {
            echo "### Structural Contract"
            echo
            echo "This lane enforces the CI harness manifest, generated docs, Graphite merge-queue config, workflow syntax, proxy guard, Tailwind contract, native-dialog ban, SEO/AEO ratchet, contrast ratchet, and reliability detector registry."
            echo
            echo "Next local command:"
            echo
            echo '```bash'
            echo "pnpm ci:harness:check && pnpm ci:control:test && pnpm ci:merge-queue:check && pnpm next:proxy-guard && pnpm tailwind:check && pnpm --filter=@jovie/web run lint:no-native-dialogs && pnpm --filter=@jovie/web run lint:seo && pnpm --filter=@jovie/web run lint:contrast-ratchet && pnpm doc:freshness:check && pnpm test:reliability-detectors"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  ci-biome:
    name: Lint
    # Single consolidated job for all Biome checks (lint + format)
    needs: [ci-path-changes]
    # Merge gate: keep on always-available GitHub runners. The self-hosted
    # jovie-runner pool is not highly-available (personal OrbStack host) and
    # took down this gate when it shut down mid-run.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name != 'pull_request' || needs.ci-path-changes.outputs.has_code_changes == 'true') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 2 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run Biome CI (lint + format)
        run: |
          # For PRs: only lint changed files (faster, pre-commit already ran on local)
          # For pushes to main: full lint to catch any issues
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_BASE="HEAD^1"
            if ! git rev-parse --verify "$DIFF_BASE" >/dev/null 2>&1; then
              git fetch origin "${{ github.base_ref }}" --depth=1
              DIFF_BASE="origin/${{ github.base_ref }}"
            fi
            # Use diff-filter=d to exclude deleted files (biome can't lint deleted files)
            # Include .mts/.mjs extensions for ESM config files
            mapfile -t CHANGED_FILES < <(
              git diff --diff-filter=d --name-only "$DIFF_BASE" HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.mts' '*.mjs' ':(exclude)**/package-lock.json' ':(exclude).claude/settings.json' ':(exclude).claude/skills/**'
            )
            if (( ${#CHANGED_FILES[@]} > 0 )); then
              echo "Linting changed files only:"
              printf '  %s\n' "${CHANGED_FILES[@]}"
              pnpm biome ci --reporter=github --no-errors-on-unmatched "${CHANGED_FILES[@]}"
            else
              echo "No lintable files changed"
            fi
          else
            pnpm biome ci --reporter=github .
          fi
      - name: Run ESLint server boundary checks
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_BASE="HEAD^1"
            if ! git rev-parse --verify "$DIFF_BASE" >/dev/null 2>&1; then
              git fetch origin "${{ github.base_ref }}" --depth=1
              DIFF_BASE="origin/${{ github.base_ref }}"
            fi
            mapfile -t CHANGED_FILES < <(
              git diff --diff-filter=d --name-only "$DIFF_BASE" HEAD -- \
                'apps/web/*.ts' \
                'apps/web/*.tsx' \
                'apps/web/**/*.ts' \
                'apps/web/**/*.tsx'
            )
            if (( ${#CHANGED_FILES[@]} > 0 )); then
              pnpm --filter=@jovie/web run lint:server-boundaries -- "${CHANGED_FILES[@]}"
            else
              echo "No server-boundary TypeScript files changed"
            fi
          else
            pnpm --filter=@jovie/web run lint:server-boundaries
          fi

  ci-promptfoo-evals:
    name: Promptfoo Evals (deterministic)
    needs: [ci-path-changes]
    # Deterministic gate: keep on always-available GitHub runners (see ci-biome).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-path-changes.outputs.run_promptfoo_evals == 'true')) }}
    env:
      JOVIE_RUN_LIVE_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_RATE_LIMIT_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_MODEL_ERROR_EVALS: '0'
      PROMPTFOO_DISABLE_TELEMETRY: '1'
      PROMPTFOO_DISABLE_UPDATE: '1'
      PROMPTFOO_NO_TESTCASE_ASSERT_WARNING: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Validate Promptfoo config
        run: pnpm --filter @jovie/web run evals:validate
      - name: Run deterministic Promptfoo evals
        run: pnpm run evals

  ci-golden-eval-set:
    name: Golden Eval Set (deterministic)
    needs: [ci-path-changes]
    # Deterministic gate: keep on always-available GitHub runners (see ci-biome).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-path-changes.outputs.run_golden_eval_set == 'true')) }}
    env:
      JOVIE_RUN_LIVE_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_RATE_LIMIT_EVALS: '0'
      JOVIE_RUN_LIVE_HTTP_MODEL_ERROR_EVALS: '0'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run golden eval-set CI gate
        run: pnpm run evals:golden

  ci-knip:
    name: Knip (dead code)
    # Detect unused files, dependencies, and exports
    needs: [ci-path-changes]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-path-changes.outputs.has_code_changes == 'true')) }}
    runs-on: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run Knip (unused files, deps & exports)
        run: pnpm knip

  ci-typecheck:
    name: Typecheck
    # Draft PRs skip; ready PRs + pushes + merge queue run typecheck
    # Note: Runs in parallel with lint for speed (no dependency on cache-warm)
    needs: [ci-path-changes]
    # Runs on GitHub-hosted runners (typecheck --force means no turbo cache benefit).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name != 'pull_request' || needs.ci-path-changes.outputs.has_code_changes == 'true') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history needed for turbo --affected merge-base detection
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          # Use content hash for better cache hit rates (not commit SHA which changes every commit)
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      # NOTE: tsbuildinfo restore intentionally removed (JOV-3499).
      # A stale tsbuildinfo from GH Actions cache can convince tsc --incremental that no
      # types changed, producing a false green even after --force bypasses the Turbo cache.
      # The merge gate must be a fresh tsc run; the cost is ~1–2 extra minutes per PR.
      - name: Run typecheck
        env:
          TURBO_SCM_BASE: ${{ (github.base_ref && format('origin/{0}', github.base_ref)) || '' }}
        # --force bypasses Turbo's remote cache so a stale SUCCESS from a prior commit
        # cannot be replayed as the merge gate result. See JOV-3499.
        run: pnpm turbo typecheck --affected --force

  neon-db:
    name: Neon DB
    needs: [ci-path-changes]
    # Run for push to main, testing-labeled full CI, or PRs touching DB-relevant paths.
    # run_neon covers drizzle, lib/db, lib/queries, schema, cron routes, SQL files, and
    # package.json changes. PRs touching only UI/perf/docs skip this job entirely.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && (needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: neon-endpoint-pool-${{ github.job }}-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    outputs:
      branch_name: ${{ steps.sanitize-branch.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for backend changes
        id: check-backend
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail

          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)

          # Check if any backend-related files changed (migrations, lib/db, API routes, etc.)
          if echo "$CHANGED_FILES" | grep -E '^(drizzle/migrations/|apps/web/lib/db/|apps/web/app/api/)' > /dev/null; then
            echo "Backend changes detected, Neon DB required"
            echo "needs_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "No backend changes detected, skipping Neon DB creation"
            echo "needs_db=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Cleanup old Neon branches (prevent limit errors)
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/neon-branch-cleanup
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_limit: '10'
          protected_branches: 'main,development,preview,br-main,br-production'
          cleanup_threshold: '7'

      - name: Determine sanitized branch name
        id: sanitize-branch
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          RAW_REF: ${{ github.head_ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          RAW="$RAW_REF"

          # Avoid collisions with protected long-lived branches in Neon.
          # For push to main we reuse the long-lived Neon branch.
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "main" ]]; then
            RAW="$REF_NAME"
          fi

          # sanitize: lowercase, replace slashes with dashes, remove invalid chars, collapse repeats
          SANITIZED=$(printf '%s' "$RAW" | tr '[:upper:]' '[:lower:]' | sed -E 's|/|-|g; s|[^a-z0-9._-]|-|g; s/-{2,}/-/g; s/^-+//; s/-+$//')
          BASE=$(printf '%s' "$SANITIZED" | cut -c1-40)
          SUFFIX="${RUN_ID}-${RUN_ATTEMPT}"
          FINAL="${BASE}-${SUFFIX}"
          echo "Using sanitized branch name: $FINAL"
          echo "name=$FINAL" >> "$GITHUB_OUTPUT"
      - name: Create or reuse Neon branch (with retry)
        id: create-branch
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ steps.sanitize-branch.outputs.name }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_in_hours: '2'
      - name: Finalize Neon DB URLs
        id: finalize-urls
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          CONNECTION_FILE: ${{ steps.create-branch.outputs.connection_file }}
        run: |
          set -euo pipefail
          CONNECTION_FILE="${CONNECTION_FILE:-${RUNNER_TEMP:-/tmp}/neon-connection/connection.json}"
          if [ ! -f "$CONNECTION_FILE" ]; then
            echo "Neon connection file missing after branch create: $CONNECTION_FILE"
            echo "This indicates NEON_PROJECT_ID/NEON_API_KEY or the create-branch action is failing."
            exit 1
          fi
          if ! jq -e '
            (.db_url // "" | length > 0) and
            (.db_url_pooled // "" | length > 0)
          ' "$CONNECTION_FILE" >/dev/null; then
            echo "Neon connection file is missing db_url/db_url_pooled."
            exit 1
          fi
          # Intentionally do NOT expose DB_URL via job outputs.
          # GitHub will drop outputs that look like secrets, which breaks downstream jobs.
          echo "Neon DB URL resolved for this job (file-backed)."

      - name: Persist Neon DB connection artifact
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        env:
          BRANCH_NAME: ${{ steps.sanitize-branch.outputs.name }}
          CONNECTION_FILE: ${{ steps.create-branch.outputs.connection_file }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/neon-db-artifact
          # Prefer the file written by neon-create-branch-with-retry (avoids
          # re-interpolating DB passwords through ${{ }} expression expansion).
          if [ -n "${CONNECTION_FILE:-}" ] && [ -f "$CONNECTION_FILE" ]; then
            cp "$CONNECTION_FILE" /tmp/neon-db-artifact/connection.json
          elif [ -f "${RUNNER_TEMP:-/tmp}/neon-connection/connection.json" ]; then
            cp "${RUNNER_TEMP:-/tmp}/neon-connection/connection.json" /tmp/neon-db-artifact/connection.json
          else
            echo "Neon connection file missing; cannot persist artifact."
            exit 1
          fi
          # Ensure branch_name is present for downstream diagnostics.
          if [ -n "${BRANCH_NAME:-}" ]; then
            jq --arg branch_name "$BRANCH_NAME" '.branch_name = $branch_name' \
              /tmp/neon-db-artifact/connection.json > /tmp/neon-db-artifact/connection.json.tmp
            mv /tmp/neon-db-artifact/connection.json.tmp /tmp/neon-db-artifact/connection.json
          fi
          # Fail closed if password is missing from the artifact URL.
          if ! jq -e '
            (.db_url // "" | test("^postgres(ql)?://[^:]+:[^@]+@")) and
            (.db_url_pooled // "" | test("^postgres(ql)?://[^:]+:[^@]+@"))
          ' /tmp/neon-db-artifact/connection.json >/dev/null; then
            echo "Neon connection artifact is missing username/password credentials."
            exit 1
          fi

      - name: Upload Neon DB connection artifact
        if: ${{ github.event_name != 'pull_request' || needs.ci-path-changes.outputs.run_neon == 'true' || needs.ci-path-changes.outputs.run_public_lighthouse == 'true' || steps.check-backend.outputs.needs_db == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-artifact/connection.json
          retention-days: 1

  drizzle-migration-guard:
    name: Migration Guard
    needs: [ci-path-changes]
    # Skip if 'skip-migration-guard' label is present (for schema consolidation)
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'push' || (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-migration-guard'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      # Skip notification (updated condition)
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping migration guard as no DB/schema paths were changed."
          exit 0
      - name: Run Migration Guard
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          # Make script executable
          chmod +x apps/web/scripts/check-migrations.sh
          chmod +x apps/web/scripts/validate-migrations.sh

          # Run migration guard and validation from apps/web directory
          cd apps/web

          ./scripts/check-migrations.sh
          ./scripts/validate-migrations.sh
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}

  ci-drizzle-check:
    name: Drizzle Check
    needs: [neon-db, ci-path-changes]
    # Drizzle check runs on push to main or PRs with testing label
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'testing'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping Drizzle check as no DB/schema paths were changed."
          echo "To force a full CI run, add the 'testing' label to the PR."
          exit 0

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-drizzle-neon-db-url
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-drizzle-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run Drizzle check against staging/production DBs."
            exit 1
          fi

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run Drizzle Check
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:check

  ci-integration-ready:
    name: Integration Fast
    # Lightweight gate for integration/* PRs (agent batch lanes). Full CI runs on train PRs to main.
    needs: [ci-path-changes, ci-risk-classifier, ci-build-public]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (always() && github.event_name == 'pull_request' && startsWith(github.event.pull_request.base.ref, 'integration/')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate integration fast checks
        run: |
          BUILD_RESULT="${{ needs.ci-build-public.result }}"
          RISK_RESULT="${{ needs.ci-risk-classifier.result }}"
          echo "ci-build-public: $BUILD_RESULT"
          echo "ci-risk-classifier: $RISK_RESULT"
          if [[ "$RISK_RESULT" != "success" ]]; then
            echo "Integration fast lane failed: risk classifier"
            exit 1
          fi
          if [[ "$BUILD_RESULT" != "success" && "$BUILD_RESULT" != "skipped" ]]; then
            echo "Integration fast lane failed: build"
            exit 1
          fi
          echo "Integration fast lane passed"

  ci-build-public:
    name: Build (public routes)
    needs: [ci-path-changes, ci-risk-classifier]
    # Shared Next.js build for a11y + layout-guard — build once, test twice.
    # On PRs to main: always runs (non-fork) for build validation. Part of the merge gate.
    # Merge queue intentionally skips build (already validated on the PR).
    # On main push: always runs for full coverage.
    # Fork PRs are excluded (no secrets) — skipped via fork-pr-gate.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false) || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_artifact: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          # Run when UI/component paths, public QA inputs, or risk-triggered smoke changed.
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_PUBLIC_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_public_lighthouse }}"
          REQUIRES_SMOKE="${{ needs.ci-risk-classifier.outputs.requires_smoke }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_PUBLIC_LIGHTHOUSE" == "true" || "$REQUIRES_SMOKE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: echo "Skipping build — no UI-relevant paths changed."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Build app (public routes only — no secrets needed)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo build --filter=@jovie/web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Verify build output exists
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [ ! -d "apps/web/.next" ]; then
            echo "::error::Build output directory apps/web/.next does not exist — build may have used remote cache without producing local output"
            exit 1
          fi
          echo "Build output verified: $(du -sh apps/web/.next | cut -f1)"

      - name: Package build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -cf /tmp/nextjs-build.tar -C apps/web .next

      - name: Upload build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        # ponytail: artifact only feeds informational downstream jobs (layout-guard,
        # a11y), so a transient FinalizeArtifact timeout must not fail this merge gate.
        # Build correctness is already asserted by the build + "Verify build output"
        # steps above. Re-enable hard failure if a downstream gate ever depends on it.
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build.tar
          retention-days: 1
          if-no-files-found: error

  ci-layout-guard:
    name: Layout Guard (informational)
    needs: [ci-path-changes, ci-build-public]
    # Fully informational — never blocks PRs or merge queue.
    # Runs when ci-build-public produced an artifact. Failures are logged but don't gate merges.
    # Moved to post-merge (push to main) — evidence-timing change only, since this job
    # cuts redundant runs while preserving the same coverage. ci-build-public also runs
    # on push:main, so the shared artifact this job downloads is still available.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-build-public.outputs.has_artifact == 'true') }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.download.outcome == 'success'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Run layout overlap/touching guard
        if: steps.download.outcome == 'success'
        run: |
          cd apps/web

          if [ ! -f tests/e2e/layout-overlap-guard.spec.ts ]; then
            echo "⚠ layout-overlap-guard.spec.ts not found — skipping"
            exit 0
          fi
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          PORT=3100 pnpm --filter=@jovie/web exec next start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then break; fi
            sleep 1
          done
          pnpm exec playwright test tests/e2e/layout-overlap-guard.spec.ts --project=chromium --reporter=line
          EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
        env:
          BASE_URL: http://localhost:3100
          SMOKE_ONLY: '1'
          CI: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: layout-guard-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 3

  ci-mobile-overflow:
    name: Mobile Overflow Guard (${{ matrix.width }}px)
    needs: [ci-path-changes, neon-db, ci-build-public]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && needs.ci-path-changes.outputs.run_public_lighthouse == 'true' && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        width: [320, 390, 430]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run static mobile overflow guard
        run: pnpm --filter=@jovie/web run mobile-overflow:guard

      - name: Download Neon DB connection artifact
        # Reuse the shared ephemeral branch from neon-db instead of DATABASE_URL_MAIN.
        # Screenshot/UI-only PRs still need seeded profile fixtures for Playwright.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        # Use only the ephemeral branch credentials from the neon-db artifact.
        # Injecting DATABASE_URL_MAIN passwords onto an ephemeral host causes
        # password-auth retry storms during migrate/seed and SSR profile reads.
        id: resolve-mobile-overflow-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url

      - name: Export DATABASE_URL (ephemeral branch)
        run: echo "DATABASE_URL=${{ steps.resolve-mobile-overflow-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (Mobile Overflow)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run mobile overflow against staging/production DBs."
            exit 1
          fi

      - name: Verify Neon DB connectivity (fail-fast)
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        # 320px matrix shard owns migrate/seed so 390/430 siblings reuse one Neon branch.
        if: matrix.width == 320
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed mobile overflow fixtures
        if: matrix.width == 320
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Wait for shared Neon seed (mobile overflow width > 320)
        if: matrix.width != 320
        run: |
          echo "Waiting for 320px shard migrate/seed on shared Neon branch..."
          for attempt in $(seq 1 60); do
            if pnpm --filter=@jovie/web exec tsx tests/wait-for-public-qa-seed.ts; then
              echo "Shared Neon seed ready"
              exit 0
            fi
            echo "Attempt ${attempt}/60: seed markers not ready yet"
            sleep 5
          done
          echo "Timed out waiting for 320px shard seed on shared Neon branch"
          exit 1
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.download-build.outcome == 'success'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Build app fallback
        if: steps.download-build.outcome != 'success'
        run: pnpm turbo build --filter=@jovie/web
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run mobile overflow Playwright guard
        run: |
          cd apps/web

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found - mobile overflow guard cannot start."
            exit 1
          fi

          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          PORT=3100 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          SERVER_READY=false
          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            echo "Waiting for standalone server ($attempt/30)..."
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Standalone server failed to start within 30s."
            exit 1
          fi

          pnpm exec playwright test tests/e2e/mobile-overflow.spec.ts --project=chromium --reporter=line
        env:
          BASE_URL: http://localhost:3100
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          CI: true
          E2E_SKIP_WEB_SERVER: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          URL_ENCRYPTION_KEY: mobile-overflow-ci-url-encryption-key
          AI_GATEWAY_API_KEY: mobile-overflow-ci
          MOBILE_OVERFLOW_WIDTHS: ${{ matrix.width }}
          MOBILE_OVERFLOW_PUBLIC_WIDTHS: ${{ matrix.width }}
          MOBILE_OVERFLOW_FOCUS_LIMIT: '8'
          # Each matrix shard owns one mobile width. Keep navigation serialized
          # so user-state transitions are deterministic.
          PLAYWRIGHT_WORKERS: '1'

      - name: Upload Playwright Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-overflow-report-${{ matrix.width }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

  ci-lighthouse-pr:
    name: Lighthouse (public routes PR)
    needs: [ci-build-public, ci-path-changes, neon-db]
    # Runs Lighthouse CI against the public-route build artifact on PRs.
    # Blocks PRs when triggered (path-gated to public-route changes).
    # Runs on push to main (post-merge validation), workflow_dispatch, or PRs with 'testing' label.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'testing'))) && needs.ci-build-public.outputs.has_artifact == 'true' && needs.ci-path-changes.outputs.run_public_lighthouse == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download Neon DB connection artifact
        # Reuse the shared ephemeral branch from neon-db instead of DATABASE_URL_MAIN.
        # Screenshot/UI-only PRs still need seeded profile fixtures for shard-0 Playwright.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        # Prefer ephemeral branch host from neon-db artifact. credential_source
        # only fills missing username/password components (Neon project roles
        # share passwords) — it never rewrites the ephemeral host. This recovers
        # when GITHUB_OUTPUT/artifact handoff strips credentials.
        id: resolve-lighthouse-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (ephemeral branch)
        run: echo "DATABASE_URL=${{ steps.resolve-lighthouse-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (Lighthouse)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run public Lighthouse against staging/production DBs."
            exit 1
          fi

      - name: Verify Neon DB connectivity (fail-fast)
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        # Shard 0 owns migrate/seed so matrix siblings reuse one Neon branch.
        if: matrix.shard == 0
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: matrix.shard == 0
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Wait for shared Neon seed (lighthouse shard > 0)
        if: matrix.shard != 0
        run: |
          echo "Waiting for shard 0 migrate/seed on shared Neon branch..."
          for attempt in $(seq 1 60); do
            if pnpm --filter=@jovie/web exec tsx tests/wait-for-public-qa-seed.ts; then
              echo "Shared Neon seed ready"
              exit 0
            fi
            echo "Attempt ${attempt}/60: seed markers not ready yet"
            sleep 5
          done
          echo "Timed out waiting for shard 0 seed on shared Neon branch"
          exit 1
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Download build artifact
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.download-build.outcome == 'success'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Build app fallback for public Lighthouse
        if: steps.download-build.outcome != 'success'
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          SKIP_SKILLS_CATALOG_SYNC: '1'

      - name: Run Lighthouse CI (public launch thresholds)
        run: |
          cd apps/web
          cleanup() {
            kill $SERVER_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found - public Lighthouse cannot start."
            exit 1
          fi

          PORT=3000 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:public:launch

          # Pin the extra mobile-viewport-stability Playwright spec to the lighter
          # LHCI shard (shard 1 collects 9 URLs vs shard 0's 10). Both shards run
          # in parallel and the merge gate waits on max(shard0, shard1); piling the
          # ~1.5m spec onto the already-heavier shard 0 made it the gate long pole
          # rebalances the only-2-way fan-out and lowers wall-clock with identical
          # coverage.
          if [ "${{ matrix.shard }}" = "1" ]; then
            mkdir -p tests/.auth
            echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
            pnpm exec playwright test tests/e2e/profile-mobile-viewport-stability.spec.ts --config=playwright.config.noauth.ts --project=chromium --reporter=line
          fi
        env:
          CI: true
          BASE_URL: http://127.0.0.1:3000
          PUBLIC_LIGHTHOUSE_SHARD_INDEX: ${{ matrix.shard }}
          PUBLIC_LIGHTHOUSE_TOTAL_SHARDS: '2'
          PROFILE_MOBILE_PERF_BUDGETS: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PUBLIC_NOAUTH_SMOKE: '1'
          URL_ENCRYPTION_KEY: lighthouse-public-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-public-ci

  ci-lighthouse-dashboard-pr:
    name: Lighthouse (dashboard PR)
    needs: [ci-path-changes, neon-db, ci-build-public]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && contains(github.event.pull_request.labels.*.name, 'testing'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: neon-endpoint-pool-${{ github.job }}-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_DASHBOARD_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_dashboard_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_DASHBOARD_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: echo "Skipping dashboard Lighthouse — no dashboard-relevant paths changed."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: dashboard-lighthouse-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-dashboard-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-dashboard-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Download build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.download-build.outcome == 'success'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Build app fallback for dashboard Lighthouse
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.download-build.outcome != 'success'
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          SKIP_SKILLS_CATALOG_SYNC: '1'

      - name: Run authenticated dashboard Lighthouse
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          if [ -z "$E2E_CLERK_USER_ID" ]; then
            echo "E2E_CLERK_USER_ID not set — skipping dashboard Lighthouse."
            exit 0
          fi

          export E2E_USE_TEST_AUTH_BYPASS=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found — dashboard Lighthouse cannot start."
            exit 1
          fi

          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:dashboard:pr
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          URL_ENCRYPTION_KEY: lighthouse-dashboard-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-dashboard-ci
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload dashboard Lighthouse artifacts
        if: always() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-dashboard-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/.lighthouseci/dashboard-pr/
          if-no-files-found: ignore
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

