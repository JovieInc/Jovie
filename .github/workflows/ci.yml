      - name: Export DATABASE_URL (main — non-DB PR)
        if: needs.ci-path-changes.outputs.run_neon != 'true'
        run: echo "DATABASE_URL=${{ secrets.DATABASE_URL_MAIN }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: needs.ci-path-changes.outputs.run_neon == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Download build artifact
        id: download-build
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.download-build.outcome == 'success'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Build app fallback for chat Lighthouse
        if: steps.download-build.outcome != 'success'
        run: pnpm --filter=@jovie/web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          SKIP_SKILLS_CATALOG_SYNC: '1'

      - name: Run authenticated chat Lighthouse
        run: |
          cd apps/web

          if [ -z "$E2E_CLERK_USER_ID" ]; then
            echo "E2E_CLERK_USER_ID not set — skipping chat Lighthouse."
            exit 0
          fi

          export E2E_USE_TEST_AUTH_BYPASS=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found — chat Lighthouse cannot start."
            exit 1
          fi

          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          echo "Waiting for standalone server..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Server failed to start within 30s."
            exit 1
          fi

          pnpm run test:lighthouse:chat:pr
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          URL_ENCRYPTION_KEY: lighthouse-chat-ci-url-encryption-key
          AI_GATEWAY_API_KEY: lighthouse-chat-ci
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload chat Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-chat-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/.lighthouseci/chat-pr/
          if-no-files-found: ignore
          retention-days: 3

  ci-pr-neon-migrate:
    name: DB Migrate (PR main)
    needs: [neon-db, ci-path-changes]
    # Only run when drizzle/schema paths changed — skip entirely otherwise to save runners
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && needs.ci-path-changes.outputs.run_drizzle == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_drizzle }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping DB migrate check: no DB/schema/migration paths were changed."
          exit 0

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-pr-neon-db-url
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled

      - name: Export DATABASE_URL (ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-pr-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (PR migrate)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run PR migrate against staging/production DBs."
            exit 1
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Verify Neon DB connectivity (fail-fast)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web exec tsx tests/e2e/verify-neon-db-connectivity.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

  # Post-deploy smoke test -- deterministic curl checks against production.
  # Replaces the previous Playwright-based test that was flaky due to
  # dynamic content assertions, hydration timing, and excessive retries.
  ci-public-profile-smoke:
    name: Post-Deploy Smoke (Production)
    needs: [promote-production]
    # Run after successful deploy to production
    if: ${{ always() && needs.promote-production.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Wait for CDN propagation
        run: |
          echo "Waiting 30s for Vercel CDN propagation after deploy..."
          sleep 30

      - name: Verify production endpoints are healthy
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail

          USER_AGENT="Mozilla/5.0 (compatible; JovieCI/1.0; +https://jov.ie)"
          COOKIE_JAR="$(mktemp)"
          MAX_RETRIES=5

          # Vercel Deployment Protection bypass
          BYPASS_SECRET="${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          BYPASS_ARGS=()
          if [ -n "$BYPASS_SECRET" ]; then
            BYPASS_ARGS+=(
              -H "x-vercel-protection-bypass: $BYPASS_SECRET"
              -H "x-vercel-set-bypass-cookie: true"
              -c "$COOKIE_JAR"
              -b "$COOKIE_JAR"
            )
          fi

          # Helper: curl with standard options, returns "body\nstatus_code"
          # Append a cache-busting query parameter to bypass Vercel CDN edge cache,
          # ensuring post-deploy smoke tests always hit the origin server.
          fetch() {
            local sep="?"
            [[ "$1" == *"?"* ]] && sep="&"
            curl -sS -L -A "$USER_AGENT" \
              -H "Cache-Control: no-cache, no-store, must-revalidate" \
              -H "Pragma: no-cache" \
              "${BYPASS_ARGS[@]}" -w "\n%{http_code}" "${1}${sep}_cb=$(date +%s%N)" || echo -e "\n000"
          }

          # Helper: retry a check function with exponential backoff (max 5 attempts)
          retry() {
            local label="$1"; shift
            local attempt=1
            while [ $attempt -le $MAX_RETRIES ]; do
              if "$@"; then
                return 0
              fi
              if [ $attempt -lt $MAX_RETRIES ]; then
                local delay=$((attempt * 3))
                echo "  Retry $attempt/$MAX_RETRIES for $label in ${delay}s..."
                sleep "$delay"
              fi
              attempt=$((attempt + 1))
            done
            echo "::error::$label failed after $MAX_RETRIES attempts"
            return 1
          }

          FAILURES=0

          # -- 1. Health API: JSON status=ok --
          check_health() {
            local response
            response=$(fetch "https://jov.ie/api/health")
            local status="${response##*$'\n'}"
            local body="${response%$'\n'*}"

            if [ "$status" != "200" ]; then
              echo "  Health API returned HTTP $status"
              return 1
            fi

            if ! echo "$body" | grep -q '"status":"ok"'; then
              echo "  Health API status is not ok: $body"
              return 1
            fi

            echo "  Health API: HTTP 200, status=ok"
            return 0
          }

          echo "=== 1/5 Health API ==="
          if ! retry "Health API" check_health; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 2. Homepage: HTTP 200, >1000 chars, no error strings --
          check_homepage() {
            local response
            response=$(fetch "https://jov.ie")
            local status="${response##*$'\n'}"
            local body="${response%$'\n'*}"

            if [ "$status" != "200" ]; then
              echo "  Homepage returned HTTP $status"
              return 1
            fi

            if [ ${#body} -lt 1000 ]; then
              echo "  Homepage body too short (${#body} chars)"
              return 1
            fi

            if echo "$body" | grep -qi "application error\|internal server error\|something went wrong"; then
              echo "  Homepage contains error message"
              return 1
            fi

            echo "  Homepage: HTTP 200, ${#body} chars, no errors"
            return 0
          }

          echo "=== 2/5 Homepage ==="
          if ! retry "Homepage" check_homepage; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 3. Public profile: HTTP 200, substantial content, no 404 markers --
          # Warm up the database connection before checking the profile page.
          # The health check (step 1) may use a lightweight query that doesn't
          # fully warm Neon, so hit the profile once and discard the result.
          fetch "https://jov.ie/tim" > /dev/null 2>&1
          sleep 5

          check_profile() {
            local response
            response=$(fetch "https://jov.ie/tim")
            local status="${response##*$'\n'}"
            local body="${response%$'\n'*}"

            if [ "$status" -ge 500 ] 2>/dev/null; then
              echo "  Profile /tim returned HTTP $status (server error)"
              return 1
            fi

            if [ ${#body} -lt 500 ]; then
              echo "  Profile /tim body too short (${#body} chars)"
              return 1
            fi

            if echo "$body" | grep -qi "application error\|internal server error\|something went wrong"; then
              echo "  Profile /tim contains error content"
              return 1
            fi

            # "Profile not found" with HTTP 200 is a valid app response (data issue),
            # not a code regression — warn but don't fail.
            if echo "$body" | grep -qi "profile not found\|page could not be found"; then
              echo "  Profile /tim: HTTP $status, profile not seeded (non-blocking warning)"
            else
              echo "  Profile /tim: HTTP $status, ${#body} chars, renders correctly"
            fi
            return 0
          }

          echo "=== 3/5 Public Profile ==="
          if ! retry "Public Profile" check_profile; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 4. Critical pages: /signup, /start, /pricing -- no 5xx --
          check_critical_pages() {
            for route in "/signup" "/start" "/pricing"; do
              local response
              response=$(fetch "https://jov.ie${route}")
              local status="${response##*$'\n'}"
              local body="${response%$'\n'*}"

              if [ "$status" -ge 500 ] 2>/dev/null; then
                echo "  Route ${route} returned HTTP $status (server error)"
                return 1
              fi
              if echo "$body" | grep -qi "turnstile is not configured\|auth unavailable\|clerk is not configured"; then
                echo "  Route ${route} contains front-door config error"
                return 1
              fi
              echo "  ${route}: HTTP $status"
            done
            return 0
          }

          echo "=== 4/5 Critical Pages ==="
          if ! retry "Critical Pages" check_critical_pages; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- 5. Production SEO surfaces: robots.txt + sitemap.xml --
          echo "=== 5/5 Production SEO Surfaces ==="
          if ! retry "Production SEO Surfaces" bash -c 'BASE_URL=https://jov.ie pnpm --filter=@jovie/web exec tsx scripts/seo-ratchet-live.ts'; then
            FAILURES=$((FAILURES + 1))
          fi

          # -- Summary --
          echo ""
          if [ $FAILURES -gt 0 ]; then
            echo "::error::Post-deploy smoke failed: $FAILURES/5 checks failed"
            exit 1
          fi
          echo "Post-deploy smoke passed: 5/5 checks OK"

  # Post-deploy authenticated smoke test — lightweight Playwright test against production.
  # Verifies sign-in + dashboard load with real credentials after deploy.
  # Non-blocking initially — promote to blocking once stable.
  ci-post-deploy-auth-smoke:
    name: Post-Deploy Auth Smoke (Production)
    needs: [promote-production]
    if: ${{ always() && needs.promote-production.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for production auth credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.E2E_PROD_USER_EMAIL }}" ] && [ -z "${{ secrets.E2E_CLERK_USER_USERNAME }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No production auth credentials configured — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check-creds.outputs.skip != 'true'

      - name: Setup Playwright (Chromium)
        if: steps.check-creds.outputs.skip != 'true'
        uses: ./.github/actions/setup-playwright

      - name: Wait for CDN propagation
        if: steps.check-creds.outputs.skip != 'true'
        run: sleep 30

      - name: Run production auth smoke tests
        if: steps.check-creds.outputs.skip != 'true'
        run: |
          cd apps/web

          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          CI=true BASE_URL=https://jov.ie pnpm exec playwright test tests/e2e/smoke-prod-auth.spec.ts --project=chromium --reporter=line
        env:
          E2E_PROD_USER_EMAIL: ${{ secrets.E2E_PROD_USER_EMAIL }}
          E2E_PROD_USER_PASSWORD: ${{ secrets.E2E_PROD_USER_PASSWORD }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright Artifacts on Failure
        if: failure() && steps.check-creds.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-deploy-auth-smoke-${{ github.run_id }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

  ci-build:
    name: Build
    needs: [ci-path-changes]
    # Build skips typecheck (NEXT_IGNORE_TYPECHECK=1), downstream jobs gate on ci-fast
    # Heavy job: runs on self-hosted jovie-runner pool for ARM64 + local turbo cache.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'testing') || contains(github.event.pull_request.labels.*.name, 'deploy-preview'))) || github.event_name == 'workflow_dispatch') }}
    runs-on: [self-hosted, jovie-runner]
    timeout-minutes: 15
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history needed for turbo --affected merge-base detection
          fetch-depth: 0

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_build }}" >> "$GITHUB_OUTPUT"

      # Skip remaining steps if no relevant changes
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping full CI as no critical paths were changed."
          echo "To force a full CI run, add the 'testing' label to the PR."
          exit 0

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      # .next/cache is managed by Turbo — no separate cache step needed

      - name: Build
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo build --affected
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Cloudflare Turnstile dummy keys for CI-only browser smoke tests.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Bundle size comparison
        if: steps.check_changes.outputs.run_full_ci == 'true'
        continue-on-error: true
        run: pnpm --filter @jovie/web compare-chunks

      - name: Upload build manifest
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: build-manifest
          path: apps/web/.next/build-manifest.json
          retention-days: 7

      - name: Pre-deploy Lighthouse performance check
        if: steps.check_changes.outputs.run_full_ci == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          cd apps/web


          if [ ! -f .lighthouserc.build.json ]; then
            echo "⚠️ Lighthouse config not found; skipping."
            exit 0
          fi

          # Start Next.js standalone server in background (monorepo places it under apps/web/)
          node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          # Wait for server to be ready (verify it actually started)
          echo "Waiting for server to start..."
          SERVER_READY=false
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "⚠️ Server failed to start within 30s. Skipping Lighthouse."
            kill $SERVER_PID 2>/dev/null || true
            exit 0
          fi

          # Run Lighthouse CI with build config
          pnpm --filter web exec lhci autorun --config=.lighthouserc.build.json || {
            echo "⚠️ Lighthouse checks failed - performance regression detected"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          }

          # Clean up
          kill $SERVER_PID 2>/dev/null || true
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          URL_ENCRYPTION_KEY: ${{ secrets.URL_ENCRYPTION_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

  ci-unit-tests:
    name: Unit Tests (${{ matrix.shard }})
    needs: [ci-path-changes]
    # Runs on PRs to main, main pushes, and manual dispatch. Merge queue skips (PR-validated).
    # Parallel with typecheck/build for faster CI.
    # Path-gated: skips test execution when no test-relevant files changed.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && ((github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') }}
    # 5-shard unit tests on GitHub-hosted runners for reliability (turbo remote cache works on any runner).
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/5', '2/5', '3/5', '4/5', '5/5']
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Full history for vitest --changed

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_test }}" >> "$GITHUB_OUTPUT"

      # Skip remaining steps if no relevant changes
      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping unit tests as no critical paths were changed."
          exit 0

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Load quarantined unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: quarantine
        run: node .github/scripts/quarantine-ledger.mjs emit-github-output

      - name: Run unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        env:
          TURBO_SCM_HEAD: ${{ github.sha }}
          TURBO_SCM_BASE: ${{ (github.base_ref && format('origin/{0}', github.base_ref)) || '' }}
        run: |
          # Use forked pool with limited workers to reduce CI flakiness from memory pressure
          export NODE_OPTIONS="--max-old-space-size=3072"
          VITEST_CI_FLAGS="--pool=forks --maxWorkers=3"
          # Retry budget comes from apps/web/tests/quarantine.json
          RETRY_FLAG="--retry=${{ steps.quarantine.outputs.unit_default_retries }}"
          # Use shard-specific output file so Codecov Test Analytics receives all 10 shards
          # (a shared filename causes only the last upload to be recorded)
          # Note: vitest runs from apps/web/, so path is relative to that directory
          SHARD_SLUG="${{ matrix.shard }}"
          SHARD_SLUG="${SHARD_SLUG//\//-}"
          OUTPUT_FLAG="--outputFile=test-report.${SHARD_SLUG}.junit.xml"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "main: Running web unit suite through Turbo without coverage; nightly coverage audit uploads Codecov coverage"
            pnpm turbo test:fast --filter=@jovie/web -- $VITEST_CI_FLAGS $RETRY_FLAG --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} $OUTPUT_FLAG
          elif [ -n "${{ github.base_ref }}" ]; then
            echo "🔍 PR: Running full test suite"
            # Run all tests on PRs to catch regressions before merge
            pnpm turbo test:fast --affected -- $VITEST_CI_FLAGS $RETRY_FLAG --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} $OUTPUT_FLAG
          else
            echo "🔍 Feature branch push: Running critical + interaction tests only (no base_ref available)"
            # Push events on feature branches (claude/*, codegen-bot/*) don't have base_ref,
            # so we can't determine changed files. Run critical + interaction tests only to avoid OOM
            # from the full test suite. The PR event covers changed-file tests.
            # --passWithNoTests: some shards may have no files matching the filter
            pnpm turbo test:fast --affected -- $VITEST_CI_FLAGS $RETRY_FLAG --passWithNoTests --shard=${{ matrix.shard }} ${{ steps.quarantine.outputs.unit_excludes }} "critical|interaction" $OUTPUT_FLAG
          fi
      - name: Run quarantined unit tests (retries)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.has_unit == 'true'
        continue-on-error: true
        env:
          TURBO_SCM_HEAD: ${{ github.sha }}
          TURBO_SCM_BASE: ${{ (github.base_ref && format('origin/{0}', github.base_ref)) || '' }}
        run: pnpm turbo test:fast --affected -- --pool=forks --maxWorkers=2 --retry=${{ steps.quarantine.outputs.quarantine_unit_retries }} ${{ steps.quarantine.outputs.unit_files }}

      - name: Run packages/ui unit tests
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm turbo test --filter=@jovie/ui

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && steps.check_changes.outputs.run_full_ci == 'true' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/test-report.*.junit.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

  ci-a11y:
    name: A11y (axe)
    # Runs axe-core WCAG 2.1 AA audit on public routes — uses shared build artifact.
    # Runs on push to main, workflow_dispatch, or PRs with 'testing' label to limit Neon compute.
    needs: [ci-build-public, ci-path-changes, neon-db]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'testing'))) && needs.ci-build-public.outputs.has_artifact == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: |
          # Align with ci-build-public so public QA config changes still run the blocking lane.
          RUN_BUILD="${{ needs.ci-path-changes.outputs.run_build }}"
          RUN_TEST="${{ needs.ci-path-changes.outputs.run_test }}"
          RUN_PUBLIC_LIGHTHOUSE="${{ needs.ci-path-changes.outputs.run_public_lighthouse }}"
          if [[ "$RUN_BUILD" == "true" || "$RUN_TEST" == "true" || "$RUN_PUBLIC_LIGHTHOUSE" == "true" ]]; then
            echo "run_full_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_full_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping a11y audit — no UI-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Download Neon DB connection artifact
        # Reuse the shared ephemeral branch from neon-db instead of creating a
        # second branch (avoids duplicate Neon branches and flaky third-party
        # action downloads on this job).
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-a11y-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-a11y-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (A11y)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run a11y against staging/production DBs."
            exit 1
          fi

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        id: download
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number || github.run_id }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Run axe a11y audit (public routes)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          # Create empty auth state so Playwright's auth-setup project doesn't crash.
          # The axe audit only tests public routes (SMOKE_ONLY=1) so no real auth is needed.
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "Standalone server not found - public axe audit cannot start."
            exit 1
          fi

          PORT=3100 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!

          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "Standalone server failed to start within 30s."
            exit 1
          fi

          pnpm exec playwright test tests/e2e/axe-audit.spec.ts --config=playwright.config.ts --project=chromium --reporter=line
        env:
          BASE_URL: http://localhost:3100
          SMOKE_ONLY: '1'
          CI: true
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          URL_ENCRYPTION_KEY: a11y-public-ci-url-encryption-key
          AI_GATEWAY_API_KEY: a11y-public-ci

      - name: Upload Playwright Report on Failure
        if: failure() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-axe-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 3

  ci-e2e-smoke:
    name: E2E Smoke (PR Fast Feedback)
    environment: Preview – jovie
    # Gated: runs with 'testing' label or deterministic high-risk classification.
    # Full E2E runs on merge to main anyway.
    # Dependabot PRs cannot access NEON_API_KEY or other Preview-environment secrets.
    needs: [ci-path-changes, ci-risk-classifier, ci-build-public, neon-db]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && needs.ci-build-public.outputs.has_artifact == 'true' && (contains(github.event.pull_request.labels.*.name, 'testing') || needs.ci-risk-classifier.outputs.requires_smoke == 'true') && (needs.neon-db.result == 'success' || needs.neon-db.result == 'skipped'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: neon-endpoint-pool-${{ github.job }}-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_e2e == 'true' || needs.ci-risk-classifier.outputs.requires_smoke == 'true' }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping E2E smoke; no E2E-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result == 'success'
        id: resolve-e2e-smoke-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled

      - name: Export DATABASE_URL (shared ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result == 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-e2e-smoke-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result != 'success'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: e2e-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production

      - name: Resolve DATABASE_URL (fallback Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result != 'success'
        id: resolve-e2e-smoke-fallback-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (fallback ephemeral branch)
        if: steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result != 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-e2e-smoke-fallback-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed public QA fixtures
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Materialize standalone assets (PR smoke)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          # Tarred .next artifacts can omit sibling paths the standalone server needs at runtime.
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public

      - name: Run E2E Smoke (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          cd apps/web

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "::error::Standalone server not found — ci-build-public artifact is required for PR smoke"
            exit 1
          fi

          # Standalone production server (not next dev --webpack) to avoid CI OOM/timeouts.
          # Keep env aligned with the post-merge smoke lane (ci-e2e-tests) so manifest
          # specs behave the same against the shared ci-build-public artifact.
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          export NODE_ENV=test
          export CI=true
          export SMOKE_ONLY=1
          export SENTRY_E2E_REPORTING=1
          export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
          export SENTRY_ENVIRONMENT=ci-pr-e2e
          export SENTRY_RELEASE="${{ github.sha }}"
          export E2E_USE_TEST_AUTH_BYPASS=1
          export VERCEL_ENV=development
          export E2E_TEST_AUTH_PERSONA=creator-ready
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          export NEXT_PUBLIC_TURNSTILE_SITE_KEY="1x00000000000000000000AA"
          export TURNSTILE_SECRET_KEY="1x0000000000000000000000000000000AA"
          export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
          export NEXT_PUBLIC_E2E_MODE=1
          export NEXT_DISABLE_TOOLBAR=1
          export CHAT_LLM_FAILURE_INJECTION=1
          export E2E_CLERK_USER_ID="${{ secrets.E2E_CLERK_USER_ID }}"
          export E2E_CLERK_USER_USERNAME="${{ secrets.E2E_CLERK_USER_USERNAME }}"
          export E2E_CLERK_USER_PASSWORD="${{ secrets.E2E_CLERK_USER_PASSWORD }}"
          export FLAGS_SECRET="${{ secrets.FLAGS_SECRET }}"
          export URL_ENCRYPTION_KEY="smoke-preview-url-encryption-key"
          export AI_GATEWAY_API_KEY="smoke-preview-ai-gateway-key"
          export E2E_SKIP_WARMUP=1
          export SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
          # Arms the onboarding LLM-failure fallback spec; matches playwright.config.smoke.ts
          export CHAT_LLM_FAILURE_INJECTION=1

          PORT=3100 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Standalone server failed to start within 30s"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"
          CI=true BASE_URL=http://localhost:3100 pnpm --filter=@jovie/web exec playwright test --config=playwright.config.smoke.ts --project=chromium --reporter=line
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

      - name: Upload Playwright Artifacts on Failure
        if: failure() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-smoke-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && needs.neon-db.result != 'success' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-golden-path:
    name: Golden Path (PR)
    environment: Preview – jovie
    # Launch-gate job (JOV-3758): full signup -> onboarding -> music import -> live
    # public profile -> Stripe checkout journey against REAL Clerk + an ephemeral
    # Neon branch. Required for launch-candidate PRs per docs/launch/LAUNCH_GATES.md.
    # Unlike ci-e2e-smoke this must NOT set NEXT_PUBLIC_CLERK_MOCK or
    # E2E_USE_TEST_AUTH_BYPASS — those make golden-path.spec.ts self-skip.
    # Path-triggered (not always-on): the spec has a 600s timeout, so always-on would
    # blow the CI budget and churn the Clerk dev-instance 100-user cap.
    needs: [ci-path-changes, ci-risk-classifier, ci-build-public, neon-db]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && needs.ci-build-public.outputs.has_artifact == 'true' && (needs.ci-path-changes.outputs.run_golden_path == 'true' || contains(github.event.pull_request.labels.*.name, 'launch-candidate') || contains(github.event.pull_request.labels.*.name, 'testing')) && (needs.neon-db.result == 'success' || needs.neon-db.result == 'skipped'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Constant group so at most ONE golden-path job runs repo-wide. This serializes
    # both the Neon endpoint pool AND the Clerk dev instance: the spec's
    # purgeStaleClerkTestUsers deletes ALL gp-* users, so two concurrent runs would
    # delete each other's sessions and flake. Do not parameterize this group.
    concurrency:
      group: neon-endpoint-pool-ci-golden-path
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        if: needs.neon-db.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        if: needs.neon-db.result == 'success'
        id: resolve-golden-path-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled

      - name: Export DATABASE_URL (shared ephemeral branch)
        if: needs.neon-db.result == 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-golden-path-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: needs.neon-db.result != 'success'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: golden-path-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production

      - name: Resolve DATABASE_URL (fallback Neon ephemeral)
        if: needs.neon-db.result != 'success'
        id: resolve-golden-path-fallback-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL (fallback ephemeral branch)
        if: needs.neon-db.result != 'success'
        run: echo "DATABASE_URL=${{ steps.resolve-golden-path-fallback-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: pr-${{ github.event.pull_request.number }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download

      - name: Extract build artifact
        run: tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web

      - name: Materialize standalone assets (golden path)
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public

      - name: Run Golden Path (Chromium, real Clerk)
        run: |
          cd apps/web

          if [ ! -f .next/standalone/apps/web/server.js ]; then
            echo "::error::Standalone server not found — ci-build-public artifact is required for the golden path"
            exit 1
          fi

          # Standalone production server (not next dev) to avoid CI OOM/timeouts.
          # REAL Clerk: no NEXT_PUBLIC_CLERK_MOCK / E2E_USE_TEST_AUTH_BYPASS here —
          # those flags make golden-path.spec.ts self-skip.
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          export NODE_ENV=test
          export CI=true
          export VERCEL_ENV=development
          export NEXT_PUBLIC_APP_URL=http://localhost:3100
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
          export FLAGS_SECRET="${{ secrets.FLAGS_SECRET }}"
          export SPOTIFY_CLIENT_ID="${{ secrets.SPOTIFY_CLIENT_ID }}"
          export SPOTIFY_CLIENT_SECRET="${{ secrets.SPOTIFY_CLIENT_SECRET }}"
          export MUSICFETCH_API_TOKEN="${{ secrets.MUSICFETCH_API_TOKEN }}"
          export UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}"
          export UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"

          PORT=3100 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Standalone server failed to start within 30s"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"
          BASE_URL=http://localhost:3100 E2E_SKIP_WEB_SERVER=1 pnpm --filter @jovie/web run test:e2e:golden-path:ci
        env:
          # Duplicated on the Playwright-runner process: global-setup calls clerkSetup
          # and the spec queries the DB + Clerk API directly, so these must be present
          # for both the server and the runner. UPSTASH_* is optional (spec degrades to
          # the in-memory rate-limit fallback when unset).
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          MUSICFETCH_API_TOKEN: ${{ secrets.MUSICFETCH_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Upload Playwright Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: golden-path-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && needs.neon-db.result != 'success' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-admin-smoke:
    name: Admin E2E Smoke
    environment: Preview – jovie
    # Gated: only runs with 'testing' label (admin tests need auth credentials).
    # Removed push-to-main trigger — merge queue validates PRs before merge.
    needs: [ci-path-changes, neon-db, ci-build-public]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && contains(github.event.pull_request.labels.*.name, 'testing')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: neon-endpoint-pool-${{ github.job }}-${{ (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '0') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '4') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '8')) && '0' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '1') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '5') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '9')) && '1' || (endsWith(format('{0}', github.event.pull_request.number || github.run_number), '2') || endsWith(format('{0}', github.event.pull_request.number || github.run_number), '6')) && '2' || '3' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_e2e }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping admin smoke; no E2E-relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Create ephemeral Neon database branch (with retry)
        id: neon-branch
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: admin-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          protected_branches: main,development,preview,br-main,br-production,${{ needs.neon-db.outputs.branch_name }}

      - name: Resolve DATABASE_URL (Neon ephemeral)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        id: resolve-admin-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          candidate_url: ${{ steps.neon-branch.outputs.db_url_pooled }}
          fallback_candidate_url: ${{ steps.neon-branch.outputs.db_url }}
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-admin-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations (ephemeral Neon)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Setup Playwright (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-playwright

      - name: Load quarantined E2E specs
        id: quarantine
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          node .github/scripts/quarantine-ledger.mjs validate
          FILE="apps/web/tests/quarantine.json"
          QUARANTINED=()

          if [ -f "$FILE" ]; then
            mapfile -t QUARANTINED < <(jq -r '.entries[]? | select(.kind == "e2e") | .path' "$FILE")
          fi

          ADMIN_SPEC="apps/web/tests/e2e/dashboard-pages-health.spec.ts"

          for quarantined in "${QUARANTINED[@]}"; do
            if [[ "$quarantined" == "$ADMIN_SPEC" ]]; then
              echo "run_admin_smoke=false" >> "$GITHUB_OUTPUT"
              echo "Admin smoke spec is quarantined: $ADMIN_SPEC"
              exit 0
            fi
          done

          echo "run_admin_smoke=true" >> "$GITHUB_OUTPUT"

      - name: Run Admin Smoke Tests (Chromium)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.run_admin_smoke == 'true'
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          CI: true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_ADMIN_USERNAME: ${{ secrets.E2E_CLERK_ADMIN_USERNAME }}
          E2E_CLERK_ADMIN_PASSWORD: ${{ secrets.E2E_CLERK_ADMIN_PASSWORD }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        # dashboard-pages-health is temporarily quarantined in apps/web/tests/quarantine.json due to JOV-782 flakiness.
        run: pnpm --filter=@jovie/web exec playwright test tests/e2e/dashboard-pages-health.spec.ts --grep "Admin Pages Health Check" --project=chromium

      - name: Skip notification (quarantined)
        if: steps.check_changes.outputs.run_full_ci == 'true' && steps.quarantine.outputs.run_admin_smoke != 'true'
        run: echo "Skipping admin smoke; admin spec is quarantined."

      - name: Upload Playwright Artifacts on Failure
        if: failure() && steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: admin-smoke-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

      - name: Cleanup ephemeral Neon branch
        if: always() && steps.check_changes.outputs.run_full_ci == 'true' && steps.neon-branch.outputs.branch_id != ''
        continue-on-error: true
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch_id }}"

  ci-e2e-migrate:
    name: E2E DB Migrate
    environment: Preview – jovie
    needs: [ci-path-changes, ci-build-public, neon-db]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'testing'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      run_full_ci: ${{ steps.check_changes.outputs.run_full_ci }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_e2e }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping E2E DB migrate as no critical paths were changed."
          echo "To force a full CI run, add the 'testing' label to the PR."
          exit 0

      - name: Setup Node.js and pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-e2e-migrate-neon-db-url
        if: steps.check_changes.outputs.run_full_ci == 'true'
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: echo "DATABASE_URL=${{ steps.resolve-e2e-migrate-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (E2E)
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run E2E against staging/production DBs."
            exit 1
          fi

      - name: Run migrations for E2E DB
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: ${{ github.ref_name }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Seed E2E DB
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm --filter=@jovie/web run seed:test-data
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}

  ci-e2e-tests:
    name: Full E2E (Preview)
    environment: Preview – jovie
    # Opt-in validation lane for risky PRs. Keep it off the main deploy critical path.
    needs: [ci-path-changes, ci-build-public, neon-db, ci-e2e-migrate]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (needs.ci-e2e-migrate.outputs.run_full_ci == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'testing')))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Set shard env
        run: |
          echo "SHARD_TOTAL=4" >> "$GITHUB_ENV"
          echo "SHARD_INDEX=${{ matrix.shard }}" >> "$GITHUB_ENV"

      # Continue with CI steps only if relevant changes detected or full-ci label present
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-e2e-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url
          fallback_json_key: db_url_pooled
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=${{ steps.resolve-e2e-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"
          echo "RESOLVED_DB_SOURCE=neon-artifact" >> "$GITHUB_ENV"

      - name: Fail if Neon DB URL is missing (E2E)
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "No Neon ephemeral DATABASE_URL available. Refusing to run E2E against staging/production DBs."
            exit 1
          fi

      - name: Setup Playwright (Chromium)
        if: ${{ (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        uses: ./.github/actions/setup-playwright

      - name: Load quarantined E2E specs
        if: ${{ (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        id: quarantine
        run: |
          node .github/scripts/quarantine-ledger.mjs validate
          FILE="apps/web/tests/quarantine.json"
          QUARANTINED=()

          if [ -f "$FILE" ]; then
            mapfile -t QUARANTINED < <(jq -r '.entries[]? | select(.kind == "e2e") | .path' "$FILE")
          fi

          mapfile -t ALL_SPECS < <(git ls-files "apps/web/tests/e2e/**/*.spec.ts" "apps/web/tests/smoke/**/*.spec.ts")

          ALLOWED_SPECS=()
          for spec in "${ALL_SPECS[@]}"; do
            skip=false
            for quarantined in "${QUARANTINED[@]}"; do
              if [[ "$spec" == "$quarantined" ]]; then
                skip=true
                break
              fi
            done
            if [[ "$skip" == "false" ]]; then
              ALLOWED_SPECS+=("$spec")
            fi
          done

          echo "allowed_specs=${ALLOWED_SPECS[*]}" >> "$GITHUB_OUTPUT"
          echo "quarantined_specs=${QUARANTINED[*]}" >> "$GITHUB_OUTPUT"

          if [ ${#QUARANTINED[@]} -gt 0 ]; then
            echo "has_quarantine=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_quarantine=false" >> "$GITHUB_OUTPUT"
          fi

      - name: E2E Smoke (PR to Preview)
        if: ${{ github.event_name == 'pull_request' && github.ref != 'refs/heads/production' && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          SMOKE_ONLY: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          VERCEL_ENV: development
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-pr-e2e
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        run: |
          if [ -z "${{ steps.quarantine.outputs.allowed_specs }}" ]; then
            echo "No non-quarantined E2E specs to run."
            exit 0
          fi
          # Chrome-only for PRs - faster feedback, Firefox runs on main only.
          # `e2e:smoke:tagged` runs every `-g @smoke` test across the suite,
          # sharded and quarantine-filtered. The focused PR-fast lane lives in
          # the separate `ci-e2e-smoke` job (playwright.config.smoke.ts).
          cd apps/web && pnpm e2e:smoke:tagged --trace=retain-on-failure --project=chromium --shard=${SHARD_INDEX}/${SHARD_TOTAL} ${{ steps.quarantine.outputs.allowed_specs }}

      - name: E2E Auth Smoke (PR Gate)
        if: ${{ matrix.shard == 1 && github.event_name == 'pull_request' && github.ref != 'refs/heads/production' && hashFiles('apps/web/tests/e2e/smoke-auth.spec.ts') != '' }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          SMOKE_ONLY: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          VERCEL_ENV: development
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-pr-e2e-auth
          SENTRY_RELEASE: ${{ github.sha }}
          # Auth smoke requires real Clerk keys in CI
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          # Auth smoke signs in a configured E2E user
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          # Optional: enable deterministic spotify-only UI check
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        run: |
          cd apps/web && pnpm --filter=@jovie/web run e2e:auth-smoke --project=chromium

      - name: E2E Full (Main Branch)
        if: ${{ github.ref == 'refs/heads/main' && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-main-e2e
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
        run: |
          if [ -z "${{ steps.quarantine.outputs.allowed_specs }}" ]; then
            echo "No non-quarantined E2E specs to run."
            exit 0
          fi
          cd apps/web && pnpm playwright test --shard=${SHARD_INDEX}/${SHARD_TOTAL} ${{ steps.quarantine.outputs.allowed_specs }}

      - name: E2E Quarantine (retries)
        if: ${{ matrix.shard == 1 && steps.quarantine.outputs.has_quarantine == 'true' }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          E2E_SKIP_SEED: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          SENTRY_E2E_REPORTING: '1'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ci-main-e2e-quarantine
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          RETRIES=$(jq -r '.retryBudget.quarantineE2eRetries // 2' apps/web/tests/quarantine.json)
          cd apps/web && pnpm playwright test --retries="$RETRIES" ${{ steps.quarantine.outputs.quarantined_specs }}

      - name: Upload Playwright Report on Failure
        if: ${{ failure() && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.job }}-shard-${{ matrix.shard }}-playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright Test Results on Failure
        if: ${{ failure() && (hashFiles('apps/web/tests/e2e/**') != '' || hashFiles('apps/web/tests/smoke/**') != '') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.job }}-shard-${{ matrix.shard }}-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: apps/web/test-results/
          retention-days: 7

  ci-test-performance:
    name: Test Performance Budgets
    needs: [ci-path-changes]
    # Post-merge only: takes ~6.5 min and is not a merge gate.
    # Running on PRs adds wall time without blocking merge.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Check for relevant changes
        id: check_changes
        shell: bash
        run: echo "run_full_ci=${{ needs.ci-path-changes.outputs.run_test }}" >> "$GITHUB_OUTPUT"

      - name: Skip notification
        if: steps.check_changes.outputs.run_full_ci != 'true'
        run: |
          echo "Skipping test performance budgets; no relevant paths changed."
          exit 0

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check_changes.outputs.run_full_ci == 'true'

      - name: Generate test performance profile
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: pnpm test:profile

      - name: Enforce test performance budgets
        if: steps.check_changes.outputs.run_full_ci == 'true'
        run: |
          TEST_PERFORMANCE_SUITE="full" TEST_PERFORMANCE_USE_BASELINE="true" pnpm test:guard -- --suite="full" --use-baseline
  ci-pr-vercel-preview:
    name: Preview Deploy (PR)
    # Preview deploys are the default QA surface for internal PRs.
    # Keep this independent from the main deploy gate so review happens before merge.
    needs: [ci-path-changes, ci-risk-classifier]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && (needs.ci-risk-classifier.outputs.requires_preview == 'true' || contains(github.event.pull_request.labels.*.name, 'testing') || contains(github.event.pull_request.labels.*.name, 'deploy-preview'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      # Scope preview concurrency to a single PR/ref so unrelated PRs do not
      # evict each other's pending preview deployments from the queue.
      group: preview-deploy-${{ github.repository }}-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: false
    outputs:
      deployment_url: ${{ steps.pr_deploy.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Export secrets to env
        uses: oNaiPs/secrets-to-env-action@75f319b3c8c926ac2eabcca34daa6cf531daf32f # v1.8
        with:
          secrets: ${{ toJSON(secrets) }}
      - name: Pull env (preview)
        run: |
          scope_args=()
          if [ -n "${VERCEL_ORG_ID:-}" ]; then
            scope_args=(--scope "$VERCEL_ORG_ID")
          fi
          ./node_modules/.bin/vercel pull --yes --environment=preview --token "$VERCEL_TOKEN" "${scope_args[@]}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Strip deprecated Turbo env overrides (preview)
        run: |
          for env_file in .vercel/.env.preview.local .vercel/.env.local; do
            if [ -f "$env_file" ]; then
              grep -v '^TURBO_REMOTE_ONLY=' "$env_file" > "${env_file}.tmp" || true
              mv "${env_file}.tmp" "$env_file"
            fi
          done
      - name: Build (PR preview)
        run: |
          scope_args=()
          if [ -n "${VERCEL_ORG_ID:-}" ]; then
            scope_args=(--scope "$VERCEL_ORG_ID")
          fi
          env -u TURBO_REMOTE_ONLY ./node_modules/.bin/vercel build --token "$VERCEL_TOKEN" "${scope_args[@]}"
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
          COREPACK_ENABLE_STRICT: 0
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (PR preview, fast deployment for UI-only changes)
        id: pr_deploy
        run: |
          # For fast preview PRs: use main secrets (no Neon dependency)
          # Fallback hierarchy for maximum compatibility
          POOLED_URL=""
          if [ -n "$DATABASE_URL_MAIN" ]; then
            POOLED_URL="$DATABASE_URL_MAIN"
            echo "Using main database URL"
          elif [ -n "$DATABASE_URL" ]; then
            POOLED_URL="$DATABASE_URL"
            echo "Using fallback database URL"
          else
            # Provide cheap stub for UI-only deployments that might not need DB
            POOLED_URL="postgresql://stub:stub@localhost:5432/main_stub"
            echo "Using stub database URL for UI-only deployment"
          fi

          bash .github/scripts/vercel-prebuilt-deploy.sh deployment_url \
            --env DATABASE_URL="$POOLED_URL" \
            --env GIT_BRANCH="${GIT_BRANCH}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ALLOW_SOURCE_FALLBACK: '1'
          VERCEL_ENABLE_PLAIN_PREBUILT_FALLBACK: 'true'
          # Use main secrets - no Neon dependency for fast deployments
          DATABASE_URL_MAIN: ${{ secrets.DATABASE_URL_MAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

  # PR Lighthouse runs as a path-gated preview-evidence lane with stricter thresholds (0.75 perf, 0.85 a11y).
  # Original removal was due to 0.5 thresholds being too relaxed. Updated .lighthouserc.pr.json fixes this.
  # Production Lighthouse (in ci-build job) has even stricter thresholds (0.8 perf, 0.95 a11y).

  ci-summary:
    name: PR Summary
    # Informational only (posts a PR comment).
    # where the comment target is a synthetic batch PR, not the source PR a human reviews.
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (always() && github.event_name == 'pull_request') }}
    permissions:
      actions: read
      pull-requests: write
      contents: read
    needs:
      - ci-path-changes
      - ci-env-example-guard
      - ci-secret-scan
      - ci-guardrails
      - ci-risk-classifier
      - ci-structural-contract
      - ci-typecheck
      - ci-biome
      - neon-db
      - drizzle-migration-guard
      - ci-drizzle-check
      - ci-e2e-smoke
      - ci-pr-neon-migrate
      - ci-unit-tests
      - ci-test-performance
      - ci-e2e-migrate
      - ci-e2e-tests
      - ci-pr-vercel-preview
      - ci-build-public
      - ci-layout-guard
      - ci-lighthouse-pr
      - ci-lighthouse-dashboard-pr
      - ci-lighthouse-onboarding-pr
      - ci-lighthouse-admin-pr
      - ci-a11y
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 1 }
      - uses: ./.github/actions/setup-node-pnpm
      - name: Build CI harness artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_PREVIEW_URL: ${{ needs.ci-pr-vercel-preview.outputs.deployment_url }}
          RISK_LEVEL: ${{ needs.ci-risk-classifier.outputs.risk_level }}
          RISK_REQUIRES_SMOKE: ${{ needs.ci-risk-classifier.outputs.requires_smoke }}
          RISK_REQUIRES_PREVIEW: ${{ needs.ci-risk-classifier.outputs.requires_preview }}
          RISK_BLOCKS_UNATTENDED: ${{ needs.ci-risk-classifier.outputs.blocks_unattended_auto_merge }}
          RISK_RULES: ${{ needs.ci-risk-classifier.outputs.matched_rule_ids }}
          CI_HARNESS_JOB_CI_RISK_CLASSIFIER: ${{ needs.ci-risk-classifier.result }}
          CI_HARNESS_JOB_CI_STRUCTURAL_CONTRACT: ${{ needs.ci-structural-contract.result }}
          CI_HARNESS_JOB_CI_UNIT_TESTS: ${{ needs.ci-unit-tests.result }}
          CI_HARNESS_JOB_CI_BUILD_PUBLIC: ${{ needs.ci-build-public.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_PR: ${{ needs.ci-lighthouse-pr.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_DASHBOARD_PR: ${{ needs.ci-lighthouse-dashboard-pr.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_ONBOARDING_PR: ${{ needs.ci-lighthouse-onboarding-pr.result }}
          CI_HARNESS_JOB_CI_LIGHTHOUSE_ADMIN_PR: ${{ needs.ci-lighthouse-admin-pr.result }}
          CI_HARNESS_JOB_CI_E2E_SMOKE: ${{ needs.ci-e2e-smoke.result }}
          CI_HARNESS_JOB_CI_PR_VERCEL_PREVIEW: ${{ needs.ci-pr-vercel-preview.result }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/ci-harness"
          RISK_JSON="$RUNNER_TEMP/ci-harness/risk.json"
          ARTIFACT_JSON="$RUNNER_TEMP/ci-harness/ci-harness.v1.json"

          risk_level="${RISK_LEVEL:-low}"
          requires_smoke="${RISK_REQUIRES_SMOKE:-false}"
          requires_preview="${RISK_REQUIRES_PREVIEW:-false}"
          blocks_unattended="${RISK_BLOCKS_UNATTENDED:-false}"
          risk_rules="${RISK_RULES:-}"

          jq -n \
            --arg riskLevel "$risk_level" \
            --arg rules "$risk_rules" \
            --argjson requiresSmoke "$requires_smoke" \
            --argjson requiresPreview "$requires_preview" \
            --argjson blocksUnattended "$blocks_unattended" \
            '{
              schemaVersion: 1,
              riskLevel: $riskLevel,
              requiresSmoke: $requiresSmoke,
              requiresPreview: $requiresPreview,
              blocksUnattendedAutoMerge: $blocksUnattended,
              matchedRules: ($rules | split(",") | map(select(length > 0) | {id: ., title: ., level: $riskLevel, files: []})),
              recommendedLabels: ((if $requiresSmoke then ["testing"] else [] end) + (if $blocksUnattended then ["needs-human"] else [] end))
            }' > "$RISK_JSON"

          node scripts/ci-harness.mjs emit-artifact \
            --risk "$RISK_JSON" \
            --out "$ARTIFACT_JSON"

          {
            echo "### CI harness artifact"
            echo
            echo "- Artifact: \`ci-harness.v1.json\`"
            echo "- Risk level: $risk_level"
            echo "- Preview URL: ${PR_PREVIEW_URL:-none}"
            echo
            echo "Next local command:"
            echo
            echo '```bash'
            echo "pnpm ci:harness:check"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CI harness artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-harness-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-harness/ci-harness.v1.json
          retention-days: 14
      - name: Post CI summary to PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILD_RUN_FULL_CI: ${{ needs.ci-path-changes.outputs.run_build }}
          DRIZZLE_RUN_FULL_CI: ${{ needs.ci-drizzle-check.outputs.run_full_ci }}
          E2E_RUN_FULL_CI: ${{ needs.ci-e2e-migrate.outputs.run_full_ci }}
          E2E_SMOKE_RUN_FULL_CI: ${{ needs.ci-e2e-smoke.outputs.run_full_ci }}
          MIGRATION_GUARD_RUN_FULL_CI: ${{ needs.drizzle-migration-guard.outputs.run_full_ci }}
          PR_MIGRATE_RUN_FULL_CI: ${{ needs.ci-pr-neon-migrate.outputs.run_full_ci }}
          UNIT_RUN_FULL_CI: ${{ needs.ci-unit-tests.outputs.run_full_ci }}
          PR_PREVIEW_URL: ${{ needs.ci-pr-vercel-preview.outputs.deployment_url }}
          RISK_LEVEL: ${{ needs.ci-risk-classifier.outputs.risk_level }}
          RISK_REQUIRES_SMOKE: ${{ needs.ci-risk-classifier.outputs.requires_smoke }}
          RISK_REQUIRES_PREVIEW: ${{ needs.ci-risk-classifier.outputs.requires_preview }}
          RISK_BLOCKS_UNATTENDED: ${{ needs.ci-risk-classifier.outputs.blocks_unattended_auto_merge }}
          RISK_RULES: ${{ needs.ci-risk-classifier.outputs.matched_rule_ids }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;

            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              per_page: 100
            });

            const jobByName = new Map(
              jobsResponse.data.jobs.map(job => [job.name, job])
            );

            const formatDuration = (job) => {
              if (!job?.started_at || !job?.completed_at) return '—';
              const start = new Date(job.started_at);
              const end = new Date(job.completed_at);
              const ms = Math.max(0, end - start);
              const minutes = Math.floor(ms / 60000);
              const seconds = Math.floor((ms % 60000) / 1000);
              return minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
            };

            const resolveOutcome = (jobName, fallbackResult) => {
              const job = jobByName.get(jobName);
              if (!job) return { status: fallbackResult ?? 'not_run', duration: '—' };
              return {
                status: job.conclusion || job.status || fallbackResult || 'unknown',
                duration: formatDuration(job)
              };
            };

            const summarizeStatus = (status) => {
              switch (status) {
                case 'success':
                  return '✅ Passed';
                case 'failure':
                  return '❌ Failed';
                case 'cancelled':
                  return '⚠️ Cancelled';
                case 'skipped':
                  return '⚠️ Skipped';
                case 'timed_out':
                  return '❌ Timed out';
                case 'not_run':
                  return '⚪️ Not run';
                default:
                  return `⚪️ ${status}`;
              }
            };

            const deriveSkipReason = (jobKey, runFullCiFlag) => {
              if (runFullCiFlag === 'false') {
                return 'Skipped (path guard: no relevant changes)';
              }
              if (runFullCiFlag === '') {
                return 'Skipped (job not applicable)';
              }
              return jobKey === 'neon-db'
                ? 'Skipped (not required for this PR)'
                : 'Skipped (conditional job)';
            };

            const summaryRows = [
              { label: '**PR Ready (merge gate)**', jobName: 'PR Ready' },
              { label: 'CI Risk Classifier', jobName: 'CI Risk Classifier' },
              { label: 'Structural Contract', jobName: 'Structural Contract' },
              { label: 'Env Example Guard', jobName: 'Env Example Guard' },
              { label: 'Guardrails', jobName: 'Guardrails (proxy)' },
              { label: 'Biome', jobName: 'Biome (lint + format)' },
              {
                label: 'Migration Guard',
                jobName: 'Migration Guard',
                runFullCi: process.env.MIGRATION_GUARD_RUN_FULL_CI
              },
              { label: 'Neon DB', jobName: 'Neon DB' },
              {
                label: 'Drizzle Check',
                jobName: 'Drizzle Check',
                runFullCi: process.env.DRIZZLE_RUN_FULL_CI
              },
              {
                label: 'Build',
                jobName: 'Build',
                runFullCi: process.env.BUILD_RUN_FULL_CI
              },
              { label: 'Build (public routes)', jobName: 'Build (public routes)' },
              { label: 'Layout Guard', jobName: 'Layout Guard (informational)' },
              { label: 'Lighthouse (public routes PR)', jobName: 'Lighthouse (public routes PR)' },
              { label: 'Lighthouse (dashboard PR)', jobName: 'Lighthouse (dashboard PR)' },
              { label: 'Lighthouse (onboarding PR)', jobName: 'Lighthouse (onboarding PR)' },
              { label: 'Lighthouse (admin PR)', jobName: 'Lighthouse (admin PR)' },
              { label: 'A11y (axe)', jobName: 'A11y (axe)' },
              {
                label: 'Unit Tests',
                jobName: 'Unit Tests',
                runFullCi: process.env.UNIT_RUN_FULL_CI
              },
              {
                label: 'E2E Smoke',
                jobName: 'E2E Smoke (PR Fast Feedback)',
                runFullCi: process.env.E2E_SMOKE_RUN_FULL_CI
              },
              {
                label: 'Test Performance Budgets',
                jobName: 'Test Performance Budgets'
              },
              {
                label: 'E2E Tests',
                jobName: 'E2E Tests',
                runFullCi: process.env.E2E_RUN_FULL_CI
              },
              {
                label: 'DB Migrate (PR main)',
                jobName: 'DB Migrate (PR main)',
                runFullCi: process.env.PR_MIGRATE_RUN_FULL_CI
              },
              { label: 'Preview Deploy', jobName: 'Preview Deploy (PR)' }
            ];

            const rows = summaryRows.map((row) => {
              const outcome = resolveOutcome(row.jobName);
              const statusLabel = summarizeStatus(outcome.status);
              const timing = outcome.duration;
              let context = 'Executed';
              if (outcome.status === 'skipped' || outcome.status === 'not_run') {
                context = deriveSkipReason(row.label, row.runFullCi ?? '');
              }
              return `| ${row.label} | ${statusLabel} | ${context} | ${timing} |`;
            });

            // Add preview URL section if available
            let previewUrlSection = '';
            if (process.env.PR_PREVIEW_URL) {
              previewUrlSection = `\n🔗 **Preview Deployment**: ${process.env.PR_PREVIEW_URL}\n`;
            }

            const summaryBody = [
              '## CI Summary',
              '',
              'A crisp snapshot of this PR run — executed vs. skipped, with timing for every key lane.',
              '',
              `**Risk:** ${process.env.RISK_LEVEL || 'low'} (smoke: ${process.env.RISK_REQUIRES_SMOKE || 'false'}, preview: ${process.env.RISK_REQUIRES_PREVIEW || 'false'}, blocks unattended auto-merge: ${process.env.RISK_BLOCKS_UNATTENDED || 'false'})`,
              `**Matched risk rules:** ${process.env.RISK_RULES || 'none'}`,
              '**Machine artifact:** `ci-harness.v1.json` uploaded to this workflow run.',
              previewUrlSection,
              '',
              '| Job | Status | Context | Time |',
              '| --- | ------ | ------- | ---- |',
              ...rows,
              '',
              `**Run:** [${runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})`,
              ''
            ].join('\n');

            const existingComments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber
            });

            const botComment = existingComments.data.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.startsWith('## CI Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: summaryBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: summaryBody
              });
            }
  # Extended smoke validation for risky changes.
  # This remains available for opt-in PR validation but does not block production deploys.
  ci-smoke-required:
    name: Extended Smoke (Preview)
    needs: [ci-path-changes, ci-build-public, neon-db, ci-e2e-tests]
    if: ${{ needs.ci-path-changes.outputs.skip == 'false' && (always() && ((github.event_name == 'workflow_dispatch' && needs.neon-db.result == 'success') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login && github.event.pull_request.user.login != 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'testing') && needs.ci-path-changes.outputs.run_e2e == 'true'))) }}
    runs-on: ubuntu-latest
    environment: Preview – jovie
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download Neon DB connection artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: neon-db-connection-${{ github.run_id }}
          path: /tmp/neon-db-connection

      - name: Resolve DATABASE_URL from Neon artifact
        id: resolve-smoke-neon-db-url
        uses: ./.github/actions/resolve-neon-database-url
        with:
          connection_file: /tmp/neon-db-connection/connection.json
          candidate_json_key: db_url_pooled
          fallback_json_key: db_url
          credential_source_url: ${{ secrets.DATABASE_URL_MAIN }}
          credential_fallback_url: ${{ secrets.DATABASE_URL }}

      - name: Export DATABASE_URL
        run: echo "DATABASE_URL=${{ steps.resolve-smoke-neon-db-url.outputs.database_url }}" >> "$GITHUB_ENV"

      - name: Run migrations for Smoke DB
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: test
          GIT_BRANCH: ${{ github.ref_name }}
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Download build artifact from ci-build
        id: download-build
        if: ${{ needs.ci-path-changes.outputs.run_build == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build-${{ github.run_id }}
          path: /tmp/nextjs-build-download
        continue-on-error: true

      - name: Extract or rebuild for smoke tests
        run: |
          if [ -f /tmp/nextjs-build-download/nextjs-build.tar ]; then
            echo "Reusing build artifact (saves ~3-4 min)"
            tar -xf /tmp/nextjs-build-download/nextjs-build.tar -C apps/web
          else
            echo "Build artifact not available, building from scratch"
            pnpm turbo build --filter=@jovie/web
          fi
          # Standalone output needs static assets alongside server.js
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Keep rebuild fallback equivalent to the shared ci-build artifact.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          # NEXT_PUBLIC_* must be present at build time for standalone smoke runs.
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_IGNORE_ESLINT: '1'
          NEXT_IGNORE_TYPECHECK: '1'
          NEXT_PRIVATE_SKIP_SIZE_CHECK: 'true'

      - name: Run Required Smoke Tests
        run: |
          cd apps/web

          # Start standalone production server (not Turbopack dev) to avoid SWC OOM on CI runners
          # IMPORTANT: Pass runtime env vars explicitly — the step's env: block only applies to
          # the shell process, but backgrounded processes inherit from the shell's exported vars.
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          export NODE_ENV=test
          export VERCEL_ENV=development
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          export NEXT_PUBLIC_TURNSTILE_SITE_KEY="1x00000000000000000000AA"
          export TURNSTILE_SECRET_KEY="1x0000000000000000000000000000000AA"
          export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
          export NEXT_PUBLIC_E2E_MODE=1
          export NEXT_DISABLE_TOOLBAR=1
          export NEXT_PUBLIC_CLERK_MOCK=1
          export NEXT_PUBLIC_CLERK_PROXY_DISABLED=1
          export E2E_USE_TEST_AUTH_BYPASS=1
          export E2E_TEST_AUTH_PERSONA=creator-ready
          export E2E_CLERK_USER_ID="${{ secrets.E2E_CLERK_USER_ID }}"
          export FLAGS_SECRET="${{ secrets.FLAGS_SECRET }}"
          export URL_ENCRYPTION_KEY="smoke-preview-url-encryption-key"
          export AI_GATEWAY_API_KEY="smoke-preview-ai-gateway-key"
          PORT=3100 node .next/standalone/apps/web/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # Wait for server readiness
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100 > /dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "false" ]; then
            echo "::error::Standalone server failed to start within 30s"
            exit 1
          fi

          # Run smoke tests with BASE_URL set (skips Playwright webServer config)
          cd "$GITHUB_WORKSPACE"
          set +e
          CI=true BASE_URL=http://localhost:3100 pnpm --filter=@jovie/web exec playwright test --config=playwright.config.smoke.ts --reporter=line
          EXIT_CODE=$?
          set -e
          exit $EXIT_CODE
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_DISABLE_TOOLBAR: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

      - name: Upload Playwright Artifacts on Failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-required-report-${{ github.run_id }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 3

  # Homepage smoke test checks CURRENT production state (informational only).
  # NOT a deploy blocker — if prod is degraded we still need to be able to ship fixes.
  # Post-deploy verification is handled by canary-health-gate.
  ci-homepage-smoke:
    name: Homepage Smoke (Informational)
    needs: [ci-build-public]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - name: Verify homepage renders correctly
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Running homepage smoke test against production..."

          USER_AGENT="Mozilla/5.0 (compatible; JovieCI/1.0; +https://jov.ie)"
          COOKIE_JAR="$(mktemp)"

          # Vercel Deployment Protection bypass for automation
          BYPASS_SECRET="${VERCEL_AUTOMATION_BYPASS_SECRET:-}"
          BYPASS_ARGS=()
          if [ -n "$BYPASS_SECRET" ]; then
            BYPASS_ARGS+=(
              -H "x-vercel-protection-bypass: $BYPASS_SECRET"
              -H "x-vercel-set-bypass-cookie: true"
              -c "$COOKIE_JAR"
              -b "$COOKIE_JAR"
            )
          fi

          # Check homepage
          response=$(curl -sS -L -A "$USER_AGENT" -H "Cache-Control: no-cache" "${BYPASS_ARGS[@]}" -w "\n%{http_code}" "https://jov.ie" || echo "\n000")
          status="${response##*$'\n'}"
          body="${response%$'\n'*}"

          if [ "$status" != "200" ]; then
            echo "❌ Homepage returned HTTP $status"
            exit 1
          fi

          if [ ${#body} -lt 1000 ]; then
            echo "❌ Homepage body too short (${#body} chars) - likely broken"
            exit 1
          fi

          if echo "$body" | grep -qi "application error\|internal server error\|something went wrong"; then
            echo "❌ Homepage contains error message"
            exit 1
          fi

          # Check critical pages (/sign-up, /pricing)
          for route in "/sign-up" "/pricing"; do
            route_response=$(curl -sS -L -A "$USER_AGENT" -H "Cache-Control: no-cache" "${BYPASS_ARGS[@]}" -w "\n%{http_code}" "https://jov.ie${route}" || echo "\n000")
            route_status="${route_response##*$'\n'}"

            if [ "$route_status" -ge 500 ]; then
              echo "❌ Route ${route} returned HTTP $route_status (server error)"
              exit 1
            fi
          done

          echo "✅ Homepage smoke passed"

  # Intermediate commits on main do not need to ship on their own. During
  # merge-queue bursts, N commits can land in quick succession and each one
  # would otherwise consume a full ~15 min deploy-chain slot against the
  # shared production-deploy concurrency group, starving the tip. This gate
  # runs first: only the commit that is still origin/main tip at gate time
  # proceeds to deploy-staging. Older intermediates short-circuit cleanly.
  deploy-gate:
    name: Deploy Gate (HEAD-only)
    needs: [ci-path-changes, ci-build-public]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      is_head: ${{ steps.check.outputs.is_head }}
    steps:
      - name: Check if SHA is still main HEAD
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tip=$(gh api "repos/${{ github.repository }}/commits/main" --jq '.sha // ""' 2>/dev/null || true)
          if [ -z "$tip" ]; then
            echo "::warning::Could not resolve origin/main tip; defaulting to proceed"
            echo "is_head=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$tip" = "${{ github.sha }}" ]; then
            echo "::notice::SHA ${{ github.sha }} is main HEAD — proceeding with deploy"
            echo "is_head=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping deploy — ${{ github.sha }} is behind main HEAD ($tip). The newer commit will promote."
            echo "is_head=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-staging:
    needs: [deploy-gate]
    # Fast main path: merge on deterministic checks, deploy a production build to
    # a preview URL, verify it on staging, then promote only if it passes.
    # Intermediate commits (not main HEAD at gate time) skip so they don't
    # saturate the production-deploy concurrency slot.
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && !failure() && !cancelled() && needs.deploy-gate.outputs.is_head == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deploy concurrency: serialize main deploys instead of cancelling them.
    # Cancelling in-progress main deploys during merge bursts can starve
    # production promotion and leave main without a completed deploy run.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      actions: read
      # Required for SLSA build-provenance attestation
      attestations: write
      id-token: write
    outputs:
      migration_status: ${{ steps.migrate.outcome }}
      preflight_status: ${{ steps.preflight.outcome }}
      # Note: if deploy is cancelled before verify completes, outcome is '' (not 'failure'),
      # so no drift warning fires. This is acceptable — the cancelled deploy didn't ship.
      schema_drift: ${{ steps.verify.outcome == 'failure' }}
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    env:
      # Migrations still run against the production database before staging
      # verification, so they must remain additive.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    # Reuse the existing production environment until a dedicated staging
    # environment exists with the same deploy secrets scoped to it.
    environment:
      name: Production – jovie
      url: https://staging.jov.ie
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
      - name: DB safety check (production - preflight)
        id: preflight
        run: pnpm --filter=@jovie/web exec tsx scripts/drizzle-migrate-preflight.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GIT_BRANCH: main
          ALLOW_PROD_MIGRATIONS: 'true'
      - name: DB migrate (production - Drizzle)
        id: migrate
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GIT_BRANCH: main
          ALLOW_PROD_MIGRATIONS: 'true'
        continue-on-error: false
      - name: DB verify (post-migration schema check)
        id: verify
        run: pnpm --filter=@jovie/web run drizzle:verify:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # Blocks deploy by default — missing columns = broken production.
        # To bypass in emergencies, include [skip-schema-verify] in the
        # merge commit message. The Slack drift notification in deploy-notify
        # fires when verify fails but deploy proceeds (bypass alert).
        continue-on-error: ${{ contains(github.event.head_commit.message, '[skip-schema-verify]') }}
      - name: Export secrets to env
        uses: oNaiPs/secrets-to-env-action@75f319b3c8c926ac2eabcca34daa6cf531daf32f # v1.8
        with:
          secrets: ${{ toJSON(secrets) }}
      - name: Sync required production env to Vercel project
        timeout-minutes: 8
        run: |
          set -euo pipefail
          set +x

          required_vercel_env=(
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY
            CLERK_PUBLISHABLE_KEY_STAGING
            CLERK_SECRET_KEY_STAGING
            DATABASE_URL
            SESSION_SECRET
            AI_GATEWAY_API_KEY
            NEXT_PUBLIC_TURNSTILE_SITE_KEY
            TURNSTILE_SECRET_KEY
          )

          missing_env=()
          for key in "${required_vercel_env[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing_env+=("$key")
            fi
          done

          if [ "${#missing_env[@]}" -gt 0 ]; then
            echo "Missing GitHub secrets required for Vercel production env: ${missing_env[*]}"
            exit 1
          fi

          # Fetch current Vercel env once, then diff to avoid
          # 24 sequential API calls when ~95% of vars are unchanged.
          current_env=$(./node_modules/.bin/vercel env ls production --json \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" 2>/dev/null || echo "[]")

          for key in "${required_vercel_env[@]}"; do
            current_value=$(echo "$current_env" | jq -r ".[] | select(.key == \"$key\") | .value // empty" 2>/dev/null || echo "")

            if [ -n "$current_value" ] && [ "$current_value" = "${!key}" ]; then
              echo "Skipping ${key} (unchanged)."
              continue
            fi

            ./node_modules/.bin/vercel env rm "$key" production \
              --yes \
              --token "$VERCEL_TOKEN" \
              --scope "$VERCEL_ORG_ID" >/dev/null 2>&1 || true
            ./node_modules/.bin/vercel env add "$key" production \
              --yes \
              --value "${!key}" \
              --token "$VERCEL_TOKEN" \
              --scope "$VERCEL_ORG_ID" >/dev/null
            echo "Synced ${key} to Vercel production env."
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          CLERK_SECRET_KEY_STAGING: ${{ secrets.CLERK_SECRET_KEY_STAGING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      - name: Pull env (production)
        timeout-minutes: 5
        run: |
          scope_args=()
          if [ -n "${VERCEL_ORG_ID:-}" ]; then
            scope_args=(--scope "$VERCEL_ORG_ID")
          fi
          ./node_modules/.bin/vercel pull --yes --environment=production --token "$VERCEL_TOKEN" "${scope_args[@]}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Strip deprecated Turbo env overrides (production)
        run: |
          for env_file in .vercel/.env.production.local .vercel/.env.local; do
            if [ -f "$env_file" ]; then
              grep -v '^TURBO_REMOTE_ONLY=' "$env_file" > "${env_file}.tmp" || true
              mv "${env_file}.tmp" "$env_file"
            fi
          done
      - name: Check signup readiness (production deploy env)
        run: pnpm --filter=@jovie/web exec tsx scripts/check-signup-readiness.ts --target=prd --source=env
      - name: Build (preview target for staging verification)
        timeout-minutes: 10
        run: |
          scope_args=()
          if [ -n "${VERCEL_ORG_ID:-}" ]; then
            scope_args=(--scope "$VERCEL_ORG_ID")
          fi
          env -u TURBO_REMOTE_ONLY ./node_modules/.bin/vercel build --token "$VERCEL_TOKEN" "${scope_args[@]}"
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
          COREPACK_ENABLE_STRICT: 0
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Package build output for provenance attestation
        run: tar -czf /tmp/vercel-build-output.tar.gz -C . .vercel/output
      - name: Attest build provenance (SLSA Level 2)
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: /tmp/vercel-build-output.tar.gz
          # ponytail: attests the vercel build output; attestation is SLSA L2 (hosted
          # runner + signed provenance). L3 requires hermetic build — upgrade when
          # Vercel builds become reproducible/isolated.
      - name: Deploy (staging preview, prebuilt)
        timeout-minutes: 8
        id: deploy
        run: |
          required_runtime_env=(
            VERCEL_AUTOMATION_BYPASS_SECRET
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY
            DATABASE_URL
            SESSION_SECRET
            AI_GATEWAY_API_KEY
            NEXT_PUBLIC_TURNSTILE_SITE_KEY
            TURNSTILE_SECRET_KEY
            CLERK_PUBLISHABLE_KEY_STAGING
            CLERK_SECRET_KEY_STAGING
          )

          missing_runtime_env=()
          for key in "${required_runtime_env[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing_runtime_env+=("$key")
            fi
          done

          if [ "${#missing_runtime_env[@]}" -gt 0 ]; then
            echo "Missing staging preview runtime env: ${missing_runtime_env[*]}"
            exit 1
          fi

          bash .github/scripts/vercel-prebuilt-deploy.sh deploy_url \
            --env VERCEL_AUTOMATION_BYPASS_SECRET="${VERCEL_AUTOMATION_BYPASS_SECRET}" \
            --env NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" \
            --env CLERK_SECRET_KEY="${CLERK_SECRET_KEY}" \
            --env DATABASE_URL="${DATABASE_URL}" \
            --env SESSION_SECRET="${SESSION_SECRET}" \
            --env AI_GATEWAY_API_KEY="${AI_GATEWAY_API_KEY}" \
            --env NEXT_PUBLIC_TURNSTILE_SITE_KEY="${NEXT_PUBLIC_TURNSTILE_SITE_KEY}" \
            --env TURNSTILE_SECRET_KEY="${TURNSTILE_SECRET_KEY}" \
            --env CLERK_PUBLISHABLE_KEY_STAGING="${CLERK_PUBLISHABLE_KEY_STAGING}" \
            --env CLERK_SECRET_KEY_STAGING="${CLERK_SECRET_KEY_STAGING}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          CLERK_SECRET_KEY_STAGING: ${{ secrets.CLERK_SECRET_KEY_STAGING }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ENABLE_PLAIN_PREBUILT_FALLBACK: 'true'

      - name: Alias preview to staging.jov.ie
        timeout-minutes: 3
        run: |
          ./node_modules/.bin/vercel alias set "${{ steps.deploy.outputs.deploy_url }}" staging.jov.ie --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ secrets.VERCEL_ORG_ID }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  canary-health-gate:
    name: Canary Health Gate (staging)
    needs: [deploy-staging]
    if: ${{ always() && needs.deploy-staging.result == 'success' }}
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    uses: ./.github/workflows/canary-health-gate.yml
    with:
      # Verify the exact deployment produced by deploy-staging instead of the
      # shared staging alias. Merge-queue traffic can retarget staging.jov.ie
      # while this gate is still retrying, which produces false negatives even
      # when the freshly deployed preview is healthy.
      deployment_url: ${{ needs.deploy-staging.outputs.deploy_url }}
      commit_sha: ${{ github.sha }}
      fallback_health_url: /api/health
    secrets:
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  promote-production:
    name: Promote to Production
    needs: [deploy-staging, canary-health-gate]
    if: ${{ always() && needs.deploy-staging.result == 'success' && needs.canary-health-gate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: Production – jovie
      url: https://jov.ie
    outputs:
      # Emitted when promote-production exits non-zero so deploy-notify can
      # distinguish silent-no-op regressions from generic promote failures.
      # Values: "domain_project_mismatch" (public domains are not on the
      # canonical Vercel project) | "no_match" (no Vercel deployment for
      # github.sha) | "verify_mismatch" (production keeps serving the old
      # commit after promote).
      failure_subtype: ${{ steps.domain-guard.outputs.failure_subtype || steps.promote.outputs.failure_subtype }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Verify production domains are on canonical Vercel project
        id: domain-guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if ! node .github/scripts/verify-vercel-production-domains.mjs; then
            echo "failure_subtype=domain_project_mismatch" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Promote specific deployment for this SHA
        id: promote
        env:
          GITHUB_SHA: ${{ github.sha }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Resolve the exact deployment URL for github.sha via the Vercel API.
          # We deliberately do NOT promote the staging.jov.ie alias: if staging
          # drifts (silent `vercel alias set` failure, stale alias), promoting
          # the alias hits "already the current production deployment" and
          # silently no-ops. That regression kept production 7 days stale in
          # 2026-04. Looking up by SHA means the only way to silently succeed
          # is if we actually promote the right commit.
          set -euo pipefail
          echo "Resolving deployment URL for SHA ${GITHUB_SHA}..."
          deploy_url="$(python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ.get("VERCEL_TOKEN", "")
          org_id = os.environ.get("VERCEL_ORG_ID", "")
          project_id = os.environ.get("VERCEL_PROJECT_ID", "")
          commit_sha = os.environ.get("GITHUB_SHA", "")

          # Distinguish missing-creds from genuine no-match so the shell can
          # pick a different failure subtype. Without this, an unset secret
          # silently triggers the `no_match` Slack alert.
          if not token or not project_id or not commit_sha:
              print("__MISSING_CREDS__", end="")
              sys.exit(0)

          # Paginate over READY deployments until we find the SHA or the
          # Vercel API says there are no more pages. A hard page cap prevents
          # runaway API calls on pathological account state.
          #
          # No target filter: the upstream deploy-staging job uses
          # `vercel deploy --prebuilt` (via vercel-prebuilt-deploy.sh) without
          # --prod, which creates PREVIEW deployments. Filtering by
          # target=production would never match and every promote would fail
          # with no_match. Preview-collision safety comes from (a) projectId
          # scoping the query to this project, (b) exact 40-char SHA match,
          # and (c) the `vercel promote` step itself, which only accepts URLs
          # from the same project.
          base_params = {
              "projectId": project_id,
              "state": "READY",
              "limit": 100,
          }
          if org_id.startswith("team_"):
              base_params["teamId"] = org_id

          next_cursor = None
          found = False
          for _page in range(10):  # hard cap: 1000 deployments searched
              params = dict(base_params)
              if next_cursor is not None:
                  params["until"] = next_cursor
              url = f"https://api.vercel.com/v6/deployments?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=15) as response:
                  payload = json.load(response)

              deployments = payload.get("deployments", [])
              for deployment in deployments:
                  meta = deployment.get("meta") or {}
                  if meta.get("githubCommitSha") == commit_sha:
                      print(f"https://{deployment['url']}")
                      found = True
                      break
              if found:
                  break

              pagination = payload.get("pagination") or {}
              next_cursor = pagination.get("next")
              if not next_cursor or not deployments:
                  break
          PY
          )"

          if [ "$deploy_url" = "__MISSING_CREDS__" ]; then
            echo "❌ Missing Vercel credentials (VERCEL_TOKEN / VERCEL_PROJECT_ID / GITHUB_SHA)."
            echo "   Cannot resolve deployment URL. Check repo secrets."
            echo "failure_subtype=missing_creds" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -z "$deploy_url" ]; then
            echo "❌ No READY Vercel deployment found for SHA ${GITHUB_SHA}."
            echo "   Either the deploy-staging job never produced a READY deployment"
            echo "   (build error, timeout) or it sits beyond the 1000-deployment"
            echo "   search window. Failing loudly instead of silently no-opping."
            echo "failure_subtype=no_match" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "Found deployment for SHA: promoting..."

          set +e
          promote_output=$(./node_modules/.bin/vercel promote "$deploy_url" --yes --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" 2>&1)
          promote_exit_code=$?
          set -e
          printf '%s\n' "$promote_output"

          if [ "$promote_exit_code" -ne 0 ]; then
            # Re-running ship on the same SHA is legitimately idempotent.
            if printf '%s' "$promote_output" | grep -q "already the current production deployment"; then
              echo "Deployment for SHA ${GITHUB_SHA} is already in production; continuing to verify."
            else
              exit "$promote_exit_code"
            fi
          fi

          # Verify production actually serves github.sha. /api/health/build-info
          # returns commitSha as a 7-char slice of VERCEL_GIT_COMMIT_SHA (see
          # apps/web/app/api/health/build-info/route.ts:35).
          expected="${GITHUB_SHA:0:7}"
          USER_AGENT="Mozilla/5.0 (compatible; JovieCI/1.0; +https://jov.ie)"
          BYPASS_ARGS=()
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            BYPASS_ARGS+=(-H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}")
          fi

          # Prefer the deployment URL when Vercel allows direct access, but
          # also verify the canonical production alias. Protected deployment
          # URLs can return 401 even after a successful promote; jov.ie is the
          # user-facing surface and catches domain/project wiring regressions.
          probe_urls=(
            "${deploy_url}/api/health/build-info"
            "https://jov.ie/api/health/build-info"
          )
          probe_labels=(
            "deployment"
            "production-alias"
          )
          echo "Verifying promoted deployment serves ${expected}..."
          # Track confirmed_mismatch separately from saw_valid_probe so a
          # late 500 can't overwrite an earlier confirmed mismatch. Once we
          # see a 200 with a wrong SHA, it IS a mismatch — routing a
          # subsequent edge hiccup to verify_probe_failed would send the
          # wrong alert path.
          actual=""
          last_status=""
          saw_valid_probe=false
          confirmed_mismatch=false
          # Vercel edge rollout can lag behind a successful `vercel promote`.
          # Keep verification strict, but use a bounded 5-minute window to
          # avoid false negatives on healthy deploys.
          max_attempts=15
          for attempt in $(seq 1 "$max_attempts"); do
            # Skip sleep on the first attempt; wait between retries so we
            # don't burn 10s after the final failing attempt.
            if [ "$attempt" -gt 1 ]; then
              sleep 10
            fi
            for index in "${!probe_urls[@]}"; do
              probe_url="${probe_urls[$index]}"
              probe_label="${probe_labels[$index]}"
              response=$(curl -sS -L \
                --connect-timeout 5 \
                --max-time 10 \
                -A "$USER_AGENT" \
                -H "Cache-Control: no-cache" \
                "${BYPASS_ARGS[@]}" \
                -w "\n%{http_code}" \
                "${probe_url}?_cb=$(date +%s%N)" 2>/dev/null || printf '\n000')
              last_status="${response##*$'\n'}"
              body="${response%$'\n'*}"

              if [ "$last_status" != "200" ]; then
                echo "  attempt ${attempt} ${probe_label}: build-info returned HTTP ${last_status}"
                continue
              fi

              actual=$(printf '%s' "$body" | jq -r '.commitSha // ""' 2>/dev/null || echo "")
              if [ -z "$actual" ]; then
                echo "  attempt ${attempt} ${probe_label}: build-info returned 200 without commitSha"
                continue
              fi

              echo "  attempt ${attempt} ${probe_label}: build-info commitSha=${actual}"
              saw_valid_probe=true
              if [ "$actual" = "$expected" ]; then
                echo "✅ ${probe_label} serves ${expected} — promote succeeded."
                exit 0
              fi
              confirmed_mismatch=true
            done
          done

          if [ "$confirmed_mismatch" = "true" ]; then
            echo "❌ Production verification returned commitSha='${actual:-<empty>}' but expected '${expected}'."
            echo "   The promoted deployment or jov.ie alias is serving a different SHA."
            echo "failure_subtype=verify_mismatch" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$saw_valid_probe" != "true" ]; then
            echo "❌ Production build-info probes failed across all attempts (last HTTP ${last_status})."
            echo "   Cannot confirm whether production is serving ${expected}."
            echo "failure_subtype=verify_probe_failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Unreachable: the loop either exits 0 on match, or both
          # confirmed_mismatch=false and saw_valid_probe=false can't both
          # hold — if we got here, something broke the control flow.
          echo "❌ Verification loop finished in an unexpected state."
          echo "failure_subtype=verify_probe_failed" >> "$GITHUB_OUTPUT"
          exit 1

  sentry-error-gate:
    name: Sentry Error Gate (production)
    needs: [promote-production, canary-health-gate]
    if: ${{ always() && needs.promote-production.result == 'success' && needs.canary-health-gate.result == 'success' }}
    uses: ./.github/workflows/sentry-error-gate.yml
    with:
      deployment_url: https://jov.ie
      soak_minutes: 5
      baseline_window_minutes: 30
      threshold_multiplier: 3
      min_baseline_errors: 5
    secrets:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  production-oauth-gate:
    name: Production OAuth Gate (rollback on auth break)
    needs: [promote-production]
    if: ${{ always() && needs.promote-production.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - name: Setup Playwright (Chromium)
        uses: ./.github/actions/setup-playwright

      - name: Hard probe — Better Auth handler reachable (GET /api/auth/ok)
        id: ba-health
        run: |
          # Plan Phase 11 (Clerk → Better Auth migration): a deterministic 200
          # from `/api/auth/ok` proves the BA handler mounted on prod before
          # the OAuth provider redirect_uri probe runs. A 404 means the
          # catch-all `/api/auth/[...all]` shadowed the static route, or the
          # deploy broke auth stitching. Separate axis from the OAuth provider
          # probe: catches handler-wired-wrong without depending on
          # Google/Apple console state.
          ok_url="https://jov.ie/api/auth/ok"
          attempt=1
          max_attempts=3
          until curl --fail --silent --show-error -o /dev/null -w "%{http_code}\n" "$ok_url" | grep -q '^200$'; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "ba_health=failed" >> "$GITHUB_OUTPUT"
              echo "❌ $ok_url did not return 200 after ${max_attempts} attempts."
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "⚠️ $ok_url not 200 on attempt ${attempt}/${max_attempts}; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done
          echo "ba_health=passed" >> "$GITHUB_OUTPUT"
          echo "✅ $ok_url returned 200 (Better Auth handler healthy)"

      - name: Probe production Google + Apple OAuth redirect URIs
        id: oauth-probe
        run: |
          # Hits the Google + Apple authorize endpoints with the EXACT redirect_uri
          # Better Auth hands them (https://jov.ie/api/auth/callback/<provider>)
          # and fails ONLY on a real provider rejection
          # (redirect_uri_mismatch / invalid_request). This is the gap the
          # staging canary cannot cover: production runs a different app host
          # + different OAuth clients than staging.
          cd apps/web
          mkdir -p tests/.auth
          echo '{"cookies":[],"origins":[]}' > tests/.auth/user.json
          attempt=1
          max_attempts=3
          until CI=true SMOKE_ONLY=1 BASE_URL="https://jov.ie" pnpm exec playwright test tests/e2e/oauth-providers.spec.ts --project=chromium --reporter=line; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "oauth_status=failed" >> "$GITHUB_OUTPUT"
              echo "❌ Production OAuth probe failed after ${max_attempts} attempts — Google/Apple reject Clerk's redirect_uri."
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "⚠ OAuth probe attempt ${attempt}/${max_attempts} failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done
          echo "oauth_status=passed" >> "$GITHUB_OUTPUT"
          echo "✅ Production Google + Apple accept Better Auth's redirect_uri"
      - name: Auto-rollback on confirmed auth break
        # Roll back ONLY on a confirmed auth regression (oauth_status=failed OR
        # ba_health=failed), never on an infra/setup failure — a spurious
        # rollback of a healthy deploy is worse than a one-cycle delay.
        if: ${{ failure() && (steps.oauth-probe.outputs.oauth_status == 'failed' || steps.ba-health.outputs.ba_health == 'failed') }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Production OAuth gate FAILED. Triggering auto-rollback..."
          ./node_modules/.bin/vercel rollback --yes --token "$VERCEL_TOKEN" 2>&1 || {
            echo "Auto-rollback failed or not supported. Manual intervention required."
            exit 1
          }
          echo "Auto-rollback completed"
      - name: Slack alert on OAuth failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                text: "🚨 Production Auth Gate FAILED — Better Auth handler unreachable OR Google/Apple reject redirect_uri. Auto-rollback triggered.",
                attachments: [{
                  color: "danger",
                  fields: [
                    {title: "Fix", value: "If BA handler 404s: catch-all /api/auth/[...all] shadowed /api/auth/ok or auth stitching broke. If OAuth probe failed: re-sync Google/Apple consoles via the /auth-console-sync skill (app host likely changed).", short: false},
                    {title: "Run", value: $run_url, short: false}
                  ]
                }]
              }')" || echo "Slack alert failed (non-fatal)"

  deploy-notify:
    name: Notify production deploy
    needs: [deploy-staging, canary-health-gate, promote-production, sentry-error-gate, production-oauth-gate]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve failure provenance
        id: failure-provenance
        if: ${{ always() }}
        run: |
          set -euo pipefail

          job_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}?check_suite_focus=true"

          echo "job_name=${{ github.job }}" >> "$GITHUB_OUTPUT"
          echo "job_url=$job_url" >> "$GITHUB_OUTPUT"

      - name: Slack notify (production deploy)
        if: ${{ needs.promote-production.result == 'success' && needs.canary-health-gate.result == 'success' && (needs.sentry-error-gate.result == 'success' || needs.sentry-error-gate.result == 'skipped') && (needs.production-oauth-gate.result == 'success' || needs.production-oauth-gate.result == 'skipped') && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-production'
          author_name: 'Deploy'
          custom_payload: |
            {
              "text": "✅ Production deployed: jov.ie",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Branch", "value": "main", "short": true },
                    { "title": "Workflow", "value": "CI", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notify (schema drift warning)
        if: ${{ needs.deploy-staging.result == 'success' && needs.deploy-staging.outputs.schema_drift == 'true' && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-production'
          author_name: 'Schema Drift'
          custom_payload: |
            {
              "text": "⚠️ Schema drift detected — deploy succeeded but Drizzle schema does not match the database",
              "attachments": [
                {
                  "color": "warning",
                  "fields": [
                    { "title": "Action Required", "value": "Generate missing migrations or remove orphaned schema definitions", "short": false },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Classify failure type
        id: classify-failure
        if: ${{ always() && (needs.deploy-staging.result == 'failure' || needs.canary-health-gate.result == 'failure' || needs.promote-production.result == 'failure' || needs.sentry-error-gate.result == 'failure' || needs.deploy-staging.result == 'cancelled' || needs.canary-health-gate.result == 'cancelled' || needs.promote-production.result == 'cancelled') }}
        run: |
          # Determine failure type for accurate Slack notification
          MIGRATION_STATUS="${{ needs.deploy-staging.outputs.migration_status }}"
          PREFLIGHT_STATUS="${{ needs.deploy-staging.outputs.preflight_status }}"
          DEPLOY_RESULT="${{ needs.deploy-staging.result }}"
          CANARY_RESULT="${{ needs.canary-health-gate.result }}"
          PROMOTE_RESULT="${{ needs.promote-production.result }}"
          SENTRY_RESULT="${{ needs.sentry-error-gate.result }}"

          # Treat cancellation of any deploy-chain job as alert-worthy.
          # Without this, runs cancelled mid-flight by merge-queue or
          # concurrency would silently succeed without any notification.
          if [ "$DEPLOY_RESULT" = "cancelled" ] || [ "$CANARY_RESULT" = "cancelled" ] || [ "$PROMOTE_RESULT" = "cancelled" ]; then
            echo "failure_type=cancelled" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=⛔" >> "$GITHUB_OUTPUT"
            echo "failure_title=Deploy cancelled mid-flight" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Deploy chain was cancelled before production promotion completed (deploy=$DEPLOY_RESULT canary=$CANARY_RESULT promote=$PROMOTE_RESULT)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Distinguish the silent-no-op regression (production kept old SHA
          # even though vercel promote exited 0) from a generic promote failure.
          PROMOTE_SUBTYPE="${{ needs.promote-production.outputs.failure_subtype }}"
          if [ "$PROMOTE_RESULT" = "failure" ] && [ "$PROMOTE_SUBTYPE" = "domain_project_mismatch" ]; then
            echo "failure_type=promote_domain_project_mismatch" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🧭" >> "$GITHUB_OUTPUT"
            echo "failure_title=Production domains are on the wrong Vercel project" >> "$GITHUB_OUTPUT"
            echo "failure_detail=One or more public production domains are missing from the canonical Vercel project or have incorrect redirect wiring. Production promotion was blocked before deploy." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PROMOTE_RESULT" = "failure" ] && [ "$PROMOTE_SUBTYPE" = "no_match" ]; then
            echo "failure_type=promote_no_match" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🕳️" >> "$GITHUB_OUTPUT"
            echo "failure_title=Promote found no matching deployment for this SHA" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Vercel API returned no READY deployment for github.sha. Production was NOT promoted. This is the silent-no-op state we previously caught only by eyeballing /api/health/build-info." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PROMOTE_RESULT" = "failure" ] && [ "$PROMOTE_SUBTYPE" = "verify_mismatch" ]; then
            echo "failure_type=promote_verify_mismatch" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🪞" >> "$GITHUB_OUTPUT"
            echo "failure_title=Promoted deployment reports mismatched runtime SHA" >> "$GITHUB_OUTPUT"
            echo "failure_detail=The Vercel API matched a deployment to github.sha via meta.githubCommitSha, but that deployment's /api/health/build-info returned 200 with a different commitSha across all retries. Check deployment/runtime integrity (meta.githubCommitSha vs the runtime VERCEL_GIT_COMMIT_SHA env)." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PROMOTE_RESULT" = "failure" ] && [ "$PROMOTE_SUBTYPE" = "verify_probe_failed" ]; then
            echo "failure_type=promote_verify_probe_failed" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=📡" >> "$GITHUB_OUTPUT"
            echo "failure_title=Post-promote verification probe failed" >> "$GITHUB_OUTPUT"
            echo "failure_detail=/api/health/build-info never returned a parseable 200 across the retry window. Cannot confirm whether production flipped. Check edge/CDN/origin health." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PROMOTE_RESULT" = "failure" ] && [ "$PROMOTE_SUBTYPE" = "missing_creds" ]; then
            echo "failure_type=promote_missing_creds" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🔑" >> "$GITHUB_OUTPUT"
            echo "failure_title=Promote missing Vercel credentials" >> "$GITHUB_OUTPUT"
            echo "failure_detail=VERCEL_TOKEN / VERCEL_PROJECT_ID / GITHUB_SHA unset inside promote-production. Check repo secrets." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PREFLIGHT_STATUS" = "failure" ]; then
            echo "failure_type=migration_preflight" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🚨" >> "$GITHUB_OUTPUT"
            echo "failure_title=DATABASE MIGRATION PREFLIGHT FAILED" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Migration preflight check failed - deployment was BLOCKED before any changes were made" >> "$GITHUB_OUTPUT"
          elif [ "$MIGRATION_STATUS" = "failure" ]; then
            echo "failure_type=migration" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🚨" >> "$GITHUB_OUTPUT"
            echo "failure_title=DATABASE MIGRATION FAILED" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Migration failed on production database - deployment was BLOCKED (no code deployed)" >> "$GITHUB_OUTPUT"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            echo "failure_type=deploy" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🔥" >> "$GITHUB_OUTPUT"
            echo "failure_title=Staging deploy failed" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Vercel preview deployment failed before production promotion" >> "$GITHUB_OUTPUT"
          elif [ "$CANARY_RESULT" = "failure" ]; then
            echo "failure_type=canary" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=⚠️" >> "$GITHUB_OUTPUT"
            echo "failure_title=CANARY HEALTH CHECK FAILED" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Staging health check failed - production was NOT updated" >> "$GITHUB_OUTPUT"
          elif [ "$PROMOTE_RESULT" = "failure" ]; then
            echo "failure_type=promote" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=🔥" >> "$GITHUB_OUTPUT"
            echo "failure_title=Production promotion failed" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Verified staging deploy could not be promoted to production" >> "$GITHUB_OUTPUT"
          elif [ "$SENTRY_RESULT" = "failure" ]; then
            echo "failure_type=sentry" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=📈" >> "$GITHUB_OUTPUT"
            echo "failure_title=SENTRY ERROR SPIKE DETECTED" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Post-deploy error rate exceeded threshold - auto-rollback triggered" >> "$GITHUB_OUTPUT"
          else
            echo "failure_type=unknown" >> "$GITHUB_OUTPUT"
            echo "failure_emoji=❓" >> "$GITHUB_OUTPUT"
            echo "failure_title=Production deploy failed" >> "$GITHUB_OUTPUT"
            echo "failure_detail=Unknown failure - check workflow logs" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack notify (migration failure - CRITICAL)
        if: ${{ always() && steps.classify-failure.outputs.failure_type == 'migration' && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'Deploy'
          custom_payload: |
            {
              "text": "🚨 DATABASE MIGRATION FAILED - Production deploy BLOCKED: jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Status", "value": "🛑 DEPLOYMENT BLOCKED - No code was deployed", "short": false },
                    { "title": "Failure", "value": "Database migration failed", "short": true },
                    { "title": "Branch", "value": "main", "short": true },
                    { "title": "Action Required", "value": "Fix migration and re-run pipeline", "short": false },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notify (migration preflight failure - CRITICAL)
        if: ${{ always() && steps.classify-failure.outputs.failure_type == 'migration_preflight' && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'Deploy'
          custom_payload: |
            {
              "text": "🚨 MIGRATION PREFLIGHT FAILED - Production deploy BLOCKED: jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Status", "value": "🛑 DEPLOYMENT BLOCKED - Preflight safety check failed", "short": false },
                    { "title": "Failure", "value": "Migration preflight validation failed", "short": true },
                    { "title": "Branch", "value": "main", "short": true },
                    { "title": "Action Required", "value": "Check migration journal integrity and database state", "short": false },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notify (canary failure - URGENT)
        if: ${{ always() && steps.classify-failure.outputs.failure_type == 'canary' && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'Deploy'
          custom_payload: |
            {
              "text": "⚠️ STAGING HEALTH CHECK FAILED - Production was NOT updated: staging.jov.ie",
              "attachments": [
                {
                  "color": "warning",
                  "fields": [
                    { "title": "Status", "value": "⚠️ STAGING verification failed before promotion", "short": false },
                    { "title": "Failure", "value": "Canary health gate failed", "short": true },
                    { "title": "Branch", "value": "main", "short": true },
                    { "title": "Action Required", "value": "Check https://staging.jov.ie or the preview deployment logs - production is still unchanged", "short": false },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notify (sentry error spike - URGENT)
        if: ${{ always() && steps.classify-failure.outputs.failure_type == 'sentry' && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'Deploy'
          custom_payload: |
            {
              "text": "📈 SENTRY ERROR SPIKE — Auto-rollback triggered: jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Status", "value": "📈 Error rate spiked post-deploy — auto-rollback triggered", "short": false },
                    { "title": "Branch", "value": "main", "short": true },
                    { "title": "Action Required", "value": "Check Sentry for new errors, verify rollback succeeded", "short": false },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notify (general deploy failure)
        if: ${{ always() && (steps.classify-failure.outputs.failure_type == 'deploy' || steps.classify-failure.outputs.failure_type == 'promote' || steps.classify-failure.outputs.failure_type == 'promote_domain_project_mismatch' || steps.classify-failure.outputs.failure_type == 'promote_no_match' || steps.classify-failure.outputs.failure_type == 'promote_verify_mismatch' || steps.classify-failure.outputs.failure_type == 'promote_verify_probe_failed' || steps.classify-failure.outputs.failure_type == 'promote_missing_creds' || steps.classify-failure.outputs.failure_type == 'cancelled' || steps.classify-failure.outputs.failure_type == 'unknown') && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'Deploy'
          custom_payload: |
            {
              "text": "${{ steps.classify-failure.outputs.failure_emoji }} ${{ steps.classify-failure.outputs.failure_title }}: jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Detail", "value": "${{ steps.classify-failure.outputs.failure_detail }}", "short": false },
                    { "title": "Branch", "value": "main", "short": true },
                    { "title": "Failing job", "value": "${{ steps.failure-provenance.outputs.job_name }}", "short": true },
                    { "title": "Failing job URL", "value": "<${{ steps.failure-provenance.outputs.job_url }}|View job>", "short": false },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Lighthouse CI - runs after production deploy to check performance on homepage + public profiles
  lighthouse-ci:
    name: Lighthouse CI (Production)
    needs: [promote-production]
    # Run after successful deploy (tests homepage + /tim profile)
    # Informational only -- performance regressions should not block deploys
    if: ${{ always() && needs.promote-production.result == 'success' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run Lighthouse CI against production
        run: for attempt in 1 2 3; do if pnpm --filter web exec lhci autorun --config=.lighthouserc.json; then exit 0; fi; echo "Lighthouse production attempt $attempt failed (PROTOCOL_TIMEOUT), retrying after 10s..."; sleep 10; done; echo "All 3 Lighthouse production attempts failed."; exit 1
