name: jovie-codeql-config

# Use the security-extended suite for broader SAST coverage
# This satisfies the OpenSSF Scorecard SAST recommendation
query-filters:
  - include:
      tags: security-extended

paths-ignore:
  - storybook-static/**
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/__tests__/**'
  - '**/__mocks__/**'
  - '**/fixtures/**'
  - docs/**
