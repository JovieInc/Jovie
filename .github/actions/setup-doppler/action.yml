name: 'Setup Doppler'
description: 'Install Doppler CLI and inject secrets into environment (Ubuntu/Debian runners only)'

inputs:
  doppler-token:
    description: 'Doppler service token for the target environment'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Doppler CLI
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates curl gnupg
        curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
        sudo apt-get update && sudo apt-get install doppler

    - name: Verify Doppler installation
      shell: bash
      run: doppler --version

    - name: Export Doppler secrets to environment
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
      run: |
        set -euo pipefail
        secrets_json="$(mktemp)"
        trap 'rm -f "$secrets_json"' EXIT

        # Export all Doppler secrets as environment variables for subsequent
        # steps. Use JSON + heredoc writes so multiline secrets (for example
        # PEM/private-key material) do not break GitHub's GITHUB_ENV parser.
        if ! doppler secrets download --no-file --format json > "$secrets_json"; then
          echo "❌ Failed to download Doppler secrets. Check token validity and project/config."
          exit 1
        fi

        while IFS= read -r entry; do
          decoded="$(printf '%s' "$entry" | base64 -d)"
          key="$(printf '%s' "$decoded" | jq -r '.key')"
          value="$(printf '%s' "$decoded" | jq -r '.value // ""')"

          # Values downloaded at runtime are not registered GitHub secrets, so
          # Actions will not redact them automatically when it prints a later
          # step's environment. Register each value before writing GITHUB_ENV.
          if [ -n "$value" ]; then
            masked_value="${value//'%'/'%25'}"
            masked_value="${masked_value//$'\r'/'%0D'}"
            masked_value="${masked_value//$'\n'/'%0A'}"
            printf '::add-mask::%s\n' "$masked_value"
          fi

          marker="EOF_${RANDOM}_$(date +%s%N)"
          {
            echo "${key}<<${marker}"
            printf '%s\n' "$value"
            echo "$marker"
          } >> "$GITHUB_ENV"
        done < <(jq -r 'to_entries[] | @base64' "$secrets_json")
        echo "✅ Doppler secrets loaded into environment"
