name: Upload safe Playwright artifact
description: Fail closed on unsafe Playwright output before artifact upload

inputs:
  name:
    description: Artifact name
    required: true
  path:
    description: Files or directories to upload
    required: true
  retention-days:
    description: Artifact retention in days
    required: false
    default: '7'
  if-no-files-found:
    description: Behavior when the path finds no files
    required: false
    default: warn
  compression-level:
    description: Zlib compression level
    required: false
    default: '6'
  overwrite:
    description: Replace an artifact with the same name
    required: false
    default: 'false'
  allow-images:
    description: Permit image-only evidence for an explicitly public or visual lane
    required: false
    default: 'false'
  allow-markdown:
    description: Permit scanned Markdown for an explicitly documented report lane
    required: false
    default: 'false'

outputs:
  artifact-id:
    description: GitHub artifact ID
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: GitHub artifact URL
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-digest:
    description: GitHub artifact digest
    value: ${{ steps.upload.outputs.artifact-digest }}

runs:
  using: composite
  steps:
    - name: Reject unsafe Playwright output
      id: guard
      shell: bash
      env:
        PLAYWRIGHT_ARTIFACT_ALLOW_IMAGES: ${{ inputs.allow-images }}
        PLAYWRIGHT_ARTIFACT_ALLOW_MARKDOWN: ${{ inputs.allow-markdown }}
        PLAYWRIGHT_ARTIFACT_PATHS: ${{ inputs.path }}
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        source_root="$GITHUB_WORKSPACE"
        if [[ "${PLAYWRIGHT_ARTIFACT_REQUIRE_PRODUCER_STAGE:-false}" == 'true' ]]; then
          producer_root="$RUNNER_TEMP/safe-playwright-producer"
          [[ -d "$producer_root" && ! -L "$producer_root" ]]
          [[ "$(realpath "$producer_root")" == "$producer_root" ]]
          [[ ! -e "$producer_root/pending" && ! -L "$producer_root/pending" ]]
          [[ ! -e "$producer_root/blocked" && ! -L "$producer_root/blocked" ]]
          [[ -f "$producer_root/current" && ! -L "$producer_root/current" ]]
          IFS='|' read -r current_binding stage_name extra < "$producer_root/current"
          [[ "$current_binding" == "${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}:${GITHUB_JOB}" ]]
          [[ -z "$extra" && "$stage_name" =~ ^stage-[0-9]+-[0-9]+$ ]]
          source_root="$producer_root/$stage_name"
          [[ -d "$source_root" && ! -L "$source_root" ]]
          [[ "$(realpath "$source_root")" == "$source_root" ]]
        fi
        outer_stage="$(mktemp -d "$RUNNER_TEMP/safe-playwright-upload.XXXXXX")"
        artifact_stage="$outer_stage/artifact"
        (
          cd "$source_root"
          GITHUB_WORKSPACE="$source_root" \
            PLAYWRIGHT_ARTIFACT_STAGE_DIR="$artifact_stage" \
            node "$GITHUB_ACTION_PATH/../../scripts/guard-playwright-artifacts.mjs"
        )
        {
          echo 'path<<PLAYWRIGHT_PATHS'
          echo "$artifact_stage/"
          echo 'PLAYWRIGHT_PATHS'
        } >> "$GITHUB_OUTPUT"
        chmod 0500 "$outer_stage"
    - name: Upload verified artifact
      id: upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ steps.guard.outputs.path }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
        compression-level: ${{ inputs.compression-level }}
        overwrite: ${{ inputs.overwrite }}
        # The immutable stage contains only guard-selected/scanned files. Include
        # Playwright's deterministic hidden `.last-run.json` evidence.
        include-hidden-files: true
