            last_green_sha: latestSuccess?.head_sha ?? '',
            failed_job_names: failedJobNames,
            systemic: systemic ? 'true' : 'false',
            repair_in_flight: repairInFlight ? 'true' : 'false',
            repair_marker_owned: repairMarkerOwned ? 'true' : 'false',
            repair_terminal: repairTerminal ? 'true' : 'false',
            repair_state_known: repairStateKnown ? 'true' : 'false',
