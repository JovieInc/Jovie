name: 'Setup Playwright (Chromium)'
description: 'Restores the Playwright browser cache and installs Chromium for @jovie/web'

# Chromium only, no apt-based `--with-deps`: slow font package mirrors can
# consume tight job budgets before tests run (see ci-layout-guard).
runs:
  using: 'composite'
  steps:
    - name: Verify baked Playwright prerequisites
      id: runner-prereqs
      shell: bash
      run: node .github/runner-image/verify-prerequisites.mjs --component playwright

    - name: Use baked Playwright browsers
      if: steps.runner-prereqs.outputs.playwright_warm == 'true'
      shell: bash
      run: |
        echo "PLAYWRIGHT_BROWSERS_PATH=${{ steps.runner-prereqs.outputs.playwright_browsers_path }}" >> "$GITHUB_ENV"

    - name: Cache Playwright Browsers
      if: steps.runner-prereqs.outputs.playwright_warm != 'true'
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-playwright-chromium-

    - name: Install Playwright (Chromium)
      if: steps.runner-prereqs.outputs.playwright_warm != 'true'
      shell: bash
      run: pnpm --filter=@jovie/web exec playwright install chromium
