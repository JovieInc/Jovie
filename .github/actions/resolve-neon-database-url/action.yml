name: Resolve Neon Database URL
description: Normalize an ephemeral Neon branch URL with stable database credentials

inputs:
  candidate_url:
    description: Primary Neon connection string candidate
    required: false
    default: ''
  fallback_candidate_url:
    description: Fallback Neon connection string candidate
    required: false
    default: ''
  credential_source_url:
    description: Preferred stable database URL to source username/password from
    required: false
    default: ''
  credential_fallback_url:
    description: Fallback stable database URL to source username/password from
    required: false
    default: ''
  connection_file:
    description: Optional path to a JSON artifact containing db_url / db_url_pooled
    required: false
    default: ''
  candidate_json_key:
    description: Preferred JSON key to read from connection_file when candidate_url is empty
    required: false
    default: ''
  fallback_json_key:
    description: Fallback JSON key to read from connection_file when fallback_candidate_url is empty
    required: false
    default: ''

outputs:
  database_url:
    description: Resolved Neon database URL
    value: ${{ steps.resolve.outputs.database_url }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      run: |
        set -euo pipefail

        CANDIDATE="${{ inputs.candidate_url }}"
        FALLBACK_CANDIDATE="${{ inputs.fallback_candidate_url }}"
        CONNECTION_FILE="${{ inputs.connection_file }}"

        if [ -n "$CONNECTION_FILE" ]; then
          if [ ! -f "$CONNECTION_FILE" ]; then
            echo "Neon DB connection artifact missing: $CONNECTION_FILE"
            exit 1
          fi

          if [ -z "$CANDIDATE" ] && [ -n "${{ inputs.candidate_json_key }}" ]; then
            CANDIDATE=$(jq -r --arg key "${{ inputs.candidate_json_key }}" '.[$key] // empty' "$CONNECTION_FILE")
          fi

          if [ -z "$FALLBACK_CANDIDATE" ] && [ -n "${{ inputs.fallback_json_key }}" ]; then
            FALLBACK_CANDIDATE=$(jq -r --arg key "${{ inputs.fallback_json_key }}" '.[$key] // empty' "$CONNECTION_FILE")
          fi
        fi

        if [ -z "$CANDIDATE" ]; then
          CANDIDATE="$FALLBACK_CANDIDATE"
        fi

        if [ -z "$CANDIDATE" ]; then
          echo "No candidate Neon DATABASE_URL available."
          exit 1
        fi

        CREDENTIAL_SOURCE="${{ inputs.credential_source_url }}"
        if [ -z "$CREDENTIAL_SOURCE" ]; then
          CREDENTIAL_SOURCE="${{ inputs.credential_fallback_url }}"
        fi

        if [ -z "$CREDENTIAL_SOURCE" ]; then
          echo "No stable credential source provided. Using candidate Neon URL as-is."
          echo "database_url=$CANDIDATE" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        RESOLVED_URL="$(
          CANDIDATE="$CANDIDATE" CREDENTIAL_SOURCE="$CREDENTIAL_SOURCE" node <<'NODE'
        const candidate = new URL(process.env.CANDIDATE);
        const source = new URL(process.env.CREDENTIAL_SOURCE);

        if (source.username) {
          candidate.username = source.username;
        }

        if (source.password) {
          candidate.password = source.password;
        }

        console.log(candidate.toString());
        NODE
        )"

        if [ -z "$RESOLVED_URL" ]; then
          echo "Failed to resolve Neon DATABASE_URL."
          exit 1
        fi

        echo "database_url=$RESOLVED_URL" >> "$GITHUB_OUTPUT"
