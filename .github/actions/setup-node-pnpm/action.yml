name: 'Setup Node.js and pnpm'
description: 'Sets up Node.js, pnpm, and installs dependencies with optimal caching'

runs:
  using: 'composite'
  steps:
    # Self-hosted runners reuse a workspace whose owner can differ from the job
    # user, tripping git's dubious-ownership guard. That makes turbo's SCM probe
    # report the checkout as "not part of a Git repository" and breaks
    # `turbo --affected` (typecheck/build/unit tests). Trust the workspace so SCM
    # detection works. No-op on hosted runners. Idempotent to avoid bloating the
    # self-hosted ~/.gitconfig across runs.
    - name: Trust workspace for git (self-hosted ownership)
      shell: bash
      run: |
        # No-op when git is not in PATH (minimal self-hosted runner environments).
        # The safe.directory concern only applies when git is actually used.
        if command -v git &>/dev/null; then
          git config --global --get-all safe.directory \
            | grep -qxF "$GITHUB_WORKSPACE" \
            || git config --global --add safe.directory "$GITHUB_WORKSPACE"
        fi

    # Per-job pnpm install dir (JOV-4175). Two prior failure modes on the
    # self-hosted pool, both from a shared persistent dest:
    #   1. default ~/setup-pnpm carried a pnpm v11 layout that crashed pinned
    #      9.15.4 ("Worker pnpm exited with code 1", run 29070623310)
    #   2. version-scoped ~/setup-pnpm-v9 raced between CONCURRENT runner
    #      processes on the same machine (shared $HOME) — ENOTEMPTY rmdir
    #      during action-setup's reinstall (job 86298003824)
    # runner.temp is per-job, so no sharing is possible; the pnpm tarball
    # re-download costs seconds. The package store stays shared and safe.
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        dest: ${{ runner.temp }}/setup-pnpm

    # Actions-cache-backed pnpm caching is GitHub-hosted only. Self-hosted
    # runners (jovie-runner) keep a persistent pnpm store on disk, so the
    # restore is pointless and the post-run save uploads ~1.2 GB — observed
    # stalling at 0 B/s and eating the whole job timeout (Typecheck cancelled
    # at 10m during the "Post Run" cache save, 2026-07-06).
    - name: Setup Node.js with pnpm cache
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: ${{ runner.environment == 'github-hosted' && 'pnpm' || '' }}
        cache-dependency-path: '**/pnpm-lock.yaml'

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      # Static self-hosted runners reuse this store across jobs. Ephemeral
      # containers do not, so actions/cache would upload the whole store during
      # teardown and can keep an otherwise-finished job occupied until timeout.
      if: >-
        runner.environment != 'github-hosted' &&
        !startsWith(runner.name, 'jovie-eph-') &&
        !startsWith(runner.name, 'jovie-iso-')
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ runner.name }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ runner.name }}-

    - name: Warm pnpm store
      shell: bash
      run: pnpm fetch --frozen-lockfile

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
