name: 'Create Neon Branch with Retry'
description: 'Create Neon branch with automatic cleanup and retry on limit errors'

inputs:
  project_id:
    description: 'Neon project ID'
    required: true
  branch_name:
    description: 'Sanitized branch name'
    required: true
  parent_branch:
    description: 'Parent branch name (optional)'
    required: false
  role:
    description: 'Database role (optional, defaults to neondb_owner)'
    required: false
    default: 'neondb_owner'
  api_key:
    description: 'Neon API key'
    required: true
  branch_limit:
    description: 'Total branch limit (default: 10)'
    required: false
    default: '10'
  protected_branches:
    description: 'Comma-separated list of protected branches'
    required: false
    default: 'main,development,preview,br-main,br-production'
  cleanup_threshold:
    description: 'Aggressive cleanup threshold (default: 3)'
    required: false
    default: '3'
  expires_in_hours:
    description: 'Hours until branch auto-expires (0 = no expiration). Acts as safety net if cleanup fails.'
    required: false
    default: '4'

outputs:
  branch_id:
    description: 'Created branch ID'
    value: ${{ steps.set-outputs.outputs.branch_id }}
  db_url:
    description: 'Direct database URL'
    value: ${{ steps.set-outputs.outputs.db_url }}
  db_url_pooled:
    description: 'Pooled database URL'
    value: ${{ steps.set-outputs.outputs.db_url_pooled }}
  connection_file:
    description: 'Path to connection.json written on the runner (preferred over outputs for secrets)'
    value: ${{ steps.set-outputs.outputs.connection_file }}

runs:
  using: 'composite'
  steps:
    - name: Compute expiration timestamp
      id: compute-expiry
      if: inputs.expires_in_hours != '0'
      shell: bash
      run: |
        HOURS="${{ inputs.expires_in_hours }}"
        # Compute expiration time in RFC 3339 format
        EXPIRES_AT=$(date -u -d "+${HOURS} hours" +"%Y-%m-%dT%H:%M:%SZ")
        echo "expires_at=$EXPIRES_AT" >> $GITHUB_OUTPUT
        echo "Branch will auto-expire at: $EXPIRES_AT (${HOURS}h from now)"

    - name: Create Neon branch with bounded capacity retry
      id: create-branch
      shell: bash
      env:
        NEON_API_KEY: ${{ inputs.api_key }}
        NEON_PROJECT_ID: ${{ inputs.project_id }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        PARENT_BRANCH: ${{ inputs.parent_branch }}
        ROLE_NAME: ${{ inputs.role }}
        EXPIRES_AT: ${{ steps.compute-expiry.outputs.expires_at }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        PROTECTED_BRANCHES: ${{ inputs.protected_branches }}
      run: bash "${{ github.action_path }}/create-branch-with-capacity-retry.sh"

    - name: Set outputs from successful attempt
      id: set-outputs
      shell: bash
      run: |
        set -euo pipefail
        CONNECTION_DIR="${RUNNER_TEMP:-/tmp}/neon-connection"
        CONNECTION_FILE="$CONNECTION_DIR/connection.json"

        if [ ! -f "$CONNECTION_FILE" ]; then
          echo "Neon connection file missing after create attempts: $CONNECTION_FILE"
          exit 1
        fi

        BRANCH_ID="$(cat "$CONNECTION_DIR/branch_id" 2>/dev/null || true)"
        DIRECT_URL="$(cat "$CONNECTION_DIR/db_url")"
        POOLED_URL="$(cat "$CONNECTION_DIR/db_url_pooled")"

        if [ -z "$DIRECT_URL" ] || [ -z "$POOLED_URL" ]; then
          echo "Neon connection files were empty."
          exit 1
        fi

        # Prefer file-backed outputs via multiline delimiters so passwords with
        # special characters (or secret-overlapping substrings) survive handoff.
        {
          echo "branch_id<<NEON_EOF"
          echo "$BRANCH_ID"
          echo "NEON_EOF"
          echo "db_url<<NEON_EOF"
          echo "$DIRECT_URL"
          echo "NEON_EOF"
          echo "db_url_pooled<<NEON_EOF"
          echo "$POOLED_URL"
          echo "NEON_EOF"
          echo "connection_file=$CONNECTION_FILE"
        } >> "$GITHUB_OUTPUT"

    - name: Report Neon branch status
      if: always()
      shell: bash
      env:
        CREATE_OUTCOME: ${{ steps.create-branch.outcome }}
        BRANCH_ID: ${{ steps.set-outputs.outputs.branch_id }}
      run: |
        if [ "$CREATE_OUTCOME" == "success" ]; then
          echo "✅ Neon branch ready after bounded provider admission: $BRANCH_ID" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        echo "❌ Neon provider admission failed or exhausted bounded retries" >> "$GITHUB_STEP_SUMMARY"
