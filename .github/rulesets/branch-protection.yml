# Main Branch Protection Ruleset
#
# This ruleset defines the native merge-queue admission policy:
#
# For first-party PRs (human or agent-authored):
#   required source checks pass → native queue validates the synthetic
#   merge_group head → squash merge → production controller
#
# For external fork PRs:
#   the same checks apply, and Fork PR Gate additionally requires a human
#   collaborator approval before queue admission.
#
# WHY 0 REQUIRED REVIEWS:
#   First-party automation can author PRs, and GitHub does not count a bot's
#   self-review. Rather than maintain an approval-only GitHub App, admission
#   relies on the required automated quality gates below:
#
#   Source PR:  CI fast lane (typecheck + lint + server boundaries + guardrails)
#               + migration, fork-origin, and size guards
#   Merge queue: latest-main combined-head unit, build/layout, migration,
#               iOS-when-affected, and deterministic eval evidence
#
#   Post-merge: production build + smoke/E2E + release health gates
#
# KEY DESIGN DECISIONS:
#
# 1. required_approving_review_count: 0
#    No approval required. The CI + merge queue + post-deploy gates
#    are the quality gates. Informational reviews may still be recorded,
#    but approval itself is not a first-party admission gate.
#
# 2. require_code_owner_review: false
#    CODEOWNERS auto-requests reviewers (so humans get notified) but
#    doesn't hard-gate.
#
# 3. dismiss_stale_reviews_on_push: false
#    Live policy has zero required reviews. Informational approvals remain in
#    the audit trail while exact-head CI and native merge_group evidence gate.
#
# 4. Simplified status checks: PR Ready + Migration Guard + Fork PR Gate
#    + PR Size Guard (the full live required set on ruleset 10512119).
#    Source PR Ready aggregates the deterministic fast lane. The same bare
#    context on merge_group aggregates deterministic unit, build/layout,
#    migration, iOS-when-affected, and eval evidence on the combined head.
#    Network/deploy/performance depth stays post-merge, scheduled, or manual.
#
# 5. Branch-specific checks are not required here
#    Every required context must be produced for every eligible source PR and
#    merge_group. Branch-specific automation therefore cannot be an admission
#    requirement in this repository-wide ruleset.
#
# 6. GitHub native merge queue
#    Existing producers keep applying merge-queue as an intent label; the
#    central controller converts that intent into exact-head native enrollment.
#    GitHub validates the synthetic merge_group head before squash-merging.
#
# 7. Fork PR Gate (required status check)
#    Since required_approving_review_count is 0, fork PRs from external
#    contributors could merge with zero reviews if CI passes. The Fork
#    PR Gate workflow (.github/workflows/fork-pr-gate.yml) closes this
#    gap: it auto-passes for non-fork PRs (agents + team) and blocks
#    fork PRs until a human collaborator submits an APPROVE review.
#    This preserves first-party queue throughput while preventing unreviewed
#    external code from reaching production.

name: 'Main Branch Protection'
enforcement: 'active'
target: 'branch'
conditions:
  ref_name:
    include:
      - 'refs/heads/main'
    exclude: []

rules:
  # ── Pull Request Reviews ──────────────────────────────────────────────
  - type: 'pull_request'
    parameters:
      # No first-party approval required. Required source checks, native queue
      # combined-head checks, and post-deploy release gates provide the
      # enforced quality boundaries. Reviews remain available for audit.
      required_approving_review_count: 0

      dismiss_stale_reviews_on_push: false

      # CODEOWNERS auto-requests reviewers for visibility but doesn't gate.
      require_code_owner_review: false

      # Not relevant with 0 required reviews, but kept false for consistency.
      require_last_push_approval: false

      # No review-thread gate with zero required approvals.
      required_review_thread_resolution: false

      # Match the live repository merge-method allowlist. The native queue
      # itself remains squash-only below.
      allowed_merge_methods: ['merge', 'squash', 'rebase']

      dismissal_restriction:
        enabled: false
        allowed_actors: []

      required_reviewers: []

  # ── Required Status Checks ────────────────────────────────────────────
  - type: 'required_status_checks'
    parameters:
      # Source branches need not rebase and rerun after every main merge;
      # the native queue validates each combined head against latest main.
      strict_required_status_checks_policy: false
      do_not_enforce_on_create: false
      required_status_checks:
        # PR Ready: The single aggregate gate for the fast PR lane.
        # Internally aggregates:
        #   ci-fast (typecheck + biome lint + eslint boundaries + guardrails)
        - context: 'PR Ready'

        # Migration Guard: Separate from PR Ready because it's independently
        # path-gated (only runs when DB/schema files change). Prevents
        # dangerous migration patterns from reaching production.
        - context: 'Migration Guard'

        # Fork PR Gate: Auto-passes for non-fork PRs (agents + team).
        # Blocks fork PRs from external contributors until a human
        # collaborator submits an APPROVE review. See design decision #7.
        - context: 'Fork PR Gate'

        # PR Size Guard: Caps PR size (800 lines / 40 files, tunable via repo
        # vars PR_MAX_LINES / PR_MAX_FILES) to force small, reviewable PRs.
        # Runs as its own workflow (.github/workflows/pr-size-guard.yml), so
        # the live context is the bare job name with no "CI /" prefix. Approved
        # mechanical codemods opt out with the `big-pr` label.
        - context: 'PR Size Guard'

  # Match live ruleset deletion protection. This applies to the main ref only.
  - type: 'deletion'

  # ── Linear History ─────────────────────────────────────────────────────
  - type: 'required_linear_history'
    # Squash-only history. Native queue configuration below matches this.

  # ── Merge Queue: GitHub native ─────────────────────────────────────────
  - type: 'merge_queue'
    parameters:
      merge_method: 'SQUASH'
      grouping_strategy: 'ALLGREEN'
      min_entries_to_merge: 1
      max_entries_to_merge: 10
      # At most two queued PRs may request checks concurrently, using expanded
      # runner capacity without an unbounded merge-group fan-out.
      max_entries_to_build: 2
      min_entries_to_merge_wait_minutes: 0
      check_response_timeout_minutes: 60

  # Dormant rules are intentionally absent from this applied payload:
  # `required_signatures` and `non_fast_forward`. Live ruleset 10512119 does
  # not enforce either rule, and native squash commits must not be surprised
  # by a future source apply. Enable only by an explicit reviewed live cutover.

# ── Bypass Actors ──────────────────────────────────────────────────────
# Native merge-queue cutover requires no Graphite or human bypass actor.
bypass_actors: []
