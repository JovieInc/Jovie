version: 2
updates:
  # Enable version updates for Node dependencies (npm ecosystem, pnpm-managed project)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'itstimwhite'
    assignees:
      - 'itstimwhite'
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps-dev'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    ignore:
      # Ignore ALL automated Clerk SDK updates — element-key naming drifts
      # silently between minor versions and breaks the AuthShell SSO-only
      # `appearance.elements` map (JOV-2446). Manually bump Clerk packages
      # in dedicated PRs that include a dogfooded /signin smoke + the
      # `clerk-config-audit` cron output.
      - dependency-name: '@clerk/nextjs'
      - dependency-name: '@clerk/backend'
      - dependency-name: '@clerk/clerk-js'
      - dependency-name: '@clerk/ui'
      - dependency-name: '@clerk/testing'
      - dependency-name: '@clerk/shared'
      - dependency-name: '@clerk/localizations'
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      # Temporary workaround: these packages do not publish 10.3.2.
      # Dependabot currently attempts that version and fails the update job.
      - dependency-name: 'storybook'
        versions: ['10.3.2']
      - dependency-name: '@storybook/addon-docs'
        versions: ['10.3.2']
      - dependency-name: '@storybook/nextjs-vite'
        versions: ['10.3.2']

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'itstimwhite'
    assignees:
      - 'itstimwhite'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'automated'

  # Enable version updates for Docker (if needed)
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'itstimwhite'
    assignees:
      - 'itstimwhite'
    commit-message:
      prefix: 'docker'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'docker'
      - 'automated'
