version: 2
updates:
  # Enable version updates for Node dependencies (npm ecosystem, pnpm-managed project)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'itstimwhite'
    assignees:
      - 'itstimwhite'
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps-dev'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: '@clerk/nextjs'
        update-types: ['version-update:semver-major']
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      # Temporary workaround: these packages do not publish 10.3.2.
      # Dependabot currently attempts that version and fails the update job.
      - dependency-name: 'storybook'
        versions: ['10.3.2']
      - dependency-name: '@storybook/addon-docs'
        versions: ['10.3.2']
      - dependency-name: '@storybook/nextjs-vite'
        versions: ['10.3.2']

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'itstimwhite'
    assignees:
      - 'itstimwhite'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'automated'

